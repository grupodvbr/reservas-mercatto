<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">

<title>Painel de Usuários • Mercatto</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
  --bg:#0b1220;
  --card:#111827;
  --border:#1f2937;
  --text:#fff;
  --muted:#9ca3af;
  --primary:#22c55e;
  --danger:#ef4444;
  --blue:#2563eb;
}

*{box-sizing:border-box;font-family:Inter}
body{margin:0;background:var(--bg);color:var(--text)}

.header{
  position:fixed;
  top:0;left:0;right:0;
  background:#020617;
  padding:16px;
  font-size:20px;
  font-weight:800;
  border-bottom:1px solid var(--border);
  z-index:10;
}

.container{
  padding:90px 15px 20px;
  max-width:1200px;
  margin:auto;
}

.filtros{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:15px;
}

input,select{
  padding:10px;
  border-radius:10px;
  border:1px solid var(--border);
  background:var(--card);
  color:#fff;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  padding:14px;
  margin-bottom:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
}

.nome{
  font-weight:700;
}

.mini{
  font-size:12px;
  color:var(--muted);
}

.botoes{
  display:flex;
  gap:8px;
}

button{
  border:none;
  padding:8px 12px;
  border-radius:8px;
  cursor:pointer;
  font-weight:600;
}

.aprovar{background:var(--primary);color:#000}
.editar{background:var(--blue);color:#fff}
.desativar{background:var(--danger);color:#fff}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.7);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:20;
}

.modalBox{
  background:#020617;
  padding:20px;
  border-radius:14px;
  width:95%;
  max-width:500px;
  max-height:90vh;
  overflow:auto;
}

.modal input, .modal select{
  width:100%;
  margin-bottom:10px;
}

.modal h2{
  margin-top:0;
}

.salvar{
  width:100%;
  background:var(--primary);
  color:#000;
  font-weight:800;
}

</style>
</head>

<body>

<div class="header">
  👥 Usuários do Sistema
</div>

<div class="container">

  <div class="filtros">
    <input id="busca" placeholder="Buscar nome...">
    
    <select id="empresaFiltro">
      <option value="">Todas Empresas</option>
      <option>MERCATTO DELICIA</option>
      <option>VILLA GOURMET</option>
      <option>EMPORIO MERCATTO</option>
    </select>
  </div>

  <div id="lista"></div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modalBox">

    <h2>Editar Usuário</h2>

    <input id="nome">
    <input id="email">
    <input id="telefone">
    <input id="cargo">
    
    <select id="empresa">
      <option>MERCATTO DELICIA</option>
      <option>VILLA GOURMET</option>
      <option>EMPORIO MERCATTO</option>
    </select>

    <select id="sexo">
      <option>Masculino</option>
      <option>Feminino</option>
      <option>Outro</option>
    </select>

    <input type="date" id="nascimento">
    <input type="date" id="admissao">

    <button class="salvar" onclick="salvar()">Salvar</button>

  </div>
</div>

<script>

// 🔥 CONFIG
const supabase = supabase.createClient(
  "https://dxkszikemntfusfyrzos.supabase.co",
  "sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
)

let dados = []
let atual = null

// 🔥 CARREGAR
async function carregar(){
  const {data} = await supabase
    .from("usuarios_do_sistema")
    .select("*")
    .order("criado_em",{ascending:false})

  dados = data
  render()
}

// 🔥 RENDER
function render(){
  const busca = document.getElementById("busca").value.toLowerCase()
  const empresa = document.getElementById("empresaFiltro").value

  const lista = document.getElementById("lista")
  lista.innerHTML = ""

  dados
  .filter(u => 
    (!busca || u.nome?.toLowerCase().includes(busca)) &&
    (!empresa || u.empresa === empresa)
  )
  .forEach(u => {

    lista.innerHTML += `
      <div class="card">
        <div>
          <div class="nome">${u.nome}</div>
          <div class="mini">${u.cargo} • ${u.empresa}</div>
          <div class="mini">${u.email || ''}</div>
        </div>

        <div class="botoes">
          <button class="aprovar" onclick="toggle('${u.id}',${u.ativo})">
            ${u.ativo ? 'Ativo' : 'Aprovar'}
          </button>

          <button class="editar" onclick='abrir(${JSON.stringify(u)})'>
            Editar
          </button>
        </div>
      </div>
    `
  })
}

// 🔥 ATIVAR / DESATIVAR
async function toggle(id,ativo){
  await supabase
    .from("usuarios_do_sistema")
    .update({ativo: !ativo})
    .eq("id",id)

  carregar()
}

// 🔥 ABRIR MODAL
function abrir(u){
  atual = u
  modal.style.display = "flex"

  nome.value = u.nome || ""
  email.value = u.email || ""
  telefone.value = u.telefone || ""
  cargo.value = u.cargo || ""
  empresa.value = u.empresa || ""
  sexo.value = u.sexo || "Masculino"
  nascimento.value = u.data_nascimento || ""
  admissao.value = u.data_admissao || ""
}

// 🔥 SALVAR
async function salvar(){
  await supabase
    .from("usuarios_do_sistema")
    .update({
      nome: nome.value,
      email: email.value,
      telefone: telefone.value,
      cargo: cargo.value,
      empresa: empresa.value,
      sexo: sexo.value,
      data_nascimento: nascimento.value,
      data_admissao: admissao.value,
      atualizado_em: new Date()
    })
    .eq("id",atual.id)

  modal.style.display = "none"
  carregar()
}

// 🔥 FILTROS
busca.oninput = render
empresaFiltro.onchange = render

// 🔥 INIT
carregar()

</script>

</body>
</html>

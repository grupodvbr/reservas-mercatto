<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Painel de Usuários</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
  --bg:#f1f5f9;
  --card:#ffffff;
  --border:#e2e8f0;
  --text:#0f172a;
  --muted:#64748b;
  --primary:#22c55e;
  --danger:#ef4444;
  --blue:#2563eb;
}

/* RESET */
*{box-sizing:border-box;font-family:Inter}
body{margin:0;background:var(--bg);color:var(--text)}

/* HEADER */
.header{
  position:fixed;
  top:0;left:0;right:0;
  background:#fff;
  padding:18px;
  font-size:20px;
  font-weight:800;
  border-bottom:1px solid var(--border);
  z-index:10;
}

/* CONTAINER */
.container{
  padding:95px 16px 20px;
  max-width:1100px;
  margin:auto;
}

/* FILTROS */
.filtros{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:20px;
}

input,select{
  padding:12px;
  border-radius:12px;
  border:1px solid var(--border);
  background:#fff;
}

/* CARD */
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  padding:16px;
  margin-bottom:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  transition:.2s;
}

.card:hover{box-shadow:0 8px 20px rgba(0,0,0,.05)}

.nome{font-weight:700}
.mini{font-size:13px;color:var(--muted)}

.status{font-weight:600}
.ativo{color:var(--primary)}
.inativo{color:var(--danger)}

.botoes{display:flex;gap:8px;margin-top:8px}

button{
  border:none;
  padding:8px 12px;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
}

.aprovar{background:var(--primary)}
.editar{background:var(--blue);color:#fff}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  display:none;
  align-items:center;
  justify-content:center;
}

.modalBox{
  background:#fff;
  padding:20px;
  border-radius:16px;
  width:95%;
  max-width:500px;
}

/* LOADER */
.loader{
  position:fixed;
  inset:0;
  background:rgba(255,255,255,.7);
  display:none;
  align-items:center;
  justify-content:center;
  font-weight:700;
}

/* TOAST */
.toast{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#111;
  color:#fff;
  padding:12px 16px;
  border-radius:10px;
  display:none;
}
</style>
</head>

<body>

<div class="header">👥 Usuários</div>

<div class="container">

  <div class="filtros">
    <input id="busca" placeholder="Buscar nome...">
    <select id="empresaFiltro">
      <option value="">Todas Empresas</option>
      <option>MERCATTO DELICIA</option>
      <option>VILLA GOURMET</option>
    </select>
  </div>

  <div id="lista"></div>

</div>

<div class="modal" id="modal">
  <div class="modalBox">
    <h3>Editar</h3>
    <input id="nome" placeholder="Nome">
    <input id="email" placeholder="Email">
    <input id="telefone" placeholder="Telefone">
    <button onclick="salvar()">Salvar</button>
  </div>
</div>

<div class="loader" id="loader">Carregando...</div>
<div class="toast" id="toast"></div>

<script>

// 🔥 SUPABASE (corrigido)
const sb = supabase.createClient(
  "https://dxkszikemntfusfyrzos.supabase.co",
  "sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
)

let dados = []
let atual = null

function showLoader(v){ loader.style.display = v ? "flex":"none" }

function toastMsg(msg){
  toast.innerText = msg
  toast.style.display = "block"
  setTimeout(()=>toast.style.display="none",2000)
}

// 🔥 LOAD
async function carregar(){
  showLoader(true)

  const {data,error} = await sb
    .from("usuarios_do_sistema")
    .select("*")

  if(error){ toastMsg("Erro ao carregar"); return }

  dados = data
  render()

  showLoader(false)
}

// 🔥 RENDER
function render(){
  const busca = buscaInput.value.toLowerCase()
  const empresa = empresaFiltro.value

  lista.innerHTML=""

  dados
  .filter(u =>
    (!busca || u.nome?.toLowerCase().includes(busca)) &&
    (!empresa || u.empresa === empresa)
  )
  .forEach(u=>{
    lista.innerHTML += `
      <div class="card">
        <div>
          <div class="nome">${u.nome}</div>
          <div class="mini">${u.cargo || ''}</div>
          <div class="status ${u.ativo?'ativo':'inativo'}">
            ${u.ativo?'● Ativo':'● Inativo'}
          </div>
        </div>

        <div class="botoes">
          <button class="aprovar" onclick="toggle('${u.id}',${u.ativo})">
            ${u.ativo?'Desativar':'Ativar'}
          </button>

          <button class="editar" onclick="abrir('${u.id}')">
            Editar
          </button>
        </div>
      </div>
    `
  })
}

// 🔥 TOGGLE
async function toggle(id,ativo){
  await sb.from("usuarios_do_sistema")
    .update({ativo:!ativo})
    .eq("id",id)

  toastMsg("Atualizado")
  carregar()
}

// 🔥 MODAL
function abrir(id){
  atual = dados.find(x=>x.id===id)
  modal.style.display="flex"

  nome.value = atual.nome || ""
  email.value = atual.email || ""
  telefone.value = atual.telefone || ""
}

// 🔥 SALVAR
async function salvar(){
  showLoader(true)

  await sb.from("usuarios_do_sistema")
    .update({
      nome:nome.value,
      email:email.value,
      telefone:telefone.value
    })
    .eq("id",atual.id)

  modal.style.display="none"
  toastMsg("Salvo com sucesso")
  carregar()
}

// 🔥 EVENTS
const buscaInput = document.getElementById("busca")
buscaInput.oninput = render
empresaFiltro.onchange = render

carregar()

</script>

</body>
</html>

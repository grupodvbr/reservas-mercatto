<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Usuários • Mercatto</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

/* ================= VARIÁVEIS ================= */
:root{
  --bg:#f1f5f9;
  --card:#ffffff;
  --border:#e2e8f0;
  --text:#0f172a;
  --muted:#64748b;
  --primary:#22c55e;
  --primary-dark:#16a34a;
  --danger:#ef4444;
  --blue:#2563eb;
}

/* ================= RESET ================= */
*{
  box-sizing:border-box;
  font-family:Inter, sans-serif;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
}

/* ================= HEADER ================= */
.header{
  position:fixed;
  top:0;left:0;right:0;
  background:#fff;
  padding:16px 18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid var(--border);
  z-index:10;
}

.title{
  font-size:18px;
  font-weight:800;
}

.badge{
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  color:#fff;
  padding:6px 12px;
  border-radius:12px;
  font-size:12px;
  font-weight:700;
}

/* ================= CONTAINER ================= */
.container{
  padding:90px 20px 20px;
  width:100%;
  max-width:none;
  margin:0;
}
/* ================= FILTROS ================= */
.filtros{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:20px;
}

/* INPUT GLOBAL */
input,select,textarea{
  flex:1;
  padding:14px 16px;
  border-radius:14px;
  border:1px solid var(--border);
  background:#fff;
  font-size:14px;
  transition:.2s;
}

input:focus,
select:focus,
textarea:focus{
  border-color:var(--blue);
  box-shadow:0 0 0 3px rgba(37,99,235,.1);
  outline:none;
}

/* ================= GRID ================= */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:18px;
}
/* ================= CARD ================= */
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:18px;
  padding:16px;
  display:flex;
  flex-direction:column;
  gap:8px;
  transition:.25s;
}

.card:hover{
  transform:translateY(-4px);
  box-shadow:0 18px 30px rgba(0,0,0,.08);
}

.nome{
  font-weight:700;
  font-size:15px;
}

.mini{
  font-size:13px;
  color:var(--muted);
}

/* STATUS */
.status{
  font-size:13px;
  font-weight:600;
}

.ativo{color:var(--primary)}
.inativo{color:var(--danger)}

/* ================= BOTÕES ================= */
.botoes{
  display:flex;
  gap:8px;
  margin-top:10px;
}

button{
  flex:1;
  border:none;
  padding:11px;
  border-radius:12px;
  font-weight:600;
  font-size:13px;
  cursor:pointer;
  transition:.2s;
}

button:active{
  transform:scale(.96);
}

.aprovar{
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  color:#fff;
}

.editar{
  background:linear-gradient(135deg,#3b82f6,#2563eb);
  color:#fff;
}

/* ================= MODAL OVERLAY ================= */
.modal{
  position:fixed;
  inset:0;
  background:rgba(15,23,42,.55);
  backdrop-filter:blur(6px);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
}

/* ================= MODAL BOX ================= */
.modalBox{
  position:relative;
  background:#fff;

  width:95%;
  max-width:1000px; /* 🔥 maior */

  height:auto; /* 🔥 remove altura travada */
  max-height:90vh;

  border-radius:20px;
  padding:24px;

  overflow:auto;
  ght:92vh;



  box-shadow:0 -20px 50px rgba(0,0,0,.18);

  animation:modalUp .35s ease;
}

/* ANIMAÇÃO */
@keyframes modalUp{
  from{transform:translateY(100%);opacity:0}
  to{transform:translateY(0);opacity:1}
}

/* HEADER MODAL */
.modalBox h3{
  font-size:18px;
  font-weight:800;
  margin-bottom:18px;
}

/* GRID INTERNO */
.modalGrid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:14px;
}
/* FULL WIDTH */
.full{
  grid-column:1/-1;
}

/* SENHA */
.senhaBox{
  display:flex;
  gap:6px;
}

.senhaBox input{
  flex:1;
}

.senhaBox button{
  width:48px;
  height:48px;
  border-radius:12px;
  background:#f1f5f9;
  border:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  font-size:16px;
}

/* TEXTAREA */
textarea{
  resize:none;
  min-height:90px;
}

/* BOTÃO SALVAR */
.salvar{
  margin-top:20px;
  padding:15px;
  border-radius:14px;
  font-size:15px;
  font-weight:700;
  color:#fff;

  background:linear-gradient(135deg,var(--primary),var(--primary-dark));

  display:block;
  margin-left:auto;
  margin-right:auto;
  width:180px;

  box-shadow:0 12px 25px rgba(34,197,94,.25);
}

/* FECHAR */
.closeModal{
  position:absolute;
  top:14px;
  right:14px;
  width:34px;
  height:34px;
  border-radius:50%;
  border:none;
  background:#f1f5f9;
  font-weight:700;
  cursor:pointer;
}

/* ================= LOADER ================= */
.loader{
  position:fixed;
  inset:0;
  background:rgba(255,255,255,.7);
  backdrop-filter:blur(4px);
  display:none;
  align-items:center;
  justify-content:center;
  font-weight:700;
  font-size:16px;
}

/* ================= TOAST ================= */
.toast{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#0f172a;
  color:#fff;
  padding:12px 18px;
  border-radius:12px;
  font-size:13px;
  display:none;
  box-shadow:0 10px 20px rgba(0,0,0,.2);
}

/* ================= MOBILE ================= */
@media(max-width:600px){

  .modalGrid{
    grid-template-columns:1fr;
  }

  .modalBox{
    height:95vh;
    padding:18px 14px;
  }

  .title{
    font-size:16px;
  }

}

</style>
</head>

<body>

<div class="header">
  <div class="title">👥 Usuários</div>
  <div class="badge" id="total">0</div>
</div>

<div class="container">

  <div class="filtros">
    <input id="busca" placeholder="Buscar usuário...">
    
    <select id="empresaFiltro">
      <option value="">Empresas</option>
      <option>MERCATTO DELICIA</option>
      <option>VILLA GOURMET</option>
      <option>EMPORIO MERCATTO</option>
    </select>
  </div>

  <div class="grid" id="lista"></div>

</div>







  
<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modalBox">

<h3>👤 Editar Usuário</h3>

<div class="modalGrid">

  <!-- LOGIN -->
  <input id="usuario" class="full" placeholder="Usuário">

  <div class="senhaBox full">
    <input id="senha" type="password" placeholder="Senha">
    <button onclick="toggleSenha()">👁</button>
  </div>

  <!-- DADOS -->
  <input id="nome" class="full" placeholder="Nome completo">

  <input id="email" placeholder="Email">
  <input id="telefone" placeholder="Telefone">

  <!-- PROFISSIONAL -->
  <input id="setor" placeholder="Setor">
  <input id="cargo" placeholder="Cargo">

  <select id="nivel">
    <option value="0">Administrador</option>
    <option value="1">Gerente</option>
    <option value="2">Funcionário</option>
  </select>

  <select id="empresa">
    <option>MERCATTO DELICIA</option>
    <option>VILLA GOURMET</option>
    <option>EMPORIO MERCATTO</option>
  </select>

  <!-- PESSOAL -->
  <select id="sexo">
    <option>Masculino</option>
    <option>Feminino</option>
    <option>Outro</option>
  </select>

  <input type="date" id="nascimento">

  <input type="date" id="admissao" class="full">

  <!-- ENDEREÇO -->
  <input id="endereco" class="full" placeholder="Endereço">

  <input id="cidade" placeholder="Cidade">
  <input id="estado" placeholder="Estado">

  <input id="cep" placeholder="CEP">
  <input id="status_funcionario" placeholder="Status">

  <!-- OBS -->
  <textarea id="obs" class="full" placeholder="Observações"></textarea>

</div>

    <button class="salvar" onclick="salvar()">Salvar</button>

  </div>
</div>

<div class="loader" id="loader">Carregando...</div>
<div class="toast" id="toast"></div>

<script>

// 🔥 SUPABASE
const sb = supabase.createClient(
  "https://dxkszikemntfusfyrzos.supabase.co",
  "sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
)

let dados = []
let atual = null

const loader = document.getElementById("loader")
const toast = document.getElementById("toast")

function showLoader(v){ loader.style.display = v ? "flex":"none" }

function toastMsg(msg){
  toast.innerText = msg
  toast.style.display="block"
  setTimeout(()=>toast.style.display="none",2000)
}

// 🔥 LOAD
async function carregar(){
  showLoader(true)

  const {data,error} = await sb
    .from("usuarios_do_sistema")
    .select("*")
    .order("criado_em",{ascending:false})

  if(error){
    toastMsg("Erro ao carregar")
    showLoader(false)
    return
  }

  dados = data
  total.innerText = dados.length

  render()
  showLoader(false)
}

// 🔥 RENDER
function render(){
  const busca = buscaInput.value.toLowerCase()
  const empresa = empresaFiltro.value

  lista.innerHTML=""

  dados
  .filter(u =>
    (!busca || u.nome?.toLowerCase().includes(busca)) &&
    (!empresa || u.empresa === empresa)
  )
  .forEach(u=>{



    
lista.innerHTML += `
  <div class="card">

    <div style="display:flex;align-items:center;gap:10px">

      <div style="
        width:42px;
        height:42px;
        border-radius:50%;
        overflow:hidden;
        background:#e5e7eb;
        display:flex;
        align-items:center;
        justify-content:center;
        font-weight:700;
        color:#64748b;
      ">
        ${
          u.foto_url 
          ? `<img src="${u.foto_url}" style="width:100%;height:100%;object-fit:cover">`
          : u.nome?.charAt(0)
        }
      </div>

      <div>
        <div class="nome">${u.nome}</div>
        <div class="mini">${u.cargo || ''}</div>
      </div>

    </div>

<div class="mini" style="font-weight:600;color:#334155">
  ${u.empresa}
</div>
    

        <div class="status ${u.ativo?'ativo':'inativo'}">
          ${u.ativo?'● Ativo':'● Inativo'}
        </div>

        <div class="botoes">
          <button class="aprovar" onclick="toggle('${u.id}',${u.ativo})">
            ${u.ativo?'Desativar':'Ativar'}
          </button>

          <button class="editar" onclick="abrir('${u.id}')">
            Editar
          </button>
        </div>
      </div>
    `
  })
}

// 🔥 TOGGLE
async function toggle(id,ativo){
  await sb.from("usuarios_do_sistema")
    .update({ativo:!ativo})
    .eq("id",id)

  toastMsg("Atualizado")
  carregar()
}

// 🔥 MODAL
function abrir(id){
  atual = dados.find(x=>x.id===id)

  modal.style.display="flex"

  usuario.value = atual.usuario || ""
  senha.value = atual.senha || ""

  nome.value = atual.nome || ""
  email.value = atual.email || ""
  telefone.value = atual.telefone || ""

  empresa.value = atual.empresa || ""
  setor.value = atual.setor || ""
  cargo.value = atual.cargo || ""

  nivel.value = atual.nivel_acesso ?? 2

  sexo.value = atual.sexo || "Masculino"

  nascimento.value = atual.data_nascimento || ""
  admissao.value = atual.data_admissao || ""

  endereco.value = atual.endereco || ""
  cidade.value = atual.cidade || ""
  estado.value = atual.estado || ""
  cep.value = atual.cep || ""

  status_funcionario.value = atual.status_funcionario || ""

  obs.value = atual.observacoes || ""
}

// 🔥 SALVAR
async function salvar(){
  showLoader(true)

await sb.from("usuarios_do_sistema")
.update({
  usuario: usuario.value,
  senha: senha.value,

  nome: nome.value,
  email: email.value,
  telefone: telefone.value,

  empresa: empresa.value,
  setor: setor.value,
  cargo: cargo.value,
  nivel_acesso: Number(nivel.value),

  sexo: sexo.value,

  data_nascimento: nascimento.value,
  data_admissao: admissao.value,

  endereco: endereco.value,
  cidade: cidade.value,
  estado: estado.value,
  cep: cep.value,

  status_funcionario: status_funcionario.value,
  observacoes: obs.value,

  atualizado_em: new Date()
})
.eq("id", atual.id)


  

  modal.style.display="none"
  toastMsg("Salvo com sucesso")
  carregar()
}

// 🔥 EVENTS
const buscaInput = document.getElementById("busca")
buscaInput.oninput = render
empresaFiltro.onchange = render

// 🔥 INIT
carregar()
document.getElementById("busca").value = "";

function toggleSenha(){
  senha.type = senha.type === "password" ? "text" : "password"
}



  

</script>

</body>
</html>

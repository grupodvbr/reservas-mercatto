<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sushi • Analítico PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<style>
:root{
  --primary:#ff6a00;
  --bg:#f6f7fb;
  --card:#ffffff;
  --border:#e5e7eb;
  --muted:#6b7280;
  --radius:16px;
  --shadow:0 10px 28px rgba(0,0,0,.08);
}

*{
  box-sizing:border-box;
  font-family:Inter;
}

body{
  margin:0;
  background:var(--bg);
}

/* ===== CONTAINER ===== */
.app{
  width:100%;
  max-width:1400px;
  margin:auto;
  padding:16px;
}

/* ===== HEADER ===== */
.title{
  font-size:22px;
  font-weight:900;
}

/* ===== CARD ===== */
.card{
  background:var(--card);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:16px;
  margin-bottom:14px;
}

/* ===== FILTROS ===== */
.filters{
  display:grid;
  grid-template-columns: 200px 260px 1fr 140px;
  gap:10px;
  align-items:center;
}

.filters input,
.filters select{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid var(--border);
  font-size:14px;
}

.filters button{
  background:var(--primary);
  color:#fff;
  border:none;
  border-radius:10px;
  padding:10px;
  font-weight:800;
  cursor:pointer;
}

/* ===== KPIs ===== */
.kpis{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
}

.kpi{
  background:#f8fafc;
  border-radius:12px;
  padding:12px;
}

.kpi small{
  color:var(--muted);
  font-size:12px;
}

.kpi h3{
  margin:6px 0 0;
  font-size:20px;
  font-weight:900;
}

/* ===== GRÁFICO ===== */
.chart-wrap{
  width:100%;
  height:260px;
  margin-top:10px;
}

/* ===== TABELA ===== */
table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

th{
  text-align:left;
  font-size:12px;
  color:var(--muted);
  padding:8px;
  border-bottom:2px solid var(--border);
}

td{
  padding:8px;
  font-size:13px;
  border-bottom:1px solid #f1f5f9;
}

tbody tr:hover{
  background:#f8fafc;
}

/* ===== CORES DINÂMICAS ===== */
.desp{
  color:#dc2626;
  font-weight:700;
}

.ok{
  color:#16a34a;
  font-weight:700;
}

/* ===== RESPONSIVO ===== */
@media(max-width:900px){

  .filters{
    grid-template-columns:1fr;
  }

  .kpis{
    grid-template-columns:1fr 1fr;
  }

  .chart-wrap{
    height:220px;
  }

}
</style>
</head>

<body>

<div class="app">

<div class="card">
  <div class="title">🍣 Análise Sushi PRO</div>
</div>

<div class="card">
  <div class="filters">

<select id="empresa">
  <option value="">Todas empresas</option>
  <option value="MERCATTO">Mercatto</option>
  <option value="VILLA">Villa</option>
</select>

<input id="range" placeholder="Período">
<input id="busca" placeholder="Buscar item...">

<button onclick="carregar()">Atualizar</button>

  </div>
</div>

<div class="card">
  <div class="kpis">
    <div class="kpi">
      <small>Produção</small>
      <h3 id="prod">0</h3>
    </div>

    <div class="kpi">
      <small>Reaproveitamento</small>
      <h3 id="reap">0</h3>
    </div>

    <div class="kpi">
      <small>Desperdício</small>
      <h3 id="desp">0</h3>
    </div>

    <div class="kpi">
      <small>% Erro</small>
      <h3 id="erro">0%</h3>
    </div>
  </div>
</div>

<div class="card">
  <b>Produção por dia</b>
<div class="chart-wrap">
  <canvas id="chart"></canvas>
</div>
</div>

<div class="card">
  <b>Ranking de Itens</b>
  <table>
    <thead>
      <tr>
        <th>Item</th>
        <th>Prod</th>
        <th>Reap</th>
        <th>Desp</th>
        <th>% Erro</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

</div>

<script>

const sb = supabase.createClient(
  "https://dxkszikemntfusfyrzos.supabase.co",
  "sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
);

let rangeSelecionado = [
  new Date(Date.now()-6*86400000).toISOString().slice(0,10),
  new Date().toISOString().slice(0,10)
];

flatpickr("#range",{
  mode:"range",
  dateFormat:"Y-m-d",
  defaultDate:rangeSelecionado,
  onChange:(d)=>{
    if(d.length===2){
      rangeSelecionado = d.map(x=>x.toISOString().slice(0,10));
    }
  }
});

let chart;

async function carregar(){

let dados = [];
let pagina = 0;

while(true){

  let query = sb
    .from("controle_sushi")
    .select("*")
    .gte("data_registro", rangeSelecionado[0])
    .lte("data_registro", rangeSelecionado[1])
    .range(pagina*1000, (pagina+1)*1000 - 1);

  const empresa = document.getElementById("empresa").value;

  if(empresa){
    query = query.eq("empresa", empresa); // 🔥 só funciona se coluna existir
  }

  const { data, error } = await query;

  if(error){
    console.error(error);
    break;
  }

  if(!data || data.length === 0) break;

  dados = dados.concat(data);

  if(data.length < 1000) break;

  pagina++;
}

// ===== PROCESSAMENTO =====

const porItem = {};
const porDia = {};

let prod=0, reap=0, desp=0;

const busca = document.getElementById("busca").value.toLowerCase();

dados.forEach(r=>{

  if(busca && !r.nome.toLowerCase().includes(busca)) return;

  porItem[r.nome] ||= {prod:0,reap:0,desp:0};

  const q = Number(r.quantidade || 0);

  if(r.tipo === "Produção"){
    porItem[r.nome].prod += q;
    prod += q;

    porDia[r.data_registro] = (porDia[r.data_registro]||0) + q;
  }

  if(r.tipo === "Reaproveitamento"){
    porItem[r.nome].reap += q;
    reap += q;
  }

  if(r.tipo === "Desperdício"){
    porItem[r.nome].desp += q;
    desp += q;
  }

});

// ===== KPIS =====

document.getElementById("prod").innerText = prod.toFixed(2);
document.getElementById("reap").innerText = reap.toFixed(2);
document.getElementById("desp").innerText = desp.toFixed(2);

const erro = prod > 0 ? (desp / prod * 100) : 0;
document.getElementById("erro").innerText = erro.toFixed(1)+"%";

// ===== TABELA =====

tbody.innerHTML = Object.entries(porItem)
.sort((a,b)=>b[1].prod - a[1].prod)
.map(([nome,v])=>{

  const total = v.prod;
  const perc = total > 0 ? (v.desp/total*100) : 0;

  return `
  <tr>
    <td><b>${nome}</b></td>
    <td>${v.prod.toFixed(2)}</td>
    <td>${v.reap.toFixed(2)}</td>
    <td style="color:red">${v.desp.toFixed(2)}</td>
    <td style="font-weight:900;color:${perc>30?'#dc2626':'#16a34a'}">
      ${perc.toFixed(1)}%
    </td>
  </tr>
  `;
}).join("");

// ===== GRÁFICO =====

const dias=[];
const valores=[];
const cores=[];

let d = new Date(rangeSelecionado[0]);
const fim = new Date(rangeSelecionado[1]);

while(d <= fim){

  const iso = d.toISOString().slice(0,10);
  const val = porDia[iso] || 0;

  dias.push(iso);
  valores.push(val);
  cores.push(val===0 ? "#dc2626" : "#2563eb");

  d = new Date(d.getTime()+86400000);
}

if(chart) chart.destroy();

chart = new Chart(document.getElementById("chart"),{
  type:"line",
  data:{
    labels:dias,
    datasets:[{
      data:valores,
      pointBackgroundColor:cores,
      borderColor:"#2563eb",
      tension:.3
    }]
  },
  options:{
    plugins:{legend:{display:false}},
    responsive:true
  }
});

}

carregar();

document.getElementById("busca").oninput = carregar;

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Agenda Checklist</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:Inter;margin:0;background:#f1f5f9;padding:20px}
.card{background:#fff;padding:20px;border-radius:10px;margin-bottom:15px}

input{width:100%;padding:10px;margin-top:5px;border:1px solid #ccc;border-radius:6px}

.lista{
border:1px solid #ccc;
max-height:150px;
overflow:auto;
margin-top:5px;
}

.item{
padding:10px;
cursor:pointer;
}
.item:hover{background:#eee}

table{width:100%;margin-top:10px;border-collapse:collapse}
td,th{border:1px solid #ddd;padding:6px;text-align:center}

button{padding:8px 10px;border:none;border-radius:6px;cursor:pointer}
</style>
</head>

<body>

<div class="card">
<h3>Selecionar Usuário</h3>

<input id="buscaUsuario" placeholder="Digite o nome...">
<div id="listaUsuarios" class="lista"></div>

<input type="date" id="data">
</div>

<div class="card">
<h3>Buscar Tarefa</h3>

<input id="buscaTarefa" placeholder="Digite tarefa...">
<div id="listaTarefas" class="lista"></div>
</div>

<div class="card">
<h3>Agenda</h3>

<table>
<thead>
<tr>
<th>Tarefa</th>
<th>Inicio</th>
<th>Fim</th>
<th>Status</th>
<th></th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>

<button onclick="salvar()">Salvar</button>
</div>

<!-- MODAL -->
<div id="modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);align-items:center;justify-content:center">
<div style="background:#fff;padding:20px;border-radius:10px;width:250px">

<h4>Horário</h4>
<input type="time" id="inicio">
<input type="time" id="fim">

<button onclick="confirmar()">OK</button>

</div>
</div>

<script>
const sb = supabase.createClient(
"https://dxkszikemntfusfyrzos.supabase.co",
"sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
);

let usuarioSelecionado=null;
let tarefas=[];
let tempTarefa=null;

// 🔎 BUSCAR USUARIO (IGUAL SEU SISTEMA)
buscaUsuario.onkeyup = async ()=>{

const q = buscaUsuario.value;

if(q.length < 1){
listaUsuarios.innerHTML="";
return;
}

const { data } = await sb
.from("usuarios_do_sistema")
.select("usuario,nome,setor")
.ilike("nome", `%${q}%`)
.limit(10);

listaUsuarios.innerHTML="";

data.forEach(u=>{
listaUsuarios.innerHTML+=`
<div class="item" onclick="selUser('${u.usuario}','${u.nome}')">
${u.nome} (${u.setor || 'SEM SETOR'})
</div>
`;
});
};

function selUser(usuario,nome){
usuarioSelecionado=usuario;
buscaUsuario.value=nome;
listaUsuarios.innerHTML="";
}

// 🔎 BUSCAR TAREFA
buscaTarefa.onkeyup = async ()=>{

const q = buscaTarefa.value;

if(q.length < 1){
listaTarefas.innerHTML="";
return;
}

const { data } = await sb
.from("checklist_mercatto")
.select("*")
.ilike("tarefa", `%${q}%`)
.limit(10);

listaTarefas.innerHTML="";

data.forEach(t=>{
listaTarefas.innerHTML+=`
<div class="item" onclick="add('${t.tarefa}')">
${t.tarefa}
</div>
`;
});
};

function add(t){
tempTarefa=t;
modal.style.display="flex";
}

// CONFIRMAR HORARIO
function confirmar(){

const inicio = document.getElementById("inicio").value;
const fim = document.getElementById("fim").value;

tarefas.push({tarefa:tempTarefa,inicio,fim});

modal.style.display="none";
render();
}

// RENDER
function render(){

tabela.innerHTML="";

tarefas.forEach((t,i)=>{

const agora = new Date();
const hoje = agora.toISOString().split("T")[0];
const fim = new Date(`${hoje}T${t.fim}`);

const status = agora > fim ? "Atrasado" : "Dentro";

tabela.innerHTML+=`
<tr>
<td>${t.tarefa}</td>
<td>${t.inicio}</td>
<td>${t.fim}</td>
<td>${status}</td>
<td><button onclick="rem(${i})">X</button></td>
</tr>
`;
});
}

function rem(i){
tarefas.splice(i,1);
render();
}

// SALVAR
async function salvar(){

const dataAgenda = document.getElementById("data").value;

const inserts = tarefas.map(t=>({
usuario:usuarioSelecionado,
tarefa:t.tarefa,
data:dataAgenda,
hora_inicio:t.inicio,
hora_fim:t.fim,
status_execucao:"pendente"
}));

await sb.from("agenda_checklist").insert(inserts);

alert("Salvo!");
tarefas=[];
render();
}
</script>

</body>
</html>

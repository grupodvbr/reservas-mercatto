<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Agenda Checklist</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
/* RESET */
*{
  box-sizing:border-box;
}

/* BODY */
body{
  margin:0;
  font-family: 'Inter', sans-serif;
  background: linear-gradient(180deg,#f8fafc,#eef2f7);
  padding:20px;
}

/* GRID PRINCIPAL */
.layout{
  max-width:1200px;
  margin:auto;
}

/* LINHA SUPERIOR */
.topo{
  display:grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap:20px;
  margin-bottom:20px;
}

/* AREA INFERIOR */
.bottom{
  width:100%;
}

/* CARD */
.card{
  background:#fff;
  padding:20px;
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,0.05);
  border:1px solid #e5e7eb;
  height:100%;
}

/* TITULOS */
h3{
  margin:0 0 10px;
  font-size:15px;
  font-weight:700;
  color:#111827;
}

/* INPUT */
input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #d1d5db;
  margin-top:6px;
}

/* LISTA */
.lista{
  border:1px solid #e5e7eb;
  border-radius:10px;
  max-height:180px;
  overflow:auto;
  margin-top:8px;
}

.item{
  padding:10px;
  cursor:pointer;
}

.item:hover{
  background:#f1f5f9;
}

/* TABELA */
table{
  width:100%;
  border-collapse:collapse;
  font-size:12px;
  margin-top:10px;
}

th,td{
  padding:8px;
  border-bottom:1px solid #e5e7eb;
  text-align:center;
}

/* BOTÕES */
button{
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

button[onclick="salvar()"]{
  width:100%;
  background:linear-gradient(90deg,#2563eb,#3b82f6);
  color:#fff;
}

/* CALENDARIO FULL */
.calendario-box{
  background:#fff;
  padding:20px;
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,0.05);
  border:1px solid #e5e7eb;
}

/* GRID CALENDARIO */
.cal-grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:10px;
  margin-top:10px;
}

/* DIAS */
.cal-day{
  padding:15px;
  background:#f1f5f9;
  border-radius:10px;
  text-align:center;
  cursor:pointer;
  font-weight:600;
}

.cal-day:hover{
  background:#3b82f6;
  color:#fff;
}

/* HEADER */
.cal-header{
  text-align:center;
  font-weight:700;
  font-size:16px;
}

/* RESPONSIVO */
@media(max-width:900px){
  .topo{
    grid-template-columns:1fr;
  }
}






  
</style>
</head>

<body>

<div class="layout">

  <!-- 🔝 TOPO -->
  <div class="topo">

    <!-- USUÁRIO -->
    <div class="card">
      <h3>Selecionar Usuário</h3>

      <input id="buscaUsuario" placeholder="Digite o nome...">
      <div id="listaUsuarios" class="lista"></div>

      <input type="date" id="data">
    </div>

    <!-- BUSCAR TAREFA -->
    <div class="card">
      <h3>Buscar Tarefa</h3>

      <input id="buscaTarefa" placeholder="Digite tarefa...">
      <div id="listaTarefas" class="lista"></div>
    </div>

    <!-- AGENDA -->
    <div class="card">
      <h3>Agenda</h3>

      <table>
        <thead>
          <tr>
            <th>Tarefa</th>
            <th>Inicio</th>
            <th>Fim</th>
            <th>Status</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tabela"></tbody>
      </table>

      <button onclick="salvar()">Salvar</button>
    </div>

  </div>

  <!-- 🔽 PARTE DE BAIXO -->
  <div class="bottom">

    <!-- CALENDÁRIO -->
    <div class="calendario-box">
      <div id="calendario"></div>
    </div>

    <!-- TAREFAS DO DIA -->
    <div class="card" style="margin-top:20px;">
      <h3>Tarefas do Dia</h3>

      <table>
        <thead>
          <tr>
            <th>Tarefa</th>
            <th>Início</th>
            <th>Fim</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="tarefasDia"></tbody>
      </table>
    </div>

  </div>

</div>
<!-- MODAL -->
<div id="modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);align-items:center;justify-content:center">
<div style="background:#fff;padding:20px;border-radius:10px;width:250px">

<h4>Horário</h4>
<input type="time" id="inicio">
<input type="time" id="fim">

<button onclick="confirmar()">OK</button>

</div>
</div>

<script>
const sb = supabase.createClient(
"https://dxkszikemntfusfyrzos.supabase.co",
"sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
);

let usuarioSelecionado=null;
let tarefas=[];
let tempTarefa=null;

// 🔎 BUSCAR USUARIO (IGUAL SEU SISTEMA)
buscaUsuario.onkeyup = async ()=>{

const q = buscaUsuario.value;

if(q.length < 1){
listaUsuarios.innerHTML="";
return;
}

const { data } = await sb
.from("usuarios_do_sistema")
.select("usuario,nome,setor")
.ilike("nome", `%${q}%`)
.limit(10);

listaUsuarios.innerHTML="";

data.forEach(u=>{
listaUsuarios.innerHTML+=`
<div class="item" onclick="selUser('${u.usuario}','${u.nome}')">
${u.nome} (${u.setor || 'SEM SETOR'})
</div>
`;
});
};

function selUser(usuario,nome){
usuarioSelecionado=usuario;
buscaUsuario.value=nome;
listaUsuarios.innerHTML="";

gerarCalendario(); // 🔥 AQUI
}

// 🔎 BUSCAR TAREFA
buscaTarefa.onkeyup = async ()=>{

const q = buscaTarefa.value;

if(q.length < 1){
listaTarefas.innerHTML="";
return;
}

const { data } = await sb
.from("checklist_mercatto")
.select("tarefa, obrigatorio_foto")
.ilike("tarefa", `%${q}%`)
.limit(10);

listaTarefas.innerHTML="";

data.forEach(t=>{
listaTarefas.innerHTML+=`
<div class="item" onclick="add('${t.tarefa}', ${t.obrigatorio_foto})">
${t.tarefa} ${t.obrigatorio_foto ? '📎' : ''}
</div>
`;
});
};

function add(t, obrigatorio){
tempTarefa = {
tarefa: t,
obrigatorio_foto: obrigatorio
};
modal.style.display="flex";
}

// CONFIRMAR HORARIO
function confirmar(){

const inicio = document.getElementById("inicio").value;
const fim = document.getElementById("fim").value;

tarefas.push({
tarefa: tempTarefa.tarefa,
inicio,
fim,
obrigatorio_foto: tempTarefa.obrigatorio_foto
});


  
modal.style.display="none";
render();
}

// RENDER
function render(){

tabela.innerHTML="";

tarefas.forEach((t,i)=>{

const agora = new Date();
const hoje = agora.toISOString().split("T")[0];
const fim = new Date(`${hoje}T${t.fim}`);

const status = agora > fim ? "Atrasado" : "Dentro";

tabela.innerHTML+=`
<tr>
<td>${t.tarefa} ${t.obrigatorio_foto ? '📎' : ''}</td>
<td>${t.inicio}</td>
<td>${t.fim}</td>
<td>${status}</td>
<td><button onclick="rem(${i})">X</button></td>
</tr>
`;
});
}

function rem(i){
tarefas.splice(i,1);
render();
}

// SALVAR
async function salvar(){

const dataAgenda = document.getElementById("data").value;

const inserts = tarefas.map(t=>({
usuario:usuarioSelecionado,
tarefa:t.tarefa,
data:dataAgenda,
hora_inicio:t.inicio,
hora_fim:t.fim,
status_execucao:"pendente",
obrigatorio_foto: t.obrigatorio_foto
}));

await sb.from("agenda_checklist").insert(inserts);

alert("Salvo!");
tarefas=[];
render();
}






function gerarCalendario(){

const hoje = new Date();
const ano = hoje.getFullYear();
const mes = hoje.getMonth();

const primeiroDia = new Date(ano, mes, 1).getDay();
const totalDias = new Date(ano, mes+1, 0).getDate();

let html = `<div class="cal-header">${mes+1}/${ano}</div>`;
html += `<div class="cal-grid">`;

// espaços antes
for(let i=0;i<primeiroDia;i++){
html += `<div></div>`;
}

// dias
for(let d=1; d<=totalDias; d++){

const dataFormatada = `${ano}-${String(mes+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

html += `
<div class="cal-day" onclick="selecionarDia('${dataFormatada}')">
${d}
</div>
`;
}

html += `</div>`;

document.getElementById("calendario").innerHTML = html;
}


async function selecionarDia(data){

document.getElementById("data").value = data;

// buscar tarefas daquele dia
const { data: tarefasDB } = await sb
.from("agenda_checklist")
.select("*")
.eq("usuario", usuarioSelecionado)
.eq("data", data);

const tbody = document.getElementById("tarefasDia");
tbody.innerHTML = "";

(tarefasDB || []).forEach(t=>{

tbody.innerHTML += `
<tr>
<td>${t.tarefa} ${t.obrigatorio_foto ? '📎' : ''}</td>
<td>${t.hora_inicio || '-'}</td>
<td>${t.hora_fim || '-'}</td>
<td>${t.status_execucao || '-'}</td>
</tr>
`;

});
}




  
</script>

</body>
</html>

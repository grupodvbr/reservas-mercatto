<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checklist Execução</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{margin:0;font-family:Inter;background:#f1f5f9}

/* HEADER */
.header{
background:#020617;
color:#fff;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.add{
background:#22c55e;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
}

/* LISTA */
.lista{padding:10px}

.card{
background:#fff;
padding:15px;
border-radius:12px;
margin-bottom:10px;
}

.btn{
margin-top:8px;
padding:10px;
border:none;
border-radius:8px;
width:100%;
cursor:pointer;
}

.finalizar{background:#2563eb;color:#fff}
.anexo{background:#f59e0b;color:#fff}

.ok{color:green}
.atraso{color:red}

/* MODAL */
.modal{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,.5);
display:none;
justify-content:center;
align-items:center;
}

.box{
background:#fff;
padding:20px;
border-radius:10px;
width:90%;
}

input,textarea{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:10px;
}
</style>
</head>

<body>

<div class="header">
<div id="nome"></div>
<div class="add" onclick="abrirAdd()">＋</div>
</div>

<div id="lista" class="lista"></div>

<!-- MODAL ADD -->
<div class="modal" id="modalAdd">
<div class="box">
<h3>Nova Tarefa</h3>

<input id="tarefaNova" placeholder="Tarefa">
<input id="usuariosNova" placeholder="Usuários (ex: NALBERT,IVANIO)">
<input type="time" id="inicioNova">
<input type="time" id="fimNova">

<button onclick="salvarNova()">Salvar</button>
</div>
</div>

<!-- MODAL FINALIZAR -->
<div class="modal" id="modalFinal">
<div class="box">
<h3>Finalizar</h3>

<textarea id="obs"></textarea>
<button onclick="confirmarFinal()">Confirmar</button>
</div>
</div>

<script>
const sb = supabase.createClient(
"https://dxkszikemntfusfyrzos.supabase.co",
"sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
);

let usuario="NALBERT";
let tarefas=[];
let tarefaAtual=null;

// CARREGAR
async function carregar(){

const hoje = new Date().toISOString().split("T")[0];

const { data } = await sb
.from("agenda_checklist")
.select("*")
.eq("data", hoje);

tarefas = data.filter(t=>{
if(t.usuario.includes(",")){
return t.usuario.split(",").includes(usuario);
}
return t.usuario==usuario;
});

render();
}

// RENDER
function render(){

lista.innerHTML="";

tarefas.forEach(t=>{

const agora = new Date();
const fim = new Date(`${new Date().toISOString().split("T")[0]}T${t.hora_fim}`);

const status = agora > fim ? "Atrasado" : "Dentro";

lista.innerHTML+=`
<div class="card">
<div><b>${t.hora_inicio} - ${t.hora_fim}</b></div>
<div>${t.tarefa} ${t.obrigatorio_foto?'📎':''}</div>
<div class="${status=='Atrasado'?'atraso':'ok'}">${status}</div>

${t.obrigatorio_foto && !t.anexo_url ? `<button class="btn anexo" onclick="upload('${t.id}')">Anexar</button>`:''}

${t.status_execucao!='concluido' ? `<button class="btn finalizar" onclick="finalizar('${t.id}')">Finalizar</button>`:''}
</div>
`;
});
}

// FINALIZAR
function finalizar(id){
tarefaAtual=id;
modalFinal.style.display="flex";
}

// CONFIRMAR FINAL
async function confirmarFinal(){

const observacao = obs.value;

const { data } = await sb
.from("agenda_checklist")
.select("*")
.eq("id", tarefaAtual)
.single();

if(data.obrigatorio_foto && !data.anexo_url){
alert("Precisa anexar foto");
return;
}

await sb.from("agenda_checklist")
.update({
status_execucao:"concluido",
observacao,
concluido_em:new Date()
})
.eq("id", tarefaAtual);

modalFinal.style.display="none";
carregar();
}

// UPLOAD
async function upload(id){

const input = document.createElement("input");
input.type="file";

input.onchange = async e=>{
const file = e.target.files[0];

const path = `${id}_${Date.now()}.jpg`;

await sb.storage
.from("anexos_checklist")
.upload(path, file);

const { data } = sb.storage
.from("anexos_checklist")
.getPublicUrl(path);

await sb.from("agenda_checklist")
.update({ anexo_url: data.publicUrl })
.eq("id", id);

carregar();
};

input.click();
}

// ADD
function abrirAdd(){
modalAdd.style.display="flex";
}

async function salvarNova(){

const tarefa = tarefaNova.value;
const usuarios = usuariosNova.value;
const inicio = inicioNova.value;
const fim = fimNova.value;

const hoje = new Date().toISOString().split("T")[0];

await sb.from("agenda_checklist").insert({
tarefa,
usuario:usuarios,
data:hoje,
hora_inicio:inicio,
hora_fim:fim
});

modalAdd.style.display="none";
carregar();
}

// INIT
carregar();
</script>

</body>
</html>

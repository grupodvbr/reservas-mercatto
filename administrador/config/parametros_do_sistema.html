<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Parâmetros • Sistema</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
  --bg:#f3f4f6;
  --card:#ffffff;
  --primary:#2563eb;
  --border:#e5e7eb;
  --text:#111827;
  --muted:#6b7280;
}

*{box-sizing:border-box;font-family:Inter}
body{margin:0;background:var(--bg)}

/* HEADER */
.header{
  padding:20px 24px;
  font-size:20px;
  font-weight:800;
}

/* TOPBAR */
.topbar{
  display:flex;
  gap:10px;
  padding:0 24px 20px;
}

input{
  flex:1;
  padding:12px;
  border-radius:10px;
  border:1px solid var(--border);
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
  gap:18px;
  padding:0 24px 24px;
}

/* CARD */
.card{
  background:var(--card);
  border-radius:14px;
  border:1px solid var(--border);
  padding:14px;
  display:flex;
  flex-direction:column;
  gap:8px;
  transition:.2s;
}

.card:hover{
  transform:translateY(-3px);
  box-shadow:0 10px 25px rgba(0,0,0,.05);
}

.nome{font-weight:700;font-size:15px;}
.mini{font-size:12px;color:var(--muted);}

/* JSON */
.json{
  background:#0f172a;
  color:#e5e7eb;
  border-radius:10px;
  padding:10px;
  font-size:11px;
  font-family:monospace;
  max-height:120px;
  overflow:auto;
}

/* STATUS */
.status{
  font-size:12px;
  font-weight:600;
}
.ativo{color:#16a34a}
.inativo{color:#dc2626}

/* BUTTONS */
.actions{
  display:flex;
  gap:6px;
}

button{
  flex:1;
  padding:8px;
  border:none;
  border-radius:8px;
  font-size:12px;
  cursor:pointer;
}

.edit{background:#3b82f6;color:#fff}
.toggle{background:#22c55e;color:#fff}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.4);
  display:none;
  align-items:center;
  justify-content:center;
}

.modalBox{
  background:#fff;
  width:95%;
  max-width:700px;
  border-radius:14px;
  padding:18px;
}

textarea{
  width:100%;
  height:180px;
  border-radius:10px;
  border:1px solid var(--border);
  padding:10px;
  font-family:monospace;
}
</style>
</head>

<body>

<div class="header">⚙️ Parâmetros do Sistema</div>

<div class="topbar">
<input id="busca" placeholder="Buscar">
<input id="empresaFiltro" placeholder="Empresa">
<input id="tipoFiltro" placeholder="Tipo">
<button onclick="novo()">+ Novo</button>
</div>

<div class="grid" id="lista"></div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modalBox">

    <input id="nome" placeholder="Nome"><br><br>
    <input id="empresa" placeholder="Empresa"><br><br>
    <input id="tipo" placeholder="Tipo"><br><br>

    <textarea id="json"></textarea>

    <br><br>
    <button onclick="salvar()">Salvar</button>
    <button onclick="fechar()">Cancelar</button>

  </div>
</div>

<script>
const sb = window.supabase.createClient(
  "https://dxkszikemntfusfyrzos.supabase.co",
  "sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
)

let dados=[]
let editando=null

/* ================= LOAD ================= */
async function carregar(){
  console.log("📥 CARREGANDO...")

  const {data,error} = await sb.from("parametros_sistema").select("*")

  if(error){
    console.error("❌ ERRO LOAD:", error)
    return
  }

  console.log("✅ DADOS:", data)

  dados = data || []
  render()
}

/* ================= RENDER ================= */
function render(){

  let b = busca.value.toLowerCase()
  let e = empresaFiltro.value.toLowerCase()
  let t = tipoFiltro.value.toLowerCase()

  lista.innerHTML=""

  dados
  .filter(p =>
    (!b || p.nome_parametro.toLowerCase().includes(b)) &&
    (!e || (p.empresa||'').toLowerCase().includes(e)) &&
    (!t || (p.tipo||'').toLowerCase().includes(t))
  )
  .forEach(p=>{
    lista.innerHTML+=`
      <div class="card">

        <div class="nome">${p.nome_parametro}</div>

        <div class="mini">${p.empresa||'-'} • ${p.tipo||'-'}</div>

        <div class="json">${JSON.stringify(p.dados,null,2)}</div>

        <div class="status ${p.ativo?'ativo':'inativo'}">
          ${p.ativo?'● Ativo':'● Inativo'}
        </div>

        <div class="actions">
          <button class="edit" onclick='editar(${JSON.stringify(p)})'>Editar</button>
          <button class="toggle" onclick='toggle("${p.id}",${p.ativo})'>Status</button>
        </div>

      </div>
    `
  })
}

/* ================= NOVO ================= */
function novo(){
  console.log("🆕 NOVO")

  editando=null
  modal.style.display="flex"

  nome.value=""
  empresa.value=""
  tipo.value=""
  json.value="{}"
}

/* ================= EDITAR ================= */
function editar(p){
  console.log("✏️ EDITAR:", p)

  editando=p.id
  modal.style.display="flex"

  nome.value=p.nome_parametro
  empresa.value=p.empresa||''
  tipo.value=p.tipo||''
  json.value=JSON.stringify(p.dados,null,2)
}

/* ================= FECHAR ================= */
function fechar(){
  modal.style.display="none"
}

/* ================= SALVAR ================= */
async function salvar(){

  console.log("🚀 SALVAR INICIADO")

  let dadosJSON

  try{
    dadosJSON = JSON.parse(json.value)
    console.log("✅ JSON OK")
  }catch(e){
    console.error("❌ JSON INVÁLIDO", e)
    return
  }

  const payload = {
    nome_parametro: nome.value,
    empresa: empresa.value,
    tipo: tipo.value,
    dados: dadosJSON
  }

  console.log("📦 PAYLOAD:", payload)

  let res

  if(editando){
    console.log("✏️ UPDATE:", editando)

    res = await sb.from("parametros_sistema")
      .update(payload)
      .eq("id", editando)

    dados = dados.map(d => d.id === editando ? {...d, ...payload} : d)

  }else{
    console.log("🆕 INSERT")

    res = await sb.from("parametros_sistema")
      .insert(payload)
      .select()

    dados.unshift(res.data[0])
  }

  console.log("📡 RESPOSTA:", res)

  if(res.error){
    console.error("❌ ERRO:", res.error)
    return
  }

  console.log("✅ SALVO")

  fechar()
  render()
}

/* ================= TOGGLE ================= */
async function toggle(id,status){

  console.log("🔄 TOGGLE:", id)

  let res = await sb.from("parametros_sistema")
    .update({ativo:!status})
    .eq("id",id)

  console.log("📡 RESPOSTA:", res)

  if(res.error){
    console.error("❌ ERRO:", res.error)
    return
  }

  dados = dados.map(d => d.id === id ? {...d, ativo:!status} : d)

  render()
}

/* ================= EVENTS ================= */
busca.oninput=render
empresaFiltro.oninput=render
tipoFiltro.oninput=render

carregar()
</script>

</body>
</html>

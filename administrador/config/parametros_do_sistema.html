<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Parâmetros • Sistema</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
  --bg:#f6f7fb;
  --card:#ffffff;
  --primary:#2563eb;
  --border:#e5e7eb;
  --text:#111827;
  --muted:#6b7280;
}

*{box-sizing:border-box;font-family:Inter;}
body{margin:0;background:var(--bg);}

/* HEADER */
.header{
  padding:20px;
  font-size:22px;
  font-weight:800;
}

/* CONTAINER */
.container{
  padding:20px;
}

/* FILTROS */
.topbar{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:20px;
}

input{
  padding:12px;
  border-radius:10px;
  border:1px solid var(--border);
}

/* BOTÕES */
button{
  background:var(--primary);
  color:#fff;
  border:none;
  padding:10px 14px;
  border-radius:10px;
  cursor:pointer;
}

/* TABELA */
.table{
  background:var(--card);
  border-radius:14px;
  overflow:hidden;
}

.row{
  display:grid;
  grid-template-columns: 2fr 1fr 1fr 120px 160px;
  padding:14px;
  border-bottom:1px solid var(--border);
  align-items:center;
}

.row.header{
  font-weight:700;
  background:#f9fafb;
}

/* STATUS */
.badge{
  padding:6px 10px;
  border-radius:6px;
  font-size:12px;
}

.on{background:#dcfce7;color:#166534;}
.off{background:#fee2e2;color:#991b1b;}

/* JSON */
.code{
  background:#0f172a;
  padding:12px;
  border-radius:10px;
  font-family:monospace;
  font-size:12px;
  overflow:auto;
  max-height:140px;
}

.key{color:#38bdf8;}
.string{color:#34d399;}
.number{color:#fbbf24;}
.boolean{color:#f87171;}
.null{color:#a78bfa;}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  display:none;
  align-items:center;
  justify-content:center;
}

.modalBox{
  background:#fff;
  width:95%;
  max-width:900px;
  padding:20px;
  border-radius:16px;
}

textarea{
  width:100%;
  height:180px;
  background:#0f172a;
  color:#fff;
  border-radius:10px;
  padding:10px;
  font-family:monospace;
}

/* TOAST */
.toast{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#111;
  color:#fff;
  padding:12px;
  border-radius:8px;
  opacity:0;
  transition:.3s;
}
.toast.show{opacity:1;}
</style>
</head>

<body>

<div class="header">⚙️ Parâmetros do Sistema</div>

<div class="container">

<div class="topbar">
<input id="busca" placeholder="Buscar">
<input id="empresaFiltro" placeholder="Empresa">
<input id="tipoFiltro" placeholder="Tipo">
<button onclick="novo()">+ Novo</button>
</div>

<div class="table" id="tabela"></div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modalBox">
    <h3>Editar</h3>

    <input id="nome" placeholder="Nome"><br><br>
    <input id="empresa" placeholder="Empresa"><br><br>
    <input id="tipo" placeholder="Tipo"><br><br>

    <textarea id="json"></textarea>

    <br><br>
    <button onclick="salvar()">Salvar</button>
    <button onclick="fechar()">Cancelar</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const supabase = window.supabase.createClient(
  "https://dxkszikemntfusfyrzos.supabase.co",
  "sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
)

let dados=[]
let editando=null

const toastEl=document.getElementById("toast")

function msg(t){
  toastEl.innerText=t
  toastEl.classList.add("show")
  setTimeout(()=>toastEl.classList.remove("show"),2000)
}

/* JSON COLOR */
function formatJSON(obj){
  let json=JSON.stringify(obj,null,2)
  return json
  .replace(/"(.*?)":/g,'<span class="key">"$1"</span>:')
  .replace(/: "(.*?)"/g,': <span class="string">"$1"</span>')
  .replace(/: (\d+)/g,': <span class="number">$1</span>')
  .replace(/: (true|false)/g,': <span class="boolean">$1</span>')
  .replace(/: null/g,': <span class="null">null</span>')
}

/* LOAD */
async function carregar(){
  const {data,error}=await supabase
  .from("parametros_sistema")
  .select("*")

  if(error){
    console.error(error)
    msg("Erro ao carregar")
    return
  }

  dados=data
  render()
}

/* RENDER */
function render(){
  let b=busca.value.toLowerCase()
  let e=empresaFiltro.value.toLowerCase()
  let t=tipoFiltro.value.toLowerCase()

  tabela.innerHTML=`
    <div class="row header">
      <div>Nome</div>
      <div>Empresa</div>
      <div>Tipo</div>
      <div>Status</div>
      <div>Ações</div>
    </div>
  `

  dados
  .filter(p =>
    (!b || p.nome_parametro.toLowerCase().includes(b)) &&
    (!e || (p.empresa||'').toLowerCase().includes(e)) &&
    (!t || (p.tipo||'').toLowerCase().includes(t))
  )
  .forEach(p=>{
    tabela.innerHTML+=`
      <div class="row">

        <div>
          <b>${p.nome_parametro}</b>
          <div class="code">${formatJSON(p.dados)}</div>
        </div>

        <div>${p.empresa||'-'}</div>
        <div>${p.tipo||'-'}</div>

        <div>
          <span class="badge ${p.ativo?'on':'off'}">
            ${p.ativo?'Ativo':'Inativo'}
          </span>
        </div>

        <div>
          <button onclick='editar(${JSON.stringify(p)})'>Editar</button>
          <button onclick='toggle("${p.id}",${p.ativo})'>Status</button>
        </div>

      </div>
    `
  })
}

/* MODAL */
function novo(){
  editando=null
  modal.style.display="flex"
  json.value="{}"
}

function fechar(){
  modal.style.display="none"
}

function editar(p){
  editando=p.id
  modal.style.display="flex"

  nome.value=p.nome_parametro
  empresa.value=p.empresa||''
  tipo.value=p.tipo||''
  json.value=JSON.stringify(p.dados,null,2)
}

/* SALVAR */
async function salvar(){
  let dadosJSON

  try{
    dadosJSON=JSON.parse(json.value)
  }catch{
    msg("JSON inválido")
    return
  }

  const payload={
    nome_parametro:nome.value,
    empresa:empresa.value,
    tipo:tipo.value,
    dados:dadosJSON
  }

  let res

  if(editando){
    res=await supabase
      .from("parametros_sistema")
      .update(payload)
      .eq("id",editando)
  }else{
    res=await supabase
      .from("parametros_sistema")
      .insert(payload)
  }

  if(res.error){
    console.error(res.error)
    msg("Erro: "+res.error.message)
    return
  }

  msg("Salvo")
  fechar()
  carregar()
}

/* STATUS */
async function toggle(id,status){
  await supabase
  .from("parametros_sistema")
  .update({ativo:!status})
  .eq("id",id)

  msg("Atualizado")
  carregar()
}

/* EVENTOS */
busca.oninput=render
empresaFiltro.oninput=render
tipoFiltro.oninput=render

carregar()
</script>

</body>
</html>

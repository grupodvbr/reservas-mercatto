<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Auditoria do Sistema</title>

<meta name="viewport"
content="width=device-width,
initial-scale=1,
maximum-scale=1,
user-scalable=no">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

:root{
--bg:#f4f6fb;
--card:#ffffff;
--border:#e5e7eb;
--text:#0f172a;
--muted:#64748b;
--primary:#111827;
--green:#16a34a;
--blue:#0284c7;
--red:#dc2626;
--radius:14px;
}

*{
box-sizing:border-box;
font-family:Inter;
}

body{
margin:0;
background:var(--bg);
color:var(--text);
}

.header{
padding:20px;
background:#fff;
border-bottom:1px solid var(--border);
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:10px;
}

.title{
font-size:20px;
font-weight:800;
}

.filters{
display:flex;
gap:10px;
flex-wrap:wrap;
}

input,select{
padding:10px 14px;
border-radius:10px;
border:1px solid var(--border);
font-weight:600;
}

.container{
padding:20px;
display:grid;
gap:14px;
}

.card{
background:var(--card);
border:1px solid var(--border);
border-radius:var(--radius);
padding:16px;
display:grid;
gap:10px;
box-shadow:0 6px 18px rgba(0,0,0,0.05);
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
}

.badge{
padding:4px 10px;
border-radius:999px;
font-size:12px;
font-weight:700;
}

.insert{
background:#dcfce7;
color:#166534;
}

.update{
background:#e0f2fe;
color:#075985;
}

.delete{
background:#fee2e2;
color:#991b1b;
}

.row{
display:flex;
justify-content:space-between;
font-size:14px;
}

.actions{
display:flex;
gap:10px;
margin-top:6px;
}

.btn{
flex:1;
padding:10px;
border:none;
border-radius:10px;
font-weight:700;
cursor:pointer;
}

.btn-view{
background:var(--blue);
color:white;
}

.btn-restore{
background:var(--green);
color:white;
}

.popup{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,.6);
display:none;
align-items:center;
justify-content:center;
padding:20px;
z-index:20;
}

.modal{
background:white;
border-radius:14px;
padding:24px;
max-width:800px;
width:100%;
max-height:85vh;
overflow:auto;
display:grid;
gap:16px;
}

.modal-header{
display:flex;
justify-content:space-between;
font-weight:800;
font-size:18px;
}

.close{
cursor:pointer;
font-size:20px;
}

.json{
background:#0f172a;
color:#e2e8f0;
padding:14px;
border-radius:10px;
font-size:12px;
overflow:auto;
}

.grid{
display:grid;
gap:16px;
}

@media(min-width:900px){

.grid{
grid-template-columns:1fr 1fr;
}

}

.empty{
text-align:center;
padding:50px;
color:var(--muted);
font-weight:600;
}

</style>
</head>

<body>

<div class="header">

<div class="title">
Auditoria do Sistema
</div>

<div class="filters">

<input id="busca" placeholder="Buscar tabela ou ID">

<select id="tipoFiltro">
<option value="">Todos</option>
<option value="insert">INSERT</option>
<option value="update">UPDATE</option>
<option value="delete">DELETE</option>
</select>

</div>

</div>

<div class="container" id="lista"></div>

<div class="popup" id="popup">

<div class="modal">

<div class="modal-header">
<span>Detalhes da alteração</span>
<span class="close" onclick="fechar()">✕</span>
</div>

<div class="grid" id="dados"></div>

<button class="btn btn-restore" onclick="restaurar()">
Restaurar Registro
</button>

</div>

</div>

<script>

const supabase = supabase.createClient(
"https://dxkszikemntfusfyrzos.supabase.co",
"sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
)

let historico=[]
let registroAtual=null

async function carregar(){

const {data,error}=await supabase
.from("historico_alteracoes")
.select("*")
.order("created_at",{ascending:false})

if(error){
alert(error.message)
return
}

historico=data

render()

}

function render(){

const busca=document.getElementById("busca").value.toLowerCase()
const tipo=document.getElementById("tipoFiltro").value

const container=document.getElementById("lista")

container.innerHTML=""

const lista=historico.filter(i=>{

const texto=(i.tabela+" "+i.registro_id).toLowerCase()

const matchBusca=texto.includes(busca)

const matchTipo=!tipo || i.tipo===tipo

return matchBusca && matchTipo

})

if(lista.length===0){

container.innerHTML='<div class="empty">Nenhum histórico encontrado</div>'

return

}

lista.forEach(item=>{

const card=document.createElement("div")
card.className="card"

card.innerHTML=`

<div class="top">

<b>${item.tabela}</b>

<span class="badge ${item.tipo}">
${item.tipo.toUpperCase()}
</span>

</div>

<div class="row">
<span>ID</span>
<span>${item.registro_id}</span>
</div>

<div class="row">
<span>Data</span>
<span>${new Date(item.created_at).toLocaleString()}</span>
</div>

<div class="actions">

<button class="btn btn-view">Ver alteração</button>

<button class="btn btn-restore">Restaurar</button>

</div>

`

card.querySelector(".btn-view").onclick=()=>abrir(item)
card.querySelector(".btn-restore").onclick=()=>restaurarDireto(item)

container.appendChild(card)

})

}

function abrir(item){

registroAtual=item

document.getElementById("popup").style.display="flex"

const antes=item.antes || {}
const depois=item.depois || {}

document.getElementById("dados").innerHTML=`

<div>
<b>ANTES</b>
<pre class="json">${JSON.stringify(antes,null,2)}</pre>
</div>

<div>
<b>DEPOIS</b>
<pre class="json">${JSON.stringify(depois,null,2)}</pre>
</div>

`

}

function fechar(){

document.getElementById("popup").style.display="none"

}

async function restaurar(){

if(!registroAtual)return

restaurarDireto(registroAtual)

}

async function restaurarDireto(item){

const dados=item.antes

if(!dados){

alert("Não existe dado para restaurar")
return

}

const tabela=item.tabela

const {error}=await supabase
.from(tabela)
.insert(dados)

if(error){

alert(error.message)
return

}

alert("Registro restaurado com sucesso!")

fechar()

carregar()

}

document.getElementById("busca").oninput=render
document.getElementById("tipoFiltro").onchange=render

carregar()

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Auditoria de Reservas • Mercatto</title>

<meta name="viewport"
content="width=device-width,
initial-scale=1,
maximum-scale=1,
user-scalable=no">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

:root{
--bg:#f6f7fb;
--card:#ffffff;
--border:#e5e7eb;
--text:#111827;
--muted:#6b7280;
--green:#16a34a;
--blue:#0284c7;
--red:#dc2626;
--radius:14px;
}

*{
box-sizing:border-box;
font-family:Inter;
}

body{
margin:0;
background:var(--bg);
color:var(--text);
}

.header{
background:white;
padding:18px;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
border-bottom:1px solid var(--border);
}

.title{
font-weight:800;
font-size:20px;
}

.filters{
display:flex;
gap:10px;
}

input,select{
padding:10px 14px;
border-radius:10px;
border:1px solid var(--border);
font-weight:600;
}

.container{
padding:20px;
display:grid;
gap:14px;
}

.card{
background:var(--card);
border-radius:var(--radius);
border:1px solid var(--border);
padding:16px;
display:grid;
gap:8px;
box-shadow:0 6px 18px rgba(0,0,0,0.05);
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
}

.badge{
padding:4px 10px;
border-radius:999px;
font-size:12px;
font-weight:700;
}

.insert{
background:#dcfce7;
color:#166534;
}

.update{
background:#e0f2fe;
color:#075985;
}

.excluir{
background:#fee2e2;
color:#991b1b;
}

.row{
display:flex;
justify-content:space-between;
font-size:14px;
}

.actions{
display:flex;
gap:10px;
margin-top:6px;
}

.btn{
flex:1;
padding:10px;
border:none;
border-radius:10px;
font-weight:700;
cursor:pointer;
}

.btn-view{
background:var(--blue);
color:white;
}

.btn-restore{
background:var(--green);
color:white;
}

.popup{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,.6);
display:none;
align-items:center;
justify-content:center;
padding:20px;
}

.modal{
background:white;
border-radius:14px;
padding:24px;
max-width:900px;
width:100%;
max-height:85vh;
overflow:auto;
display:grid;
gap:18px;
}

.modal-header{
display:flex;
justify-content:space-between;
font-weight:800;
font-size:18px;
}

.close{
cursor:pointer;
font-size:22px;
}

.grid{
display:grid;
gap:16px;
}

@media(min-width:900px){
.grid{
grid-template-columns:1fr 1fr;
}
}

.json{
background:#111827;
color:#e5e7eb;
padding:14px;
border-radius:10px;
font-size:12px;
overflow:auto;
}

.empty{
text-align:center;
padding:50px;
color:var(--muted);
font-weight:600;
}

</style>

</head>

<body>

<div class="header">

<div class="title">
Auditoria de Reservas
</div>

<div class="filters">

<input id="busca" placeholder="Buscar nome ou mesa">

<select id="tipoFiltro">
<option value="">Todos</option>
<option value="INSERT">INSERT</option>
<option value="UPDATE">UPDATE</option>
<option value="excluir">EXCLUIR</option>
</select>

</div>

</div>

<div class="container" id="lista"></div>

<div class="popup" id="popup">

<div class="modal">

<div class="modal-header">
<span>Detalhes da alteração</span>
<span class="close" onclick="fechar()">✕</span>
</div>

<div class="grid" id="dados"></div>

<button class="btn btn-restore" onclick="restaurar()">
Restaurar Registro
</button>

</div>

</div>

<script>

const client = supabase.createClient(
"https://dxkszikemntfusfyrzos.supabase.co",
"sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
)

let historico=[]
let registroAtual=null

async function carregar(){

const {data,error}=await client
.from("hist_reservas_mercatto")
.select("*")
.order("created_at",{ascending:false})

if(error){
alert(error.message)
return
}

historico=data

render()

}

function render(){

const busca=document.getElementById("busca").value.toLowerCase()
const tipo=document.getElementById("tipoFiltro").value

const container=document.getElementById("lista")

container.innerHTML=""

const lista=historico.filter(i=>{

let dados={}

try{
dados=JSON.parse(i.dados || "{}")
}catch{}

const texto=(dados.nome || "") + " " + (dados.mesa || "")

const matchBusca=texto.toLowerCase().includes(busca)

const matchTipo=!tipo || i.acao===tipo

return matchBusca && matchTipo

})

if(lista.length===0){

container.innerHTML='<div class="empty">Nenhum histórico encontrado</div>'
return

}

lista.forEach(item=>{

let dados={}

try{
dados=JSON.parse(item.dados || "{}")
}catch{}

const card=document.createElement("div")

card.className="card"

card.innerHTML=`

<div class="top">

<b>${dados.nome || "Reserva"}</b>

<span class="badge ${item.acao}">
${item.acao}
</span>

</div>

<div class="row">
<span>Mesa</span>
<span>${dados.mesa || "-"}</span>
</div>

<div class="row">
<span>Pessoas</span>
<span>${dados.pessoas || "-"}</span>
</div>

<div class="row">
<span>Data</span>
<span>${new Date(item.created_at).toLocaleString()}</span>
</div>

<div class="actions">

<button class="btn btn-view">
Ver alteração
</button>

<button class="btn btn-restore">
Restaurar
</button>

</div>

`

card.querySelector(".btn-view").onclick=()=>abrir(item)
card.querySelector(".btn-restore").onclick=()=>restaurarDireto(item)

container.appendChild(card)

})

}

function abrir(item){

registroAtual=item

document.getElementById("popup").style.display="flex"

let dados={}

try{
dados=JSON.parse(item.dados || "{}")
}catch{}

const antes=dados.antes || dados
const depois=dados.depois || {}

document.getElementById("dados").innerHTML=`

<div>

<b>ANTES</b>

<pre class="json">
${JSON.stringify(antes,null,2)}
</pre>

</div>

<div>

<b>DEPOIS</b>

<pre class="json">
${JSON.stringify(depois,null,2)}
</pre>

</div>

`

}

function fechar(){
document.getElementById("popup").style.display="none"
}

async function restaurar(){

if(!registroAtual)return

restaurarDireto(registroAtual)

}

async function restaurarDireto(item){

let dados={}

try{
dados=JSON.parse(item.dados || "{}")
}catch{}

const registro=dados.antes || dados

if(!registro){

alert("Não existe dado para restaurar")
return

}

const {error}=await client
.from("reservas_mercatto")
.upsert(registro)

if(error){

alert(error.message)
return

}

alert("Reserva restaurada com sucesso!")

fechar()

carregar()

}

document.getElementById("busca").oninput=render
document.getElementById("tipoFiltro").onchange=render

carregar()

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Trabalhe Conosco • Grupo DV</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:#0b0e14;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.card{
  width:100%;
  max-width:500px;
  background:#121826;
  border-radius:18px;
  padding:28px;
  box-shadow:0 20px 50px rgba(0,0,0,.6);
}

h1{
  text-align:center;
  margin-bottom:20px;
  color:#f59e0b;
}

label{
  display:block;
  margin-top:12px;
  font-weight:600;
}

input, select{
  width:100%;
  padding:12px;
  margin-top:6px;
  border-radius:10px;
  border:1px solid #1f2937;
  background:#0b0e14;
  color:#fff;
}

button{
  width:100%;
  padding:14px;
  margin-top:20px;
  border:none;
  border-radius:12px;
  background:linear-gradient(90deg,#f59e0b,#d97706);
  font-weight:bold;
  color:#000;
  cursor:pointer;
}

.msg{
  text-align:center;
  margin-top:12px;
}

.ok{color:#22c55e}
.err{color:#ef4444}

.progress{
  height:6px;
  background:#1f2937;
  border-radius:6px;
  overflow:hidden;
  margin-top:10px;
}

.progress span{
  display:block;
  height:100%;
  width:0%;
  background:#f59e0b;
}
</style>
</head>

<body>

<form class="card" id="form">

<h1>Envie seu Currículo</h1>

<label>Nome *</label>
<input id="nome" required>

<label>Idade *</label>
<input id="idade" type="number" required>

<label>Sexo *</label>
<select id="sexo" required>
<option value="">Selecione</option>
<option>Masculino</option>
<option>Feminino</option>
<option>Outro</option>
</select>

<label>Telefone *</label>
<input id="telefone" required>

<label>Email</label>
<input id="email">

<label>Empresa *</label>
<select id="empresa" required>
<option value="">Selecione</option>
<option>MERCATTO DELÍCIA</option>
<option>VILLA GOURMET</option>
<option>PADARIA DELÍCIA</option>
<option>M.KIDS</option>
<option>DELÍCIA GOURMET</option>
</select>

<label>Área de Interesse *</label>
<input id="area" placeholder="EX: GARÇOM, COZINHA..." required>

<label>Currículo *</label>
<input type="file" id="arquivo" required>

<div class="progress"><span id="bar"></span></div>

<button>Enviar Currículo</button>

<div id="msg" class="msg"></div>

</form>

<script>
const supabase = window.supabase.createClient(
  "https://dxkszikemntfusfyrzos.supabase.co",
  "sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
);

const form = document.getElementById("form");
const msg = document.getElementById("msg");
const bar = document.getElementById("bar");

form.addEventListener("submit", async (e)=>{
  e.preventDefault();

  msg.textContent = "Enviando...";
  bar.style.width = "20%";

  const nome = nomeInput.value;
  const idade = idade.value;
  const sexo = sexo.value;
  const telefone = telefone.value;
  const email = emailInput.value;
  const empresa = empresaSelect.value;
  let area = areaInput.value.toUpperCase();

  const file = arquivo.files[0];

  // Upload arquivo
  const fileName = Date.now() + "_" + file.name;

  bar.style.width = "40%";

  const { data: upload, error: errUpload } = await supabase
    .storage
    .from("curriculos")
    .upload(fileName, file);

  if(errUpload){
    msg.textContent = "Erro upload";
    msg.className="msg err";
    return;
  }

  bar.style.width = "70%";

  const { data: urlData } = supabase
    .storage
    .from("curriculos")
    .getPublicUrl(fileName);

  // Salvar no banco
  const { error } = await supabase
    .from("curriculo_empresas")
    .insert({
      nome,
      idade,
      sexo,
      telefone,
      email,
      empresa,
      area_interesse: area,
      arquivo_url: urlData.publicUrl,
      nome_arquivo: file.name
    });

  if(error){
    msg.textContent = "Erro ao salvar";
    msg.className="msg err";
    return;
  }

  bar.style.width = "100%";

  msg.innerHTML = `✅ Obrigado <b>${nome}</b>!<br>Seu currículo foi enviado para <b>${empresa}</b>.`;
  msg.className="msg ok";

  form.reset();
});
</script>

</body>
</html>

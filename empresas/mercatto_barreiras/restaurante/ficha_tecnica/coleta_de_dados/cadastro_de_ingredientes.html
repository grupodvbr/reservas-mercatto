<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>PAINEL DE INGREDIENTES • CMV</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  
<style>
/* ================= ROOT ================= */
:root{

--primary:#14c8a8;
--primary-dark:#0ea58b;
--primary-soft:#ecfeff;

/* BASE */
--bg:#f8fafc;
--panel:#ffffff;
--card:#ffffff;

/* TEXTO */
--text:#0f172a;
--muted:#64748b;

/* BORDA */
--border:#e2e8f0;
--ring:rgba(20,200,168,.25);

/* RADIUS */
--radius-xl:24px;
--radius-lg:16px;
--radius-md:12px;

/* SOMBRA */
--shadow-soft:0 8px 25px rgba(0,0,0,.08);
--shadow-strong:0 18px 50px rgba(0,0,0,.12);

}

/* ================= RESET ================= */
*{
box-sizing:border-box;
-webkit-font-smoothing:antialiased;
}

html,body{
margin:0;
height:100%;
font-family:Inter,sans-serif;

background:
radial-gradient(1200px 600px at 10% -10%, #ecfeff, transparent 60%),
radial-gradient(900px 500px at 110% 10%, #f0fdfa, transparent 55%),
var(--bg);

color:var(--text);
overflow:hidden;
}

/* ================= SCROLL ================= */
::-webkit-scrollbar{
width:8px;
}
::-webkit-scrollbar-thumb{
background:#cbd5f5;
border-radius:20px;
}

/* ================= LAYOUT ================= */
.app{
display:grid;
grid-template-columns:240px 1fr;
height:100%;
}

/* ================= SIDEBAR ================= */
.sidebar{
background:#ffffff;
border-right:1px solid var(--border);
padding:16px;
display:flex;
flex-direction:column;
gap:10px;
}

.sidebar h2{
margin:4px 0 8px;
font-size:14px;
font-weight:900;
letter-spacing:.05em;
}

/* BUSCA */
.sidebar input{
background:#f1f5f9;
border:1px solid var(--border);
padding:10px;
border-radius:999px;
font-size:12px;
font-weight:700;
outline:none;
transition:.15s;
}

.sidebar input::placeholder{
color:var(--muted);
}

.sidebar input:focus{
border-color:var(--primary);
box-shadow:0 0 0 3px var(--ring);
}

/* LISTA */
.lista{
flex:1;
overflow-y:auto;
padding:6px;
border-radius:12px;
background:#f8fafc;
border:1px solid var(--border);
}

.lista::-webkit-scrollbar{
width:6px;
}

/* ITEM */
.item{
padding:10px;
border-radius:10px;
margin-bottom:6px;
font-size:12px;
font-weight:700;
cursor:pointer;
background:#ffffff;
border:1px solid var(--border);
transition:.15s;
}

.item:hover{
border-color:var(--primary);
box-shadow:0 6px 18px rgba(20,200,168,.15);
}

.item.active{
background:var(--primary-soft);
border-color:var(--primary);
color:#065f46;
}

/* BOTÃO NOVO */
.new{
margin-top:10px;
background:linear-gradient(135deg,var(--primary),var(--primary-dark));
border:none;
border-radius:999px;
padding:10px;
font-size:12px;
font-weight:900;
letter-spacing:.05em;
color:#fff;
cursor:pointer;
box-shadow:0 8px 20px rgba(20,200,168,.35);
transition:.15s;
}

.new:hover{
transform:translateY(-1px);
box-shadow:0 12px 28px rgba(20,200,168,.45);
}

/* ================= MAIN ================= */
.main{
padding:20px;
overflow-y:auto;
}

/* ================= CARD ================= */
.card{
max-width:900px;
margin:auto;
background:var(--panel);
border-radius:20px;
padding:24px;
border:1px solid var(--border);
box-shadow:var(--shadow-soft);
}

/* TITULO */
.card h1{
font-size:22px;
font-weight:900;
margin-bottom:10px;
}

/* ================= SECTION ================= */
.section{
margin-top:18px;
padding-top:12px;
border-top:1px dashed var(--border);
}

/* ================= GRID ================= */
.form-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

/* ================= FIELD ================= */
.field{
display:flex;
flex-direction:column;
}

.field.full{
grid-column:1/-1;
}

/* ================= LABEL ================= */
.field label{
font-size:11px;
font-weight:800;
color:#334155;
}

/* ================= INPUT ================= */
input,select{
padding:10px;
border-radius:10px;
border:1px solid var(--border);
margin-top:5px;
background:#fff;
font-size:12px;
font-weight:700;
outline:none;
transition:.15s;
}

input::placeholder{
color:var(--muted);
}

input:focus,select:focus{
border-color:var(--primary);
box-shadow:0 0 0 3px var(--ring);
}

/* ================= BUTTON ================= */
button{
margin-top:18px;
border:none;
border-radius:999px;
background:linear-gradient(135deg,var(--primary),var(--primary-dark));
color:#fff;
font-weight:900;
font-size:12px;
letter-spacing:.05em;
padding:12px 18px;
cursor:pointer;
box-shadow:0 10px 25px rgba(20,200,168,.35);
transition:.15s;
}

button:hover{
transform:translateY(-1px);
box-shadow:0 14px 30px rgba(20,200,168,.45);
}

/* ================= SUGESTÕES ================= */
.sugestoes{
position:absolute;
top:100%;
left:0;
right:0;
background:#fff;
border:1px solid var(--border);
border-radius:10px;
max-height:200px;
overflow:auto;
z-index:50;
box-shadow:var(--shadow-soft);
}

.sugestoes div{
padding:10px;
font-weight:700;
cursor:pointer;
}

.sugestoes div:hover{
background:var(--primary-soft);
}

/* ================= TOAST ================= */
.toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:linear-gradient(135deg,var(--primary),var(--primary-dark));
color:#fff;
padding:10px 16px;
border-radius:999px;
font-weight:900;
opacity:0;
transition:.25s;
box-shadow:0 10px 25px rgba(20,200,168,.35);
}

.toast.show{
opacity:1;
transform:translate(-50%,0);
}

/* ================= RESPONSIVO ================= */
@media(max-width:900px){

.app{
grid-template-columns:1fr;
}

.sidebar{
display:none;
}

.form-grid{
grid-template-columns:1fr;
}

}


.close{
position:absolute;
top:12px;
right:14px;
cursor:pointer;
font-weight:900;
font-size:18px;
z-index:10;
}

.modal-box{
position:relative;
}






  
</style>
</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>INGREDIENTES</h2>
  <input id="busca" placeholder="BUSCAR...">
  <div id="lista" class="lista"></div>
  <button class="new" onclick="novo()">+ NOVO INGREDIENTE</button>
</div>

<!-- MAIN -->
<div class="main">
  <div class="card">

    <h1 id="titulo">NOVO INGREDIENTE</h1>
<div class="section form-grid">

<div class="field full" style="position:relative">
  <label>NOME</label>
  <input id="nome" autocomplete="off" placeholder="DIGITE PARA BUSCAR OU CADASTRAR...">
  <div id="sugestoes" class="sugestoes"></div>
</div>

  <div class="field full">
    <label>DESCRIÇÃO</label>
    <input id="descricao">
  </div>

  <div class="field">
    <label>UNIDADE</label>
    <select id="unidade">
      <option>UN</option><option>KG</option><option>G</option><option>L</option><option>ML</option>
    </select>
  </div>

</div>

<div class="section form-grid">

  <div class="field">
    <label>VALOR</label>
    <input id="valor">
  </div>

  <div class="field">
    <label>QUANTIDADE DE REFERÊNCIA</label>
    <input id="quantidade_referencia" type="number" placeholder="Ex: 700">
  </div>
<div id="preview_conversao" 
     style="margin-top:6px;
            font-weight:800;
            color:#14b8a6;
            letter-spacing:.04em;">
</div>
  <div class="field">
    <label>RENDIMENTO (%)</label>
    <input id="rendimento" value="100">
  </div>

</div>

   <div class="section form-grid">

  <h3>INFORMAÇÃO NUTRICIONAL (por 100g ou 100ml)</h3>

  <div class="field">
    <label>VALOR ENERGÉTICO (kcal)</label>
    <input id="energia_kcal" type="number">
  </div>

  <div class="field">
    <label>CARBOIDRATOS (g)</label>
    <input id="carboidratos" type="number">
  </div>

  <div class="field">
    <label>AÇÚCARES TOTAIS (g)</label>
    <input id="acucares_totais" type="number">
  </div>

  <div class="field">
    <label>AÇÚCARES ADICIONADOS (g)</label>
    <input id="acucares_adicionados" type="number">
  </div>

  <div class="field">
    <label>PROTEÍNAS (g)</label>
    <input id="proteinas" type="number">
  </div>

  <div class="field">
    <label>GORDURAS TOTAIS (g)</label>
    <input id="gorduras_totais" type="number">
  </div>

  <div class="field">
    <label>GORDURAS SATURADAS (g)</label>
    <input id="gorduras_saturadas" type="number">
  </div>

  <div class="field">
    <label>GORDURAS TRANS (g)</label>
    <input id="gorduras_trans" type="number">
  </div>

  <div class="field">
    <label>FIBRA ALIMENTAR (g)</label>
    <input id="fibra_alimentar" type="number">
  </div>

  <div class="field">
    <label>SÓDIO (mg)</label>
    <input id="sodio_mg" type="number">
  </div>

</div>
    <button onclick="salvar()">SALVAR INGREDIENTE</button>

  </div>
</div>

</div>

<div id="toast" class="toast">SALVO COM SUCESSO</div>

<script>
const sb = supabase.createClient(
  "https://dxkszikemntfusfyrzos.supabase.co",
  "sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
);

let atual=null;

function toast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2500);
}

document.addEventListener("input",e=>{
  if(e.target.tagName==="INPUT") e.target.value=e.target.value.toUpperCase();
});

function moeda(el){
  el.oninput=()=>{
    let v=el.value.replace(/\D/g,"");
    el.value="R$ "+(v/100).toFixed(2).replace(".",",");
  }
}
window.addEventListener("DOMContentLoaded", ()=>{
  moeda(valor);
});
let pagina = 0;
const LIMITE = 20;
let carregando = false;
let fim = false;

async function carregar(reset=false){
  if(carregando || fim) return;
  carregando = true;

  if(reset){
    pagina = 0;
    fim = false;
    lista.innerHTML = "";
  }

  const { data } = await sb
    .from("produtos")
    .select("*")
    .order("id", { ascending: false })  // últimos primeiro
    .range(pagina*LIMITE, (pagina+1)*LIMITE - 1);

  if(!data || data.length === 0){
    fim = true;
    carregando = false;
    return;
  }

  lista.insertAdjacentHTML("beforeend",
    data.map(i=>`
      <div class="item ${atual?.id===i.id?'active':''}" onclick="editar('${i.id}')">
        ${i.nome}
      </div>
    `).join("")
  );

  pagina++;
  carregando = false;
}

carregar(true);

lista.addEventListener("scroll", ()=>{
  const pertoDoFim =
    lista.scrollTop + lista.clientHeight
    >= lista.scrollHeight - 40;

  if(pertoDoFim){
    carregar();
  }
});

busca.oninput = async ()=>{
  const q = busca.value.trim().toLowerCase();
  if(!q){
    carregar(true);
    return;
  }

  const { data } = await sb
    .from("produtos")
    .select("*")
    .ilike("nome", `%${q}%`);

  lista.innerHTML = (data||[]).map(i=>`
    <div class="item" onclick="editar('${i.id}')">${i.nome}</div>
  `).join("");
};

async function editar(id){
  const {data}=await sb.from("produtos").select("*").eq("id",id).single();
  atual=data;
  titulo.textContent="EDITAR INGREDIENTE";

  Object.keys(data).forEach(k=>{
    if(document.getElementById(k)) document.getElementById(k).value=data[k]||"";
  });

  valor.value="R$ "+Number(data.valor).toFixed(2).replace(".",",");
}

function novo(){
  atual=null;
  titulo.textContent="NOVO INGREDIENTE";
  document.querySelectorAll("input").forEach(i=>i.value="");
  rendimento.value=100;
}




  function converterParaBase(qtd, unidade){
  if(unidade === "L") return qtd * 1000;
  if(unidade === "KG") return qtd * 1000;
  return qtd;
}




  function atualizarPreviewConversao(){

  const valorDigitado = Number(valor.value.replace(/\D/g,""))/100;
  const qtdRef = Number(quantidade_referencia.value || 0);
  const unidadeSelecionada = unidade.value;
  const preview = document.getElementById("preview_conversao");

  if(!valorDigitado || !qtdRef){
    preview.innerHTML = "";
    return;
  }

  let valorConvertido = valorDigitado;
  let textoUnidade = unidadeSelecionada;

  if(unidadeSelecionada === "ML"){
    const litros = qtdRef / 1000;
    valorConvertido = valorDigitado / litros;
    textoUnidade = "LITRO";
  }

  if(unidadeSelecionada === "G"){
    const kg = qtdRef / 1000;
    valorConvertido = valorDigitado / kg;
    textoUnidade = "KG";
  }

  if(unidadeSelecionada === "L"){
    valorConvertido = valorDigitado / qtdRef;
    textoUnidade = "LITRO";
  }

  if(unidadeSelecionada === "KG"){
    valorConvertido = valorDigitado / qtdRef;
    textoUnidade = "KG";
  }

  if(unidadeSelecionada === "UN"){
    valorConvertido = valorDigitado / qtdRef;
    textoUnidade = "UNIDADE";
  }

  preview.innerHTML = 
    `VALOR FINAL: R$ ${valorConvertido.toFixed(2)} POR ${textoUnidade}`;
}
async function salvar(){

  const valorDigitado = Number(valor.value.replace(/\D/g,""))/100;
  const qtdRef = Number(quantidade_referencia.value || 0);
  const unidadeSelecionada = unidade.value;

  if(!valorDigitado || !qtdRef){
    toast("INFORME VALOR E QUANTIDADE");
    return;
  }

  let valorConvertido = valorDigitado;

  /* ================================
     CONVERSÃO PARA UNIDADE BASE
  ================================= */

  if(unidadeSelecionada === "ML"){
    // converte para litro
    const litros = qtdRef / 1000;
    valorConvertido = valorDigitado / litros;
  }

  if(unidadeSelecionada === "G"){
    // converte para kg
    const kg = qtdRef / 1000;
    valorConvertido = valorDigitado / kg;
  }

  if(unidadeSelecionada === "L"){
    valorConvertido = valorDigitado / qtdRef;
  }

  if(unidadeSelecionada === "KG"){
    valorConvertido = valorDigitado / qtdRef;
  }

  if(unidadeSelecionada === "UN"){
    valorConvertido = valorDigitado / qtdRef;
  }

  /* ================================
     PAYLOAD FINAL
  ================================= */

let unidadeFinal = unidadeSelecionada;

if(unidadeSelecionada === "ML") unidadeFinal = "L";
if(unidadeSelecionada === "G") unidadeFinal = "KG";

const payload={
  nome:nome.value,
  descricao:descricao.value,

  // 🔥 agora salva a unidade convertida
  unidade_medida:unidadeFinal,

    // 🔥 AGORA SALVA SEMPRE PREÇO BASE
    valor:valorConvertido,

    quantidade_referencia:qtdRef,
    rendimento_percentual:Number(rendimento.value),

    energia_kcal:+energia_kcal.value||0,
    carboidratos:+carboidratos.value||0,
    acucares_totais:+acucares_totais.value||0,
    acucares_adicionados:+acucares_adicionados.value||0,
    proteinas:+proteinas.value||0,
    gorduras_totais:+gorduras_totais.value||0,
    gorduras_saturadas:+gorduras_saturadas.value||0,
    gorduras_trans:+gorduras_trans.value||0,
    fibra_alimentar:+fibra_alimentar.value||0,
    sodio_mg:+sodio_mg.value||0
  };

  if(atual){
    await sb.from("produtos").update(payload).eq("id",atual.id);
    toast("EDITADO COM SUCESSO");
  }else{
    await sb.from("produtos").insert(payload);
    toast("SALVO COM SUCESSO");

    atual=null;
    titulo.textContent="NOVO INGREDIENTE";
    document.querySelectorAll("input").forEach(i=>i.value="");
    unidade.value="UN";
    rendimento.value=100;
  }

  carregar(true);
}

const sugestoes = document.getElementById("sugestoes");

nome.addEventListener("input", async () => {
  const q = nome.value.trim();

  if(q.length < 2){
    sugestoes.innerHTML = "";
    return;
  }

  const { data } = await sb
    .from("produtos")
    .select("id, nome")
    .ilike("nome", `%${q}%`)
    .limit(6);

  if(!data || data.length === 0){
    sugestoes.innerHTML = "";
    return;
  }

  sugestoes.innerHTML = data.map(i => `
    <div onclick="selecionarIngrediente('${i.id}')">
      ${i.nome}
    </div>
  `).join("");
});

async function selecionarIngrediente(id){
  const { data } = await sb
    .from("produtos")
    .select("*")
    .eq("id", id)
    .single();

  atual = data;
  titulo.textContent = "EDITAR INGREDIENTE";

  Object.keys(data).forEach(k=>{
    if(document.getElementById(k)){
      document.getElementById(k).value = data[k] || "";
    }
  });

  valor.value = "R$ " + Number(data.valor).toFixed(2).replace(".", ",");

  sugestoes.innerHTML = "";
}

// fecha sugestões ao clicar fora
document.addEventListener("click", (e)=>{
  if(!e.target.closest(".field")){
    sugestoes.innerHTML = "";
  }
});


valor.addEventListener("input", atualizarPreviewConversao);
quantidade_referencia.addEventListener("input", atualizarPreviewConversao);
unidade.addEventListener("change", atualizarPreviewConversao);
</script>

</body>
</html>

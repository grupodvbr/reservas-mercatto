<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cardápio Buffet</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter}

body{
background:#f3f4f6;
padding:20px;
}

/* HEADER */
.header{
font-size:26px;
font-weight:900;
margin-bottom:15px;
}

/* CARD */
.card{
background:#fff;
border-radius:16px;
padding:18px;
margin-bottom:15px;
box-shadow:0 8px 25px rgba(0,0,0,.06);
}

/* GRID */
.grid{
display:grid;
grid-template-columns:2fr 1fr;
gap:12px;
}

/* INPUT */
input{
height:42px;
padding:10px;
border-radius:10px;
border:1px solid #e5e7eb;
}

input:focus{
border-color:#ff6a00;
outline:none;
}

/* DIAS */
.dias{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:6px;
margin-top:10px;
}

.dias label{
background:#f1f5f9;
padding:10px;
border-radius:10px;
text-align:center;
cursor:pointer;
font-weight:700;
font-size:12px;
}

.dias input{display:none;}

.dias input:checked + span{
background:#ff6a00;
color:#fff;
}

/* BUTTON */
button{
height:44px;
border:none;
border-radius:10px;
font-weight:800;
cursor:pointer;
}

.primary{
background:#ff6a00;
color:#fff;
}

/* LISTA */
.lista{
display:grid;
gap:10px;
}

.item{
background:#fff;
border-radius:12px;
padding:14px;
display:flex;
justify-content:space-between;
align-items:center;
border:1px solid #e5e7eb;
}

.nome{font-weight:900;}

.meta{
font-size:12px;
color:#6b7280;
}

.excluir{
background:#fee2e2;
color:#991b1b;
padding:6px 10px;
border-radius:8px;
cursor:pointer;
font-weight:800;
}
</style>
</head>

<body>

<div class="header">Cardápio do Buffet Mercatto</div>

<div class="card">

<div class="grid">
  <input id="nome" placeholder="Nome do prato">
  <input id="tara" placeholder="Tara (kg)">
</div>

<div class="dias" id="dias">
  <label><input type="checkbox" value="SEGUNDA"><span>SEG</span></label>
  <label><input type="checkbox" value="TERCA"><span>TER</span></label>
  <label><input type="checkbox" value="QUARTA"><span>QUA</span></label>
  <label><input type="checkbox" value="QUINTA"><span>QUI</span></label>
  <label><input type="checkbox" value="SEXTA"><span>SEX</span></label>
  <label><input type="checkbox" value="SABADO"><span>SAB</span></label>
  <label><input type="checkbox" value="DOMINGO"><span>DOM</span></label>
</div>

<button class="primary" style="margin-top:12px;width:100%" onclick="salvar()">
Salvar Cardápio
</button>

</div>

<div class="card">
<b>Cardápio Atual</b>
<div class="lista" id="lista"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const sb = window.supabase.createClient(
  "https://dxkszikemntfusfyrzos.supabase.co",
  "sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
);

const empresa = "MERCATTO DELÍCIA";

document.getElementById("nome").addEventListener("input", e=>{
  e.target.value = e.target.value.toUpperCase();
});

function parsePeso(v){
  return Number(String(v || "0").replace(",", "."));
}

async function salvar(){

  const nome = document.getElementById("nome").value.trim();
  const tara = parsePeso(document.getElementById("tara").value);

  const dias = [...document.querySelectorAll("#dias input:checked")]
                .map(i=>i.value);

  if(!nome || dias.length === 0){
    return alert("Preencha tudo");
  }

  // remove antigo
  await sb.from("cardapio_dia_buffet")
    .delete()
    .eq("empresa", empresa)
    .eq("produto_nome", nome);

  // insere novo
  for(const dia of dias){
    await sb.from("cardapio_dia_buffet").insert({
      empresa,
      produto_nome: nome,
      dia_semana: dia,
      tara_padrao: tara
    });
  }

  limpar();
  carregar();
}

function limpar(){
  document.getElementById("nome").value="";
  document.getElementById("tara").value="";
  document.querySelectorAll("#dias input").forEach(i=>i.checked=false);
}

async function carregar(){

  const { data } = await sb
    .from("cardapio_dia_buffet")
    .select("*")
    .eq("empresa", empresa);

  const agrupado = {};

  data?.forEach(i=>{
    if(!agrupado[i.produto_nome]){
      agrupado[i.produto_nome] = {
        dias: [],
        tara: i.tara_padrao
      };
    }
    agrupado[i.produto_nome].dias.push(i.dia_semana);
  });

  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  Object.keys(agrupado).forEach(nome=>{
    const item = agrupado[nome];

    lista.innerHTML += `
      <div class="item">
        <div>
          <div class="nome">${nome}</div>
          <div class="meta">${item.dias.join(" • ")} | Tara: ${item.tara}</div>
        </div>
        <div class="excluir" onclick="excluir('${nome}')">Excluir</div>
      </div>
    `;
  });
}

async function excluir(nome){
  if(!confirm("Excluir?")) return;

  await sb.from("cardapio_dia_buffet")
    .delete()
    .eq("empresa", empresa)
    .eq("produto_nome", nome);

  carregar();
}

carregar();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  
  <title>Controle Sushi</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

:root{
  --bg:#0b1220;
  --card:#111827;
  --primary:#22c55e;
  --blue:#2563eb;
  --danger:#ef4444;
  --text:#fff;
  --muted:#9ca3af;
}

html, body{
  width:100%;
  overflow-x:hidden;
  overscroll-behavior: none; /* 🔥 BLOQUEIA bounce GLOBAL */

}


  
body{
  margin:0;
  font-family:Inter;
  background:var(--bg);
  color:#fff;
}

/* HEADER */
.header{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  z-index:50;

  padding:8px;
  font-size:14px;
  font-weight:700;

  background:#020617;
  text-align:center;
}

/* BUSCA */
.search{
  padding:12px;
}

.search input{
  width:100%;
  height:44px;
  border-radius:12px;
  border:none;
  padding:0 14px;
}

/* BOTÃO REGISTROS */
.btn-registros{
  margin:0 12px 12px;
  height:44px;
  border-radius:12px;
  background:var(--blue);
  color:#fff;
  border:none;
  font-weight:800;
}

/* GRID */
.grid{
  display:grid;
  gap:6px;
  padding:8px;

  margin-top:120px; /* altura real do topo */
}

/* 📱 CELULAR → 4 COLUNAS */
@media (max-width: 600px){
  .grid{
    grid-template-columns: repeat(4, 1fr);
  }

  .card img{
    height:70px;
  }

  .card-body b{
    font-size:10px;
  }
}

/* 📲 TABLET → 6 COLUNAS */
@media (min-width: 601px) and (max-width: 1024px){
  .grid{
    grid-template-columns: repeat(6, 1fr);
  }

  .card img{
    height:80px;
  }

  .card-body b{
    font-size:11px;
  }
}

/* 💻 DESKTOP */
@media (min-width: 1025px){
  .grid{
    grid-template-columns: repeat(6, 1fr);
  }
}


  

.card{
  background:var(--card);
  border-radius:10px;
  overflow:hidden;
  position:relative;
  min-width:0;
}

.card img{
  width:100%;
  height:100px;
  object-fit:cover;
}

.card-body{
  padding:8px;
}

.badge{
  position:absolute;
  top:6px;
  right:6px;
  background:var(--primary);
  padding:4px 8px;
  border-radius:10px;
  font-size:11px;
  font-weight:900;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.9);
  display:none;
  align-items:flex-end;
}

.modal-box{
  width:100%;
  max-height:75vh;

  background:#fff;
  color:#000;

  border-radius:20px 20px 0 0;
  padding:14px;

  overflow:auto;

  box-shadow:0 -10px 30px rgba(0,0,0,0.4);
}
/* REGISTROS */
.modal-reg{
  position:fixed;
  inset:0;

  background:rgba(0,0,0,0.85);

  display:none;

  justify-content:center;
  align-items:flex-end;

  z-index:9999;

  overflow:hidden; /* 🔥 ESSENCIAL */
  touch-action:none; /* 🔥 BLOQUEIA gesto externo */
}

.box-reg{
  width:100%;
  max-height:85vh;

  background:#0b1220;
  border-radius:20px 20px 0 0;

  padding:16px;

  overflow-y:auto;

  -webkit-overflow-scrolling: touch;

  overscroll-behavior: contain;

  touch-action: pan-y; /* 🔥 BLOQUEIA MULTI-DIREÇÃO */

  box-shadow:0 -10px 40px rgba(0,0,0,0.6);

  animation: subir .25s ease;
}

.modal-reg{
  overscroll-behavior: none; /* 🔥 bloqueia scroll externo */
}

  

@keyframes subir{
  from{ transform:translateY(100%); }
  to{ transform:translateY(0); }
}

.reg-card{
  background:#111;
  color:#fff;
  padding:12px;
  border-radius:12px;
  margin-top:10px;
  display:flex;
  gap:10px;
}

.reg-card img{
  width:70px;
  height:70px;
  border-radius:10px;
  object-fit:cover;
}

/* INPUTS */
input,select{
  width:100%;
  height:42px;
  margin-top:8px;
  border-radius:10px;
  border:1px solid #ddd;
  padding:8px;
  font-size:14px;
}

/* BOTÕES */
.btn{
  height:42px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  font-weight:800;
  font-size:14px;
}

.salvar{ background:var(--primary); color:#fff; }
.fechar{ background:#111; color:#fff; }

.titulo{
  margin-top:20px;
  font-weight:900;
}



#boasvindas{
  animation: fadeIn .3s ease;
}

@keyframes fadeIn{
  from{opacity:0}
  to{opacity:1}
}
/* LOGIN PREMIUM */
.login-screen{
  position:fixed;
  inset:0;

  display:flex;
  align-items:center;
  justify-content:center;

  background:#000;

  padding:16px;

  overflow:hidden;

  z-index:99999; /* 🔥 ESSENCIAL */
}

/* BOX */
.login-box{
  width:100%;
  max-width:320px;

  padding:16px;

  border-radius:14px;
  background:#111;

  display:flex;
  flex-direction:column;
  gap:10px;

  box-sizing:border-box;
}

*{
  box-sizing:border-box;
}

/* LOGO */
.login-logo{
  font-size:40px;
  text-align:center;
}

/* TITULO */
.login-box h2{
  text-align:center;
  margin:0;
  font-weight:800;
}

.sub{
  text-align:center;
  color:var(--muted);
  margin-bottom:10px;
  font-size:13px;
}

/* INPUTS */
.login-box input{
  height:48px;
  border-radius:12px;
  border:none;
  padding:0 14px;
  font-size:16px;

  background:#020617;
  color:#fff;

  outline:none;
}

/* BOTÃO */
.login-box button{
  height:48px;
  border-radius:12px;
  border:none;
  background:var(--primary);
  color:#fff;
  font-weight:800;
  font-size:15px;
}

/* REMOVE ZOOM IOS */
input, textarea, select{
  font-size:16px !important;
}

body.travado{
  overflow:hidden;
  position:fixed;
  width:100%;
}



  
</style>
</head>

<body>

<div id="login" class="login-screen">

  <div class="login-box">

    <div class="login-logo"></div>

    <h2>Controle Sushi</h2>
    <p class="sub">Acesso ao sistema</p>

    <input id="user" placeholder="Usuário">
    <input id="pass" type="password" placeholder="Senha">

    <button onclick="logar()">Entrar</button>

  </div>

</div>
<div class="header">Controle Sushi</div>

<div class="search" style="
position:fixed;
top:40px;
left:0;
width:100%;
z-index:50;
background:#0b1220;

display:flex;
gap:8px;
align-items:center;
padding:6px;
">
  <input id="busca" placeholder="Buscar sushi..." style="flex:1">

<button class="btn-registros" onclick="abrirRegistros()" style="margin:0;height:44px;min-width:120px">
  Registros
  </button>

</div>

<div id="cards" class="grid"></div>
<div id="boasvindas" style="
position:fixed;
inset:0;
background:#020617cc;
backdrop-filter: blur(10px);
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:10000;
color:#fff;
">

  <img id="fotoUser" style="
    width:90px;
    height:90px;
    border-radius:50%;
    object-fit:cover;
    margin-bottom:10px;
  ">

  <h2 id="msgUser"></h2>

</div>


  
<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-box">

<h2 id="nome" style="
font-size:16px;
margin-bottom:6px;
font-weight:800;
"></h2>
    
<img id="foto" style="
width:100%;
height:120px;
border-radius:10px;
object-fit:cover;
margin-bottom:6px;
">




    

    <input type="file" id="uploadFoto">

    <p id="descricao"></p>

   <div style="display:flex; gap:10px; margin-top:10px;">

  <div style="flex:1;">
    <label style="font-size:12px; font-weight:700; color:#555;">
      Tipo
    </label>
    <select id="tipo">
      <option>Produção</option>
      <option>Reaproveitamento</option>
      <option>Desperdício</option>
    </select>
  </div>

  <div style="flex:1;">
    <label style="font-size:12px; font-weight:700; color:#555;">
      Quantidade
    </label>
    <input id="qtd"
      type="number"
      inputmode="numeric"
      pattern="[0-9]*"
      placeholder="0">
  </div>

</div>


<div style="display:flex; justify-content:flex-end; gap:10px; margin-top:10px;">
  <button class="btn fechar" onclick="fechar()">FECHAR</button>
  <button class="btn salvar" onclick="salvar()">SALVAR</button>
</div>

  </div>
</div>

<!-- REGISTROS -->
<div id="registros" class="modal-reg">
  <div class="box-reg">

    <input type="date" id="dataFiltro" onchange="carregarRegistros()">

    <div id="listaRegistros"></div>

    <button class="btn fechar" onclick="fecharRegistros()">Fechar</button>

  </div>
</div>

<script>

const sb = supabase.createClient(
  "https://dxkszikemntfusfyrzos.supabase.co",
  "sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
);

let lista = [];
let atual = null;




function travarTela(){
  document.body.classList.add("travado");
}

function liberarTela(){
  document.body.classList.remove("travado");
}


  
/* =========================
   CARREGAR SUSHI
========================= */
async function carregar(){

  const usuarioLogado = localStorage.getItem("usuario_logado");

if(!usuarioLogado){
  document.getElementById("login").style.display = "flex";


  return;
}

  const { data } = await sb
    .from("buffet")
    .select("*")
    .eq("tipo","SUSHI");

  lista = data || [];
  atualizarCards();
}
/* =========================
   REGISTROS HOJE
========================= */
async function pegarHoje(){

  const hoje = new Date().toISOString().slice(0,10);

  const { data } = await sb
    .from("controle_sushi")
    .select("*")
    .eq("data_registro", hoje);

  return data || [];
}

/* =========================
   CARDS
========================= */
async function atualizarCards(listaFiltrada = lista){

  const registros = await pegarHoje();

  cards.innerHTML="";

  listaFiltrada.forEach(p=>{

    const total = registros
      .filter(r=>r.buffet_id===p.id)
      .reduce((s,r)=>s+Number(r.quantidade||0),0);

    const c = document.createElement("div");
    c.className="card";

    c.onclick = ()=>abrir(p);

    c.innerHTML = `
      ${total>0 ? `<div class="badge">${total}</div>` : ``}
      <img src="${p.foto_url||''}">
      <div class="card-body">
        <b>${p.nome}</b>
      </div>
    `;

    cards.appendChild(c);
  });
}

  
/* =========================
   MODAL
========================= */
function abrir(p){
  atual = p;
  modal.style.display="flex";
  travarTela(); // 🔥 AQUI

  nome.innerText = p.nome;
  descricao.innerText = p.descricao||"";
  foto.src = p.foto_url||"";
}

function fechar(){
  modal.style.display="none";
  liberarTela(); // 🔥 AQUI
}

/* =========================
   SALVAR
========================= */
async function salvar(){

  const hoje = new Date().toISOString().slice(0,10);

  await sb.from("controle_sushi").insert({
    buffet_id: atual.id,
    nome: atual.nome,
tipo: document.getElementById("tipo").value,
quantidade: document.getElementById("qtd").value,
    data_registro: hoje
  });

  alert("Salvo!");
  fechar();
  atualizarCards();
}

/* =========================
   EDITAR FOTO
========================= */
uploadFoto.onchange = async (e)=>{

  const file = e.target.files[0];
  if(!file) return;

  const nomeArquivo = atual.id + ".jpg";

  await sb.storage.from("buffet")
    .upload(nomeArquivo,file,{upsert:true});

  const { data } = sb.storage.from("buffet")
    .getPublicUrl(nomeArquivo);

  await sb.from("buffet")
    .update({ foto_url:data.publicUrl })
    .eq("id",atual.id);

  foto.src = data.publicUrl;

  carregar();
};

/* =========================
   REGISTROS
========================= */
function abrirRegistros(){
  registros.style.display="flex";
  travarTela(); // 🔥 AQUI

  const hoje = new Date().toISOString().slice(0,10);
  dataFiltro.value = hoje;

  carregarRegistros();
}



  
function fecharRegistros(){
  registros.style.display="none";
  liberarTela(); // 🔥 AQUI
}

/* =========================
   LISTA REGISTROS
========================= */
async function carregarRegistros(){

  const data = dataFiltro.value;

  const { data: regs } = await sb
    .from("controle_sushi")
    .select("*")
    .eq("data_registro", data);

  listaRegistros.innerHTML="";

  ["Produção","Reaproveitamento","Desperdício"].forEach(tipo=>{

    const grupo = regs.filter(r=>r.tipo===tipo);

    if(grupo.length===0) return;

    listaRegistros.innerHTML += `<div class="titulo">${tipo}</div>`;

    grupo.forEach(r=>{

      const prato = lista.find(p=>p.id===r.buffet_id);

      const editavel = data === new Date().toISOString().slice(0,10);

      listaRegistros.innerHTML += `
        <div class="reg-card">
          <img src="${prato?.foto_url || ''}">
          <div>
            <b>${r.nome}</b><br>
            ${r.quantidade}
${editavel ? `
  <br>
  <button onclick="editar('${r.id}')">Editar</button>
  <button onclick="excluir('${r.id}')" style="background:#ef4444;color:#fff;margin-left:5px">Excluir</button>
` : ``}


</div>
        </div>
      `;
    });

  });

}



  async function logar(){

  const usuarioDigitado = document.getElementById("user").value;
  const senhaDigitada = document.getElementById("pass").value;

  const resposta = await sb
    .from("usuarios_do_sistema") // CORRIGIDO
    .select("*")
    .eq("usuario", usuarioDigitado)
    .eq("senha", senhaDigitada)
    .eq("ativo", true)
    .single();

  if(resposta.error || !resposta.data){
    alert("Usuário ou senha inválidos");
    return;
  }

  const user = resposta.data;

  // salva sessão
  localStorage.setItem("usuario_logado", JSON.stringify(user));

  // força mostrar boas-vindas
  localStorage.setItem("boas_vindas_mostrada", "nao");

document.getElementById("login").style.display = "none";
 mostrarBoasVindas(user, true);
}

async function mostrarBoasVindas(user, primeiraVez = false){

  const tela = document.getElementById("boasvindas");

  document.getElementById("fotoUser").src =
    user.foto_url || "https://i.imgur.com/2DhmtJ4.png";

  if(primeiraVez){
    document.getElementById("msgUser").innerText =
      "Bem-vindo(a), " + (user.nome || user.usuario);
  }else{
    document.getElementById("msgUser").innerText =
      "Olá " + (user.nome || user.usuario) + ", carregando dados...";
  }

  tela.style.display = "flex";

  // 🔥 AGORA SIM: espera os dados da buffet
  await carregar();

  // 🔥 só some depois que carregar
  tela.style.display = "none";

  localStorage.setItem("boas_vindas_mostrada", "sim");
}


  

function logout(){
  localStorage.removeItem("usuario_logado");
  localStorage.removeItem("boas_vindas_mostrada"); // 🔥 importante
  location.reload();
}

/* INIT */
const usuarioLogado = localStorage.getItem("usuario_logado");
const boasVindas = localStorage.getItem("boas_vindas_mostrada");

if(usuarioLogado){

  const user = JSON.parse(usuarioLogado);

  document.getElementById("login").style.display = "none";

  document.querySelector(".header").innerText =
    "Controle Sushi - " + (user.nome || user.usuario);

  // 🔥 MOSTRA SÓ UMA VEZ
if(boasVindas !== "sim"){
  mostrarBoasVindas(user, true); // primeira vez
}else{
  mostrarBoasVindas(user, false); // já logado → loading leve
}

}else{
  document.getElementById("login").style.display = "flex";
}



  /* =========================
   EDITAR REGISTRO
========================= */
async function editar(id){

  const novo = prompt("Nova quantidade:");

  if(novo === null) return;

  if(!novo || novo <= 0){
    alert("Valor inválido");
    return;
  }

  const { error } = await sb
    .from("controle_sushi")
    .update({ quantidade: novo })
    .eq("id", id);

  if(error){
    alert("Erro ao editar");
    console.error(error);
    return;
  }

  alert("Atualizado!");
  carregarRegistros();
  atualizarCards();
}


/* =========================
   APAGAR REGISTRO
========================= */
async function excluir(id){

  if(!confirm("Deseja apagar esse registro?")) return;

  const { error } = await sb
    .from("controle_sushi")
    .delete()
    .eq("id", id);

  if(error){
    alert("Erro ao apagar");
    console.error(error);
    return;
  }

  alert("Apagado!");
  carregarRegistros();
  atualizarCards();
}

document.getElementById("busca").addEventListener("input", function(){

  const valor = this.value.toLowerCase().trim();

  if(!valor){
    atualizarCards(lista); // volta tudo
    return;
  }

  const filtrado = lista.filter(p =>
    (p.nome || "").toLowerCase().includes(valor)
  );

  atualizarCards(filtrado);
});
  
</script>


<script>
// 🚫 BLOQUEIA TODOS OS GESTOS DE ZOOM (2, 3, 4 dedos)
document.addEventListener('touchstart', function(e){
  if(e.touches.length > 1){
    e.preventDefault();
  }
}, { passive:false });

document.addEventListener('touchmove', function(e){
  if(e.touches.length > 1){
    e.preventDefault();
  }
}, { passive:false });

// 🚫 BLOQUEIA GESTOS iOS
document.addEventListener('gesturestart', e => e.preventDefault());
document.addEventListener('gesturechange', e => e.preventDefault());
document.addEventListener('gestureend', e => e.preventDefault());

// 🚫 BLOQUEIA ZOOM COM CTRL (desktop)
document.addEventListener('wheel', function(e){
  if(e.ctrlKey){
    e.preventDefault();
  }
}, { passive:false });

// 🚫 BLOQUEIA DOUBLE TAP ZOOM
let lastTouchEnd = 0;
document.addEventListener('touchend', function (event) {
  const now = (new Date()).getTime();
  if (now - lastTouchEnd <= 300) {
    event.preventDefault();
  }
  lastTouchEnd = now;
}, false);
</script>
</body>

</html>

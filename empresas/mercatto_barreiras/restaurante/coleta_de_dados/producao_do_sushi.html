<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Controle Sushi</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

:root{
  --bg:#0b1220;
  --card:#111827;
  --primary:#22c55e;
  --blue:#2563eb;
  --danger:#ef4444;
  --text:#fff;
  --muted:#9ca3af;
}

body{
  margin:0;
  font-family:Inter;
  background:var(--bg);
  color:#fff;
}

/* HEADER */
.header{
  padding:18px;
  font-size:20px;
  font-weight:900;
  text-align:center;
  background:#020617;
}

/* BUSCA */
.search{
  padding:12px;
}

.search input{
  width:100%;
  height:44px;
  border-radius:12px;
  border:none;
  padding:0 14px;
}

/* BOTÃO REGISTROS */
.btn-registros{
  margin:0 12px 12px;
  height:44px;
  border-radius:12px;
  background:var(--blue);
  color:#fff;
  border:none;
  font-weight:800;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.card{
  background:var(--card);
  border-radius:14px;
  overflow:hidden;
  position:relative;
}

.card img{
  width:100%;
  height:100px;
  object-fit:cover;
}

.card-body{
  padding:8px;
}

.badge{
  position:absolute;
  top:6px;
  right:6px;
  background:var(--primary);
  padding:4px 8px;
  border-radius:10px;
  font-size:11px;
  font-weight:900;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.9);
  display:none;
  align-items:flex-end;
}

.modal-box{
  width:100%;
  height:92%;
  background:#fff;
  color:#000;
  border-radius:20px 20px 0 0;
  padding:16px;
  overflow:auto;
}

/* REGISTROS */
.modal-reg{
  position:fixed;
  inset:0;
  background:#000000ee;
  display:none;
  overflow:auto;
}

.box-reg{
  padding:16px;
}

.reg-card{
  background:#111;
  color:#fff;
  padding:12px;
  border-radius:12px;
  margin-top:10px;
  display:flex;
  gap:10px;
}

.reg-card img{
  width:70px;
  height:70px;
  border-radius:10px;
  object-fit:cover;
}

/* INPUTS */
input,select{
  width:100%;
  height:44px;
  margin-top:10px;
  border-radius:12px;
  border:1px solid #ddd;
  padding:10px;
}

/* BOTÕES */
.btn{
  height:46px;
  margin-top:12px;
  border:none;
  border-radius:12px;
  font-weight:900;
}

.salvar{ background:var(--primary); color:#fff; }
.fechar{ background:#111; color:#fff; }

.titulo{
  margin-top:20px;
  font-weight:900;
}

</style>
</head>

<body>

<div class="header">Controle Sushi</div>

<div class="search" style="display:flex;gap:8px;align-items:center">
  <input id="busca" placeholder="Buscar sushi..." style="flex:1">

<button class="btn-registros" onclick="abrirRegistros()" style="margin:0;height:44px;min-width:120px">
  Registros
  </button>

</div>

<div id="cards" class="grid"></div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-box">

    <h2 id="nome"></h2>

    <img id="foto" style="width:100%;height:160px;border-radius:12px;object-fit:cover">

    <input type="file" id="uploadFoto">

    <p id="descricao"></p>

    <select id="tipo">
      <option>Produção</option>
      <option>Reaproveitamento</option>
      <option>Desperdício</option>
    </select>

    <input id="qtd" type="number" placeholder="Quantidade">

    <button class="btn salvar" onclick="salvar()">SALVAR</button>
    <button class="btn fechar" onclick="fechar()">FECHAR</button>

  </div>
</div>

<!-- REGISTROS -->
<div id="registros" class="modal-reg">
  <div class="box-reg">

    <input type="date" id="dataFiltro" onchange="carregarRegistros()">

    <div id="listaRegistros"></div>

    <button class="btn fechar" onclick="fecharRegistros()">Fechar</button>

  </div>
</div>

<script>

const sb = supabase.createClient(
  "https://dxkszikemntfusfyrzos.supabase.co",
  "sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
);

let lista = [];
let atual = null;

/* =========================
   CARREGAR SUSHI
========================= */
async function carregar(){
  const { data } = await sb
    .from("buffet")
    .select("*")
    .eq("tipo","SUSHI");

  lista = data || [];
  atualizarCards();
}

/* =========================
   REGISTROS HOJE
========================= */
async function pegarHoje(){

  const hoje = new Date().toISOString().slice(0,10);

  const { data } = await sb
    .from("controle_sushi")
    .select("*")
    .eq("data_registro", hoje);

  return data || [];
}

/* =========================
   CARDS
========================= */
async function atualizarCards(){

  const registros = await pegarHoje();

  cards.innerHTML="";

  lista.forEach(p=>{

    const total = registros
      .filter(r=>r.buffet_id===p.id)
      .reduce((s,r)=>s+Number(r.quantidade||0),0);

    const c = document.createElement("div");
    c.className="card";

    c.onclick = ()=>abrir(p);

    c.innerHTML = `
      ${total>0 ? `<div class="badge">${total}</div>` : ``}
      <img src="${p.foto_url||''}">
      <div class="card-body">
        <b>${p.nome}</b>
      </div>
    `;

    cards.appendChild(c);
  });
}

/* =========================
   BUSCA
========================= */
busca.oninput = ()=>{
  const v = busca.value.toLowerCase();
  atualizarCards(lista.filter(p=>p.nome.toLowerCase().includes(v)));
};

/* =========================
   MODAL
========================= */
function abrir(p){
  atual = p;
  modal.style.display="flex";

  nome.innerText = p.nome;
  descricao.innerText = p.descricao||"";
  foto.src = p.foto_url||"";
}

function fechar(){
  modal.style.display="none";
}

/* =========================
   SALVAR
========================= */
async function salvar(){

  const hoje = new Date().toISOString().slice(0,10);

  await sb.from("controle_sushi").insert({
    buffet_id: atual.id,
    nome: atual.nome,
tipo: document.getElementById("tipo").value,
quantidade: document.getElementById("qtd").value,
    data_registro: hoje
  });

  alert("Salvo!");
  fechar();
  atualizarCards();
}

/* =========================
   EDITAR FOTO
========================= */
uploadFoto.onchange = async (e)=>{

  const file = e.target.files[0];
  if(!file) return;

  const nomeArquivo = atual.id + ".jpg";

  await sb.storage.from("buffet")
    .upload(nomeArquivo,file,{upsert:true});

  const { data } = sb.storage.from("buffet")
    .getPublicUrl(nomeArquivo);

  await sb.from("buffet")
    .update({ foto_url:data.publicUrl })
    .eq("id",atual.id);

  foto.src = data.publicUrl;

  carregar();
};

/* =========================
   REGISTROS
========================= */
function abrirRegistros(){
  registros.style.display="block";

  const hoje = new Date().toISOString().slice(0,10);
  dataFiltro.value = hoje;

  carregarRegistros();
}

function fecharRegistros(){
  registros.style.display="none";
}

/* =========================
   LISTA REGISTROS
========================= */
async function carregarRegistros(){

  const data = dataFiltro.value;

  const { data: regs } = await sb
    .from("controle_sushi")
    .select("*")
    .eq("data_registro", data);

  listaRegistros.innerHTML="";

  ["Produção","Reaproveitamento","Desperdício"].forEach(tipo=>{

    const grupo = regs.filter(r=>r.tipo===tipo);

    if(grupo.length===0) return;

    listaRegistros.innerHTML += `<div class="titulo">${tipo}</div>`;

    grupo.forEach(r=>{

      const prato = lista.find(p=>p.id===r.buffet_id);

      const editavel = data === new Date().toISOString().slice(0,10);

      listaRegistros.innerHTML += `
        <div class="reg-card">
          <img src="${prato?.foto_url || ''}">
          <div>
            <b>${r.nome}</b><br>
            ${r.quantidade}
            ${editavel ? `<br><button onclick="editar('${r.id}')">Editar</button>` : ``}
          </div>
        </div>
      `;
    });

  });

}

/* INIT */
carregar();

</script>

</body>
</html>

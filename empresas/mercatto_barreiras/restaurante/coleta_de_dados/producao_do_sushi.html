<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Controle Sushi</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

:root{
  --bg:#0b1220;
  --card:#111827;
  --primary:#22c55e;
  --blue:#2563eb;
  --danger:#ef4444;
  --text:#fff;
  --muted:#9ca3af;
}

body{
  margin:0;
  font-family:Inter;
  background:var(--bg);
  color:#fff;
}

/* HEADER */
.header{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  z-index:50;

  padding:8px;
  font-size:14px;
  font-weight:700;

  background:#020617;
  text-align:center;
}

/* BUSCA */
.search{
  padding:12px;
}

.search input{
  width:100%;
  height:44px;
  border-radius:12px;
  border:none;
  padding:0 14px;
}

/* BOTÃO REGISTROS */
.btn-registros{
  margin:0 12px 12px;
  height:44px;
  border-radius:12px;
  background:var(--blue);
  color:#fff;
  border:none;
  font-weight:800;
}

/* GRID */
.grid{
  display:grid;
  gap:6px;
  padding:8px;

  margin-top:120px; /* altura real do topo */
}

/* 📱 CELULAR → 4 COLUNAS */
@media (max-width: 600px){
  .grid{
    grid-template-columns: repeat(4, 1fr);
  }

  .card img{
    height:70px;
  }

  .card-body b{
    font-size:10px;
  }
}

/* 📲 TABLET → 6 COLUNAS */
@media (min-width: 601px) and (max-width: 1024px){
  .grid{
    grid-template-columns: repeat(6, 1fr);
  }

  .card img{
    height:80px;
  }

  .card-body b{
    font-size:11px;
  }
}

/* 💻 DESKTOP */
@media (min-width: 1025px){
  .grid{
    grid-template-columns: repeat(6, 1fr);
  }
}


  

.card{
  background:var(--card);
  border-radius:10px;
  overflow:hidden;
  position:relative;
  min-width:0;
}

.card img{
  width:100%;
  height:100px;
  object-fit:cover;
}

.card-body{
  padding:8px;
}

.badge{
  position:absolute;
  top:6px;
  right:6px;
  background:var(--primary);
  padding:4px 8px;
  border-radius:10px;
  font-size:11px;
  font-weight:900;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.9);
  display:none;
  align-items:flex-end;
}

.modal-box{
  width:100%;
  max-height:75vh;

  background:#fff;
  color:#000;

  border-radius:20px 20px 0 0;
  padding:14px;

  overflow:auto;

  box-shadow:0 -10px 30px rgba(0,0,0,0.4);
}
/* REGISTROS */
.modal-reg{
  position:fixed;
  inset:0;
  background:#000000ee;
  display:none;
  overflow:auto;
}

.box-reg{
  padding:16px;
}

.reg-card{
  background:#111;
  color:#fff;
  padding:12px;
  border-radius:12px;
  margin-top:10px;
  display:flex;
  gap:10px;
}

.reg-card img{
  width:70px;
  height:70px;
  border-radius:10px;
  object-fit:cover;
}

/* INPUTS */
input,select{
  width:100%;
  height:42px;
  margin-top:8px;
  border-radius:10px;
  border:1px solid #ddd;
  padding:8px;
  font-size:14px;
}

/* BOTÕES */
.btn{
  height:42px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  font-weight:800;
  font-size:14px;
}

.salvar{ background:var(--primary); color:#fff; }
.fechar{ background:#111; color:#fff; }

.titulo{
  margin-top:20px;
  font-weight:900;
}

</style>
</head>

<body>

<div id="login" style="
position:fixed;
inset:0;
background:#000;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
">

  <div style="
    background:#111;
    padding:20px;
    border-radius:16px;
    width:90%;
    max-width:320px;
  ">

    <h2 style="color:#fff;text-align:center">Acesso</h2>

    <input id="user" placeholder="Usuário">
    <input id="pass" type="password" placeholder="Senha">

    <button onclick="logar()" style="
      width:100%;
      height:44px;
      margin-top:10px;
      background:#22c55e;
      color:#fff;
      border:none;
      border-radius:10px;
      font-weight:800;
    ">
      Entrar
    </button>

  </div>

</div>

<div class="header">Controle Sushi</div>

<div class="search" style="
position:fixed;
top:40px;
left:0;
width:100%;
z-index:50;
background:#0b1220;

display:flex;
gap:8px;
align-items:center;
padding:6px;
">
  <input id="busca" placeholder="Buscar sushi..." style="flex:1">

<button class="btn-registros" onclick="abrirRegistros()" style="margin:0;height:44px;min-width:120px">
  Registros
  </button>

</div>

<div id="cards" class="grid"></div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-box">

<h2 id="nome" style="
font-size:16px;
margin-bottom:6px;
font-weight:800;
"></h2>
    
<img id="foto" style="
width:100%;
height:120px;
border-radius:10px;
object-fit:cover;
margin-bottom:6px;
">


    

    <input type="file" id="uploadFoto">

    <p id="descricao"></p>

    <select id="tipo">
      <option>Produção</option>
      <option>Reaproveitamento</option>
      <option>Desperdício</option>
    </select>

<input id="qtd"
type="number"
inputmode="numeric"
pattern="[0-9]*"
placeholder="Quantidade"
style="font-size:16px;">


    
    <button class="btn salvar" onclick="salvar()">SALVAR</button>
    <button class="btn fechar" onclick="fechar()">FECHAR</button>

  </div>
</div>

<!-- REGISTROS -->
<div id="registros" class="modal-reg">
  <div class="box-reg">

    <input type="date" id="dataFiltro" onchange="carregarRegistros()">

    <div id="listaRegistros"></div>

    <button class="btn fechar" onclick="fecharRegistros()">Fechar</button>

  </div>
</div>

<script>

const sb = supabase.createClient(
  "https://dxkszikemntfusfyrzos.supabase.co",
  "sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
);

let lista = [];
let atual = null;

/* =========================
   CARREGAR SUSHI
========================= */
async function carregar(){

  const usuarioLogado = localStorage.getItem("usuario_logado");

  if(!usuarioLogado){
    document.getElementById("login").style.display = "flex";
    return;
  }

  const { data } = await sb
    .from("buffet")
    .select("*")
    .eq("tipo","SUSHI");

  lista = data || [];
  atualizarCards();
}
/* =========================
   REGISTROS HOJE
========================= */
async function pegarHoje(){

  const hoje = new Date().toISOString().slice(0,10);

  const { data } = await sb
    .from("controle_sushi")
    .select("*")
    .eq("data_registro", hoje);

  return data || [];
}

/* =========================
   CARDS
========================= */
async function atualizarCards(){

  const registros = await pegarHoje();

  cards.innerHTML="";

  lista.forEach(p=>{

    const total = registros
      .filter(r=>r.buffet_id===p.id)
      .reduce((s,r)=>s+Number(r.quantidade||0),0);

    const c = document.createElement("div");
    c.className="card";

    c.onclick = ()=>abrir(p);

    c.innerHTML = `
      ${total>0 ? `<div class="badge">${total}</div>` : ``}
      <img src="${p.foto_url||''}">
      <div class="card-body">
        <b>${p.nome}</b>
      </div>
    `;

    cards.appendChild(c);
  });
}

/* =========================
   BUSCA
========================= */
busca.oninput = ()=>{
  const v = busca.value.toLowerCase();
  atualizarCards(lista.filter(p=>p.nome.toLowerCase().includes(v)));
};

/* =========================
   MODAL
========================= */
function abrir(p){
  atual = p;
  modal.style.display="flex";

  nome.innerText = p.nome;
  descricao.innerText = p.descricao||"";
  foto.src = p.foto_url||"";
}

function fechar(){
  modal.style.display="none";
}

/* =========================
   SALVAR
========================= */
async function salvar(){

  const hoje = new Date().toISOString().slice(0,10);

  await sb.from("controle_sushi").insert({
    buffet_id: atual.id,
    nome: atual.nome,
tipo: document.getElementById("tipo").value,
quantidade: document.getElementById("qtd").value,
    data_registro: hoje
  });

  alert("Salvo!");
  fechar();
  atualizarCards();
}

/* =========================
   EDITAR FOTO
========================= */
uploadFoto.onchange = async (e)=>{

  const file = e.target.files[0];
  if(!file) return;

  const nomeArquivo = atual.id + ".jpg";

  await sb.storage.from("buffet")
    .upload(nomeArquivo,file,{upsert:true});

  const { data } = sb.storage.from("buffet")
    .getPublicUrl(nomeArquivo);

  await sb.from("buffet")
    .update({ foto_url:data.publicUrl })
    .eq("id",atual.id);

  foto.src = data.publicUrl;

  carregar();
};

/* =========================
   REGISTROS
========================= */
function abrirRegistros(){
  registros.style.display="block";

  const hoje = new Date().toISOString().slice(0,10);
  dataFiltro.value = hoje;

  carregarRegistros();
}

function fecharRegistros(){
  registros.style.display="none";
}

/* =========================
   LISTA REGISTROS
========================= */
async function carregarRegistros(){

  const data = dataFiltro.value;

  const { data: regs } = await sb
    .from("controle_sushi")
    .select("*")
    .eq("data_registro", data);

  listaRegistros.innerHTML="";

  ["Produção","Reaproveitamento","Desperdício"].forEach(tipo=>{

    const grupo = regs.filter(r=>r.tipo===tipo);

    if(grupo.length===0) return;

    listaRegistros.innerHTML += `<div class="titulo">${tipo}</div>`;

    grupo.forEach(r=>{

      const prato = lista.find(p=>p.id===r.buffet_id);

      const editavel = data === new Date().toISOString().slice(0,10);

      listaRegistros.innerHTML += `
        <div class="reg-card">
          <img src="${prato?.foto_url || ''}">
          <div>
            <b>${r.nome}</b><br>
            ${r.quantidade}
${editavel ? `
  <br>
  <button onclick="editar('${r.id}')">Editar</button>
  <button onclick="excluir('${r.id}')" style="background:#ef4444;color:#fff;margin-left:5px">Excluir</button>
` : ``}


</div>
        </div>
      `;
    });

  });

}



  async function logar(){

  const usuarioDigitado = document.getElementById("user").value;
  const senhaDigitada = document.getElementById("pass").value;

  const resposta = await sb
    .from("usuarios_do_sistema")
    .select("*")
    .eq("usuario", usuarioDigitado)
    .eq("senha", senhaDigitada)
    .eq("ativo", true)
    .single();

  if(resposta.error || !resposta.data){
    alert("Usuário ou senha inválidos");
    return;
  }

  localStorage.setItem("usuario_logado", JSON.stringify(resposta.data));

  document.getElementById("login").style.display = "none";

  carregar();
}

function logout(){
  localStorage.removeItem("usuario_logado");
  location.reload();
}


/* INIT */
const usuarioLogado = localStorage.getItem("usuario_logado");

if(usuarioLogado){

  document.getElementById("login").style.display = "none";

  const dadosUsuario = JSON.parse(usuarioLogado);

  document.querySelector(".header").innerText =
    "Controle Sushi - " + dadosUsuario.nome + " (" + dadosUsuario.empresa + ")";

  carregar();

}else{
  document.getElementById("login").style.display = "flex";
}



  /* =========================
   EDITAR REGISTRO
========================= */
async function editar(id){

  const novo = prompt("Nova quantidade:");

  if(novo === null) return;

  if(!novo || novo <= 0){
    alert("Valor inválido");
    return;
  }

  const { error } = await sb
    .from("controle_sushi")
    .update({ quantidade: novo })
    .eq("id", id);

  if(error){
    alert("Erro ao editar");
    console.error(error);
    return;
  }

  alert("Atualizado!");
  carregarRegistros();
  atualizarCards();
}


/* =========================
   APAGAR REGISTRO
========================= */
async function excluir(id){

  if(!confirm("Deseja apagar esse registro?")) return;

  const { error } = await sb
    .from("controle_sushi")
    .delete()
    .eq("id", id);

  if(error){
    alert("Erro ao apagar");
    console.error(error);
    return;
  }

  alert("Apagado!");
  carregarRegistros();
  atualizarCards();
}




  
</script>

</body>
</html>

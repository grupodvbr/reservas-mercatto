<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Painel RH • Grupo DV</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{box-sizing:border-box}

body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:#f4f6fb;
  color:#111827;
}

header{
  padding:20px;
  font-weight:800;
  font-size:20px;
  background:#fff;
  border-bottom:1px solid #e5e7eb;
  position:sticky;
  top:0;
}

.container{
  padding:20px;
  max-width:1200px;
  margin:auto;
}

/* FILTROS */
.filters{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:10px;
  margin-bottom:20px;
}

input,select{
  padding:10px;
  border-radius:10px;
  border:1px solid #e5e7eb;
  background:#fff;
}

/* CARD */
.card{
  background:#fff;
  padding:16px;
  border-radius:14px;
  margin-bottom:12px;
  box-shadow:0 5px 20px rgba(0,0,0,.05);
}

.row{
  display:flex;
  justify-content:space-between;
  flex-wrap:wrap;
  gap:10px;
}

/* STATUS */
.badge{
  padding:4px 8px;
  border-radius:8px;
  font-size:11px;
  font-weight:600;
}

.NOVO{background:#dbeafe;color:#1d4ed8}
.EM_ANALISE{background:#fef3c7;color:#92400e}
.APROVADO{background:#dcfce7;color:#166534}
.REPROVADO{background:#fee2e2;color:#991b1b}

/* BOTÕES */
button{
  padding:8px 12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-size:13px;
}

.view{background:#2563eb;color:#fff}
.download{background:#059669;color:#fff}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  pointer-events:none;
  transition:.3s;
}

.modal.active{
  opacity:1;
  pointer-events:auto;
}

.modal-box{
  background:#fff;
  width:95%;
  max-width:900px;
  height:90%;
  border-radius:12px;
  overflow:hidden;
  display:flex;
  flex-direction:column;
}

.modal-header{
  padding:10px;
  background:#111827;
  color:#fff;
  display:flex;
  justify-content:space-between;
}

iframe{
  flex:1;
  border:none;
}

.close{
  background:#ef4444;
  color:#fff;
}

</style>

</head>

<body>

<header>Painel RH</header>

<div class="container">

<div class="filters">
<input id="busca" placeholder="Buscar nome...">

<select id="empresaFiltro">
<option value="">Empresa</option>
<option>MERCATTO DELÍCIA (Barreiras)</option>
<option>VILLA GOURMET(Luis Eduardo)</option>
<option>PADARIA DELÍCIA (Barreiras)</option>
<option>M.KIDS (Barreiras)</option>
<option>DELÍCIA GOURMET (Barreiras)</option>
</select>

<select id="sexoFiltro">
<option value="">Sexo</option>
<option>Masculino</option>
<option>Feminino</option>
</select>

<select id="idadeFiltro">
<option value="">Idade</option>
<option value="18-25">18-25</option>
<option value="26-35">26-35</option>
<option value="36-50">36-50</option>
</select>

<input id="areaFiltro" placeholder="Área">
<input type="date" id="dataFiltro">

</div>

<div id="lista"></div>

</div>

<!-- MODAL CV -->
<div class="modal" id="modal">
  <div class="modal-box">
    <div class="modal-header">
      <span>Visualizar Currículo</span>
      <button class="close" onclick="modal.classList.remove('active')">Fechar</button>
    </div>
    <iframe id="frame"></iframe>
  </div>
</div>

<script>

const client = window.supabase.createClient(
  "https://dxkszikemntfusfyrzos.supabase.co",
  "sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
);

async function carregar(){

  let { data } = await client
    .from("curriculo_candidatos")
    .select("*")
    .order("created_at",{ascending:false});

  render(data);
}

function render(data){

  const lista = document.getElementById("lista");

  const busca = buscaEl.value.toLowerCase();
  const empresa = empresaFiltro.value;
  const sexo = sexoFiltro.value;
  const idade = idadeFiltro.value;
  const area = areaFiltro.value.toLowerCase();
  const dataFiltro = dataEl.value;

  lista.innerHTML="";

  data.filter(c=>{

    if(busca && !c.nome.toLowerCase().includes(busca)) return false;
    if(empresa && c.empresa !== empresa) return false;
    if(sexo && c.sexo !== sexo) return false;
    if(area && !c.area_interesse.toLowerCase().includes(area)) return false;

    if(idade){
      const [min,max] = idade.split("-").map(Number);
      if(c.idade < min || c.idade > max) return false;
    }

    if(dataFiltro){
      const d = new Date(c.created_at).toISOString().slice(0,10);
      if(d !== dataFiltro) return false;
    }

    return true;

  }).forEach(c=>{

    const div = document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <div class="row">
        <div>
          <b>${c.nome}</b><br>
          ${c.idade} anos • ${c.sexo}<br>
          ${c.telefone}<br>
          ${c.email || '-'}<br>
          <b>${c.empresa}</b><br>
          Área: ${c.area_interesse}<br>
          Obs: ${c.observacoes || '-'}
        </div>

        <div>
          <span class="badge ${c.status}">${c.status}</span><br><br>

          <button class="view" onclick="abrir('${c.arquivo_url}')">Ver</button>
          <button class="download" onclick="download('${c.arquivo_url}')">Download</button>

          <br><br>

          <select onchange="status('${c.id}',this.value)">
            <option ${c.status==='NOVO'?'selected':''}>NOVO</option>
            <option ${c.status==='EM_ANALISE'?'selected':''}>EM_ANALISE</option>
            <option ${c.status==='APROVADO'?'selected':''}>APROVADO</option>
            <option ${c.status==='REPROVADO'?'selected':''}>REPROVADO</option>
          </select>
        </div>
      </div>
    `;

    lista.appendChild(div);

  });
}

/* MODAL */
function abrir(url){
  frame.src = url;
  modal.classList.add("active");
}

/* DOWNLOAD */
function download(url){
  window.open(url,"_blank");
}

/* STATUS */
async function status(id,novo){
  await client
    .from("curriculo_candidatos")
    .update({status:novo})
    .eq("id",id);
}

/* FILTROS */
const buscaEl = document.getElementById("busca");
const empresaFiltro = document.getElementById("empresaFiltro");
const sexoFiltro = document.getElementById("sexoFiltro");
const idadeFiltro = document.getElementById("idadeFiltro");
const areaFiltro = document.getElementById("areaFiltro");
const dataEl = document.getElementById("dataFiltro");

document.querySelectorAll("input,select").forEach(e=>{
  e.addEventListener("input",carregar);
});

carregar();

</script>

</body>
</html>

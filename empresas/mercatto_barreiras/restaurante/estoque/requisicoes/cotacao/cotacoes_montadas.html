<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cotações • Mercatto</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
  --primary:#111827;
  --primary2:#1f2937;
  --bg:#f3f4f6;
  --card:#ffffff;
  --border:#e5e7eb;
  --text:#111827;
  --muted:#6b7280;
  --green:#16a34a;
  --red:#dc2626;
  --yellow:#ca8a04;
  --shadow:0 10px 30px rgba(0,0,0,.08);
  --radius:18px;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Inter;
}

body{
  background:var(--bg);
  color:var(--text);
}

/* ================= TOPO ================= */

.top{
  background:#fff;
  padding:20px;
  border-bottom:1px solid var(--border);
  position:sticky;
  top:0;
  z-index:100;
}

.top-flex{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
}

.top input{
  flex:1;
  min-width:220px;
  padding:12px;
  border-radius:12px;
  border:1px solid var(--border);
  background:#fff;
}

.top button{
  padding:12px 18px;
  border:none;
  border-radius:12px;
  background:var(--primary);
  color:#fff;
  font-weight:700;
  cursor:pointer;
}

/* ================= LAYOUT ================= */

.layout{
  display:grid;
  grid-template-columns:420px 1fr;
  gap:18px;
  padding:18px;
}

@media(max-width:1000px){
  .layout{
    grid-template-columns:1fr;
  }
}

/* ================= CARD ================= */

.card{
  background:var(--card);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  overflow:hidden;
  border:1px solid var(--border);
}

.card-header{
  padding:16px 18px;
  border-bottom:1px solid var(--border);
  font-size:15px;
  font-weight:800;
}

.card-body{
  padding:16px;
}

/* ================= COTAÇÕES ================= */

.cotacao{
  padding:14px;
  border:1px solid var(--border);
  border-radius:14px;
  margin-bottom:12px;
  cursor:pointer;
  transition:.2s;
  background:#fff;
}

.cotacao:hover{
  transform:translateY(-2px);
  border-color:#cbd5e1;
}

.cotacao h3{
  font-size:15px;
  margin-bottom:4px;
}

.cotacao small{
  color:var(--muted);
}

.badges{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-top:10px;
}

.badge{
  padding:5px 10px;
  border-radius:999px;
  font-size:11px;
  font-weight:700;
}

.ativa{
  background:#dcfce7;
  color:#166534;
}

.finalizada{
  background:#fee2e2;
  color:#991b1b;
}

.total{
  background:#eff6ff;
  color:#1d4ed8;
}

/* ================= ITENS ================= */

.itens{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.item{
  border:1px solid var(--border);
  border-radius:14px;
  padding:14px;
}

.item-top{
  display:flex;
  justify-content:space-between;
  gap:10px;
}

.item h4{
  font-size:14px;
}

.item small{
  color:var(--muted);
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:10px;
  margin-top:12px;
}

.info{
  background:#f9fafb;
  border-radius:10px;
  padding:10px;
}

.info span{
  display:block;
  font-size:11px;
  color:var(--muted);
  margin-bottom:4px;
}

.info b{
  font-size:14px;
}

/* ================= FORNECEDORES ================= */

.fornecedores{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-top:14px;
}

.for{
  padding:8px 12px;
  border-radius:999px;
  border:1px solid var(--border);
  cursor:pointer;
  transition:.2s;
  font-size:12px;
  font-weight:600;
}

.for:hover{
  background:#f3f4f6;
}

.for.active{
  background:var(--primary);
  color:#fff;
  border-color:var(--primary);
}

/* ================= OVERLAY ================= */

.overlay{
  position:fixed;
  inset:0;
  background:rgba(255,255,255,.7);
  backdrop-filter:blur(4px);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
  font-size:18px;
  font-weight:800;
}

/* ================= EMPTY ================= */

.empty{
  padding:30px;
  text-align:center;
  color:var(--muted);
}

</style>
</head>

<body>

<div class="top">

  <div class="top-flex">

    <input
      id="busca"
      placeholder="🔍 Buscar cotação..."
      oninput="filtrarCotacoes()"
    >

    <button onclick="recarregar()">
      Atualizar
    </button>

  </div>

</div>

<div class="layout">

  <!-- ================= ESQUERDA ================= -->

  <div class="card">

    <div class="card-header">
      📦 Cotações Salvas
    </div>

    <div class="card-body">

      <div id="listaCotacoes"></div>

    </div>

  </div>

  <!-- ================= DIREITA ================= -->

  <div class="card">

    <div class="card-header">
      📋 Detalhes da Cotação
    </div>

    <div class="card-body">

      <div id="detalhes">

        <div class="empty">
          Selecione uma cotação
        </div>

      </div>

    </div>

  </div>

</div>

<div class="overlay" id="overlay">
  Carregando...
</div>

<script>

const sb = supabase.createClient(
  "https://dxkszikemntfusfyrzos.supabase.co",
  "sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
);

let cotacoes = [];
let fornecedores = [];
let cotacaoAtual = null;

/* =========================
   INIT
========================= */

init();

async function init(){

  overlay.style.display = "flex";

  await carregarFornecedores();
  await carregarCotacoes();

  overlay.style.display = "none";
}

/* =========================
   FORNECEDORES
========================= */

async function carregarFornecedores(){

  const { data } = await sb
    .from("fornecedores_mercatto")
    .select("*")
    .eq("ativo", true)
    .order("nome");

  fornecedores = data || [];
}

/* =========================
   COTAÇÕES
========================= */

async function carregarCotacoes(){

  const { data } = await sb
    .from("cotacoes")
    .select("*")
    .order("data_cotacao", { ascending:false });

  cotacoes = data || [];

  renderCotacoes(cotacoes);
}

/* =========================
   RENDER COTAÇÕES
========================= */

function renderCotacoes(arr){

  const lista = document.getElementById("listaCotacoes");

  if(!arr.length){
    lista.innerHTML = `
      <div class="empty">
        Nenhuma cotação encontrada
      </div>
    `;
    return;
  }

  lista.innerHTML = "";

  arr.forEach(c => {

    const totalItens = c.itens?.length || 0;

    lista.innerHTML += `

      <div class="cotacao"
        onclick='abrirCotacao(${JSON.stringify(c)})'>

        <h3>${c.nome || "Sem nome"}</h3>

        <small>
          ${formatarData(c.data_cotacao)}
        </small>

        <div class="badges">

          <div class="badge total">
            ${totalItens} itens
          </div>

          <div class="badge ${c.status === "finalizada"
            ? "finalizada"
            : "ativa"}">

            ${(c.status || "ativa").toUpperCase()}

          </div>

        </div>

      </div>

    `;
  });
}

/* =========================
   ABRIR
========================= */

function abrirCotacao(c){

  cotacaoAtual = c;

  const box = document.getElementById("detalhes");

  const itens = c.itens || [];

  const total = itens.reduce((acc,i)=>{
    return acc + (
      (Number(i.comprar)||0) *
      (Number(i.preco)||0)
    );
  },0);

  box.innerHTML = `

    <div style="margin-bottom:18px;">

      <h2 style="font-size:22px;">
        ${c.nome}
      </h2>

      <small style="color:#6b7280;">
        ${formatarData(c.data_cotacao)}
      </small>

      <div class="badges" style="margin-top:12px;">

        <div class="badge total">
          Total R$ ${total.toFixed(2)}
        </div>

        <div class="badge ${c.status === "finalizada"
          ? "finalizada"
          : "ativa"}">

          ${(c.status || "ativa").toUpperCase()}

        </div>

      </div>

    </div>

    <div class="fornecedores">

      ${fornecedores.map(f=>`

        <div
          class="for"
          onclick="toggleFornecedor(this,'${f.id}')">

          ${f.nome}

        </div>

      `).join("")}

    </div>

    <br>

    <div class="itens">

      ${itens.map(i=>`

        <div class="item">

          <div class="item-top">

            <div>

              <h4>${i.produto}</h4>

              <small>
                Resultado Final:
                ${i.resultado}
              </small>

            </div>

          </div>

          <div class="grid">

            <div class="info">
              <span>Atual</span>
              <b>${i.atual}</b>
            </div>

            <div class="info">
              <span>Mínimo</span>
              <b>${i.minimo}</b>
            </div>

            <div class="info">
              <span>Ideal</span>
              <b>${i.ideal}</b>
            </div>

            <div class="info">
              <span>Comprar</span>
              <b>${i.comprar}</b>
            </div>

            <div class="info">
              <span>Preço</span>
              <b>
                ${
                  i.preco
                  ? `R$ ${Number(i.preco).toFixed(2)}`
                  : "Sem preço"
                }
              </b>
            </div>

            <div class="info">
              <span>Subtotal</span>
              <b>
                R$
                ${(
                  (Number(i.comprar)||0) *
                  (Number(i.preco)||0)
                ).toFixed(2)}
              </b>
            </div>

          </div>

        </div>

      `).join("")}

    </div>

    <br>

    <div style="display:flex;gap:10px;flex-wrap:wrap;">

      <button onclick="finalizarCotacao()"
        style="
          background:#111827;
          color:#fff;
          border:none;
          padding:14px 18px;
          border-radius:12px;
          font-weight:700;
          cursor:pointer;
        ">

        Finalizar Cotação

      </button>

      <button onclick="reabrirCotacao()"
        style="
          background:#2563eb;
          color:#fff;
          border:none;
          padding:14px 18px;
          border-radius:12px;
          font-weight:700;
          cursor:pointer;
        ">

        Reabrir

      </button>

    </div>

  `;
}

/* =========================
   FORNECEDOR
========================= */

function toggleFornecedor(el,id){

  el.classList.toggle("active");
}

/* =========================
   STATUS
========================= */

async function finalizarCotacao(){

  if(!cotacaoAtual) return;

  overlay.style.display = "flex";

  await sb
    .from("cotacoes")
    .update({
      status:"finalizada"
    })
    .eq("id", cotacaoAtual.id);

  await carregarCotacoes();

  overlay.style.display = "none";

  alert("Cotação finalizada");
}

async function reabrirCotacao(){

  if(!cotacaoAtual) return;

  overlay.style.display = "flex";

  await sb
    .from("cotacoes")
    .update({
      status:"ativa"
    })
    .eq("id", cotacaoAtual.id);

  await carregarCotacoes();

  overlay.style.display = "none";

  alert("Cotação reaberta");
}

/* =========================
   BUSCA
========================= */

function filtrarCotacoes(){

  const termo =
    document.getElementById("busca")
    .value
    .toLowerCase();

  const filtradas = cotacoes.filter(c =>

    (c.nome || "")
    .toLowerCase()
    .includes(termo)

  );

  renderCotacoes(filtradas);
}

/* =========================
   HELPERS
========================= */

function recarregar(){
  init();
}

function formatarData(data){

  if(!data) return "-";

  return new Date(data)
    .toLocaleString("pt-BR");
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Mercatto • Cotações</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

:root{
  --bg:#f3f4f6;
  --card:#ffffff;
  --line:#dfe3e8;
  --text:#111827;
  --muted:#6b7280;
  --primary:#111827;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Inter;
}

body{
  background:var(--bg);
  color:var(--text);
}

/* ================= TOPO ================= */

.top{
  background:#fff;
  border-bottom:1px solid var(--line);
  padding:14px 18px;
}

.top-flex{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:20px;
  flex-wrap:wrap;
}

.top h1{
  font-size:22px;
}

.top small{
  color:#6b7280;
}

.btn{
  border:none;
  background:#111827;
  color:#fff;
  padding:10px 14px;
  border-radius:8px;
  cursor:pointer;
  font-size:13px;
  font-weight:700;
}

/* ================= LAYOUT ================= */

.layout{
  display:grid;
  grid-template-columns:190px 1fr;
  gap:10px;
  padding:10px;
}

@media(max-width:1100px){

  .layout{
    grid-template-columns:1fr;
  }

}

/* ================= SIDEBAR ================= */

.sidebar{
  background:#fff;
  border:1px solid var(--line);
  border-radius:10px;
  overflow:hidden;
  width:190px;
}

.search{
  width:100%;
  border:none;
  border-bottom:1px solid var(--line);
  padding:10px;
  outline:none;
  font-size:12px;
}

.lista{
  max-height:calc(100vh - 140px);
  overflow:auto;
}

.cotacao{
  padding:10px;
  border-bottom:1px solid var(--line);
  cursor:pointer;
}

.cotacao:hover{
  background:#f9fafb;
}

.cotacao.active{
  background:#eef2ff;
}

/* ================= STATUS ================= */

.cotacao.aberta{
  border-left:4px solid #f97316;
  background:#fff7ed;
}

.cotacao.finalizada{
  border-left:4px solid #22c55e;
  background:#f0fdf4;
}

.cotacao.aberta h3{
  color:#ea580c;
}

.cotacao.finalizada h3{
  color:#166534;
}










  
.cotacao h3{
  font-size:13px;
  margin-bottom:4px;
}

.cotacao small{
  color:#6b7280;
  font-size:11px;
}

/* ================= MAIN ================= */

.main{
  background:#fff;
  border:1px solid var(--line);
  border-radius:10px;
  overflow:hidden;
}

.main-top{
  padding:14px;
  border-bottom:1px solid var(--line);
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:20px;
  flex-wrap:wrap;
}

.main-top h2{
  font-size:18px;
}

.main-top small{
  color:#6b7280;
}

/* ================= FORNECEDORES ================= */

.toolbar{
  padding:12px 14px;
  border-bottom:1px solid var(--line);
  background:#fafafa;
}

.toolbar-top{
  display:flex;
  gap:12px;
  align-items:center;
  flex-wrap:nowrap;
  justify-content:space-between;
}

.for-search{
  width:240px;
  min-width:240px;
  border:1px solid var(--line);
  border-radius:8px;
  padding:10px;
  outline:none;
  font-size:13px;
  background:#fff;
}

.dropdown{
  position:relative;
}

.dropdown-list{
  position:absolute;
  top:100%;
  left:0;
  width:320px;
  max-height:250px;
  overflow:auto;
  background:#fff;
  border:1px solid var(--line);
  border-radius:8px;
  z-index:999;
  display:none;
}

.dropdown-item{
  padding:10px;
  border-bottom:1px solid #f1f5f9;
  cursor:pointer;
  font-size:12px;
}

.dropdown-item:hover{
  background:#f9fafb;
}

.tags{
  display:flex;
  align-items:center;
  gap:8px;
  overflow-x:auto;
  flex:1;
  min-height:42px;
}

.tag{
  display:flex;
  align-items:center;
  gap:8px;
  background:#111827;
  color:#fff;
  padding:7px 10px;
  border-radius:999px;
  font-size:11px;
  font-weight:700;
}

.tag button{
  border:none;
  background:none;
  color:#fff;
  cursor:pointer;
  font-size:12px;
}

/* ================= TABELA ================= */

.table-wrap{
  width:100%;
  overflow:auto;
}

table{
  border-collapse:collapse;
  width:max-content;
  min-width:100%;
}

thead{
  background:#f9fafb;
}

th{
  border-right:1px solid var(--line);
  border-bottom:1px solid var(--line);
  padding:10px;
  font-size:11px;
  text-transform:uppercase;
  color:#6b7280;
  white-space:nowrap;
  text-align:left;
}

td{
  border-right:1px solid var(--line);
  border-bottom:1px solid var(--line);
  padding:8px;
  font-size:13px;
  vertical-align:top;
  background:#fff;
}

tr:hover td{
  background:#fafafa;
}

.input{
  width:100%;
  min-width:95px;
  height:34px;
  border:1px solid #d1d5db;
  border-radius:6px;
  padding:6px 8px;
  font-size:12px;
  outline:none;
  background:#fff;
}

/* ================= MENOR PREÇO ================= */

.input.melhor-preco{
  background:#dcfce7;
  border:2px solid #22c55e;
  color:#166534;
  font-weight:800;
}



  
textarea.input{
  min-height:38px;
  resize:vertical;
}

.produto{
  font-weight:700;
  min-width:180px;
}

/* ================= OVERLAY ================= */

.overlay{
  position:fixed;
  inset:0;
  background:rgba(255,255,255,.6);
  backdrop-filter:blur(4px);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
  font-size:20px;
  font-weight:800;
}

.empty{
  padding:60px;
  text-align:center;
  color:#6b7280;
}

</style>
</head>

<body>

<div class="top">

  <div class="top-flex">

    <div>

      <h1>Cotações</h1>

      <small>
        Modelo planilha Excel dinâmica
      </small>

    </div>

    <button
      class="btn"
      onclick="carregarCotacoes()">

      Atualizar

    </button>

  </div>

</div>

<div class="layout">

  <!-- SIDEBAR -->

  <div class="sidebar">

    <input
      class="search"
      id="buscaCotacao"
      placeholder="Pesquisar cotação..."
      oninput="filtrarCotacoes()"
    >

    <div
      class="lista"
      id="listaCotacoes">
    </div>

  </div>

  <!-- MAIN -->

  <div class="main">

    <div id="detalhes">

      <div class="empty">

        Selecione uma cotação

      </div>

    </div>

  </div>

</div>

<div
  class="overlay"
  id="overlay">

  Processando...

</div>

<script>

const sb = supabase.createClient(
  "https://dxkszikemntfusfyrzos.supabase.co",
  "sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
);

let cotacoes = [];
let fornecedores = [];
let cotacaoAtual = null;

/* ================= INIT ================= */

init();

async function init(){

  overlay(true);

  await carregarFornecedores();
  await carregarCotacoes();

  overlay(false);
}

/* ================= OVERLAY ================= */

function overlay(show){

  document.getElementById("overlay")
    .style.display =
      show ? "flex" : "none";
}

/* ================= FORNECEDORES ================= */

async function carregarFornecedores(){

  const { data } = await sb

    .from("fornecedores_mercatto")

    .select("*")

    .eq("ativo", true)

    .order("nome");

  fornecedores = data || [];
}

/* ================= COTAÇÕES ================= */

async function carregarCotacoes(){

  const { data } = await sb

    .from("cotacoes")

    .select("*")

    .order(
      "data_cotacao",
      { ascending:false }
    );

  cotacoes = data || [];

  renderCotacoes(cotacoes);

  if(cotacaoAtual){

    const nova =
      cotacoes.find(c =>

        c.id === cotacaoAtual.id

      );

    if(nova){

      cotacaoAtual = nova;

      abrirCotacao(nova);
    }
  }
}

/* ================= LISTA ================= */

function renderCotacoes(arr){

  const lista =
    document.getElementById(
      "listaCotacoes"
    );

  lista.innerHTML = "";

  arr.forEach(c => {

    lista.innerHTML += `

<div
  class="cotacao

  ${

    c.status === 'FINALIZADA'

      ? 'finalizada'

      : 'aberta'

  }

  ${
    cotacaoAtual &&
    cotacaoAtual.id === c.id
    ? "active"
    : ""
  }"


  

        onclick='abrirCotacao(
          ${JSON.stringify(c)}
        )'>

        <h3>
          ${c.nome || "Cotação"}
        </h3>

        <small>
          ${formatarData(c.data_cotacao)}
        </small>

      </div>

    `;

  });

}

function calcularMelhoresPrecos(itensCotacao){

  const melhores = {};

  itensCotacao.forEach(item => {

    let menor = null;

    (item.fornecedores || []).forEach(f => {

      const preco =
        Number(f.preco_unitario || 0);

      const emb =
        Number(
          f.quantidade_embalagem || 1
        );

      if(!preco) return;

      const precoConvertido =
        preco / emb;

      if(
        menor === null ||
        precoConvertido < menor
      ){
        menor = precoConvertido;
      }

    });

    melhores[item.produto] = menor;

  });

  return melhores;
}














  

/* ================= ABRIR ================= */

function abrirCotacao(c){

  cotacaoAtual = c;

  renderCotacoes(cotacoes);

  const detalhes =
    document.getElementById(
      "detalhes"
    );

  const itens = c.itens || [];
  const itensCotacao =
    c.itens_cotacao || [];





const melhoresPrecos =
  calcularMelhoresPrecos(
    itensCotacao
  );

const totaisFornecedor = {};

itensCotacao.forEach(item => {

  const melhorPrecoItem =
    melhoresPrecos[item.produto];

  if(!melhorPrecoItem)
    return;

  (item.fornecedores || [])
  .forEach(f => {

    const preco =
      Number(f.preco_unitario || 0);

    const emb =
      Number(
        f.quantidade_embalagem || 1
      );

    if(!preco) return;

    /* PREÇO REAL UNITÁRIO */

    const precoConvertido =
      preco / emb;

    /* APENAS QUEM TEM O MELHOR PREÇO */

    if(
      precoConvertido ===
      melhorPrecoItem
    ){

      const qtd =
        Number(
          item.qtd_solicitada || 0
        );

      /* TOTAL REAL DO ITEM */

      const totalItem =
        precoConvertido * qtd;

      if(
        !totaisFornecedor[
          f.fornecedor_id
        ]
      ){

        totaisFornecedor[
          f.fornecedor_id
        ] = {

          nome:
            f.fornecedor_nome,

          total:0,

          itens:0,

          produtos:[]
        };

      }

      totaisFornecedor[
        f.fornecedor_id
      ].total += totalItem;

      totaisFornecedor[
        f.fornecedor_id
      ].itens += 1;

      totaisFornecedor[
        f.fornecedor_id
      ].produtos.push({

        produto:item.produto,

        qtd,

        valor:totalItem

      });

    }

  });

});




  
  /* ================= FORNECEDORES GERAIS ================= */

  let fornecedoresSelecionados = [];

  itensCotacao.forEach(i => {

    (i.fornecedores || [])

    .forEach(f => {

      const existe =
        fornecedoresSelecionados
        .find(x =>

          x.fornecedor_id ===
          f.fornecedor_id

        );

      if(!existe){

        fornecedoresSelecionados
        .push(f);

      }

    });

  });

  detalhes.innerHTML = `

    <!-- HEADER -->

    <div class="main-top">

      <div>

<div style="
  display:flex;
  align-items:center;
  gap:10px;
">

  <h2
    id="tituloCotacao"
    style="
      margin:0;
    ">

    ${c.nome}

  </h2>







  
<button

  onclick="
    editarNomeCotacao(
      '${c.id}',
      \`${c.nome}\`
    )
  "

  style="
    border:none;
    background:#f3f4f6;
    width:34px;
    height:34px;
    border-radius:8px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:14px;
  ">

  ✏️

</button>

<button

  onclick="
    alterarStatusCotacao(
      '${c.id}',
      '${
        c.status === 'FINALIZADA'
          ? 'ABERTA'
          : 'FINALIZADA'
      }'
    )
  "

  style="
    border:none;
    background:${
      c.status === 'FINALIZADA'
        ? '#dcfce7'
        : '#111827'
    };
    color:${
      c.status === 'FINALIZADA'
        ? '#166534'
        : '#fff'
    };
    padding:0 14px;
    height:34px;
    border-radius:8px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:12px;
    font-weight:800;
  ">

  ${
    c.status === 'FINALIZADA'
      ? 'REABRIR'
      : 'FINALIZAR'
  }








</button>

<button

  onclick="
    excluirCotacao(
      '${c.id}'
    )
  "

  style="
    border:none;
    background:#fee2e2;
    color:#b91c1c;
    padding:0 14px;
    height:34px;
    border-radius:8px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:12px;
    font-weight:800;
  ">

  EXCLUIR

</button>


<button

  onclick="
    gerarResultadoCotacaoPDF()
  "

  style="
    border:none;
    background:#2563eb;
    color:#fff;
    padding:0 16px;
    height:34px;
    border-radius:8px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:12px;
    font-weight:800;
  ">

  GERAR RESULTADO

</button>











</div>

        <small>
          ${formatarData(c.data_cotacao)}
        </small>

      </div>




























    </div>

   ${
  c.status === 'FINALIZADA'

  ? ''

  : `

    <!-- TOOLBAR -->

    <div class="toolbar">

      <div class="toolbar-top">

        <!-- FORNECEDORES SELECIONADOS -->

        <div class="tags">

          ${fornecedoresSelecionados.map(f=>`

            <div class="tag">

              ${f.fornecedor_nome}

              <button
                onclick="
                  removerFornecedorGeral(
                    '${f.fornecedor_id}'
                  )
                ">

                ✕

              </button>

            </div>

          `).join("")}

        </div>

        <!-- PESQUISA -->

        <div class="dropdown">

          <input
            class="for-search"

            placeholder="Pesquisar fornecedor..."

            onfocus="
              abrirDropdown()
            "

            oninput="
              pesquisarFornecedor(this)
            "
          >

          <div
            class="dropdown-list"
            id="dropdown">

            ${fornecedores.map(f=>`

              <div
                class="dropdown-item"

                data-nome="${f.nome}"

                onclick="
                  adicionarFornecedorGeral(
                    '${f.id}',
                    '${f.nome}'
                  )
                ">

                ${f.nome}

              </div>

            `).join("")}

          </div>

        </div>

      </div>

    </div>

  `
}


<!-- CARDS -->

<div style="
  display:flex;
  gap:12px;
  padding:14px;
  overflow:auto;
  border-top:1px solid #e5e7eb;
  border-bottom:1px solid #e5e7eb;
  background:#fff;
">

${Object.values(
  totaisFornecedor
).map(f=>`

  <div style="
    min-width:220px;
    background:#f8fafc;
    border:1px solid #e5e7eb;
    border-radius:14px;
    padding:14px;
    box-shadow:
      0 4px 12px rgba(0,0,0,.04);
  ">

<div style="
      font-size:11px;
      color:#64748b;
      margin-bottom:6px;
      font-weight:700;
      text-transform:uppercase;
    ">

      Total com melhores preços

    </div>

    <div style="
      font-size:15px;
      font-weight:800;
      margin-bottom:10px;
    ">

      ${f.nome}

    </div>









<div style="
  display:flex;
  flex-direction:column;
  gap:6px;
">

  <div style="
    font-size:24px;
    font-weight:900;
    color:#16a34a;
  ">

    R$
    ${f.total.toLocaleString(
      'pt-BR',
      {
        minimumFractionDigits:2,
        maximumFractionDigits:2
      }
    )}

  </div>

  <div style="
    font-size:12px;
    color:#64748b;
    font-weight:700;
  ">

    ${f.itens} itens vencedores

  </div>

</div>

  </div>

`).join("")}

</div>

















    <!-- TABELA -->

    <div class="table-wrap">

      <table>

        <thead>

          <tr>

            <th>Produto</th>
<th>Qtd / Und</th>
<th>Último preço</th>

            ${fornecedoresSelecionados.map(f=>`

              <th>
                ${f.fornecedor_nome}
                <br><br>

                <div style="
                  display:grid;
grid-template-columns:
110px 90px 100px 120px;
                  gap:4px;
                ">

               <div>Valor</div>
<div>Und</div>
<div>Emb</div>
<div>Prazo</div>
                </div>

              </th>

            `).join("")}

          </tr>

        </thead>

        <tbody>

          ${itens.map((item,index)=>{

            const itemCotado =
              itensCotacao.find(i =>

                i.produto === item.produto

              ) || {

              produto:item.produto,

qtd_solicitada:
  item.comprar || 0,

unidade:
  item.unidade || "UN",

fornecedores:[]
              };

            return `

              <tr>

                <!-- PRODUTO -->

                <td class="produto">

                  ${item.produto}

                </td>















                

<!-- QTD -->

<td>

  <div style="
    display:flex;
    flex-direction:column;
    gap:4px;
    min-width:140px;
  ">

    <!-- LINHA PRINCIPAL -->

    <div style="
      display:flex;
      align-items:center;
      gap:6px;
      white-space:nowrap;
      font-weight:700;
    ">

      <span>
        ${item.comprar || 0}
      </span>

      <span style="
        color:#2563eb;
        font-size:11px;
        text-transform:uppercase;
        font-weight:800;
      ">

        ${item.unidade || "UN"}

      </span>

    </div>

    <!-- CONVERSÃO -->






${
  Number(
    itemCotado.qtd_unidades ||
    item.qtd_unidades ||
    item.quantidade_embalagem ||
    1
  ) > 1

  ? `

  <small style="
    color:#6b7280;
    font-size:10px;
    line-height:1.4;
  ">

    Caixa com
    <b>
      ${
        itemCotado.qtd_unidades ||
        item.qtd_unidades ||
        item.quantidade_embalagem ||
        1
      }
    </b>
    unidades

  </small>

  `

  : `

  <small style="
    color:#9ca3af;
    font-size:10px;
  ">

    Unidade individual

  </small>

  `
}

  </div>

</td>
















                <!-- ULTIMO -->

                <td>

                  ${
                    item.preco
                    ? "R$ " + item.preco
                    : "Sem preço"
                  }

                </td>

                <!-- FORNECEDORES -->

                ${fornecedoresSelecionados.map(f=>{

                  const resposta =
                    itemCotado
                    .fornecedores
                    .find(x =>

                      x.fornecedor_id ===
                      f.fornecedor_id

                    );

                  return `

                    <td>

                      ${
                        resposta

                        ? `

                         <div style="
  display:grid;
  grid-template-columns:
  90px 90px 90px 110px;
  gap:4px;
">

  <!-- VALOR -->







<input
  class="input ${
    (
      Number(
        resposta.preco_unitario || 0
      ) /
      Number(
        resposta.quantidade_embalagem || 1
      )
    ) ===
    melhoresPrecos[item.produto]

    ? 'melhor-preco'

    : ''
  }"

  value="${
    resposta.preco_unitario

      ? Number(
          resposta.preco_unitario
        ).toLocaleString(
          'pt-BR',
          {
            style:'currency',
            currency:'BRL'
          }
        )

      : ''
  }"

  readonly
>

  <!-- UNIDADE -->

  <input
    class="input"

    value="${
      resposta.unidade ||
      item.unidade ||
      itemCotado.unidade ||
      'UN'
    }"

    readonly
  >

  <!-- EMBALAGEM -->





<input
  class="input"

  value="${
    resposta.quantidade_embalagem

      ? resposta.quantidade_embalagem + ' UN'

      : '1 UN'
  }"

  readonly
>











  <!-- PRAZO -->

  <input
    class="input"

    value="${
      resposta.prazo || ''
    }"

    readonly
  >

</div>

                        `

                        : `

                          <div style="
                            color:#9ca3af;
                            font-size:12px;
                          ">

                            Não selecionado

                          </div>

                        `
                      }

                    </td>

                  `;

                }).join("")}

              </tr>

/* ================= REMOVER ================= */

async function removerFornecedorGeral(
  fornecedorId
){

  const confirmar =
    confirm(
      "Deseja remover este fornecedor?"
    );

  if(!confirmar)
    return;

  const { data } = await sb

    .from("cotacoes")

    .select("*")

    .eq("id", cotacaoAtual.id)

    .single();

  let itensCotacao =
    data.itens_cotacao || [];

  itensCotacao.forEach(item => {

    item.fornecedores =
      (item.fornecedores || [])

      .filter(f =>

        f.fornecedor_id !==
        fornecedorId

      );

  });

  await sb

    .from("cotacoes")

    .update({

      itens_cotacao:itensCotacao,
      atualizado_em:new Date()

    })

    .eq("id", cotacaoAtual.id);

  cotacaoAtual.itens_cotacao =
    itensCotacao;

  abrirCotacao(cotacaoAtual);
}

function filtrarCotacoes(){

  const termo =
    document.getElementById(
      "buscaCotacao"
    )
    .value
    .toLowerCase();

  const filtradas =
    cotacoes.filter(c =>

      (c.nome || "")
      .toLowerCase()
      .includes(termo)

    );

  renderCotacoes(filtradas);
}

function formatarData(data){

  if(!data) return "-";

  return new Date(data)
    .toLocaleString("pt-BR");
}

function overlay(show){

  document.getElementById("overlay")
    .style.display =
      show ? "flex" : "none";
}

/* ================= REALTIME ================= */

sb.channel("cotacoes_realtime")

.on(
  "postgres_changes",
  {
    event:"UPDATE",
    schema:"public",
    table:"cotacoes"
  },
  payload => {

    carregarCotacoes();

    if(
      cotacaoAtual &&
      payload.new.id === cotacaoAtual.id
    ){

      cotacaoAtual =
        payload.new;

      abrirCotacao(
        cotacaoAtual
      );

    }

  }
)

.subscribe();





async function editarNomeCotacao(
  id,
  nomeAtual
){

  const novoNome = prompt(
    "Editar nome da cotação:",
    nomeAtual
  );

  if(
    !novoNome ||
    !novoNome.trim()
  ){
    return;
  }

  overlay(true);

  const { error } = await sb

    .from("cotacoes")

    .update({

      nome:novoNome.trim(),
      atualizado_em:new Date()

    })

    .eq("id", id);

  overlay(false);

  if(error){

    console.log(error);

    alert(
      "Erro ao atualizar"
    );

    return;
  }

  cotacaoAtual.nome =
    novoNome.trim();

  carregarCotacoes();

}

  const itensCotacao =

    itensCotacao
  );

const totaisFornecedor = {};

itensCotacao.forEach(item => {

    melhoresPrecos[item.produto];

    return;

  .forEach(f => {

      Number(f.preco_unitario || 0);

      );

        );

        f.fornecedor_id
      ].total += totalItem;

      totaisFornecedor[
        f.fornecedor_id
      ].itens += 1;

    }

  });

});

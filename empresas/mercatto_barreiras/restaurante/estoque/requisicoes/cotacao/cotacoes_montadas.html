<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mercatto • Cotações</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

:root{
  --primary:#111827;
  --primary2:#1f2937;
  --bg:#f3f4f6;
  --card:#ffffff;
  --border:#e5e7eb;
  --muted:#6b7280;
  --green:#16a34a;
  --red:#dc2626;
  --yellow:#ca8a04;
  --blue:#2563eb;
  --shadow:0 10px 30px rgba(0,0,0,.08);
  --radius:22px;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Inter;
}

body{
  background:var(--bg);
  color:#111827;
}

/* ================= TOP ================= */

.top{
  position:sticky;
  top:0;
  z-index:100;
  background:#fff;
  border-bottom:1px solid var(--border);
  padding:18px 24px;
}

.top-flex{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:20px;
  flex-wrap:wrap;
}

.top h1{
  font-size:28px;
}

.top small{
  color:var(--muted);
}

.top-actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.btn{
  border:none;
  padding:13px 18px;
  border-radius:14px;
  font-weight:700;
  cursor:pointer;
}

.btn-dark{
  background:#111827;
  color:#fff;
}

.btn-blue{
  background:#2563eb;
  color:#fff;
}

.btn-red{
  background:#ef4444;
  color:#fff;
}

/* ================= LAYOUT ================= */

.layout{
  display:grid;
  grid-template-columns:400px 1fr;
  gap:20px;
  padding:24px;
}

@media(max-width:1100px){

  .layout{
    grid-template-columns:1fr;
  }

}

/* ================= CARD ================= */

.card{
  background:#fff;
  border-radius:28px;
  padding:22px;
  box-shadow:var(--shadow);
}

/* ================= LISTA ================= */

.search{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:1px solid var(--border);
  margin-bottom:18px;
  outline:none;
}

.cotacao{
  border:1px solid var(--border);
  border-radius:18px;
  padding:16px;
  margin-bottom:12px;
  cursor:pointer;
  transition:.2s;
}

.cotacao:hover{
  transform:translateY(-2px);
}

.cotacao.active{
  border-color:#111827;
  background:#f9fafb;
}

.cotacao h3{
  font-size:16px;
  margin-bottom:6px;
}

.cotacao small{
  color:var(--muted);
}

.badges{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-top:12px;
}

.badge{
  padding:6px 12px;
  border-radius:999px;
  font-size:11px;
  font-weight:800;
}

.badge-ativa{
  background:#dcfce7;
  color:#166534;
}

.badge-finalizada{
  background:#fee2e2;
  color:#991b1b;
}

.badge-respondida{
  background:#fef3c7;
  color:#92400e;
}

/* ================= ITEM ================= */

.item{
  border:1px solid var(--border);
  border-radius:22px;
  padding:20px;
  margin-bottom:18px;
}

.item-top{
  margin-bottom:18px;
}

.item-top h3{
  font-size:18px;
  margin-bottom:6px;
}

.item-top small{
  color:var(--muted);
}

.grid{
  display:grid;
  grid-template-columns:
  repeat(auto-fit,minmax(150px,1fr));
  gap:12px;
}

.info{
  background:#f9fafb;
  border-radius:16px;
  padding:14px;
}

.info span{
  display:block;
  font-size:11px;
  color:#6b7280;
  margin-bottom:4px;
}

.info b{
  font-size:15px;
}

/* ================= FORNECEDORES ================= */

.for-search{
  width:100%;
  padding:13px;
  border-radius:14px;
  border:1px solid var(--border);
  margin-top:18px;
  margin-bottom:14px;
}

.for-wrap{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}

.for{
  padding:10px 14px;
  border-radius:999px;
  border:1px solid var(--border);
  cursor:pointer;
  font-size:13px;
  font-weight:700;
  transition:.2s;
  display:flex;
  align-items:center;
  gap:8px;
}

.for.active{
  background:#111827;
  color:#fff;
  border-color:#111827;
}

/* ================= RESPOSTAS ================= */

.responses{
  margin-top:22px;
  border-top:1px solid #e5e7eb;
  padding-top:18px;
}

.response{
  border:1px solid #e5e7eb;
  border-radius:18px;
  padding:16px;
  margin-bottom:12px;
  background:#fafafa;
}

.response-top{
  display:flex;
  justify-content:space-between;
  gap:12px;
  flex-wrap:wrap;
  margin-bottom:14px;
}

.response-grid{
  display:grid;
  grid-template-columns:
  repeat(auto-fit,minmax(150px,1fr));
  gap:12px;
}

.response-status{
  padding:7px 12px;
  border-radius:999px;
  font-size:11px;
  font-weight:800;
}

.pending{
  background:#fef3c7;
  color:#92400e;
}

.done{
  background:#dcfce7;
  color:#166534;
}

/* ================= EMPTY ================= */

.empty{
  padding:60px 20px;
  text-align:center;
  color:#6b7280;
}

/* ================= OVERLAY ================= */

.overlay{
  position:fixed;
  inset:0;
  background:rgba(255,255,255,.7);
  backdrop-filter:blur(4px);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
  font-size:22px;
  font-weight:900;
}

</style>
</head>

<body>

<div class="top">

  <div class="top-flex">

    <div>

      <h1>Cotações</h1>

      <small>
        Gestão inteligente de fornecedores
      </small>

    </div>

    <div class="top-actions">

      <button
        class="btn btn-dark"
        onclick="carregarCotacoes()">

        Atualizar

      </button>

    </div>

  </div>

</div>

<div class="layout">

  <!-- ================= ESQUERDA ================= -->

  <div class="card">

    <input
      class="search"
      id="buscaCotacao"
      placeholder="Pesquisar cotação..."
      oninput="filtrarCotacoes()"
    >

    <div id="listaCotacoes"></div>

  </div>

  <!-- ================= DIREITA ================= -->

  <div class="card">

    <div id="detalhes">

      <div class="empty">

        Selecione uma cotação

      </div>

    </div>

  </div>

</div>

<div
  class="overlay"
  id="overlay">

  Processando...

</div>

<script>

const sb = supabase.createClient(
  "https://dxkszikemntfusfyrzos.supabase.co",
  "sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
);

let cotacoes = [];
let fornecedores = [];
let cotacaoAtual = null;

/* =========================
   INIT
========================= */

init();

async function init(){

  overlay(true);

  await carregarFornecedores();
  await carregarCotacoes();

  overlay(false);
}

/* =========================
   OVERLAY
========================= */

function overlay(show){

  document.getElementById("overlay")
    .style.display =
      show ? "flex" : "none";
}

/* =========================
   FORNECEDORES
========================= */

async function carregarFornecedores(){

  const { data } = await sb

    .from("fornecedores_mercatto")

    .select("*")

    .eq("ativo", true)

    .order("nome");

  fornecedores = data || [];
}

/* =========================
   COTAÇÕES
========================= */

async function carregarCotacoes(){

  const { data, error } = await sb

    .from("cotacoes")

    .select("*")

    .order(
      "data_cotacao",
      { ascending:false }
    );

  if(error){

    console.log(error);

    return;
  }

  cotacoes = data || [];

  renderCotacoes(cotacoes);

  if(
    cotacaoAtual
  ){

    const atualizada =
      cotacoes.find(c =>

        c.id === cotacaoAtual.id

      );

    if(atualizada){

      cotacaoAtual = atualizada;

      abrirCotacao(atualizada);
    }
  }
}

/* =========================
   RENDER LISTA
========================= */

function renderCotacoes(arr){

  const lista =
    document.getElementById(
      "listaCotacoes"
    );

  lista.innerHTML = "";

  if(!arr.length){

    lista.innerHTML = `

      <div class="empty">

        Nenhuma cotação encontrada

      </div>

    `;

    return;
  }

  arr.forEach(c => {

    lista.innerHTML += `

      <div
        class="cotacao
        ${
          cotacaoAtual &&
          cotacaoAtual.id === c.id
          ? "active"
          : ""
        }"

        onclick='abrirCotacao(
          ${JSON.stringify(c)}
        )'>

        <h3>
          ${c.nome || "Cotação"}
        </h3>

        <small>
          ${formatarData(c.data_cotacao)}
        </small>

        <div class="badges">

          <div class="badge ${
            c.status === "finalizada"
            ? "badge-finalizada"
            : c.status === "respondida"
            ? "badge-respondida"
            : "badge-ativa"
          }">

            ${(c.status || "ativa")
              .toUpperCase()}

          </div>

        </div>

      </div>

    `;
  });
}

/* =========================
   ABRIR
========================= */

function abrirCotacao(c){

  cotacaoAtual = c;

  renderCotacoes(cotacoes);

  const box =
    document.getElementById(
      "detalhes"
    );

  const itens = c.itens || [];
  const itensCotacao =
    c.itens_cotacao || [];

  box.innerHTML = `

    <div style="
      display:flex;
      justify-content:space-between;
      gap:20px;
      flex-wrap:wrap;
      margin-bottom:24px;
    ">

      <div>

        <h2 style="
          font-size:28px;
          margin-bottom:6px;
        ">
          ${c.nome}
        </h2>

        <small style="
          color:#6b7280;
        ">
          ${formatarData(c.data_cotacao)}
        </small>

      </div>

      <div style="
        display:flex;
        gap:10px;
        flex-wrap:wrap;
      ">

        <button
          class="btn btn-dark"
          onclick="finalizarCotacao()">

          Finalizar

        </button>

        <button
          class="btn btn-blue"
          onclick="reabrirCotacao()">

          Reabrir

        </button>

      </div>

    </div>

    ${itens.map((i,index)=>{

      const itemCotado =
        itensCotacao.find(x =>

          x.produto === i.produto

        ) || {

          produto:i.produto,
          qtd_solicitada:
            i.comprar || 0,
          fornecedores:[]

        };

      return `

        <div class="item">

          <div class="item-top">

            <h3>
              ${i.produto}
            </h3>

            <small>

              Comprar:
              ${i.comprar || 0}

              •

              Resultado:
              ${i.resultado || 0}

            </small>

          </div>

          <div class="grid">

            <div class="info">
              <span>Atual</span>
              <b>${i.atual || 0}</b>
            </div>

            <div class="info">
              <span>Mínimo</span>
              <b>${i.minimo || 0}</b>
            </div>

            <div class="info">
              <span>Ideal</span>
              <b>${i.ideal || 0}</b>
            </div>

            <div class="info">
              <span>Comprar</span>
              <b>${i.comprar || 0}</b>
            </div>

          </div>

          <!-- ================= PESQUISA ================= -->

          <input
            class="for-search"
            placeholder="Pesquisar fornecedor..."
            oninput="
              filtrarFornecedor(
                this,
                'for_${index}'
              )
            "
          >

          <!-- ================= FORNECEDORES ================= -->

          <div
            class="for-wrap"
            id="for_${index}">

            ${fornecedores.map(f=>{

              const selecionado =
                itemCotado.fornecedores
                .some(x =>

                  x.fornecedor_id === f.id

                );

              return `

                <div

                  class="for
                  ${
                    selecionado
                    ? "active"
                    : ""
                  }"

                  data-nome="${f.nome}"

                  onclick="
                    toggleFornecedor(
                      this,
                      '${c.id}',
                      '${i.produto}',
                      '${f.id}',
                      '${f.nome}',
                      ${i.comprar || 0}
                    )
                  ">

                  ${f.nome}

                </div>

              `;

            }).join("")}

          </div>

          <!-- ================= RESPOSTAS ================= -->

          <div class="responses">

            <h3 style="
              margin-bottom:14px;
              font-size:15px;
            ">
              Respostas dos fornecedores
            </h3>

            ${
              itemCotado.fornecedores.length
              ? itemCotado.fornecedores.map(f=>`

                <div class="response">

                  <div class="response-top">

                    <div>

                      <b>
                        ${f.fornecedor_nome}
                      </b>

                      <div style="
                        font-size:12px;
                        color:#6b7280;
                        margin-top:4px;
                      ">

                        ${
                          f.respondido_em
                          ? "Respondido em " +
                            formatarData(
                              f.respondido_em
                            )
                          : "Aguardando resposta"
                        }

                      </div>

                    </div>

                    <div class="
                      response-status
                      ${
                        f.preco_unitario
                        ? "done"
                        : "pending"
                      }
                    ">

                      ${
                        f.preco_unitario
                        ? "RESPONDIDO"
                        : "PENDENTE"
                      }

                    </div>

                  </div>

                  <div class="response-grid">

                    <div class="info">
                      <span>Marca</span>
                      <b>${f.marca || "-"}</b>
                    </div>

                    <div class="info">
                      <span>Preço Unitário</span>
                      <b>
                        ${
                          f.preco_unitario
                          ? "R$ " +
                            Number(
                              f.preco_unitario
                            ).toFixed(2)
                          : "-"
                        }
                      </b>
                    </div>

                    <div class="info">
                      <span>Preço Total</span>
                      <b>
                        ${
                          f.preco_total
                          ? "R$ " +
                            Number(
                              f.preco_total
                            ).toFixed(2)
                          : "-"
                        }
                      </b>
                    </div>

                    <div class="info">
                      <span>Prazo</span>
                      <b>${f.prazo || "-"}</b>
                    </div>

                    <div class="info">
                      <span>Unidade</span>
                      <b>${f.unidade || "-"}</b>
                    </div>

                    <div class="info">
                      <span>Embalagem</span>
                      <b>
                        ${
                          f.quantidade_embalagem
                          || "-"
                        }
                      </b>
                    </div>

                  </div>

                  ${
                    f.observacao
                    ? `

                      <div style="
                        margin-top:12px;
                        padding:12px;
                        border-radius:14px;
                        background:#fff;
                        border:1px solid #e5e7eb;
                      ">

                        <span style="
                          display:block;
                          font-size:11px;
                          color:#6b7280;
                          margin-bottom:4px;
                        ">

                          Observação

                        </span>

                        <div style="
                          font-size:14px;
                        ">

                          ${f.observacao}

                        </div>

                      </div>

                    `
                    : ""
                  }

                </div>

              `).join("")
              : `
                <div style="
                  color:#6b7280;
                  font-size:14px;
                ">
                  Nenhum fornecedor selecionado.
                </div>
              `
            }

          </div>

        </div>

      `;

    }).join("")}

  `;
}

/* =========================
   FILTRAR FORNECEDOR
========================= */

function filtrarFornecedor(
  input,
  listaId
){

  const termo =
    input.value.toLowerCase();

  const lista =
    document.getElementById(listaId);

  const itens =
    lista.querySelectorAll(".for");

  itens.forEach(el => {

    const nome =
      el.dataset.nome.toLowerCase();

    el.style.display =
      nome.includes(termo)
      ? "flex"
      : "none";

  });

}

/* =========================
   TOGGLE
========================= */

async function toggleFornecedor(
  el,
  cotacaoId,
  produto,
  fornecedorId,
  fornecedorNome,
  qtd
){

  el.classList.toggle("active");

  const ativo =
    el.classList.contains("active");

  const { data } = await sb

    .from("cotacoes")

    .select("*")

    .eq("id", cotacaoId)

    .single();

  let itensCotacao =
    data.itens_cotacao || [];

  let item =
    itensCotacao.find(i =>

      i.produto === produto

    );

  if(!item){

    item = {

      produto,
      qtd_solicitada:qtd,
      fornecedores:[]

    };

    itensCotacao.push(item);
  }

  if(ativo){

    const existe =
      item.fornecedores.find(f =>

        f.fornecedor_id === fornecedorId

      );

    if(!existe){

      item.fornecedores.push({

        fornecedor_id:
          fornecedorId,

        fornecedor_nome:
          fornecedorNome,

        preco_unitario:null,
        preco_total:null,
        quantidade_embalagem:1,
        unidade:"UN",
        prazo:"",
        marca:"",
        observacao:""

      });

    }

  }else{

    item.fornecedores =
      item.fornecedores.filter(f =>

        f.fornecedor_id !== fornecedorId

      );

  }

  await sb

    .from("cotacoes")

    .update({

      itens_cotacao:itensCotacao,
      atualizado_em:new Date()

    })

    .eq("id", cotacaoId);

  cotacaoAtual.itens_cotacao =
    itensCotacao;

  abrirCotacao(cotacaoAtual);
}

/* =========================
   STATUS
========================= */

async function finalizarCotacao(){

  if(!cotacaoAtual) return;

  await sb

    .from("cotacoes")

    .update({
      status:"finalizada"
    })

    .eq("id", cotacaoAtual.id);

  carregarCotacoes();
}

async function reabrirCotacao(){

  if(!cotacaoAtual) return;

  await sb

    .from("cotacoes")

    .update({
      status:"ativa"
    })

    .eq("id", cotacaoAtual.id);

  carregarCotacoes();
}

/* =========================
   BUSCA
========================= */

function filtrarCotacoes(){

  const termo =
    document.getElementById(
      "buscaCotacao"
    )
    .value
    .toLowerCase();

  const filtradas =
    cotacoes.filter(c =>

      (c.nome || "")
      .toLowerCase()
      .includes(termo)

    );

  renderCotacoes(filtradas);
}

/* =========================
   REALTIME
========================= */

sb.channel("cotacoes_realtime")

.on(
  "postgres_changes",
  {
    event:"UPDATE",
    schema:"public",
    table:"cotacoes"
  },
  payload => {

    carregarCotacoes();

    if(
      cotacaoAtual &&
      payload.new.id === cotacaoAtual.id
    ){

      cotacaoAtual =
        payload.new;

      abrirCotacao(
        cotacaoAtual
      );

    }

  }
)

.subscribe();

/* =========================
   HELPERS
========================= */

function formatarData(data){

  if(!data) return "-";

  return new Date(data)
    .toLocaleString("pt-BR");
}

</script>

</body>
</html>

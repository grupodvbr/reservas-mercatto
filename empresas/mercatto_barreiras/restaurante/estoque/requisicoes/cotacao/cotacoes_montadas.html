<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Mercatto • Cotações</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

:root{
  --bg:#f3f4f6;
  --card:#ffffff;
  --line:#dfe3e8;
  --text:#111827;
  --muted:#6b7280;
  --primary:#111827;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Inter;
}

body{
  background:var(--bg);
  color:var(--text);
}

/* ================= TOPO ================= */

.top{
  background:#fff;
  border-bottom:1px solid var(--line);
  padding:14px 18px;
}

.top-flex{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:20px;
  flex-wrap:wrap;
}

.top h1{
  font-size:22px;
}

.top small{
  color:#6b7280;
}

.btn{
  border:none;
  background:#111827;
  color:#fff;
  padding:10px 14px;
  border-radius:8px;
  cursor:pointer;
  font-size:13px;
  font-weight:700;
}

/* ================= LAYOUT ================= */

.layout{
  display:grid;
  grid-template-columns:190px 1fr;
  gap:10px;
  padding:10px;
}

@media(max-width:1100px){

  .layout{
    grid-template-columns:1fr;
  }

}

/* ================= SIDEBAR ================= */

.sidebar{
  background:#fff;
  border:1px solid var(--line);
  border-radius:10px;
  overflow:hidden;
  width:190px;
}

.search{
  width:100%;
  border:none;
  border-bottom:1px solid var(--line);
  padding:10px;
  outline:none;
  font-size:12px;
}

.lista{
  max-height:calc(100vh - 140px);
  overflow:auto;
}

.cotacao{
  padding:10px;
  border-bottom:1px solid var(--line);
  cursor:pointer;
}

.cotacao:hover{
  background:#f9fafb;
}

.cotacao.active{
  background:#eef2ff;
}

.cotacao h3{
  font-size:13px;
  margin-bottom:4px;
}

.cotacao small{
  color:#6b7280;
  font-size:11px;
}

/* ================= MAIN ================= */

.main{
  background:#fff;
  border:1px solid var(--line);
  border-radius:10px;
  overflow:hidden;
}

.main-top{
  padding:14px;
  border-bottom:1px solid var(--line);
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:20px;
  flex-wrap:wrap;
}

.main-top h2{
  font-size:18px;
}

.main-top small{
  color:#6b7280;
}

/* ================= FORNECEDORES ================= */

.toolbar{
  padding:12px 14px;
  border-bottom:1px solid var(--line);
  background:#fafafa;
}

.toolbar-top{
  display:flex;
  gap:12px;
  align-items:center;
  flex-wrap:nowrap;
  justify-content:space-between;
}

.for-search{
  width:240px;
  min-width:240px;
  border:1px solid var(--line);
  border-radius:8px;
  padding:10px;
  outline:none;
  font-size:13px;
  background:#fff;
}

.dropdown{
  position:relative;
}

.dropdown-list{
  position:absolute;
  top:100%;
  left:0;
  width:320px;
  max-height:250px;
  overflow:auto;
  background:#fff;
  border:1px solid var(--line);
  border-radius:8px;
  z-index:999;
  display:none;
}

.dropdown-item{
  padding:10px;
  border-bottom:1px solid #f1f5f9;
  cursor:pointer;
  font-size:12px;
}

.dropdown-item:hover{
  background:#f9fafb;
}

.tags{
  display:flex;
  align-items:center;
  gap:8px;
  overflow-x:auto;
  flex:1;
  min-height:42px;
}

.tag{
  display:flex;
  align-items:center;
  gap:8px;
  background:#111827;
  color:#fff;
  padding:7px 10px;
  border-radius:999px;
  font-size:11px;
  font-weight:700;
}

.tag button{
  border:none;
  background:none;
  color:#fff;
  cursor:pointer;
  font-size:12px;
}

/* ================= TABELA ================= */

.table-wrap{
  width:100%;
  overflow:auto;
}

table{
  border-collapse:collapse;
  width:max-content;
  min-width:100%;
}

thead{
  background:#f9fafb;
}

th{
  border-right:1px solid var(--line);
  border-bottom:1px solid var(--line);
  padding:10px;
  font-size:11px;
  text-transform:uppercase;
  color:#6b7280;
  white-space:nowrap;
  text-align:left;
}

td{
  border-right:1px solid var(--line);
  border-bottom:1px solid var(--line);
  padding:8px;
  font-size:13px;
  vertical-align:top;
  background:#fff;
}

tr:hover td{
  background:#fafafa;
}

.input{
  width:100%;
  min-width:95px;
  height:34px;
  border:1px solid #d1d5db;
  border-radius:6px;
  padding:6px 8px;
  font-size:12px;
  outline:none;
  background:#fff;
}

textarea.input{
  min-height:38px;
  resize:vertical;
}

.produto{
  font-weight:700;
  min-width:180px;
}

/* ================= OVERLAY ================= */

.overlay{
  position:fixed;
  inset:0;
  background:rgba(255,255,255,.6);
  backdrop-filter:blur(4px);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
  font-size:20px;
  font-weight:800;
}

.empty{
  padding:60px;
  text-align:center;
  color:#6b7280;
}

</style>
</head>

<body>

<div class="top">

  <div class="top-flex">

    <div>

      <h1>Cotações</h1>

      <small>
        Modelo planilha Excel dinâmica
      </small>

    </div>

    <button
      class="btn"
      onclick="carregarCotacoes()">

      Atualizar

    </button>

  </div>

</div>

<div class="layout">

  <!-- SIDEBAR -->

  <div class="sidebar">

    <input
      class="search"
      id="buscaCotacao"
      placeholder="Pesquisar cotação..."
      oninput="filtrarCotacoes()"
    >

    <div
      class="lista"
      id="listaCotacoes">
    </div>

  </div>

  <!-- MAIN -->

  <div class="main">

    <div id="detalhes">

      <div class="empty">

        Selecione uma cotação

      </div>

    </div>

  </div>

</div>

<div
  class="overlay"
  id="overlay">

  Processando...

</div>

<script>

const sb = supabase.createClient(
  "https://dxkszikemntfusfyrzos.supabase.co",
  "sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
);

let cotacoes = [];
let fornecedores = [];
let cotacaoAtual = null;

/* ================= INIT ================= */

init();

async function init(){

  overlay(true);

  await carregarFornecedores();
  await carregarCotacoes();

  overlay(false);
}

/* ================= OVERLAY ================= */

function overlay(show){

  document.getElementById("overlay")
    .style.display =
      show ? "flex" : "none";
}

/* ================= FORNECEDORES ================= */

async function carregarFornecedores(){

  const { data } = await sb

    .from("fornecedores_mercatto")

    .select("*")

    .eq("ativo", true)

    .order("nome");

  fornecedores = data || [];
}

/* ================= COTAÇÕES ================= */

async function carregarCotacoes(){

  const { data } = await sb

    .from("cotacoes")

    .select("*")

    .order(
      "data_cotacao",
      { ascending:false }
    );

  cotacoes = data || [];

  renderCotacoes(cotacoes);

  if(cotacaoAtual){

    const nova =
      cotacoes.find(c =>

        c.id === cotacaoAtual.id

      );

    if(nova){

      cotacaoAtual = nova;

      abrirCotacao(nova);
    }
  }
}

/* ================= LISTA ================= */

function renderCotacoes(arr){

  const lista =
    document.getElementById(
      "listaCotacoes"
    );

  lista.innerHTML = "";

  arr.forEach(c => {

    lista.innerHTML += `

      <div
        class="cotacao ${
          cotacaoAtual &&
          cotacaoAtual.id === c.id
          ? "active"
          : ""
        }"

        onclick='abrirCotacao(
          ${JSON.stringify(c)}
        )'>

        <h3>
          ${c.nome || "Cotação"}
        </h3>

        <small>
          ${formatarData(c.data_cotacao)}
        </small>

      </div>

    `;

  });

}

/* ================= ABRIR ================= */

function abrirCotacao(c){

  cotacaoAtual = c;

  renderCotacoes(cotacoes);

  const detalhes =
    document.getElementById(
      "detalhes"
    );

  const itens = c.itens || [];
  const itensCotacao =
    c.itens_cotacao || [];

  /* ================= FORNECEDORES GERAIS ================= */

  let fornecedoresSelecionados = [];

  itensCotacao.forEach(i => {

    (i.fornecedores || [])

    .forEach(f => {

      const existe =
        fornecedoresSelecionados
        .find(x =>

          x.fornecedor_id ===
          f.fornecedor_id

        );

      if(!existe){

        fornecedoresSelecionados
        .push(f);

      }

    });

  });

  detalhes.innerHTML = `

    <!-- HEADER -->

    <div class="main-top">

      <div>

<div style="
  display:flex;
  align-items:center;
  gap:10px;
">

  <h2
    id="tituloCotacao"
    style="
      margin:0;
    ">

    ${c.nome}

  </h2>

  <button

    onclick="
      editarNomeCotacao(
        '${c.id}',
        \`${c.nome}\`
      )
    "

    style="
      border:none;
      background:#f3f4f6;
      width:34px;
      height:34px;
      border-radius:8px;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:14px;
    ">

    ✏️

  </button>

</div>

        <small>
          ${formatarData(c.data_cotacao)}
        </small>

      </div>

    </div>

    <!-- TOOLBAR -->

    <div class="toolbar">

    <div class="toolbar-top">

  <!-- FORNECEDORES SELECIONADOS -->

  <div class="tags">

    ${fornecedoresSelecionados.map(f=>`

      <div class="tag">

        ${f.fornecedor_nome}

        <button
          onclick="
            removerFornecedorGeral(
              '${f.fornecedor_id}'
            )
          ">

          ✕

        </button>

      </div>

    `).join("")}

  </div>

  <!-- PESQUISA -->

  <div class="dropdown">

    <input
      class="for-search"


      









            
            placeholder="Pesquisar fornecedor..."
            onfocus="
              abrirDropdown()
            "
            oninput="
              pesquisarFornecedor(this)
            "
          >

          <div
            class="dropdown-list"
            id="dropdown">

            ${fornecedores.map(f=>`

              <div
                class="dropdown-item"

                data-nome="${f.nome}"

                onclick="
                  adicionarFornecedorGeral(
                    '${f.id}',
                    '${f.nome}'
                  )
                ">

                ${f.nome}

              </div>

            `).join("")}

          </div>

        </div>

      </div>

    
    </div>

    <!-- TABELA -->

    <div class="table-wrap">

      <table>

        <thead>

          <tr>

            <th>Produto</th>
<th>Qtd / Und</th>
<th>Último preço</th>

            ${fornecedoresSelecionados.map(f=>`

              <th>
                ${f.fornecedor_nome}
                <br><br>

                <div style="
                  display:grid;
grid-template-columns:
110px 90px 100px 120px;
                  gap:4px;
                ">

               <div>Valor</div>
<div>Und</div>
<div>Emb</div>
<div>Prazo</div>
                </div>

              </th>

            `).join("")}

          </tr>

        </thead>

        <tbody>

          ${itens.map((item,index)=>{

            const itemCotado =
              itensCotacao.find(i =>

                i.produto === item.produto

              ) || {

              produto:item.produto,

qtd_solicitada:
  item.comprar || 0,

unidade:
  item.unidade || "UN",

fornecedores:[]
              };

            return `

              <tr>

                <!-- PRODUTO -->

                <td class="produto">

                  ${item.produto}

                </td>















                

<!-- QTD -->

<td>

  <div style="
    display:flex;
    flex-direction:column;
    gap:4px;
    min-width:140px;
  ">

    <!-- LINHA PRINCIPAL -->

    <div style="
      display:flex;
      align-items:center;
      gap:6px;
      white-space:nowrap;
      font-weight:700;
    ">

      <span>
        ${item.comprar || 0}
      </span>

      <span style="
        color:#2563eb;
        font-size:11px;
        text-transform:uppercase;
        font-weight:800;
      ">

        ${item.unidade || "UN"}

      </span>

    </div>

    <!-- CONVERSÃO -->

    ${
      Number(
        item.qtd_unidades ||
        item.quantidade_embalagem ||
        1
      ) > 1

      ? `

      <small style="
        color:#6b7280;
        font-size:10px;
        line-height:1.4;
      ">

        Caixa com
        <b>
          ${
            item.qtd_unidades ||
            item.quantidade_embalagem
          }
        </b>
        unidades

      </small>

      `

      : `

      <small style="
        color:#9ca3af;
        font-size:10px;
      ">

        Unidade individual

      </small>

      `
    }

  </div>

</td>
















                <!-- ULTIMO -->

                <td>

                  ${
                    item.preco
                    ? "R$ " + item.preco
                    : "Sem preço"
                  }

                </td>

                <!-- FORNECEDORES -->

                ${fornecedoresSelecionados.map(f=>{

                  const resposta =
                    itemCotado
                    .fornecedores
                    .find(x =>

                      x.fornecedor_id ===
                      f.fornecedor_id

                    );

                  return `

                    <td>

                      ${
                        resposta

                        ? `

                         <div style="
  display:grid;
  grid-template-columns:
  90px 90px 90px 110px;
  gap:4px;
">

  <!-- VALOR -->

<!-- VALOR -->

<input
  class="input"

  value="${
    resposta.preco_unitario

      ? Number(
          resposta.preco_unitario
        ).toLocaleString(
          'pt-BR',
          {
            minimumFractionDigits:2,
            maximumFractionDigits:2
          }
        )

      : ''
  }"

  readonly
>


  <!-- UNIDADE -->

  <input
    class="input"

    value="${
      resposta.unidade ||
      item.unidade ||
      itemCotado.unidade ||
      'UN'
    }"

    readonly
  >

  <!-- EMBALAGEM -->


<input
  class="input"

  value="${
    resposta.quantidade_embalagem

      ? resposta.quantidade_embalagem + ' UN'

      : '1 UN'
  }"

  readonly
>

  <!-- PRAZO -->

  <input
    class="input"

    value="${
      resposta.prazo || ''
    }"

    readonly
  >

</div>

                        `

                        : `

                          <div style="
                            color:#9ca3af;
                            font-size:12px;
                          ">

                            Não selecionado

                          </div>

                        `
                      }

                    </td>

                  `;

                }).join("")}

              </tr>

            `;

          }).join("")}

        </tbody>

      </table>

    </div>

  `;
}

/* ================= DROPDOWN ================= */

function abrirDropdown(){

  document.getElementById(
    "dropdown"
  ).style.display = "block";
}

function pesquisarFornecedor(input){

  const termo =
    input.value.toLowerCase();

  const itens =
    document.querySelectorAll(
      ".dropdown-item"
    );

  itens.forEach(el => {

    const nome =
      el.dataset.nome.toLowerCase();

    el.style.display =
      nome.includes(termo)
      ? "block"
      : "none";

  });

}

/* ================= ADICIONAR ================= */

async function adicionarFornecedorGeral(
  fornecedorId,
  fornecedorNome
){

  const { data } = await sb

    .from("cotacoes")

    .select("*")

    .eq("id", cotacaoAtual.id)

    .single();

  let itensCotacao =
    data.itens_cotacao || [];

  (data.itens || []).forEach(item => {

    let itemCotado =
      itensCotacao.find(i =>

        i.produto === item.produto

      );

    if(!itemCotado){


      

itemCotado = {

  produto:item.produto,

  qtd_solicitada:
    Number(item.comprar || 0),

  unidade:
    item.unidade ||
    item.unidade_uso ||
    "UN",

qtd_unidades:
  Number(
    item.qtd_unidades ||
    item.quantidade_embalagem ||
    1
  ),

  fornecedores:[]

};

      itensCotacao.push(itemCotado);
    }

    const existe =
      itemCotado.fornecedores
      .find(f =>

        f.fornecedor_id ===
        fornecedorId

      );

    if(!existe){

      itemCotado.fornecedores.push({

        fornecedor_id:
          fornecedorId,

        fornecedor_nome:
          fornecedorNome,

        preco_unitario:"",
        preco_total:"",
        unidade:"",
        quantidade_embalagem:"",
        prazo:"",
        marca:"",
        observacao:""

      });

    }

  });

  await sb

    .from("cotacoes")

    .update({

      itens_cotacao:itensCotacao,
      atualizado_em:new Date()

    })

    .eq("id", cotacaoAtual.id);

  cotacaoAtual.itens_cotacao =
    itensCotacao;

  abrirCotacao(cotacaoAtual);
}

/* ================= REMOVER ================= */

async function removerFornecedorGeral(
  fornecedorId
){

  const confirmar =
    confirm(
      "Deseja remover este fornecedor?"
    );

  if(!confirmar)
    return;

  const { data } = await sb

    .from("cotacoes")

    .select("*")

    .eq("id", cotacaoAtual.id)

    .single();

  let itensCotacao =
    data.itens_cotacao || [];

  itensCotacao.forEach(item => {

    item.fornecedores =
      (item.fornecedores || [])

      .filter(f =>

        f.fornecedor_id !==
        fornecedorId

      );

  });

  await sb

    .from("cotacoes")

    .update({

      itens_cotacao:itensCotacao,
      atualizado_em:new Date()

    })

    .eq("id", cotacaoAtual.id);

  cotacaoAtual.itens_cotacao =
    itensCotacao;

  abrirCotacao(cotacaoAtual);
}

/* ================= BUSCA ================= */

function filtrarCotacoes(){

  const termo =
    document.getElementById(
      "buscaCotacao"
    )
    .value
    .toLowerCase();

  const filtradas =
    cotacoes.filter(c =>

      (c.nome || "")
      .toLowerCase()
      .includes(termo)

    );

  renderCotacoes(filtradas);
}

/* ================= HELPERS ================= */

function formatarData(data){

  if(!data) return "-";

  return new Date(data)
    .toLocaleString("pt-BR");
}

function overlay(show){

  document.getElementById("overlay")
    .style.display =
      show ? "flex" : "none";
}

/* ================= REALTIME ================= */

sb.channel("cotacoes_realtime")

.on(
  "postgres_changes",
  {
    event:"UPDATE",
    schema:"public",
    table:"cotacoes"
  },
  payload => {

    carregarCotacoes();

    if(
      cotacaoAtual &&
      payload.new.id === cotacaoAtual.id
    ){

      cotacaoAtual =
        payload.new;

      abrirCotacao(
        cotacaoAtual
      );

    }

  }
)

.subscribe();





async function editarNomeCotacao(
  id,
  nomeAtual
){

  const novoNome = prompt(
    "Editar nome da cotação:",
    nomeAtual
  );

  if(
    !novoNome ||
    !novoNome.trim()
  ){
    return;
  }

  overlay(true);

  const { error } = await sb

    .from("cotacoes")

    .update({

      nome:novoNome.trim(),
      atualizado_em:new Date()

    })

    .eq("id", id);

  overlay(false);

  if(error){

    console.log(error);

    alert(
      "Erro ao atualizar"
    );

    return;
  }

  cotacaoAtual.nome =
    novoNome.trim();

  carregarCotacoes();

}











  
</script>

</body>
</html>

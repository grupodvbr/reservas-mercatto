<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Cotações</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:Inter;background:#eef2f7;margin:0;padding:20px;}

.card{
  background:#fff;
  padding:15px;
  border-radius:10px;
  margin-bottom:10px;
  cursor:pointer;
  box-shadow:0 5px 15px rgba(0,0,0,.05);
}

.card:hover{background:#f9fafb;}

.status{
  font-size:12px;
  padding:4px 8px;
  border-radius:6px;
}

.aberto{background:#fef3c7;}
.andamento{background:#dbeafe;}
.finalizado{background:#dcfce7;}
</style>
</head>

<body>

<h2>📊 Cotações</h2>

<div id="lista"></div>

<script>

const sb = supabase.createClient(
 "https://dxkszikemntfusfyrzos.supabase.co",
 "sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
);

// ================= LISTAR =================
async function carregar(){

  const { data } = await sb
    .from("cotacoes")
    .select("*")
    .order("data_criacao", { ascending:false });

  lista.innerHTML = data.map(c=>`

    <div class="card" onclick="abrir('${c.id}')">

      <strong>${c.nome}</strong><br>
      <small>${c.data_cotacao}</small><br>

      <span class="status ${
        c.status === "Em aberto" ? "aberto" :
        c.status === "Em andamento" ? "andamento" :
        "finalizado"
      }">
        ${c.status}
      </span>

    </div>

  `).join("");
}

// ================= ABRIR =================
function abrir(id){
  window.open(`cotacao_execucao.html?id=${id}`, "_blank");
}

carregar();

</script>

</body>
</html>

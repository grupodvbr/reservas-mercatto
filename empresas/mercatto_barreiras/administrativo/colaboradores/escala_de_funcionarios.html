<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Escala Profissional • Mercatto</title>

<meta name="viewport" content="width=device-width,initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>

:root{
  --bg:#f4f6f9;
  --card:#ffffff;
  --border:#e5e7eb;

  --text:#111827;
  --muted:#6b7280;

  --primary:#2563eb;
  --primary-light:#eff6ff;
  --primary-dark:#1d4ed8;

  --success:#22c55e;
  --danger:#ef4444;

  --radius:14px;
  --shadow:0 10px 30px rgba(0,0,0,.08);
}

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

body{
  margin:0;
  font-family:Inter;
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px 20px;
  background:var(--card);
  border-bottom:1px solid var(--border);
  position:sticky;
  top:0;
  z-index:10;
}

header b{
  font-size:16px;
}

/* BOTÕES */
button{
  background:var(--primary);
  color:#fff;
  border:none;
  padding:10px 14px;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
  transition:.2s;
}

button:hover{
  background:var(--primary-dark);
  transform:translateY(-1px);
}

/* CALENDARIO */
.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:12px;
  padding:20px;
}

.day{
  background:var(--card);
  border-radius:var(--radius);
  padding:12px;
  min-height:140px;
  border:1px solid var(--border);
  cursor:pointer;
  transition:.2s;
}

.day:hover{
  transform:translateY(-3px);
  box-shadow:var(--shadow);
}

/* ESCALA */
.item-escala{
  margin-top:2px;
  padding:2px 4px;
  border-radius:6px;

  font-size:9px;
  line-height:1.1;

  background:var(--primary-light);
  color:var(--primary-dark);
  font-weight:600;

  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

/* STATUS BADGE */
.status{
  padding:4px 8px;
  border-radius:999px;
  font-size:11px;
  font-weight:700;
  display:inline-block;
}

.status.ativo{
  background:rgba(34,197,94,.15);
  color:var(--success);
}

.status.inativo{
  background:rgba(239,68,68,.15);
  color:var(--danger);
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  display:none;
  align-items:center;
  justify-content:center;
  backdrop-filter:blur(4px);
}

.box{
  background:var(--card);
  padding:20px;
  border-radius:18px;
  width:520px;
  max-width:95%;
  box-shadow:0 20px 60px rgba(0,0,0,.25);
  animation:fadeIn .2s ease;
}

@keyframes fadeIn{
  from{transform:scale(.95);opacity:0}
  to{transform:scale(1);opacity:1}
}

/* FORM */
.form{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.form-full{
  grid-column:1/-1;
}

.field{
  display:flex;
  flex-direction:column;
  gap:5px;
}

.field label{
  font-size:12px;
  font-weight:700;
  color:#374151;
  margin-bottom:2px;
  letter-spacing:.3px;
}

/* INPUTS */
.field input,
.field select{
  padding:10px;
  border-radius:10px;
  border:1px solid var(--border);
  font-size:13px;
  transition:.2s;
}

.field input:focus,
.field select:focus{
  border-color:var(--primary);
  outline:none;
  box-shadow:0 0 0 2px rgba(37,99,235,.15);
}

/* CHECKBOX */
.checkbox-group{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
}

.checkbox-group label{
  display:flex;
  align-items:center;
  gap:6px;
  background:#f9fafb;
  padding:8px;
  border-radius:10px;
  border:1px solid var(--border);
  cursor:pointer;
  transition:.2s;
  font-size:13px;
}

.checkbox-group label:hover{
  background:var(--primary-light);
  border-color:var(--primary);
}

.checkbox-group input{
  accent-color:var(--primary);
}

/* LISTA */
.lista{
  margin-top:10px;
  max-height:200px;
  overflow:auto;
}

.item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 12px;
  border-radius:12px;
  border:1px solid var(--border);
  background:#fff;
  font-weight:600;
}

.item span{
  font-size:12px;
  color:var(--muted);
}

/* ACTIONS */
.actions{
  display:flex;
  justify-content:flex-end;
  gap:10px;
  margin-top:20px;
}

.btn{
  padding:10px 16px;
  border-radius:10px;
  font-weight:600;
}

.btn.cancel{
  background:#e5e7eb;
  color:#111;
}

.btn.save{
  background:var(--primary);
  color:#fff;
}

/* ================= LOADING ================= */

/* OVERLAY LOADING */
.loading{
  position:fixed;
  inset:0;
  background:rgba(255,255,255,.6);
  backdrop-filter:blur(4px);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.spinner{
  width:50px;
  height:50px;
  border:4px solid #e5e7eb;
  border-top:4px solid var(--primary);
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  to{transform:rotate(360deg)}
}

/* SKELETON */
.skeleton{
  background:linear-gradient(90deg,#eee,#f5f5f5,#eee);
  background-size:200% 100%;
  animation:skeleton 1.5s infinite;
  border-radius:8px;
}

@keyframes skeleton{
  0%{background-position:200% 0}
  100%{background-position:-200% 0}
}

/* SCROLL */
::-webkit-scrollbar{
  width:6px;
}
::-webkit-scrollbar-thumb{
  background:#d1d5db;
  border-radius:6px;
}



.user-card{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:10px;
}

.user-item{
  background:#f9fafb;
  padding:10px;
  border-radius:10px;
  border:1px solid var(--border);
  font-size:13px;
}

.user-item b{
  display:block;
  font-size:11px;
  color:#6b7280;
}








  
</style>
</head>

<!-- MODAL ESCALA -->

<script>

const sb = supabase.createClient(
  "https://dxkszikemntfusfyrzos.supabase.co",
  "sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
)

let dataAtual=new Date()
let funcionarios=[]
let escalas=[]
let dataSelecionada=null
async function loadFuncionarios(){

  const {data, error} = await sb
    .from("usuarios_do_sistema")
    .select("*")
    .eq("empresa","MERCATTO DELICIA")
    .eq("ativo", true)

  if(error){
    console.error(error)
    return
  }

  funcionarios = data || []

  funcionario.innerHTML=""

  funcionarios.forEach(f=>{
    funcionario.innerHTML += `
      <option value="${f.id}">
        ${f.nome} • ${f.cargo || '-'}
      </option>
    `
  })
}









async function loadEscala(){

  const sessao = document.getElementById("agendaSessao")?.value || "GERAL"

  const {data} = await sb
    .from("escala_funcionarios")
    .select("*")
    .eq("empresa", "MERCATTO DELICIA")
    .eq("agenda_sessao", sessao) // 🔥 AQUI É O FILTRO
    .order("data", { ascending: true })

  escalas = data || []
}

async function render(){
  await loadEscala()
  calendar.innerHTML=""

  const ano=dataAtual.getFullYear()
  const mes=dataAtual.getMonth()
  mesEl.innerText=dataAtual.toLocaleString("pt-BR",{month:"long",year:"numeric"})

  const dias=new Date(ano,mes+1,0).getDate()

  for(let i=1;i<=dias;i++){
    const dataStr=`${ano}-${String(mes+1).padStart(2,"0")}-${String(i).padStart(2,"0")}`

    const d=document.createElement("div")
    d.className="day"
    d.innerHTML=`${i}`

    escalas.filter(e=>e.data===dataStr).forEach(e=>{
      d.innerHTML+=`<div class="item-escala">${e.nome}</div>`
    })

    d.onclick=()=>abrirVisual(dataStr)
    calendar.appendChild(d)
  }
}

function abrirVisual(data){
  dataSelecionada = data

  // DATA NO TOPO
  dataEl.innerText = formatarDataBR(data)

  // ESCONDE FORM
  document.getElementById("formEscala").style.display = "none"

  const lista = escalas.filter(e => e.data === data)

  let agrupado = {}

  lista.forEach(e=>{
    if(!agrupado[e.setor]) agrupado[e.setor] = []
    agrupado[e.setor].push(e)
  })

  let html = ""

  for(const setor in agrupado){
    html += `<h4 style="margin-top:10px">${setor}</h4>`

    agrupado[setor].forEach(e=>{
      html += `
        <div class="item">
          <div>${e.nome}</div>

          <div style="display:flex;align-items:center;gap:10px">
            <span>${e.entrada} - ${e.saida}</span>

            <div style="display:flex;gap:6px">

              <button onclick="editarEscala('${e.id}')" style="
                background:#2563eb;
                padding:6px 8px;
                border-radius:8px;
                font-size:12px;
              ">✏️</button>

              <button onclick="excluirEscala('${e.id}')" style="
                background:#ef4444;
                padding:6px 8px;
                border-radius:8px;
                font-size:12px;
              ">🗑️</button>

              <button onclick="abrirUser('${e.funcionario_id}')" style="
                background:#111827;
                padding:6px 8px;
                border-radius:8px;
                font-size:12px;
              ">👁</button>

            </div>
          </div>
        </div>
      `
    })
  }

  preview.innerHTML = html
  modal.style.display = "flex"
}



  

  
function formatarDataBR(data){
  const [ano, mes, dia] = data.split("-")
  return `${dia}/${mes}/${ano}`
}

function fechar(){ modal.style.display="none" }



function abrirCadastro(){ cadastro.style.display="flex" }
function fecharCadastro(){ cadastro.style.display="none" }

async function salvarFuncionario(){

  const folgasSelecionadas=[...document.querySelectorAll('#folga input:checked')].map(el=>el.value)

  if(
    !nome.value ||
    !nascimento.value ||
    !contratacao.value ||
    !setor.value ||
    !funcao.value ||
    folgasSelecionadas.length===0 ||
    !numero.value ||
    !sexo.value
  ){
    alert("Preencha todos os campos")
    return
  }

const { data, error } = await sb
.from("usuarios_do_sistema")
.insert({
  nome: nome.value,
  telefone: numero.value.replace(/\D/g,""),
  sexo: sexo.value,
  data_nascimento: nascimento.value,
  data_admissao: contratacao.value,
  setor: setor.value,
  cargo: funcao.value,
  empresa: "MERCATTO DELICIA",
  nivel_acesso: 10,
  ativo: true
})

if(error){
  console.error("ERRO SUPABASE:", error)
  alert(error.message)
  return
}

fecharCadastro()
await loadFuncionarios()
render()
}

/* MASCARA */
const numeroInput=document.getElementById("numero")
numeroInput.addEventListener("input",(e)=>{
  let v=e.target.value.replace(/\D/g,"")
  if(v.length>11)v=v.slice(0,11)

  if(v.length<=10){
    v=v.replace(/(\d{2})(\d)/,"($1) $2")
    v=v.replace(/(\d{4})(\d)/,"$1-$2")
  }else{
    v=v.replace(/(\d{2})(\d)/,"($1) $2")
    v=v.replace(/(\d{5})(\d)/,"$1-$2")
  }

  e.target.value=v
})

function mesAnterior(){ dataAtual.setMonth(dataAtual.getMonth()-1); render() }
function mesProximo(){ dataAtual.setMonth(dataAtual.getMonth()+1); render() }

const mesEl=document.getElementById("mes")
const dataEl=document.getElementById("data")

loadFuncionarios()
render()









async function salvarEscala(){

  const funcionarioId = document.getElementById("funcionario").value
  const f = funcionarios.find(x => x.id == funcionarioId)

  if(!f){
    alert("Selecione um funcionário")
    return
  }

  const entrada = document.getElementById("entrada").value
  const saida = document.getElementById("saida").value

  if(!entrada || !saida){
    alert("Preencha entrada e saída")
    return
  }

  // EDITAR
  if(escalaEditando){

    const { error } = await sb
      .from("escala_funcionarios")
      .update({
        funcionario_id: f.id,
        nome: f.nome,
        entrada,
        saida,
        atualizado_em: new Date().toISOString()
      })
      .eq("id", escalaEditando)

    if(error){
      console.error(error)
      alert("Erro ao atualizar")
      return
    }

    escalaEditando = null
    fechar()
    render()
    return
  }

  // NOVO
  const { error } = await sb
    .from("escala_funcionarios")
    .insert({
      funcionario_id: f.id,
      nome: f.nome,
      data: dataSelecionada,
      entrada,
      saida,
      setor: f.setor,
      empresa: "MERCATTO DELICIA",
      agenda_sessao: document.getElementById("agendaSessao").value,
      atualizado_em: new Date().toISOString()
    })

  if(error){
    console.error(error)
    alert("Já existe escala nesse horário!")
    return
  }

  fechar()
  render()
}


  
  function abrir(data){
  dataSelecionada = data

  const lista = escalas.filter(e=>e.data === data)

  let agrupado = {}

  lista.forEach(e=>{
    if(!agrupado[e.setor]) agrupado[e.setor] = []
    agrupado[e.setor].push(e)
  })

  let html = ""

  for(const setor in agrupado){
    html += `<h4 style="margin-top:10px">${setor}</h4>`

    agrupado[setor].forEach(e=>{
      html += `
        <div class="item">
          ${e.nome} • ${e.entrada} - ${e.saida}
        </div>
      `
    })
  }

  preview.innerHTML = html

  modal.style.display="flex"
  dataEl.innerText = formatarDataBR(data)
}

function abrirEdicao(){
  document.getElementById("formEscala").style.display = "block"

  // limpa campos
  document.getElementById("entrada").value = ""
  document.getElementById("saida").value = ""

  escalaEditando = null
}


function abrirUser(id){

  const u = funcionarios.find(x => x.id == id)

  if(!u) return

  userDetalhe.innerHTML = `
    <div class="user-card">

      <div class="user-item"><b>Nome</b>${u.nome || '-'}</div>
      <div class="user-item"><b>Usuário</b>${u.usuario || '-'}</div>
      <div class="user-item"><b>Telefone</b>${u.telefone || '-'}</div>
      <div class="user-item"><b>Empresa</b>${u.empresa || '-'}</div>

      <div class="user-item"><b>Setor</b>${u.setor || '-'}</div>
      <div class="user-item"><b>Cargo</b>${u.cargo || '-'}</div>

      <div class="user-item"><b>Nível</b>${u.nivel_acesso}</div>
      <div class="user-item"><b>Status</b>${u.ativo ? 'Ativo' : 'Inativo'}</div>

      <div class="user-item"><b>Admissão</b>${u.data_admissao || '-'}</div>
      <div class="user-item"><b>Nascimento</b>${u.data_nascimento || '-'}</div>

      <div class="user-item"><b>Cidade</b>${u.cidade || '-'}</div>
      <div class="user-item"><b>Estado</b>${u.estado || '-'}</div>

      <div class="user-item form-full"><b>Observações</b>${u.observacoes || '-'}</div>

    </div>
  `

  modalUser.style.display = "flex"
}

function fecharUser(){
  modalUser.style.display = "none"
}

async function excluirEscala(id){

  if(!confirm("Deseja excluir essa escala?")) return

  await sb
    .from("escala_funcionarios")
    .delete()
    .eq("id", id)

  render()
}




let escalaEditando = null

function editarEscala(id){

  const e = escalas.find(x => x.id == id)
  if(!e) return

  escalaEditando = e.id

  document.getElementById("formEscala").style.display = "block"

  document.getElementById("funcionario").value = e.funcionario_id
  document.getElementById("entrada").value = e.entrada
  document.getElementById("saida").value = e.saida
}

async function gerarPDFMes(){

  const { jsPDF } = window.jspdf

  const doc = new jsPDF({
    orientation: "landscape"
  })

  const logoUrl = "https://github.com/grupodvbr/otto/blob/main/logo/mercatto.png?raw=true"

  const ano = dataAtual.getFullYear()
  const mes = dataAtual.getMonth()

  const nomeMes = dataAtual.toLocaleString("pt-BR",{month:"long",year:"numeric"})
  const sessao = document.getElementById("agendaSessao").value

  // HEADER
  doc.setFont("helvetica","bold")
  doc.setFontSize(18)
  doc.text(`ESCALA - ${sessao}`, 14, 15)

  doc.setFontSize(11)
  doc.text(nomeMes.toUpperCase(), 14, 22)

  // LOGO
  try{
    const response = await fetch(logoUrl)
    const blob = await response.blob()

    const base64 = await new Promise((resolve)=>{
      const reader = new FileReader()
      reader.onloadend = () => resolve(reader.result)
      reader.readAsDataURL(blob)
    })

    doc.addImage(base64, "PNG", 240, 8, 40, 15)

  }catch(e){
    console.log("Erro logo")
  }

  const startX = 10
  const startY = 30
  const boxW = 40
  const boxH = 45

  const dias = new Date(ano, mes+1, 0).getDate()

  let col = 0
  let row = 0

  for(let i=1;i<=dias;i++){

    const dataStr = `${ano}-${String(mes+1).padStart(2,"0")}-${String(i).padStart(2,"0")}`

    const x = startX + (col * boxW)
    const y = startY + (row * boxH)

    // QUADRADO
    doc.setDrawColor(200)
    doc.rect(x, y, boxW, boxH)

    // DIA
    doc.setFontSize(10)
    doc.setFont("helvetica","bold")
    doc.text(String(i), x+2, y+5)

    // ESCALAS
    const lista = escalas.filter(e => e.data === dataStr)

    doc.setFont("helvetica","normal")
    doc.setFontSize(5.5)

    let linhaY = y + 10

const listaLimitada = lista.slice(0, 25)

listaLimitada.forEach(e=>{

  const nomeCurto = e.nome.split(" ")[0]
  const texto = `${nomeCurto} (${e.entrada.slice(0,5)})`

  const linhas = doc.splitTextToSize(texto, boxW - 4)

  linhas.forEach(linha=>{
    if(linhaY < y + boxH - 3){
      doc.text(linha, x+2, linhaY)
      linhaY += 3
    }
  })

})

col++

if(col === 7){
  col = 0
  row++
}
}
  doc.save(`escala-${nomeMes}.pdf`)
</script>

  <div class="box">

    <div style="display:flex;justify-content:space-between;align-items:center">
      <h3>👤 Dados do Colaborador</h3>
      <button onclick="fecharUser()">✕</button>
    </div>

    <div id="userDetalhe" style="margin-top:15px"></div>

  </div>
</div>

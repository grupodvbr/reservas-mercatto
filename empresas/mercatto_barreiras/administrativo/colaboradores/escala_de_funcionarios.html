<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Escala Profissional • Mercatto</title>

<meta name="viewport" content="width=device-width,initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>

:root{
  --bg:#f3f4f6;
  --card:#ffffff;
  --border:#e5e7eb;
  --text:#111827;
  --muted:#6b7280;
  --primary:#2563eb;
}

*{box-sizing:border-box;}

body{
  margin:0;
  font-family:Inter;
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px;
  background:#fff;
  border-bottom:1px solid var(--border);
}

button{
  background:var(--primary);
  color:white;
  border:none;
  padding:10px 14px;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
}

/* CALENDARIO */
.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:10px;
  padding:15px;
}

.day{
  background:var(--card);
  border-radius:12px;
  padding:10px;
  min-height:130px;
  border:1px solid var(--border);
  cursor:pointer;
}

.day-number{
  font-size:12px;
  color:var(--muted);
}

.item-escala{
  margin-top:5px;
  padding:4px 6px;
  border-radius:6px;
  font-size:11px;
  background:#dbeafe;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  display:none;
  align-items:center;
  justify-content:center;
}

.box{
  background:white;
  padding:20px;
  border-radius:14px;
  width:480px;
}

.form{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.form-full{grid-column:1/-1;}

input,select{
  padding:10px;
  border-radius:8px;
  border:1px solid var(--border);
}

/* LISTA */
.lista{
  margin-top:10px;
  max-height:200px;
  overflow:auto;
}

.item{
  background:#f9fafb;
  padding:8px;
  border-radius:8px;
  margin-top:5px;
  display:flex;
  justify-content:space-between;
}

/* PREVIEW */
.preview{
  margin-top:10px;
  font-size:12px;
  color:var(--muted);
}

</style>
</head>

<body>

<header>
  <button onclick="mesAnterior()">◀</button>
  <b id="mes"></b>
  <div>
    <button onclick="abrirCadastro()">+ Funcionário</button>
    <button onclick="mesProximo()">▶</button>
  </div>
</header>

<div id="calendar" class="calendar"></div>

<!-- MODAL ESCALA -->
<div id="modal" class="modal">
  <div class="box">

    <h3 id="data"></h3>

    <select id="funcionario"></select>

    <input type="time" id="entrada">
    <input type="time" id="saida">

    <button onclick="add()">Adicionar horário</button>

    <div id="lista" class="lista"></div>

    <button onclick="fechar()">Fechar</button>
  </div>
</div>

<!-- MODAL CADASTRO -->
<div id="cadastro" class="modal">
  <div class="box">

    <h3>Novo Funcionário</h3>

    <div class="form">

      <input class="form-full" id="nome" placeholder="Nome completo">

      <input id="numero" placeholder="WhatsApp">

      <select id="sexo">
        <option>MASCULINO</option>
        <option>FEMININO</option>
      </select>

      <input type="date" id="nascimento">
      <input type="date" id="contratacao">

      <input id="funcao" placeholder="Função">
      <input id="folga" placeholder="Dia de folga">

    </div>

    <div id="preview" class="preview"></div>

    <button onclick="salvarFuncionario()">Salvar</button>
    <button onclick="fecharCadastro()">Fechar</button>

  </div>
</div>

<script>

const sb = supabase.createClient(
  "https://dxkszikemntfusfyrzos.supabase.co",
  "sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
)

let dataAtual=new Date()
let funcionarios=[]
let escalas=[]
let dataSelecionada=null

/* FUNCIONARIOS */
async function loadFuncionarios(){
  const {data}=await sb.from("funcionarios_mercatto").select("*")
  funcionarios=data||[]

  funcionario.innerHTML=""
  funcionarios.forEach(f=>{
    funcionario.innerHTML+=`<option value="${f.id}">${f.nome}</option>`
  })
}

/* ESCALA */
async function loadEscala(){
  const {data}=await sb.from("escala_funcionarios").select("*")
  escalas=data||[]
}

/* CALENDARIO */
async function render(){
  await loadEscala()

  calendar.innerHTML=""

  const ano=dataAtual.getFullYear()
  const mes=dataAtual.getMonth()

  mesEl.innerText=dataAtual.toLocaleString("pt-BR",{month:"long",year:"numeric"})

  const dias=new Date(ano,mes+1,0).getDate()

  for(let i=1;i<=dias;i++){
    const dataStr=`${ano}-${String(mes+1).padStart(2,"0")}-${String(i).padStart(2,"0")}`

    const d=document.createElement("div")
    d.className="day"
    d.innerHTML=`<div class="day-number">${i}</div>`

    escalas.filter(e=>e.data===dataStr).forEach(e=>{
      d.innerHTML+=`
      <div class="item-escala">
        ${e.nome}<br>
        ${e.entrada} - ${e.saida}
      </div>`
    })

    d.onclick=()=>abrir(dataStr)

    calendar.appendChild(d)
  }
}

/* ESCALA */
function abrir(data){
  dataSelecionada=data
  modal.style.display="flex"
  dataEl.innerText=data
  renderLista()
}

function fechar(){ modal.style.display="none" }

async function add(){

  const f=funcionarios.find(x=>x.id==funcionario.value)

  await sb.from("escala_funcionarios").insert({
    funcionario_id:f.id,
    nome:f.nome,
    data:dataSelecionada,
    entrada:entrada.value,
    saida:saida.value
  })

  render()
  renderLista()
}

function renderLista(){
  lista.innerHTML=""
  escalas.filter(e=>e.data===dataSelecionada).forEach(e=>{
    lista.innerHTML+=`
    <div class="item">
      ${e.nome} (${e.entrada}-${e.saida})
      <span onclick="remover('${e.id}')">❌</span>
    </div>`
  })
}

async function remover(id){
  await sb.from("escala_funcionarios").delete().eq("id",id)
  render()
  renderLista()
}

/* CADASTRO */
function abrirCadastro(){ cadastro.style.display="flex" }
function fecharCadastro(){ cadastro.style.display="none" }

async function salvarFuncionario(){

  await sb.from("funcionarios_mercatto").insert({
    nome:nome.value,
    numero:numero.value,
    sexo:sexo.value,
    data_nascimento:nascimento.value,
    data_contratacao:contratacao.value,
    funcao:funcao.value,
    folga:folga.value
  })

  fecharCadastro()
  loadFuncionarios()
}

/* PREVIEW */
[nascimento,contratacao].forEach(el=>{
  el.onchange=()=>{
    if(!nascimento.value||!contratacao.value) return

    const idade=new Date().getFullYear()-new Date(nascimento.value).getFullYear()
    const dias=(new Date()-new Date(contratacao.value))/(1000*60*60*24)

    preview.innerText=`Idade: ${idade} | Empresa: ${Math.floor(dias)} dias`
  }
})

/* NAV */
function mesAnterior(){ dataAtual.setMonth(dataAtual.getMonth()-1); render() }
function mesProximo(){ dataAtual.setMonth(dataAtual.getMonth()+1); render() }

const mesEl=document.getElementById("mes")
const dataEl=document.getElementById("data")

loadFuncionarios()
render()

</script>

</body>
</html>

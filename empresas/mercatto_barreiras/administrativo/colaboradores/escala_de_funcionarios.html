<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Escala Profissional • Mercatto</title>

<meta name="viewport" content="width=device-width,initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>

:root{
  --bg:#f3f4f6;
  --card:#ffffff;
  --border:#e5e7eb;
  --text:#111827;
  --muted:#6b7280;
  --primary:#2563eb;
}

*{box-sizing:border-box;}

body{
  margin:0;
  font-family:Inter;
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px;
  background:#fff;
  border-bottom:1px solid var(--border);
}

button{
  background:var(--primary);
  color:white;
  border:none;
  padding:10px 14px;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
}

/* CALENDARIO */
.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:10px;
  padding:15px;
}

.day{
  background:var(--card);
  border-radius:12px;
  padding:10px;
  min-height:130px;
  border:1px solid var(--border);
  cursor:pointer;
}

.day-number{
  font-size:12px;
  color:var(--muted);
}

.item-escala{
  margin-top:5px;
  padding:4px 6px;
  border-radius:6px;
  font-size:11px;
  background:#dbeafe;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  display:none;
  align-items:center;
  justify-content:center;
}

.box{
  background:white;
  padding:20px;
  border-radius:14px;
  width:480px;
}

.form{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.form-full{grid-column:1/-1;}

input,select{
  padding:10px;
  border-radius:8px;
  border:1px solid var(--border);
}

/* LISTA */
.lista{
  margin-top:10px;
  max-height:200px;
  overflow:auto;
}

.item{
  background:#f9fafb;
  padding:8px;
  border-radius:8px;
  margin-top:5px;
  display:flex;
  justify-content:space-between;
}

/* PREVIEW */
.preview{
  margin-top:10px;
  font-size:12px;
  color:var(--muted);
}



/* MODAL PREMIUM */
.box.premium{
  width:520px;
  max-width:95%;
  border-radius:18px;
  box-shadow:0 20px 60px rgba(0,0,0,.25);
  padding:20px;
}

/* HEADER */
.header-modal{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}

.header-modal h2{
  margin:0;
  font-size:20px;
}

.header-modal span{
  cursor:pointer;
  font-size:18px;
}

/* SECTIONS */
.section{
  margin-top:15px;
  padding-top:10px;
  border-top:1px solid var(--border);
}

.section h4{
  margin:0 0 10px 0;
  font-size:13px;
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:.5px;
}

/* CAMPOS */
.field{
  display:flex;
  flex-direction:column;
  gap:4px;
}

.field label{
  font-size:12px;
  color:var(--muted);
  font-weight:600;
}

.field input,
.field select{
  padding:10px;
  border-radius:10px;
  border:1px solid var(--border);
  font-size:13px;
  transition:.2s;
}

.field input:focus,
.field select:focus{
  border-color:var(--primary);
  outline:none;
  box-shadow:0 0 0 2px rgba(37,99,235,.15);
}

/* AÇÕES */
.actions{
  display:flex;
  justify-content:flex-end;
  gap:10px;
  margin-top:20px;
}

.btn{
  padding:10px 14px;
  border-radius:10px;
  font-weight:600;
  border:none;
  cursor:pointer;
}

.btn.cancel{
  background:#e5e7eb;
}

.btn.save{
  background:var(--primary);
  color:white;
}


  
</style>
</head>

<body>

<header>
  <button onclick="mesAnterior()">◀</button>
  <b id="mes"></b>
  <div>
    <button onclick="abrirCadastro()">+ Funcionário</button>
    <button onclick="mesProximo()">▶</button>
  </div>
</header>

<div id="calendar" class="calendar"></div>

<!-- MODAL ESCALA -->
<div id="modal" class="modal">
  <div class="box">

    <h3 id="data"></h3>

    <select id="funcionario"></select>

    <input type="time" id="entrada">
    <input type="time" id="saida">

    <button onclick="add()">Adicionar horário</button>

    <div id="lista" class="lista"></div>

    <button onclick="fechar()">Fechar</button>
  </div>
</div>

<!-- MODAL CADASTRO PREMIUM -->
<div id="cadastro" class="modal">
  <div class="box premium">

    <div class="header-modal">
      <h2>Cadastro de Colaborador</h2>
      <span onclick="fecharCadastro()">✕</span>
    </div>

    <!-- DADOS PESSOAIS -->
    <div class="section">
      <h4>Dados Pessoais</h4>

      <div class="form">
        <div class="field form-full">
          <label>Nome Completo *</label>
          <input id="nome" required placeholder="Digite o nome completo">
        </div>

        <div class="field">
          <label>Data de Nascimento *</label>
          <input type="date" id="nascimento" required>
        </div>

        <div class="field">
          <label>WhatsApp *</label>
          <input id="numero" required placeholder="(77) 99999-9999">
        </div>

        <div class="field">
          <label>Sexo *</label>
          <select id="sexo" required>
            <option value="">Selecionar</option>
            <option>MASCULINO</option>
            <option>FEMININO</option>
          </select>
        </div>
      </div>
    </div>

    <!-- DADOS PROFISSIONAIS -->
    <div class="section">
      <h4>Dados Profissionais</h4>

      <div class="form">
        <div class="field">
          <label>Data de Contratação *</label>
          <input type="date" id="contratacao" required>
        </div>

        <div class="field">
          <label>Setor *</label>
          <select id="setor" required>
            <option value="">Selecionar</option>
            <option>COZINHA</option>
            <option>SALÃO</option>
            <option>BAR</option>
            <option>CAIXA</option>
            <option>ADMINISTRATIVO</option>
          </select>
        </div>

        <div class="field">
          <label>Função *</label>
          <input id="funcao" required placeholder="Ex: Garçom, Cozinheiro...">
        </div>

        <div class="field">
  <label>Dias de Folga *</label>

  <div class="checkbox-group" id="folga">
    <label><input type="checkbox" value="DOMINGO"> Domingo</label>
    <label><input type="checkbox" value="SEGUNDA"> Segunda</label>
    <label><input type="checkbox" value="TERÇA"> Terça</label>
    <label><input type="checkbox" value="QUARTA"> Quarta</label>
    <label><input type="checkbox" value="QUINTA"> Quinta</label>
    <label><input type="checkbox" value="SEXTA"> Sexta</label>
    <label><input type="checkbox" value="SÁBADO"> Sábado</label>
  </div>
</div>
        </div>
      </div>
    </div>

    <!-- PREVIEW -->
    <div id="preview" class="preview"></div>

    <!-- AÇÕES -->
    <div class="actions">
      <button class="btn cancel" onclick="fecharCadastro()">Cancelar</button>
      <button class="btn save" onclick="salvarFuncionario()">Salvar Colaborador</button>
    </div>

  </div>
</div>

<script>

const sb = supabase.createClient(
  "https://dxkszikemntfusfyrzos.supabase.co",
  "sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
)

let dataAtual=new Date()
let funcionarios=[]
let escalas=[]
let dataSelecionada=null

/* FUNCIONARIOS */
async function loadFuncionarios(){
  const {data}=await sb.from("funcionarios_mercatto").select("*")
  funcionarios=data||[]

  funcionario.innerHTML=""
  funcionarios.forEach(f=>{
    funcionario.innerHTML+=`<option value="${f.id}">${f.nome}</option>`
  })
}

/* ESCALA */
async function loadEscala(){
  const {data}=await sb.from("escala_funcionarios").select("*")
  escalas=data||[]
}

/* CALENDARIO */
async function render(){
  await loadEscala()

  calendar.innerHTML=""

  const ano=dataAtual.getFullYear()
  const mes=dataAtual.getMonth()

  mesEl.innerText=dataAtual.toLocaleString("pt-BR",{month:"long",year:"numeric"})

  const dias=new Date(ano,mes+1,0).getDate()

  for(let i=1;i<=dias;i++){
    const dataStr=`${ano}-${String(mes+1).padStart(2,"0")}-${String(i).padStart(2,"0")}`

    const d=document.createElement("div")
    d.className="day"
    d.innerHTML=`<div class="day-number">${i}</div>`

    escalas.filter(e=>e.data===dataStr).forEach(e=>{
      d.innerHTML+=`
      <div class="item-escala">
        ${e.nome}<br>
        ${e.entrada} - ${e.saida}
      </div>`
    })

    d.onclick=()=>abrir(dataStr)

    calendar.appendChild(d)
  }
}

/* ESCALA */
function abrir(data){
  dataSelecionada=data
  modal.style.display="flex"
  dataEl.innerText=data
  renderLista()
}

function fechar(){ modal.style.display="none" }

async function add(){

  const f=funcionarios.find(x=>x.id==funcionario.value)

  await sb.from("escala_funcionarios").insert({
    funcionario_id:f.id,
    nome:f.nome,
    data:dataSelecionada,
    entrada:entrada.value,
    saida:saida.value
  })

  render()
  renderLista()
}

function renderLista(){
  lista.innerHTML=""
  escalas.filter(e=>e.data===dataSelecionada).forEach(e=>{
    lista.innerHTML+=`
    <div class="item">
      ${e.nome} (${e.entrada}-${e.saida})
      <span onclick="remover('${e.id}')">❌</span>
    </div>`
  })
}

async function remover(id){
  await sb.from("escala_funcionarios").delete().eq("id",id)
  render()
  renderLista()
}

/* CADASTRO */
function abrirCadastro(){ cadastro.style.display="flex" }
function fecharCadastro(){ cadastro.style.display="none" }

async function salvarFuncionario(){

if(
  !nome.value ||
  !nascimento.value ||
  !contratacao.value ||
  !setor.value ||
  !funcao.value ||
  folgasSelecionadas.length === 0 ||
  !numero.value ||
  !sexo.value
){
  alert("Preencha todos os campos obrigatórios")
  return
}
  
  |
  await sb.from("funcionarios_mercatto").insert({
    nome:nome.value,
numero: numero.value.replace(/\D/g, ""),
    sexo:sexo.value,
    data_nascimento:nascimento.value,
    data_contratacao:contratacao.value,
    setor:setor.value,
    funcao:funcao.value,
folga: folgasSelecionadas.join(",")
  })
  

  fecharCadastro()
  loadFuncionarios()
}

/* NAV */
function mesAnterior(){ dataAtual.setMonth(dataAtual.getMonth()-1); render() }
function mesProximo(){ dataAtual.setMonth(dataAtual.getMonth()+1); render() }

const mesEl=document.getElementById("mes")
const dataEl=document.getElementById("data")

  // MASCARA WHATSAPP
setTimeout(() => {
  const numeroInput = document.getElementById("numero")

  numeroInput.addEventListener("input", (e) => {

    let v = e.target.value.replace(/\D/g, "")

    if(v.length > 11) v = v.slice(0,11)

    if(v.length <= 10){
      v = v.replace(/(\d{2})(\d)/, "($1) $2")
      v = v.replace(/(\d{4})(\d)/, "$1-$2")
    } else {
      v = v.replace(/(\d{2})(\d)/, "($1) $2")
      v = v.replace(/(\d{5})(\d)/, "$1-$2")
    }

    e.target.value = v
  })
}, 500)



  
loadFuncionarios()
render()

</script>

</body>
</html>

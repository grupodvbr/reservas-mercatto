<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Central de Links</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter}

body{
background:#f1f5f9;
padding:15px;
}

/* HEADER */
.header{
position:sticky;
top:0;
z-index:10;

background:#f1f5f9;
padding:10px 0;

font-size:22px;
font-weight:800;
color:#0f172a;

border-bottom:1px solid #e2e8f0;
}

/* SEARCH */
.search{
width:100%;
padding:14px 16px;
border-radius:14px;
border:1px solid #e2e8f0;
margin:15px 0;
font-size:14px;

background:#fff;
box-shadow:0 4px 15px rgba(0,0,0,.04);

outline:none;
transition:.2s;
}

.search:focus{
border-color:#14c8a8;
box-shadow:0 0 0 3px rgba(20,200,168,.15);
}

/* GRID */
.grid{
display:grid;
gap:12px;
grid-template-columns:repeat(3,1fr);
}

/* TABLET */
@media(min-width:768px){
  .grid{
    grid-template-columns:repeat(5,1fr);
  }
}

/* DESKTOP */
@media(min-width:1200px){
  .grid{
    grid-template-columns:repeat(6,1fr);
  }
}

/* CARD */
.card{
background:#fff;
border-radius:16px;
padding:14px;
border:1px solid #e2e8f0;

box-shadow:0 8px 20px rgba(0,0,0,.05);

display:flex;
flex-direction:column;
gap:8px;

transition:.25s;
animation:fadeUp .3s ease;
}

.card:hover{
transform:translateY(-3px);
box-shadow:0 15px 30px rgba(0,0,0,.08);
}

/* TITLE */
.title{
font-weight:800;
color:#0f172a;
font-size:13px;
text-align:center;
}

/* ESCONDER LINK */
.link{
display:none;
}

/* BUTTONS */
.actions{
display:flex;
gap:6px;
margin-top:6px;
}

button{
flex:1;
padding:10px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:700;
font-size:12px;

display:flex;
align-items:center;
justify-content:center;

transition:.2s;
}

.copy{
background:#14c8a8;
color:#fff;
}

.open{
background:#e2e8f0;
}

.copy:hover{
background:#0ea58b;
}

.open:hover{
background:#cbd5e1;
}

/* TOAST */
.toast{
position:fixed;
bottom:20px;
right:20px;
background:#22c55e;
color:#fff;
padding:10px 14px;
border-radius:10px;
font-weight:800;
opacity:0;
transition:.2s;
font-size:12px;
}

.toast.show{
opacity:1;
}

/* ANIMAÇÃO */
@keyframes fadeUp{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}
</style>
</head>

<body>

<div class="header">Central de Links</div>

<input class="search" placeholder="Buscar link..." oninput="filtrar(this.value)">

<div class="grid" id="grid"></div>

<div class="toast" id="toast">COPIADO</div>

<script>

const links = [

  {nome:"Requisições", url:"https://otavio-seven.vercel.app/restaurante/requisicoesdemercadorias.html"},
  {nome:"Cardápio", url:"https://otavio-seven.vercel.app/mercatto/cardapio.html"},
  {nome:"Buffet", url:"https://reservas-mercatto.vercel.app/empresas/mercatto_barreiras/restaurante/coleta_de_dados/registro_do_buffet.html"},
  {nome:"Empresas", url:"https://seusite.com/empresas"},
  {nome:"Licitações", url:"https://seusite.com/licitacoes"},
  {nome:"Cotações", url:"https://seusite.com/cotacoes"},
  {nome:"Análises", url:"https://seusite.com/analises"}

];

const grid = document.getElementById("grid");

function render(lista){
  grid.innerHTML = lista.map(l=>`
    <div class="card">
      <div class="title">${l.nome}</div>

      <div class="actions">
        <button class="copy" onclick="copiar('${l.url}')">📋</button>
        <button class="open" onclick="window.open('${l.url}', '_blank')">🚀</button>
      </div>
    </div>
  `).join("");
}

render(links);

function copiar(texto){
  navigator.clipboard.writeText(texto);

  const t = document.getElementById("toast");
  t.classList.add("show");

  setTimeout(()=>t.classList.remove("show"),1500);
}

function filtrar(valor){
  const v = valor.toLowerCase();
  const filtrado = links.filter(l =>
    l.nome.toLowerCase().includes(v)
  );
  render(filtrado);
}

</script>

</body>
</html>

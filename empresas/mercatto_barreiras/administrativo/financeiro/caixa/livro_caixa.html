<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>

<title>Livro Caixa • Mercatto Delícia</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

/* =====================================================
ROOT
===================================================== */

:root{

  --primary:#082b63;
  --primary2:#0f3c88;

  --green:#1fa34a;
  --green2:#2cbf59;

  --red:#ff3b30;

  --bg:#f3f5f9;

  --card:#ffffff;

  --line:#dfe3eb;

  --text:#111827;

  --muted:#6b7280;

  --shadow:
  0 10px 30px rgba(0,0,0,.06);

  --radius:18px;

}

/* =====================================================
BASE
===================================================== */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

html,
body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:var(--bg);
}

body{
  display:flex;
  flex-direction:column;
}

/* =====================================================
TOPO
===================================================== */

.topo{

  position:sticky;
  top:0;
  z-index:999;

  background:white;

  box-shadow:var(--shadow);

}

/* =====================================================
TITULO
===================================================== */

.titulo{

  background:
  linear-gradient(
    135deg,
    var(--primary),
    var(--primary2)
  );

  color:white;

  font-size:28px;

  font-weight:900;

  letter-spacing:.5px;

  text-align:center;

  padding:20px;

}

/* =====================================================
RESUMO
===================================================== */

.resumo{

  display:grid;

  grid-template-columns:
  180px
  220px
  1fr
  1fr
  220px;

  border-bottom:1px solid var(--line);

}

.resumo div{

  min-height:68px;

  border-right:1px solid var(--line);
  border-bottom:1px solid var(--line);

  display:flex;
  align-items:center;

  padding:14px;

  font-size:15px;

}

.resumo .head{

  background:#eef2f7;

  font-weight:800;

  justify-content:center;

  color:#374151;

}

.resumo .empresa{

  background:#f9f3ea;

  font-size:17px;

  font-weight:700;

}

.resumo .saldo{

  font-size:22px;

  font-weight:800;

  color:#111827;

}

.resumo .saldo-loja{

  background:
  linear-gradient(
    135deg,
    var(--green),
    var(--green2)
  );

  color:white;

  justify-content:flex-end;

  font-size:30px;

  font-weight:900;

}

/* =====================================================
FORM
===================================================== */

.form-area{

  background:white;

  padding:14px;

  display:grid;

  grid-template-columns:

  160px
  150px
  2fr
  1.5fr
  170px
  220px
  180px;

  gap:12px;

  border-bottom:1px solid var(--line);

  align-items:center;

}

.form-group{
  position:relative;
}

.form-area input,
.form-area select{

  width:100%;

  height:52px;

  border:1px solid #d1d5db;

  border-radius:14px;

  padding:0 16px;

  background:#f9fafb;

  font-size:15px;

  font-weight:500;

  color:#111827;

  outline:none;

  transition:.2s;

}

.form-area input:focus,
.form-area select:focus{

  border-color:var(--primary);

  background:white;

  box-shadow:
  0 0 0 4px rgba(8,43,99,.08);

}

.form-area button{

  height:52px;

  border:none;

  border-radius:14px;

  background:
  linear-gradient(
    135deg,
    var(--primary),
    var(--primary2)
  );

  color:white;

  font-size:15px;

  font-weight:800;

  cursor:pointer;

  transition:.2s;

}

.form-area button:hover{

  transform:translateY(-2px);

  box-shadow:
  0 10px 20px rgba(8,43,99,.18);

}

.empresa-fixa{

  background:#eef2f7 !important;

  font-weight:800 !important;

  color:#374151 !important;

  cursor:not-allowed;

}

/* =====================================================
TABELA
===================================================== */

.container{

  flex:1;

  overflow:auto;

  background:white;

}

table{

  width:100%;

  border-collapse:collapse;

  table-layout:fixed;

}

/* =====================================================
THEAD
===================================================== */

thead{

  position:sticky;

  top:0;

  z-index:20;

}

thead th{

  background:
  linear-gradient(
    180deg,
    #f8fafc,
    #edf2f7
  );

  border-bottom:1px solid var(--line);

  padding:14px;

  text-align:left;

  font-size:14px;

  font-weight:800;

  color:#374151;

}

/* =====================================================
TBODY
===================================================== */

tbody tr{

  transition:.15s;

}

tbody tr:hover{

  background:#f8fbff;

}

tbody td{

  border-bottom:1px solid #edf1f5;

  padding:12px 14px;

  font-size:14px;

  color:#111827;

  white-space:nowrap;

  overflow:hidden;

  text-overflow:ellipsis;

}

.center{
  text-align:center;
}

.valor-entrada{

  color:var(--green);

  font-weight:800;

  text-align:right;

}

.valor-saida{

  color:var(--red);

  font-weight:800;

  text-align:right;

}

.valor-saldo{

  text-align:right;

  font-weight:900;

  color:#111827;

}

/* =====================================================
LOADING
===================================================== */

.loading{

  padding:30px;

  text-align:center;

  color:var(--muted);

  font-weight:700;

}

/* =====================================================
SCROLL
===================================================== */

.container::-webkit-scrollbar{
  width:10px;
  height:10px;
}

.container::-webkit-scrollbar-thumb{
  background:#cbd5e1;
  border-radius:20px;
}

/* =====================================================
RESPONSIVO
===================================================== */

@media(max-width:1400px){

  .form-area{

    grid-template-columns:
    1fr 1fr;

  }

}

</style>
</head>
<body>

<!-- =====================================================
TOPO
===================================================== -->

<div class="topo">

  <div class="titulo">
    REGISTRO DE DINHEIRO • MERCATTO DELÍCIA
  </div>

  <!-- =====================================================
  RESUMO
  ===================================================== -->

  <div class="resumo">

    <div class="head">
      EMPRESA
    </div>

    <div class="head">
      Saldo Implantação
    </div>

    <div class="head">
      Total Entradas
    </div>

    <div class="head">
      Total Saídas
    </div>

    <div class="head">
      SALDO NA LOJA
    </div>

    <div class="empresa">
      Mercatto Delícia
    </div>

    <div class="saldo" id="saldoImplantacao">
      R$ 0,00
    </div>

    <div class="saldo" id="totalEntradas">
      R$ 0,00
    </div>

    <div class="saldo" id="totalSaidas">
      R$ 0,00
    </div>

    <div class="saldo-loja" id="saldoLoja">
      R$ 0,00
    </div>

  </div>

  <!-- =====================================================
  FORM
  ===================================================== -->

  <div class="form-area">

    <div class="form-group">
      <input
      type="date"
      id="data_movimento">
    </div>

    <div class="form-group">
      <select id="tipo">

        <option value="entrada">
          ENTRADA
        </option>

        <option value="saida">
          SAÍDA
        </option>

      </select>
    </div>

    <div class="form-group">
      <input
      type="text"
      id="historico"
      placeholder="Histórico da movimentação">
    </div>

    <div class="form-group">
      <input
      type="text"
      id="complemento"
      placeholder="Complemento">
    </div>

    <div class="form-group">
      <input
      type="text"
      id="valor"
      placeholder="R$ 0,00"
      inputmode="numeric"
      oninput="mascaraDinheiro(this)">
    </div>

    <div class="form-group">
      <input
      type="text"
      id="empresa"
      value="Mercatto Delícia"
      readonly
      class="empresa-fixa">
    </div>

    <button onclick="salvarRegistro()">
      SALVAR
    </button>

  </div>

</div>

<!-- =====================================================
TABELA
===================================================== -->

<div class="container" id="scrollContainer">

<table>

<thead>

<tr>

  <th style="width:140px">
    Data Registro
  </th>

  <th style="width:140px">
    Data Movimento
  </th>

  <th>
    Histórico
  </th>

  <th>
    Complemento
  </th>

  <th style="width:180px">
    Entrada
  </th>

  <th style="width:180px">
    Saída
  </th>

  <th style="width:180px">
    Saldo
  </th>

</tr>

</thead>

<tbody id="tbody"></tbody>

</table>

<div class="loading" id="loading">
  Carregando registros...
</div>

</div>

<script>

/* =====================================================
SUPABASE
===================================================== */

const SUPABASE_URL =
"https://dxkszikemntfusfyrzos.supabase.co";

const SUPABASE_KEY =
"sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed";

const supabaseClient =
window.supabase.createClient(

  SUPABASE_URL,
  SUPABASE_KEY

);

/* =====================================================
CONFIG
===================================================== */

const PAGE_SIZE = 50;

let pagina = 0;
let carregando = false;
let acabou = false;

/* =====================================================
ELEMENTOS
===================================================== */

const tbody =
document.getElementById('tbody');

const loading =
document.getElementById('loading');

const scrollContainer =
document.getElementById('scrollContainer');

/* =====================================================
DATA PADRÃO
===================================================== */

document.getElementById(
'data_movimento'
).value =
new Date()
.toISOString()
.split('T')[0];

document.getElementById(
'valor'
).value = 'R$ 0,00';

/* =====================================================
FORMATA MOEDA
===================================================== */

function moeda(valor){

  return Number(valor || 0)
  .toLocaleString('pt-BR',{

    style:'currency',
    currency:'BRL'

  });

}

/* =====================================================
FORMATA DATA
===================================================== */

function formatarData(data){

  if(!data) return '-';

  return new Date(data)
  .toLocaleDateString('pt-BR',{

    timeZone:'America/Bahia'

  });

}

/* =====================================================
MASCARA DINHEIRO
===================================================== */

function mascaraDinheiro(campo){

  let valor =
  campo.value.replace(/\D/g,'');

  valor =
  (Number(valor) / 100)
  .toFixed(2) + '';

  valor =
  valor.replace('.',',');

  valor =
  valor.replace(
    /(\d)(?=(\d{3})+(?!\d))/g,
    '$1.'
  );

  campo.value = 'R$ ' + valor;

}

/* =====================================================
CONVERTER VALOR
===================================================== */

function converterValor(valor){

  return Number(

    valor
    .replace('R$','')
    .replace(/\./g,'')
    .replace(',','.')
    .trim()

  ) || 0;

}

/* =====================================================
CARREGAR RESUMO
===================================================== */

async function carregarResumo(){

  const { data, error } =
  await supabaseClient
  .from('livros_caixa')
  .select('tipo,valor');

  if(error){

    console.error(error);
    return;

  }

  let entradas = 0;
  let saidas = 0;

  data.forEach(item=>{

    if(item.tipo === 'entrada'){

      entradas +=
      Number(item.valor || 0);

    }else{

      saidas +=
      Number(item.valor || 0);

    }

  });

  const saldo =
  entradas - saidas;

  document.getElementById(
    'saldoImplantacao'
  ).innerHTML =
  moeda(1038.06);

  document.getElementById(
    'totalEntradas'
  ).innerHTML =
  moeda(entradas);

  document.getElementById(
    'totalSaidas'
  ).innerHTML =
  moeda(saidas);

  document.getElementById(
    'saldoLoja'
  ).innerHTML =
  moeda(saldo);

}

/* =====================================================
CARREGAR REGISTROS
===================================================== */

async function carregarRegistros(){

  if(carregando || acabou)
  return;

  carregando = true;

  loading.style.display =
  'block';

  const inicio =
  pagina * PAGE_SIZE;

  const fim =
  inicio + PAGE_SIZE - 1;

  const { data, error } =
  await supabaseClient

  .from('livros_caixa')

  .select('*')

  .order('created_at',{

    ascending:false

  })

  .range(inicio,fim);

  if(error){

    console.error(error);

    carregando = false;

    return;

  }

  if(!data.length){

    acabou = true;

    loading.innerHTML =
    'Fim dos registros';

    return;

  }

  renderizar(data);

  pagina++;

  carregando = false;

  loading.style.display =
  'none';

}

/* =====================================================
RENDER
===================================================== */

function renderizar(lista){

  lista.forEach(item=>{

    const tr =
    document.createElement('tr');

    tr.innerHTML = `

      <td class="center">
        ${formatarData(item.data_registro)}
      </td>

      <td class="center">
        ${formatarData(item.data_movimento)}
      </td>

      <td>
        ${item.historico || ''}
      </td>

      <td>
        ${item.complemento || ''}
      </td>

      <td class="${
        item.tipo === 'entrada'
        ? 'valor-entrada'
        : ''
      }">

        ${
          item.tipo === 'entrada'
          ? moeda(item.valor)
          : ''
        }

      </td>

      <td class="${
        item.tipo === 'saida'
        ? 'valor-saida'
        : ''
      }">

        ${
          item.tipo === 'saida'
          ? moeda(item.valor)
          : ''
        }

      </td>

      <td class="valor-saldo">
        ${moeda(item.saldo)}
      </td>

    `;

    tbody.appendChild(tr);

  });

}

/* =====================================================
SALVAR
===================================================== */

async function salvarRegistro(){

  const data_movimento =
  document.getElementById(
    'data_movimento'
  ).value;

  const historico =
  document.getElementById(
    'historico'
  ).value.trim();

  const complemento =
  document.getElementById(
    'complemento'
  ).value.trim();

  const tipo =
  document.getElementById(
    'tipo'
  ).value;

  const valor =
  converterValor(

    document
    .getElementById('valor')
    .value

  );

  const empresa =
  document.getElementById(
    'empresa'
  ).value;

  if(!historico){

    alert('Informe o histórico');
    return;

  }

  if(valor <= 0){

    alert('Informe um valor válido');
    return;

  }

  /* =====================================================
  PEGA ÚLTIMO SALDO
  ===================================================== */

  const { data: ultimo } =
  await supabaseClient

  .from('livros_caixa')

  .select('saldo')

  .order('created_at',{

    ascending:false

  })

  .limit(1)

  .maybeSingle();

  const saldoAnterior =
  Number(ultimo?.saldo || 0);

  /* =====================================================
  CALCULA
  ===================================================== */

  let novoSaldo = 0;

  if(tipo === 'entrada'){

    novoSaldo =
    saldoAnterior + valor;

  }else{

    novoSaldo =
    saldoAnterior - valor;

  }

  /* =====================================================
  INSERT
  ===================================================== */

  const { error } =
  await supabaseClient

  .from('livros_caixa')

  .insert({

    empresa,
    historico,
    complemento,
    tipo,
    valor,

    saldo:novoSaldo,

    data_movimento,

    data_registro:
    new Date(),

    created_at:
    new Date()

  });

  if(error){

    console.error(error);

    alert(
      'Erro ao salvar'
    );

    return;

  }

  /* =====================================================
  LIMPAR
  ===================================================== */

  document.getElementById(
    'historico'
  ).value = '';

  document.getElementById(
    'complemento'
  ).value = '';

  document.getElementById(
    'valor'
  ).value = 'R$ 0,00';

  /* =====================================================
  RELOAD
  ===================================================== */

  tbody.innerHTML = '';

  pagina = 0;

  acabou = false;

  await carregarResumo();

  await carregarRegistros();

}

/* =====================================================
SCROLL INFINITO
===================================================== */

scrollContainer
.addEventListener(

  'scroll',

  async function(){

    const el = this;

    if(

      el.scrollTop +
      el.clientHeight >=

      el.scrollHeight - 300

    ){

      await carregarRegistros();

    }

  }

);

/* =====================================================
REALTIME
===================================================== */

supabaseClient

.channel(
  'livro_caixa_realtime'
)

.on(

  'postgres_changes',

  {

    event:'INSERT',

    schema:'public',

    table:'livros_caixa'

  },

  async ()=>{

    tbody.innerHTML = '';

    pagina = 0;

    acabou = false;

    await carregarResumo();

    await carregarRegistros();

  }

)

.subscribe();

/* =====================================================
INIT
===================================================== */

(async()=>{

  await carregarResumo();

  await carregarRegistros();

})();

</script>

</body>
</html>

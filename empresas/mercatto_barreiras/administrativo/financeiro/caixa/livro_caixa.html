<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>

<title>Livro Caixa • Mercatto Delícia</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

/* =====================================================
ROOT
===================================================== */

:root{

  --primary:#0f2d5c;
  --primary-light:#1c4b92;

  --green:#16a34a;
  --red:#dc2626;

  --bg:#f4f6f9;

  --card:#ffffff;

  --border:#dbe2ea;

  --text:#0f172a;

  --muted:#64748b;

  --shadow:
  0 4px 18px rgba(15,23,42,.06);

  --radius:14px;

}

/* =====================================================
BASE
===================================================== */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

html,
body{

  width:100%;
  height:100%;

  overflow:hidden;

  background:var(--bg);

}

body{

  display:flex;
  flex-direction:column;

}

/* =====================================================
HEADER
===================================================== */

.topo{

  background:white;

  box-shadow:var(--shadow);

  z-index:999;

}

/* =====================================================
TITULO
===================================================== */

.titulo{

  background:
  linear-gradient(
    90deg,
    var(--primary),
    var(--primary-light)
  );

  color:white;

  text-align:center;

  padding:18px;

  font-size:24px;

  font-weight:800;

  letter-spacing:.3px;

}

/* =====================================================
RESUMO
===================================================== */

.resumo{

  display:grid;

  grid-template-columns:
  220px
  1fr
  1fr
  1fr
  260px;

  border-bottom:1px solid var(--border);

}

.resumo-box{

  padding:16px 18px;

  border-right:1px solid var(--border);

  min-height:84px;

  display:flex;
  flex-direction:column;
  justify-content:center;

  background:white;

}

.resumo-box:last-child{
  border-right:none;
}

.resumo-label{

  font-size:12px;

  font-weight:700;

  text-transform:uppercase;

  letter-spacing:.4px;

  color:var(--muted);

  margin-bottom:8px;

}

.resumo-valor{

  font-size:26px;

  font-weight:800;

  color:var(--text);

}

.resumo-empresa{

  background:#f8f4ee;

}

.resumo-saldo{

  background:
  linear-gradient(
    90deg,
    #169c46,
    #1bb653
  );

}

.resumo-saldo .resumo-label,
.resumo-saldo .resumo-valor{

  color:white;

}

/* =====================================================
FORM
===================================================== */

.form-area{

  display:grid;

  grid-template-columns:

  150px
  150px
  2fr
  1.4fr
  170px
  210px
  180px;

  gap:12px;

  padding:14px;

  border-top:1px solid var(--border);

  background:white;

}

.form-area input,
.form-area select{

  width:100%;

  height:50px;

  border:1px solid var(--border);

  border-radius:12px;

  background:#f8fafc;

  padding:0 14px;

  outline:none;

  font-size:14px;

  font-weight:600;

  color:var(--text);

  transition:.18s;

}

.form-area input:focus,
.form-area select:focus{

  background:white;

  border-color:#2563eb;

  box-shadow:
  0 0 0 4px rgba(37,99,235,.08);

}

.empresa-fixa{

  background:#eef2f7 !important;

  color:#475569 !important;

  font-weight:800 !important;

}

.btn-salvar{

  border:none;

  border-radius:12px;

  background:
  linear-gradient(
    90deg,
    var(--primary),
    var(--primary-light)
  );

  color:white;

  font-size:14px;

  font-weight:800;

  cursor:pointer;

  transition:.18s;

}

.btn-salvar:hover{

  opacity:.94;

  transform:translateY(-1px);

}

/* =====================================================
CONTAINER
===================================================== */

.container{

  flex:1;

  overflow:auto;

  background:white;

}

/* =====================================================
TABELA
===================================================== */

table{

  width:100%;

  border-collapse:collapse;

  table-layout:fixed;

}

/* =====================================================
HEAD
===================================================== */

thead{

  position:sticky;

  top:0;

  z-index:50;

}

thead th{

  background:#f8fafc;

  border-bottom:1px solid var(--border);
  border-right:1px solid var(--border);

  padding:14px 12px;

  text-align:left;

  font-size:12px;

  font-weight:800;

  color:#475569;

  text-transform:uppercase;

  letter-spacing:.4px;

  white-space:nowrap;

}

thead th:last-child{
  border-right:none;
}

/* =====================================================
COLUNAS FIXAS
===================================================== */

th:nth-child(1),
td:nth-child(1){

  width:130px;
  min-width:130px;
  max-width:130px;

}

th:nth-child(2),
td:nth-child(2){

  width:130px;
  min-width:130px;
  max-width:130px;

}

th:nth-child(5),
td:nth-child(5){

  width:170px;
  min-width:170px;
  max-width:170px;

}

th:nth-child(6),
td:nth-child(6){

  width:170px;
  min-width:170px;
  max-width:170px;

}

th:nth-child(7),
td:nth-child(7){

  width:190px;
  min-width:190px;
  max-width:190px;

}

/* =====================================================
LINHA SALDO DIA
===================================================== */

.linha-dia{

  background:
  linear-gradient(
    90deg,
    var(--primary),
    var(--primary-light)
  );

}

.linha-dia td{

  background:transparent !important;

  color:white !important;

  padding:12px 14px;

  border-bottom:1px solid rgba(255,255,255,.08);

  font-size:13px;

  font-weight:800;

}

.saldo-dia{

  text-align:right;

  color:#b8ffcb !important;

  font-size:15px !important;

}

/* =====================================================
LINHAS NORMAIS
===================================================== */

.linha-normal{

  transition:.12s;

}

.linha-normal:hover{

  background:#f8fbff;

}

.linha-normal td{

  padding:12px 12px;

  border-bottom:1px solid #edf2f7;
  border-right:1px solid #edf2f7;

  font-size:13px;

  color:var(--text);

  white-space:nowrap;

  overflow:hidden;

  text-overflow:ellipsis;

  background:white;

  vertical-align:middle;

}

.linha-normal td:last-child{
  border-right:none;
}

/* =====================================================
ALINHAMENTOS
===================================================== */

.center{
  text-align:center;
}

.valor-entrada{

  color:var(--green);

  font-weight:800;

  text-align:right;

}

.valor-saida{

  color:var(--red);

  font-weight:800;

  text-align:right;

}

.valor-saldo{

  text-align:right;

  font-weight:800;

  color:#0f172a;

}

/* =====================================================
ZEBRADO
===================================================== */

.linha-normal:nth-child(even) td{

  background:#fcfdff;

}

/* =====================================================
LOADING
===================================================== */

.loading{

  padding:26px;

  text-align:center;

  font-size:14px;

  font-weight:700;

  color:var(--muted);

}

/* =====================================================
SCROLL
===================================================== */

.container::-webkit-scrollbar{
  width:10px;
  height:10px;
}

.container::-webkit-scrollbar-thumb{
  background:#cbd5e1;
  border-radius:20px;
}

/* =====================================================
RESPONSIVO
===================================================== */

@media(max-width:1450px){

  .form-area{

    grid-template-columns:
    1fr 1fr;

  }

}

</style>
</head>
<body>

<!-- =====================================================
TOPO
===================================================== -->

<div class="topo">

  <div class="titulo">
    REGISTRO DE DINHEIRO • MERCATTO DELÍCIA
  </div>

  <!-- =====================================================
  RESUMO
  ===================================================== -->

  <div class="resumo">

    <div class="head">
      EMPRESA
    </div>

    <div class="head">
      Saldo Implantação
    </div>

    <div class="head">
      Total Entradas
    </div>

    <div class="head">
      Total Saídas
    </div>

    <div class="head">
      SALDO NA LOJA
    </div>

    <div class="empresa">
      Mercatto Delícia
    </div>

    <div class="saldo" id="saldoImplantacao">
      R$ 0,00
    </div>

    <div class="saldo" id="totalEntradas">
      R$ 0,00
    </div>

    <div class="saldo" id="totalSaidas">
      R$ 0,00
    </div>

    <div class="saldo-loja" id="saldoLoja">
      R$ 0,00
    </div>

  </div>

  <!-- =====================================================
  FORM
  ===================================================== -->

  <div class="form-area">

    <div class="form-group">
      <input
      type="date"
      id="data_movimento">
    </div>

    <div class="form-group">
      <select id="tipo">

        <option value="entrada">
          ENTRADA
        </option>

        <option value="saida">
          SAÍDA
        </option>

      </select>
    </div>

    <div class="form-group">
      <input
      type="text"
      id="historico"
      placeholder="Histórico da movimentação">
    </div>

    <div class="form-group">
      <input
      type="text"
      id="complemento"
      placeholder="Complemento">
    </div>

    <div class="form-group">
      <input
      type="text"
      id="valor"
      placeholder="R$ 0,00"
      inputmode="numeric"
      oninput="mascaraDinheiro(this)">
    </div>

    <div class="form-group">
      <input
      type="text"
      id="empresa"
      value="Mercatto Delícia"
      readonly
      class="empresa-fixa">
    </div>

    <button onclick="salvarRegistro()">
      SALVAR
    </button>

  </div>

</div>

<!-- =====================================================
TABELA
===================================================== -->

<div class="container" id="scrollContainer">

<table>

<thead>

<tr>

  <th style="width:140px">
    Data Registro
  </th>

  <th style="width:140px">
    Data Movimento
  </th>

  <th>
    Histórico
  </th>

  <th>
    Complemento
  </th>

  <th style="width:180px">
    Entrada
  </th>

  <th style="width:180px">
    Saída
  </th>

  <th style="width:180px">
    Saldo
  </th>

</tr>

</thead>

<tbody id="tbody"></tbody>

</table>

<div class="loading" id="loading">
  Carregando registros...
</div>

</div>

<script>

/* =====================================================
SUPABASE
===================================================== */

const SUPABASE_URL =
"https://dxkszikemntfusfyrzos.supabase.co";

const SUPABASE_KEY =
"sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed";

const supabaseClient =
window.supabase.createClient(

  SUPABASE_URL,
  SUPABASE_KEY

);

/* =====================================================
CONFIG
===================================================== */

const PAGE_SIZE = 50;

let pagina = 0;
let carregando = false;
let acabou = false;

/* =====================================================
ELEMENTOS
===================================================== */

const tbody =
document.getElementById('tbody');

const loading =
document.getElementById('loading');

const scrollContainer =
document.getElementById('scrollContainer');

/* =====================================================
DATA PADRÃO
===================================================== */

document.getElementById(
'data_movimento'
).value =
new Date()
.toISOString()
.split('T')[0];

document.getElementById(
'valor'
).value = 'R$ 0,00';

/* =====================================================
FORMATA MOEDA
===================================================== */

function moeda(valor){

  return Number(valor || 0)
  .toLocaleString('pt-BR',{

    style:'currency',
    currency:'BRL'

  });

}

/* =====================================================
FORMATA DATA
===================================================== */

function formatarData(data){

  if(!data) return '-';

  return new Date(data)
  .toLocaleDateString('pt-BR',{

    timeZone:'America/Bahia'

  });

}

/* =====================================================
MASCARA DINHEIRO
===================================================== */

function mascaraDinheiro(campo){

  let valor =
  campo.value.replace(/\D/g,'');

  valor =
  (Number(valor) / 100)
  .toFixed(2) + '';

  valor =
  valor.replace('.',',');

  valor =
  valor.replace(
    /(\d)(?=(\d{3})+(?!\d))/g,
    '$1.'
  );

  campo.value = 'R$ ' + valor;

}

/* =====================================================
CONVERTER VALOR
===================================================== */

function converterValor(valor){

  return Number(

    valor
    .replace('R$','')
    .replace(/\./g,'')
    .replace(',','.')
    .trim()

  ) || 0;

}

/* =====================================================
CARREGAR RESUMO
===================================================== */

async function carregarResumo(){

  const { data, error } =
  await supabaseClient
  .from('livros_caixa')
  .select('tipo,valor');

  if(error){

    console.error(error);
    return;

  }

  let entradas = 0;
  let saidas = 0;

  data.forEach(item=>{

    if(item.tipo === 'entrada'){

      entradas +=
      Number(item.valor || 0);

    }else{

      saidas +=
      Number(item.valor || 0);

    }

  });

  const saldo =
  entradas - saidas;

  document.getElementById(
    'saldoImplantacao'
  ).innerHTML =
  moeda(1038.06);

  document.getElementById(
    'totalEntradas'
  ).innerHTML =
  moeda(entradas);

  document.getElementById(
    'totalSaidas'
  ).innerHTML =
  moeda(saidas);

  document.getElementById(
    'saldoLoja'
  ).innerHTML =
  moeda(saldo);

}

/* =====================================================
CARREGAR REGISTROS
===================================================== */

async function carregarRegistros(){

  if(carregando || acabou)
  return;

  carregando = true;

  loading.style.display =
  'block';

  const inicio =
  pagina * PAGE_SIZE;

  const fim =
  inicio + PAGE_SIZE - 1;

  const { data, error } =
  await supabaseClient

  .from('livros_caixa')

  .select('*')

  .order('created_at',{

    ascending:false

  })

  .range(inicio,fim);

  if(error){

    console.error(error);

    carregando = false;

    return;

  }

  if(!data.length){

    acabou = true;

    loading.innerHTML =
    'Fim dos registros';

    return;

  }

  renderizar(data);

  pagina++;

  carregando = false;

  loading.style.display =
  'none';

}

/* =====================================================
RENDER
===================================================== */

function renderizar(lista){

  lista.forEach(item=>{

    const tr =
    document.createElement('tr');

    tr.innerHTML = `

      <td class="center">
        ${formatarData(item.data_registro)}
      </td>

      <td class="center">
        ${formatarData(item.data_movimento)}
      </td>

      <td>
        ${item.historico || ''}
      </td>

      <td>
        ${item.complemento || ''}
      </td>

      <td class="${
        item.tipo === 'entrada'
        ? 'valor-entrada'
        : ''
      }">

        ${
          item.tipo === 'entrada'
          ? moeda(item.valor)
          : ''
        }

      </td>

      <td class="${
        item.tipo === 'saida'
        ? 'valor-saida'
        : ''
      }">

        ${
          item.tipo === 'saida'
          ? moeda(item.valor)
          : ''
        }

      </td>

      <td class="valor-saldo">
        ${moeda(item.saldo)}
      </td>

    `;

    tbody.appendChild(tr);

  });

}

/* =====================================================
SALVAR
===================================================== */

async function salvarRegistro(){

  const data_movimento =
  document.getElementById(
    'data_movimento'
  ).value;

  const historico =
  document.getElementById(
    'historico'
  ).value.trim();

  const complemento =
  document.getElementById(
    'complemento'
  ).value.trim();

  const tipo =
  document.getElementById(
    'tipo'
  ).value;

  const valor =
  converterValor(

    document
    .getElementById('valor')
    .value

  );

  const empresa =
  document.getElementById(
    'empresa'
  ).value;

  if(!historico){

    alert('Informe o histórico');
    return;

  }

  if(valor <= 0){

    alert('Informe um valor válido');
    return;

  }

  /* =====================================================
  PEGA ÚLTIMO SALDO
  ===================================================== */

  const { data: ultimo } =
  await supabaseClient

  .from('livros_caixa')

  .select('saldo')

  .order('created_at',{

    ascending:false

  })

  .limit(1)

  .maybeSingle();

  const saldoAnterior =
  Number(ultimo?.saldo || 0);

  /* =====================================================
  CALCULA
  ===================================================== */

  let novoSaldo = 0;

  if(tipo === 'entrada'){

    novoSaldo =
    saldoAnterior + valor;

  }else{

    novoSaldo =
    saldoAnterior - valor;

  }

  /* =====================================================
  INSERT
  ===================================================== */

  const { error } =
  await supabaseClient

  .from('livros_caixa')

  .insert({

    empresa,
    historico,
    complemento,
    tipo,
    valor,

    saldo:novoSaldo,

    data_movimento,

    data_registro:
    new Date(),

    created_at:
    new Date()

  });

  if(error){

    console.error(error);

    alert(
      'Erro ao salvar'
    );

    return;

  }

  /* =====================================================
  LIMPAR
  ===================================================== */

  document.getElementById(
    'historico'
  ).value = '';

  document.getElementById(
    'complemento'
  ).value = '';

  document.getElementById(
    'valor'
  ).value = 'R$ 0,00';

  /* =====================================================
  RELOAD
  ===================================================== */

  tbody.innerHTML = '';

  pagina = 0;

  acabou = false;

  await carregarResumo();

  await carregarRegistros();

}

/* =====================================================
SCROLL INFINITO
===================================================== */

scrollContainer
.addEventListener(

  'scroll',

  async function(){

    const el = this;

    if(

      el.scrollTop +
      el.clientHeight >=

      el.scrollHeight - 300

    ){

      await carregarRegistros();

    }

  }

);

/* =====================================================
REALTIME
===================================================== */

supabaseClient

.channel(
  'livro_caixa_realtime'
)

.on(

  'postgres_changes',

  {

    event:'INSERT',

    schema:'public',

    table:'livros_caixa'

  },

  async ()=>{

    tbody.innerHTML = '';

    pagina = 0;

    acabou = false;

    await carregarResumo();

    await carregarRegistros();

  }

)

.subscribe();

/* =====================================================
INIT
===================================================== */

(async()=>{

  await carregarResumo();

  await carregarRegistros();

})();

</script>

</body>
</html>

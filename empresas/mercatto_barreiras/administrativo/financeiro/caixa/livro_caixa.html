<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8"/>

<meta
name="viewport"
content="
width=device-width,
initial-scale=1.0,
viewport-fit=cover
"/>

<title>
Livro Caixa • Mercatto Delícia
</title>

<!-- =====================================================
FONT
===================================================== -->

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
rel="stylesheet"
/>

<!-- =====================================================
SUPABASE
===================================================== -->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

/* =====================================================
ROOT
===================================================== */

:root{

  --primary:#082b63;
  --primary2:#123f89;

  --green:#16a34a;
  --green2:#22c55e;

  --red:#ef4444;

  --bg:#eef2f7;

  --card:#ffffff;

  --line:#dfe5ee;

  --text:#0f172a;

  --muted:#64748b;

  --shadow:
  0 10px 30px rgba(0,0,0,.06);

  --radius:18px;

}

/* =====================================================
BASE
===================================================== */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

html,
body{

  width:100%;
  height:100%;

  overflow:hidden;

  background:var(--bg);

}

body{

  display:flex;
  flex-direction:column;

}

/* =====================================================
TOPO
===================================================== */

.topo{

  position:sticky;
  top:0;

  z-index:999;

  background:white;

  box-shadow:var(--shadow);

}

/* =====================================================
HEADER
===================================================== */

.titulo{

  background:
  linear-gradient(
    135deg,
    var(--primary),
    var(--primary2)
  );

  color:white;

  padding:22px;

  text-align:center;

  font-size:28px;

  font-weight:900;

  letter-spacing:.5px;

}

/* =====================================================
RESUMO
===================================================== */

.resumo{

  display:grid;

  grid-template-columns:
  200px
  1fr
  1fr
  1fr
  260px;

}

.resumo-box{

  border-right:
  1px solid var(--line);

  border-bottom:
  1px solid var(--line);

  padding:16px;

  background:white;

  min-height:82px;

  display:flex;
  flex-direction:column;
  justify-content:center;

}

.resumo-label{

  color:var(--muted);

  font-size:13px;

  font-weight:700;

  margin-bottom:8px;

  text-transform:uppercase;

  letter-spacing:.4px;

}

.resumo-valor{

  font-size:28px;

  font-weight:900;

  color:var(--text);

}

.resumo-empresa{

  background:#f9f4ec;

}

.resumo-saldo{

  background:
  linear-gradient(
    135deg,
    var(--green),
    var(--green2)
  );

}

.resumo-saldo .resumo-label,
.resumo-saldo .resumo-valor{

  color:white;

}

/* =====================================================
FORM
===================================================== */

.form-area{

  background:white;

  padding:14px;

  display:grid;

  grid-template-columns:

  160px
  150px
  2fr
  1.5fr
  180px
  220px
  190px;

  gap:12px;

  border-top:1px solid var(--line);

}

.form-area input,
.form-area select{

  width:100%;

  height:54px;

  border:1px solid #d7dde7;

  border-radius:14px;

  background:#f8fafc;

  padding:0 16px;

  outline:none;

  font-size:15px;

  font-weight:600;

  color:var(--text);

  transition:.2s;

}

.form-area input:focus,
.form-area select:focus{

  background:white;

  border-color:var(--primary);

  box-shadow:
  0 0 0 4px rgba(8,43,99,.08);

}

.empresa-fixa{

  background:#edf2f7 !important;

  font-weight:800 !important;

  cursor:not-allowed;

}

.btn-salvar{

  border:none;

  border-radius:14px;

  background:
  linear-gradient(
    135deg,
    var(--primary),
    var(--primary2)
  );

  color:white;

  font-size:15px;

  font-weight:900;

  cursor:pointer;

  transition:.2s;

}

.btn-salvar:hover{

  transform:translateY(-2px);

  box-shadow:
  0 10px 20px rgba(8,43,99,.18);

}

/* =====================================================
CONTAINER
===================================================== */

.container{

  flex:1;

  overflow:auto;

  background:white;

}

/* =====================================================
TABELA
===================================================== */

table{

  width:100%;

  border-collapse:collapse;

  table-layout:fixed;

}

/* =====================================================
HEAD
===================================================== */

thead{

  position:sticky;

  top:0;

  z-index:50;

}

thead th{

  background:
  linear-gradient(
    180deg,
    #f8fafc,
    #edf2f7
  );

  border-bottom:1px solid var(--line);

  padding:14px;

  font-size:13px;

  font-weight:900;

  text-transform:uppercase;

  letter-spacing:.4px;

  color:#475569;

  text-align:left;

}

/* =====================================================
LINHA DIA
===================================================== */

.linha-dia{

  background:
  linear-gradient(
    90deg,
    var(--primary),
    var(--primary2)
  );

}

.linha-dia td{

  background:transparent !important;

  color:white !important;

  padding:18px 16px;

  border-bottom:1px solid rgba(255,255,255,.08);

  font-weight:900;

}

.titulo-dia{

  font-size:15px;

  letter-spacing:.4px;

}

.saldo-dia{

  color:#9dffb7 !important;

  font-size:18px;

  text-align:right;

}

/* =====================================================
LINHAS
===================================================== */

.linha-normal{

  transition:.15s;

}

.linha-normal:hover{

  background:#f8fbff;

}

.linha-normal td{

  border-bottom:1px solid #edf2f7;

  padding:14px;

  font-size:14px;

  color:var(--text);

  white-space:nowrap;

  overflow:hidden;

  text-overflow:ellipsis;

}

.center{
  text-align:center;
}

.valor-entrada{

  color:var(--green);

  font-weight:900;

  text-align:right;

}

.valor-saida{

  color:var(--red);

  font-weight:900;

  text-align:right;

}

.valor-saldo{

  font-weight:900;

  text-align:right;

  color:#0f172a;

}

/* =====================================================
SCROLL
===================================================== */

.container::-webkit-scrollbar{
  width:10px;
  height:10px;
}

.container::-webkit-scrollbar-thumb{
  background:#cbd5e1;
  border-radius:20px;
}

/* =====================================================
LOADING
===================================================== */

.loading{

  padding:30px;

  text-align:center;

  font-weight:800;

  color:var(--muted);

}

/* =====================================================
RESPONSIVO
===================================================== */

@media(max-width:1500px){

  .form-area{

    grid-template-columns:
    1fr 1fr;

  }

}

</style>
</head>

<body>

<!-- =====================================================
TOPO
===================================================== -->

<div class="topo">

  <!-- =====================================================
  TITULO
  ===================================================== -->

  <div class="titulo">
    REGISTRO DE DINHEIRO • MERCATTO DELÍCIA
  </div>

  <!-- =====================================================
  RESUMO
  ===================================================== -->

  <div class="resumo">

    <div class="resumo-box resumo-empresa">

      <div class="resumo-label">
        Empresa
      </div>

      <div class="resumo-valor">
        Mercatto Delícia
      </div>

    </div>

    <div class="resumo-box">

      <div class="resumo-label">
        Saldo Implantação
      </div>

      <div
      class="resumo-valor"
      id="saldoImplantacao">

        R$ 0,00

      </div>

    </div>

    <div class="resumo-box">

      <div class="resumo-label">
        Total Entradas
      </div>

      <div
      class="resumo-valor"
      id="totalEntradas">

        R$ 0,00

      </div>

    </div>

    <div class="resumo-box">

      <div class="resumo-label">
        Total Saídas
      </div>

      <div
      class="resumo-valor"
      id="totalSaidas">

        R$ 0,00

      </div>

    </div>

    <div class="resumo-box resumo-saldo">

      <div class="resumo-label">
        SALDO NA LOJA
      </div>

      <div
      class="resumo-valor"
      id="saldoLoja">

        R$ 0,00

      </div>

    </div>

  </div>

  <!-- =====================================================
  FORM
  ===================================================== -->

  <div class="form-area">

    <input
    type="date"
    id="data_movimento">

    <select id="tipo">

      <option value="entrada">
        ENTRADA
      </option>

      <option value="saida">
        SAÍDA
      </option>

    </select>

    <input
    type="text"
    id="historico"
    placeholder="Histórico da movimentação">

    <input
    type="text"
    id="complemento"
    placeholder="Complemento">

    <input
    type="text"
    id="valor"
    placeholder="R$ 0,00"
    inputmode="numeric"
    oninput="mascaraDinheiro(this)">

    <input
    type="text"
    id="empresa"
    value="Mercatto Delícia"
    readonly
    class="empresa-fixa">

    <button
    class="btn-salvar"
    onclick="salvarRegistro()">

      SALVAR

    </button>

  </div>

</div>

<!-- =====================================================
TABELA
===================================================== -->

<div
class="container"
id="scrollContainer">

<table>

<thead>

<tr>

  <th style="width:140px">
    Data Registro
  </th>

  <th style="width:140px">
    Data Movimento
  </th>

  <th style="min-width:320px">
    Histórico
  </th>

  <th style="min-width:320px">
    Complemento
  </th>

  <th style="width:180px">
    Entrada
  </th>

  <th style="width:180px">
    Saída
  </th>

  <th style="width:200px">
    Saldo Movimento
  </th>

</tr>

</thead>

<tbody id="tbody"></tbody>

</table>

<div class="loading" id="loading">
  Carregando registros...
</div>

</div>

<script>

/* =====================================================
SUPABASE
===================================================== */

const SUPABASE_URL =
"https://dxkszikemntfusfyrzos.supabase.co";

const SUPABASE_KEY =
"sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed";

const supabaseClient =
window.supabase.createClient(

  SUPABASE_URL,
  SUPABASE_KEY

);

/* =====================================================
CONFIG
===================================================== */

const PAGE_SIZE = 50;

let pagina = 0;

let carregando = false;

let acabou = false;

/* =====================================================
ELEMENTOS
===================================================== */

const tbody =
document.getElementById('tbody');

const loading =
document.getElementById('loading');

const scrollContainer =
document.getElementById('scrollContainer');

/* =====================================================
INIT CAMPOS
===================================================== */

document.getElementById(
'data_movimento'
).value =
new Date()
.toISOString()
.split('T')[0];

document.getElementById(
'valor'
).value = 'R$ 0,00';

/* =====================================================
FORMATA MOEDA
===================================================== */

function moeda(valor){

  return Number(valor || 0)

  .toLocaleString(

    'pt-BR',

    {

      style:'currency',

      currency:'BRL'

    }

  );

}

/* =====================================================
FORMATA DATA
===================================================== */

function formatarData(data){

  if(!data) return '-';

  return new Date(data)

  .toLocaleDateString(

    'pt-BR',

    {

      timeZone:'America/Bahia'

    }

  );

}

/* =====================================================
MÁSCARA DINHEIRO
===================================================== */

function mascaraDinheiro(campo){

  let valor =
  campo.value
  .replace(/\D/g,'');

  valor =
  (Number(valor)/100)
  .toFixed(2) + '';

  valor =
  valor.replace('.',',');

  valor =
  valor.replace(
    /(\d)(?=(\d{3})+(?!\d))/g,
    '$1.'
  );

  campo.value =
  'R$ ' + valor;

}

/* =====================================================
CONVERTE DINHEIRO
===================================================== */

function converterValor(valor){

  return Number(

    valor

    .replace('R$','')

    .replace(/\./g,'')

    .replace(',','.')

    .trim()

  ) || 0;

}

/* =====================================================
CARREGAR RESUMO
===================================================== */

async function carregarResumo(){

  const { data, error } =

  await supabaseClient

  .from('livros_caixa')

  .select('tipo,valor');

  if(error){

    console.error(error);

    return;

  }

  let entradas = 0;

  let saidas = 0;

  data.forEach(item=>{

    if(item.tipo === 'entrada'){

      entradas +=
      Number(item.valor || 0);

    }else{

      saidas +=
      Number(item.valor || 0);

    }

  });

  const saldo =
  entradas - saidas;

  document.getElementById(
    'saldoImplantacao'
  ).innerHTML =
  moeda(1038.06);

  document.getElementById(
    'totalEntradas'
  ).innerHTML =
  moeda(entradas);

  document.getElementById(
    'totalSaidas'
  ).innerHTML =
  moeda(saidas);

  document.getElementById(
    'saldoLoja'
  ).innerHTML =
  moeda(saldo);

}

/* =====================================================
CARREGAR REGISTROS
===================================================== */

async function carregarRegistros(){

  if(carregando || acabou)
  return;

  carregando = true;

  loading.style.display =
  'block';

  const inicio =
  pagina * PAGE_SIZE;

  const fim =
  inicio + PAGE_SIZE - 1;

  const { data, error } =

  await supabaseClient

  .from('livros_caixa')

  .select('*')

  .order('data_movimento',{

    ascending:false

  })

  .order('created_at',{

    ascending:false

  })

  .range(inicio,fim);

  if(error){

    console.error(error);

    carregando = false;

    return;

  }

  if(!data.length){

    acabou = true;

    loading.innerHTML =
    'Fim dos registros';

    return;

  }

  renderizar(data);

  pagina++;

  carregando = false;

  loading.style.display =
  'none';

}

/* =====================================================
RENDER
===================================================== */

function renderizar(lista){

  let ultimoDia = '';

  lista.forEach(item=>{

    const diaAtual =
    item.data_movimento;

    /* ============================================
    NOVO BLOCO DIA
    ============================================ */

    if(diaAtual !== ultimoDia){

      const trDia =
      document.createElement('tr');

      trDia.className =
      'linha-dia';

      trDia.innerHTML = `

        <td colspan="5"
        class="titulo-dia">

          SALDO DO DIA •
          ${formatarData(diaAtual)}

        </td>

        <td colspan="2"
        class="saldo-dia">

          ${moeda(item.saldo)}

        </td>

      `;

      tbody.appendChild(trDia);

      ultimoDia = diaAtual;

    }

    /* ============================================
    LINHA NORMAL
    ============================================ */

    const tr =
    document.createElement('tr');

    tr.className =
    'linha-normal';

    tr.innerHTML = `

      <td class="center">
        ${formatarData(
          item.data_registro
        )}
      </td>

      <td class="center">
        ${formatarData(
          item.data_movimento
        )}
      </td>

      <td>
        ${item.historico || ''}
      </td>

      <td>
        ${item.complemento || ''}
      </td>

      <td class="${
        item.tipo === 'entrada'
        ? 'valor-entrada'
        : ''
      }">

        ${
          item.tipo === 'entrada'
          ? moeda(item.valor)
          : '-'
        }

      </td>

      <td class="${
        item.tipo === 'saida'
        ? 'valor-saida'
        : ''
      }">

        ${
          item.tipo === 'saida'
          ? moeda(item.valor)
          : '-'
        }

      </td>

      <td class="valor-saldo">

        ${moeda(item.saldo)}

      </td>

    `;

    tbody.appendChild(tr);

  });

}

/* =====================================================
SALVAR
===================================================== */

async function salvarRegistro(){

  const data_movimento =

  document.getElementById(
    'data_movimento'
  ).value;

  const historico =

  document.getElementById(
    'historico'
  ).value.trim();

  const complemento =

  document.getElementById(
    'complemento'
  ).value.trim();

  const tipo =

  document.getElementById(
    'tipo'
  ).value;

  const valor =
  converterValor(

    document
    .getElementById('valor')
    .value

  );

  const empresa =

  document.getElementById(
    'empresa'
  ).value;

  /* =====================================================
  VALIDAR
  ===================================================== */

  if(!historico){

    alert(
      'Informe o histórico'
    );

    return;

  }

  if(valor <= 0){

    alert(
      'Informe um valor válido'
    );

    return;

  }

  /* =====================================================
  ÚLTIMO SALDO
  ===================================================== */

  const { data: ultimo } =

  await supabaseClient

  .from('livros_caixa')

  .select('saldo')

  .order('created_at',{

    ascending:false

  })

  .limit(1)

  .maybeSingle();

  const saldoAnterior =
  Number(ultimo?.saldo || 0);

  /* =====================================================
  CALCULO
  ===================================================== */

  let novoSaldo = 0;

  if(tipo === 'entrada'){

    novoSaldo =
    saldoAnterior + valor;

  }else{

    novoSaldo =
    saldoAnterior - valor;

  }

  /* =====================================================
  INSERT
  ===================================================== */

  const { error } =

  await supabaseClient

  .from('livros_caixa')

  .insert({

    empresa,
    historico,
    complemento,
    tipo,
    valor,

    saldo:novoSaldo,

    data_movimento,

    data_registro:
    new Date(),

    created_at:
    new Date()

  });

  if(error){

    console.error(error);

    alert(
      'Erro ao salvar'
    );

    return;

  }

  /* =====================================================
  LIMPAR
  ===================================================== */

  document.getElementById(
    'historico'
  ).value = '';

  document.getElementById(
    'complemento'
  ).value = '';

  document.getElementById(
    'valor'
  ).value = 'R$ 0,00';

  /* =====================================================
  RELOAD
  ===================================================== */

  tbody.innerHTML = '';

  pagina = 0;

  acabou = false;

  await carregarResumo();

  await carregarRegistros();

}

/* =====================================================
SCROLL INFINITO
===================================================== */

scrollContainer
.addEventListener(

  'scroll',

  async function(){

    const el = this;

    if(

      el.scrollTop +
      el.clientHeight >=

      el.scrollHeight - 300

    ){

      await carregarRegistros();

    }

  }

);

/* =====================================================
REALTIME
===================================================== */

supabaseClient

.channel(
  'livro_caixa_realtime'
)

.on(

  'postgres_changes',

  {

    event:'INSERT',

    schema:'public',

    table:'livros_caixa'

  },

  async ()=>{

    tbody.innerHTML = '';

    pagina = 0;

    acabou = false;

    await carregarResumo();

    await carregarRegistros();

  }

)

.subscribe();

/* =====================================================
INIT
===================================================== */

(async()=>{

  await carregarResumo();

  await carregarRegistros();

})();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"/>

<title>Contagem de Estoque</title>

<meta name="theme-color" content="#ff6a00">
<link rel="manifest" href="manifest.json">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

:root{
  --primary:#ff6a00;
  --primary2:#fb923c;
  --bg:#f3f4f6;
  --card:#ffffff;
  --text:#111827;
  --muted:#6b7280;
  --border:#e5e7eb;
  --danger:#dc2626;
  --success:#16a34a;
  --shadow:0 10px 30px rgba(0,0,0,.08);
  --radius:18px;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Inter,sans-serif;
  -webkit-tap-highlight-color:transparent;
}

body{
  background:var(--bg);
  color:var(--text);
}

.hidden{
  display:none!important;
}

/* LOGIN */

.login{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
  background:
  radial-gradient(circle at top,#fb923c 0%,#ff6a00 35%,#111827 100%);
}

.login-card{
  width:100%;
  max-width:400px;
  background:rgba(255,255,255,.96);
  backdrop-filter:blur(14px);
  border-radius:30px;
  padding:28px;
  box-shadow:0 25px 60px rgba(0,0,0,.25);
}

.logo{
  width:84px;
  height:84px;
  border-radius:28px;
  background:linear-gradient(135deg,#ff6a00,#fb923c);
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  font-size:42px;
  margin:auto;
  margin-bottom:20px;
  box-shadow:0 15px 30px rgba(255,106,0,.35);
}

h1{
  text-align:center;
  font-size:28px;
  font-weight:900;
}

.sub{
  text-align:center;
  margin-top:8px;
  color:var(--muted);
  font-size:14px;
  margin-bottom:24px;
}

label{
  display:block;
  margin-bottom:8px;
  margin-top:16px;
  font-size:13px;
  font-weight:800;
}

.input{
  width:100%;
  height:54px;
  border-radius:16px;
  border:1px solid var(--border);
  padding:0 16px;
  font-size:16px;
  outline:none;
}

.input:focus{
  border-color:var(--primary);
  box-shadow:0 0 0 4px rgba(255,106,0,.15);
}

.btn{
  width:100%;
  height:56px;
  border:none;
  border-radius:18px;
  background:linear-gradient(135deg,#ff6a00,#fb923c);
  color:#fff;
  font-weight:900;
  font-size:16px;
  cursor:pointer;
  margin-top:22px;
  box-shadow:0 15px 30px rgba(255,106,0,.25);
}

/* APP */

.app{
  min-height:100vh;
}

.topbar{
  position:sticky;
  top:0;
  z-index:20;
  background:rgba(255,255,255,.95);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border);
  padding:14px 16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.top-info{
  display:flex;
  flex-direction:column;
}

.top-name{
  font-weight:900;
  font-size:16px;
}

.top-company{
  color:var(--muted);
  font-size:12px;
  margin-top:2px;
}

.logout{
  width:46px;
  height:46px;
  border-radius:16px;
  border:none;
  background:#fee2e2;
  color:#dc2626;
  font-size:20px;
  cursor:pointer;
}

.content{
  padding:16px;
  padding-bottom:110px;
}

.search{
  position:relative;
  margin-bottom:16px;
}

.search i{
  position:absolute;
  left:15px;
  top:50%;
  transform:translateY(-50%);
  color:var(--muted);
}

.search input{
  width:100%;
  height:52px;
  border-radius:16px;
  border:1px solid var(--border);
  padding-left:45px;
  padding-right:16px;
  font-size:15px;
  outline:none;
}

.stats{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-bottom:18px;
}

.stat{
  background:#fff;
  border-radius:18px;
  padding:14px;
  border:1px solid var(--border);
  box-shadow:var(--shadow);
}

.stat h3{
  font-size:22px;
  font-weight:900;
}

.stat p{
  margin-top:4px;
  color:var(--muted);
  font-size:11px;
  font-weight:700;
}

.lista{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.card{
  background:#fff;
  border-radius:22px;
  border:1px solid var(--border);
  padding:16px;
  box-shadow:var(--shadow);
}

.card-top{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:10px;
  margin-bottom:14px;
}

.produto{
  font-size:16px;
  font-weight:900;
  text-transform:uppercase;
}

.empresa{
  margin-top:4px;
  font-size:11px;
  color:var(--muted);
  font-weight:700;
}

.unidade{
  background:#fff7ed;
  color:#ff6a00;
  padding:8px 12px;
  border-radius:999px;
  font-size:11px;
  font-weight:900;
}

.contador{
  display:grid;
  grid-template-columns:52px 1fr 52px;
  gap:8px;
  margin-top:12px;
}

.contador button{
  border:none;
  border-radius:16px;
  background:#111827;
  color:#fff;
  font-size:24px;
  font-weight:900;
  cursor:pointer;
}

.contador input{
  width:100%;
  height:54px;
  border-radius:16px;
  border:1px solid var(--border);
  text-align:center;
  font-size:22px;
  font-weight:900;
  outline:none;
}

.info{
  margin-top:12px;
  display:flex;
  justify-content:space-between;
  gap:8px;
  font-size:11px;
  color:var(--muted);
  font-weight:700;
}

.bottom{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  background:#fff;
  border-top:1px solid var(--border);
  padding:12px 16px calc(12px + env(safe-area-inset-bottom));
}

.save{
  width:100%;
  height:58px;
  border:none;
  border-radius:20px;
  background:linear-gradient(135deg,#ff6a00,#fb923c);
  color:#fff;
  font-size:16px;
  font-weight:900;
  cursor:pointer;
  box-shadow:0 20px 40px rgba(255,106,0,.3);
}

.loader{
  position:fixed;
  inset:0;
  background:rgba(255,255,255,.7);
  backdrop-filter:blur(5px);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.spinner{
  width:52px;
  height:52px;
  border-radius:50%;
  border:5px solid #fed7aa;
  border-top-color:#ff6a00;
  animation:spin .8s linear infinite;
}

@keyframes spin{
  to{
    transform:rotate(360deg);
  }
}

.toast{
  position:fixed;
  left:50%;
  transform:translateX(-50%);
  bottom:90px;
  background:#111827;
  color:#fff;
  padding:14px 18px;
  border-radius:16px;
  font-size:13px;
  font-weight:800;
  z-index:999;
  display:none;
}

</style>
</head>

<body>

<!-- LOGIN -->

<section class="login" id="loginTela">

  <div class="login-card">

    <div class="logo">
      <i class="ri-box-3-fill"></i>
    </div>

    <h1>Contagem de Estoque</h1>

    <div class="sub">
      Acesse utilizando seu usuário e senha
    </div>

    <label>Usuário</label>
    <input id="usuario" class="input" placeholder="Digite seu usuário">

    <label>Senha</label>
    <input id="senha" type="password" class="input" placeholder="Digite sua senha">

    <button class="btn" onclick="login()">
      ENTRAR
    </button>

  </div>

</section>

<!-- APP -->

<section class="app hidden" id="appTela">

  <header class="topbar">

    <div class="top-info">
      <div class="top-name" id="nomeUsuario">USUÁRIO</div>
      <div class="top-company" id="empresaUsuario">EMPRESA</div>
    </div>

    <button class="logout" onclick="sair()">
      <i class="ri-logout-box-r-line"></i>
    </button>

  </header>

  <main class="content">

    <div class="search">
      <i class="ri-search-line"></i>
      <input id="busca" placeholder="Buscar produto..." oninput="renderizar()">
    </div>

    <div class="stats">

      <div class="stat">
        <h3 id="totalProdutos">0</h3>
        <p>PRODUTOS</p>
      </div>

      <div class="stat">
        <h3 id="contados">0</h3>
        <p>CONTADOS</p>
      </div>

      <div class="stat">
        <h3 id="zerados">0</h3>
        <p>ZERADOS</p>
      </div>

    </div>

    <div class="lista" id="lista"></div>

  </main>

  <div class="bottom">

    <button class="save" onclick="salvarTudo()">
      <i class="ri-save-3-line"></i>
      SALVAR CONTAGEM
    </button>

  </div>

</section>

<div class="loader" id="loader">
  <div class="spinner"></div>
</div>

<div class="toast" id="toast"></div>

<script>

const SUPABASE_URL = "https://dxkszikemntfusfyrzos.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed";

const db = window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_ANON_KEY
);

const TABELA_USUARIOS = "usuarios_do_sistema";
const TABELA_ESTOQUE = "mercatto_estoque";

let usuarioLogado = null;
let itens = [];

/* INIT */

window.addEventListener("load", ()=>{

  const salvo = localStorage.getItem("usuario_estoque");

  if(salvo){
    usuarioLogado = JSON.parse(salvo);
    abrirApp();
  }

});

/* LOADING */

function loading(status){
  const loader = document.getElementById("loader");

  if(!loader) return;

  if(status){
    loader.style.display = "flex";
    loader.style.pointerEvents = "all";
  }else{
    loader.style.display = "none";
    loader.style.pointerEvents = "none";
  }
}

/* TOAST */

function aviso(msg){

  const toast = document.getElementById("toast");

  toast.innerText = msg;
  toast.style.display = "block";

  setTimeout(()=>{
    toast.style.display = "none";
  },2500);

}

/* LOGIN */

async function login(){

  try{

    const usuario = document
    .getElementById("usuario")
    .value
    .trim()
    .toUpperCase();

    const senha = document
    .getElementById("senha")
    .value
    .trim();

    if(!usuario || !senha){
      aviso("Informe usuário e senha");
      return;
    }

    loading(true);

    const { data, error } = await db
    .from(TABELA_USUARIOS)
    .select("*")
    .eq("usuario", usuario)
    .eq("senha", senha)
    .eq("ativo", true)
    .limit(1)
    .maybeSingle();

    if(error){
      console.error(error);
      aviso("Erro ao acessar");
      loading(false);
      return;
    }

    if(!data){
      aviso("Usuário inválido");
      loading(false);
      return;
    }

    usuarioLogado = data;

    localStorage.setItem(
      "usuario_estoque",
      JSON.stringify(data)
    );

    await db
    .from(TABELA_USUARIOS)
    .update({
      ultimo_login:new Date().toISOString()
    })
    .eq("id", data.id);

    loading(false);

    abrirApp();

  }catch(err){

    console.error(err);
    aviso("Erro inesperado");
    loading(false);

  }

}

/* ABRIR APP */

async function abrirApp(){

  document
  .getElementById("loginTela")
  .classList
  .add("hidden");

  document
  .getElementById("appTela")
  .classList
  .remove("hidden");

  document.getElementById("nomeUsuario").innerText =
  usuarioLogado.nome || usuarioLogado.usuario;

  document.getElementById("empresaUsuario").innerText =
  usuarioLogado.empresa || "";

  carregarEstoque();

}

/* ESTOQUE */

async function carregarEstoque(){

  try{

    const { data, error } = await db
    .from(TABELA_ESTOQUE)
    .select("*")
    .eq("empresa", usuarioLogado.empresa)
    .eq("ativo", true)
    .order("produto",{ascending:true});

    if(error){
      console.error(error);
      aviso("Erro ao carregar estoque");
      return;
    }

    itens = (data || []).map(item=>({
      ...item,
      quantidade_temp:Number(item.quantidade || item.saldo || 0)
    }));

    renderizar();

  }catch(err){

    console.error("ERRO AO CARREGAR ESTOQUE:", err);
    aviso("Erro ao carregar estoque");

  }

}
/* RENDER */

function renderizar(){

  const busca = document
  .getElementById("busca")
  .value
  .trim()
  .toUpperCase();

  const filtrados = itens.filter(item=>
    String(item.produto || "")
    .toUpperCase()
    .includes(busca)
  );

  document.getElementById("totalProdutos").innerText =
  itens.length;

  document.getElementById("contados").innerText =
  itens.filter(i=>Number(i.quantidade_temp)>0).length;

  document.getElementById("zerados").innerText =
  itens.filter(i=>Number(i.quantidade_temp)===0).length;

  const lista = document.getElementById("lista");

  if(!filtrados.length){

    lista.innerHTML = `
      <div class="card">
        <div class="produto">
          Nenhum produto encontrado
        </div>
      </div>
    `;

    return;

  }

  lista.innerHTML = filtrados.map(item=>`

    <div class="card">

      <div class="card-top">

        <div>

          <div class="produto">
            ${item.produto || "-"}
          </div>

          <div class="empresa">
            ${item.empresa || ""}
          </div>

        </div>

        <div class="unidade">
          ${item.unidade || item.und_compra || "UN"}
        </div>

      </div>

      <div class="contador">

        <button onclick="alterarQtd('${item.id}',-1)">
          -
        </button>

        <input
          type="number"
          min="0"
          value="${Number(item.quantidade_temp || 0)}"
          onchange="digitarQtd('${item.id}',this.value)"
        >

        <button onclick="alterarQtd('${item.id}',1)">
          +
        </button>

      </div>

      <div class="info">

        <span>
          Mín: ${item.estoque_minimo || 0}
        </span>

        <span>
          Ideal: ${item.estoque_ideal || 0}
        </span>

        <span>
          ${item.unidade || ""}
        </span>

      </div>

    </div>

  `).join("");

}

/* ALTERAR */

function alterarQtd(id,delta){

  const item = itens.find(i=>i.id===id);

  if(!item) return;

  let atual = Number(item.quantidade_temp || 0);

  atual += delta;

  if(atual < 0){
    atual = 0;
  }

  item.quantidade_temp = atual;

  renderizar();

}

/* DIGITAR */

function digitarQtd(id,valor){

  const item = itens.find(i=>i.id===id);

  if(!item) return;

  let qtd = Number(valor || 0);

  if(qtd < 0){
    qtd = 0;
  }

  item.quantidade_temp = qtd;

  renderizar();

}

/* SALVAR */

async function salvarTudo(){

  if(!itens.length){
    aviso("Nenhum item");
    return;
  }

  loading(true);

  try{

    let erros = 0;

    for(const item of itens){

      const qtd = Number(item.quantidade_temp || 0);

      const { error } = await db
      .from(TABELA_ESTOQUE)
      .update({
        quantidade:qtd,
        saldo:qtd,
        atualizado_em:new Date().toISOString()
      })
      .eq("id", item.id);

      if(error){
        erros++;
        console.error("Erro ao salvar:", item.produto, error);
      }

    }

    loading(false);

    if(erros > 0){
      alert(`⚠️ Contagem salva, mas teve ${erros} erro(s).`);
    }else{
      alert("✅ Contagem salva com sucesso!");
    }

    await carregarEstoque();

  }catch(err){

    console.error("ERRO GERAL AO SALVAR:", err);
    loading(false);
    alert("❌ Erro ao salvar contagem.");

  }finally{

    loading(false);

  }

}
/* SAIR */

function sair(){

  localStorage.removeItem(
    "usuario_estoque"
  );

  usuarioLogado = null;
  itens = [];

  document
  .getElementById("appTela")
  .classList
  .add("hidden");

  document
  .getElementById("loginTela")
  .classList
  .remove("hidden");

}

/* GLOBAL */

window.login = login;
window.sair = sair;
window.renderizar = renderizar;
window.alterarQtd = alterarQtd;
window.digitarQtd = digitarQtd;
window.salvarTudo = salvarTudo;

</script>

</body>
</html>

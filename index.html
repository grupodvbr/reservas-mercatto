<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel de Reservas • Mercatto Delícia</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
font-family:Arial;
background:#050b16;
color:white;
margin:0;
}

.wrap{
max-width:1200px;
margin:auto;
padding:20px;
}

input,select,textarea{
width:100%;
padding:10px;
margin-top:4px;
margin-bottom:12px;
background:#081428;
border:1px solid #1c2a44;
color:white;
border-radius:8px;
}

button{
padding:10px 14px;
border:none;
border-radius:8px;
background:#3b82f6;
color:white;
cursor:pointer;
}

.card{
background:#0b1324;
padding:20px;
border-radius:14px;
margin-bottom:20px;
}

.cal-grid{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:8px;
}

.cal-day{
background:#081428;
border:1px solid #1c2a44;
padding:12px;
min-height:100px;
cursor:pointer;
border-radius:10px;
}

.res-item{
border:1px solid #1c2a44;
padding:10px;
margin-bottom:10px;
border-radius:10px;
}

</style>

</head>

<body>

<div class="wrap">

<h1>Reservas • Mercatto Delícia</h1>

<div class="card">

<h3>Nova Reserva</h3>

<input id="nome" placeholder="Nome">
<input id="email" placeholder="Email">
<input id="telefone" placeholder="Telefone">

<input id="pessoas" type="number" placeholder="Pessoas">

<select id="mesa">
<option>Sala Paulo Augusto</option>
<option>Villa Gourmet</option>
<option>Villa Churrascada</option>
</select>

<select id="cardapio">
<option>Buffet Ouro</option>
<option>Buffet Diamante</option>
<option>Buffet Master Gold</option>
</select>

<input id="datahora" type="datetime-local">

<input id="valorEstimado" placeholder="Valor Estimado">
<input id="pagamentoAntecipado" placeholder="Adiantamento">

<select id="banco">
<option>SICREDI</option>
<option>ITAÚ</option>
<option>CRÉDITO POS</option>
<option>DÉBITO POS</option>
</select>

<textarea id="observacoes" placeholder="Observações"></textarea>

<input id="arquivo" type="file">

<button onclick="salvarReserva()">Salvar Reserva</button>

</div>

<div class="card">

<h3 id="mesTitulo"></h3>

<div class="cal-grid" id="calendario"></div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

/* ==============================
SUPABASE
============================== */

const SUPABASE_URL = "COLE_SUA_URL";
const SUPABASE_KEY = "COLE_SUA_ANON_KEY";

const supabase = window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);


/* ==============================
HELPERS
============================== */

const $ = (s,el=document)=>el.querySelector(s);
const $$ = (s,el=document)=>Array.from(el.querySelectorAll(s));

const toast = (msg, ms=3500) => {
  const el = $("#toast");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(()=>el.classList.remove("show"), ms);
};

const formatBRL = (num) =>
Number(num||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});

const parseBRL = v=>{
if(!v) return 0;
return Number(v.toString().replace(/\./g,'').replace(',','.'))||0;
};

const toBase64 = (file) => new Promise((resolve,reject)=>{
const r=new FileReader();
r.onload=()=>resolve(r.result);
r.onerror=reject;
r.readAsDataURL(file);
});


/* ==============================
ESTADO
============================== */

const state = {
mes:(new Date()).getMonth(),
ano:(new Date()).getFullYear(),
reservas:[],
editingId:null
};


/* ==============================
API SUPABASE
============================== */

const api = {

async listar(ano,mes){

const inicio = new Date(ano,mes,1).toISOString();
const fim = new Date(ano,mes+1,1).toISOString();

const {data,error} = await supabase
.from("reservas")
.select("*")
.gte("datahora",inicio)
.lt("datahora",fim)
.order("datahora");

if(error){
console.error(error);
throw error;
}

return data;

},

async cadastrar(payload){

const {error} = await supabase
.from("reservas")
.insert([payload]);

if(error){
return {ok:false,message:error.message};
}

return {ok:true};

},

async atualizar(id,payload){

const {error} = await supabase
.from("reservas")
.update(payload)
.eq("id",id);

if(error){
return {ok:false,message:error.message};
}

return {ok:true};

},

async concluir(id,valorFinalPago){

const {error} = await supabase
.from("reservas")
.update({
status:"Concluída",
valorFinalPago
})
.eq("id",id);

if(error){
return {ok:false,message:error.message};
}

return {ok:true};

},

async excluir(id){

const {error} = await supabase
.from("reservas")
.delete()
.eq("id",id);

if(error){
return {ok:false,message:error.message};
}

return {ok:true};

}

};


/* ==============================
UPLOAD DE ARQUIVO
============================== */

async function uploadArquivo(file){

const nome = crypto.randomUUID()+"_"+file.name;

const {error} = await supabase
.storage
.from("comprovantes")
.upload(nome,file);

if(error) throw error;

const {data} = supabase
.storage
.from("comprovantes")
.getPublicUrl(nome);

return data.publicUrl;

}


/* ==============================
FORMULÁRIO
============================== */

const form = $('#reservaForm');

form.addEventListener('submit', async (e)=>{

e.preventDefault();

const payload = collectPayload();

const file = $('#arquivo').files[0];

if(file){

try{

payload.arquivoURL = await uploadArquivo(file);

}catch(e){
toast("Erro upload arquivo");
}

}

let resp;

if(state.editingId){

resp = await api.atualizar(state.editingId,payload);

}else{

resp = await api.cadastrar(payload);

}

if(resp.ok){

toast("Reserva salva");

await loadMonth(state.ano,state.mes);

form.reset();

state.editingId=null;

}else{

toast(resp.message);

}

});


function collectPayload(){

return {

nome:$('#nome').value,
email:$('#email').value,
telefone:$('#telefone').value,
pessoas:Number($('#pessoas').value),

mesa:$('#mesa').value,
cardapio:$('#cardapio').value,

datahora:new Date($('#datahora').value).toISOString(),

valorEstimado:parseBRL($('#valorEstimado').value),
pagamentoAntecipado:parseBRL($('#pagamentoAntecipado').value),

banco:$('#banco').value,

observacoes:$('#observacoes').value,

status:'Pendente'

};

}


/* ==============================
CARREGAR MÊS
============================== */

async function loadMonth(ano,mes){

try{

const data = await api.listar(ano,mes);

state.reservas=data;

}catch(e){

state.reservas=[];
toast("Erro carregando reservas");

}

buildCalendar();
updateSummary();

}


/* ==============================
CALENDÁRIO
============================== */

const calGrid = $("#calGrid");

function buildCalendar(){

calGrid.innerHTML="";

const {mes,ano}=state;

const first=new Date(ano,mes,1);

const start=new Date(first);

const startDay=first.getDay();

start.setDate(1-startDay);

for(let i=0;i<42;i++){

const d=new Date(start);

d.setDate(start.getDate()+i);

const cell=document.createElement("div");

cell.className="cal-day";

const items=state.reservas.filter(r=>{
return new Date(r.datahora).toDateString()===d.toDateString();
});

cell.innerHTML=`
<div class="num">${d.getDate()}</div>
<div class="tags">${items.length} reservas</div>
`;

cell.onclick=()=>openDayModal(d,items);

calGrid.appendChild(cell);

}

}


/* ==============================
MODAL DIA
============================== */

function openDayModal(date,items){

const list=$("#modalList");

if(!items.length){

list.innerHTML="<div>Nenhuma reserva</div>";

}else{

list.innerHTML=items.map(r=>`
<div class="res-item">

<b>${r.nome}</b><br>

${new Date(r.datahora).toLocaleString("pt-BR")}<br>

${r.mesa}<br>

${r.pessoas} pessoas<br>

Status: ${r.status}

<br><br>

<button onclick="concluir('${r.id}')">Concluir</button>
<button onclick="excluir('${r.id}')">Excluir</button>

</div>
`).join("");

}

$("#dayModal").classList.add("show");

}


/* ==============================
AÇÕES
============================== */

async function concluir(id){

const valor = prompt("Valor final pago");

if(!valor) return;

const resp = await api.concluir(id,parseBRL(valor));

if(resp.ok){

toast("Reserva concluída");

loadMonth(state.ano,state.mes);

}

}


async function excluir(id){

if(!confirm("Excluir reserva?")) return;

const resp = await api.excluir(id);

if(resp.ok){

toast("Reserva excluída");

loadMonth(state.ano,state.mes);

}

}


/* ==============================
RESUMO FINANCEIRO
============================== */

function updateSummary(){

const {mes,ano}=state;

const lista = state.reservas.filter(r=>{

const d=new Date(r.datahora);

return d.getMonth()===mes && d.getFullYear()===ano;

});

let adiantado=0;
let finalPago=0;

lista.forEach(r=>{
adiantado+=Number(r.pagamentoAntecipado||0);
finalPago+=Number(r.valorFinalPago||0);
});

$("#kpiAntecipado").textContent=formatBRL(adiantado);
$("#kpiFinalPago").textContent=formatBRL(finalPago);
$("#kpiTotalMes").textContent=formatBRL(adiantado+finalPago);

}


/* ==============================
NAVEGAÇÃO
============================== */

$("#prevMonth").onclick=()=>{
const m=new Date(state.ano,state.mes,1);
m.setMonth(m.getMonth()-1);
state.mes=m.getMonth();
state.ano=m.getFullYear();
loadMonth(state.ano,state.mes);
};

$("#nextMonth").onclick=()=>{
const m=new Date(state.ano,state.mes,1);
m.setMonth(m.getMonth()+1);
state.mes=m.getMonth();
state.ano=m.getFullYear();
loadMonth(state.ano,state.mes);
};

$("#todayBtn").onclick=()=>{
const t=new Date();
state.mes=t.getMonth();
state.ano=t.getFullYear();
loadMonth(state.ano,state.mes);
};


/* ==============================
INIT
============================== */

window.addEventListener("DOMContentLoaded",()=>{

loadMonth(state.ano,state.mes);

});

</script>

</body>
</html>

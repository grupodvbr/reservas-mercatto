font-family: 'Inter', sans-serif;

.lista-usuarios div{

 <div class="card-status">📥 RECEBIDA <span id="countRecebida">0</span></div>

<script>
const sb = supabase.createClient(
 "https://dxkszikemntfusfyrzos.supabase.co",
 "sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
);
let userEditando = null;  
let dadosRequisicoes=[];

function formatarDataHora(valor){
  if(!valor) return "";
  try{
    const d=new Date(valor);
    const dd=String(d.getDate()).padStart(2,"0");
    const mm=String(d.getMonth()+1).padStart(2,"0");
    const yyyy=d.getFullYear();
    const hh=String(d.getHours()).padStart(2,"0");
    const min=String(d.getMinutes()).padStart(2,"0");
    return `${dd}/${mm}/${yyyy} ${hh}:${min}`;
  }catch{return valor;}
}

document.getElementById("temaBtn").onclick=()=>{document.body.classList.toggle("dark");
localStorage.setItem("tema",document.body.classList.contains("dark")?"dark":"light");
document.getElementById("temaBtn").textContent=document.body.classList.contains("dark")?"☀️":"🌙";};
if(localStorage.getItem("tema")==="dark"){document.body.classList.add("dark");document.getElementById("temaBtn").textContent="☀️";}

async function carregarRequisicoes(){
 document.getElementById("overlay-carregando").style.display="flex";

const { data, error } = await sb
.from("mercatto_requisicoes")
.select("*")
.order("created_at", { ascending: false })
.limit(100);

if(error){
 console.error(error);
 document.getElementById("overlay-carregando").style.display="none";
 mostrarAlerta("Erro ao carregar");
 return;
}

dadosRequisicoes = (data || []).map(r => ({
index: r.id,
produto_id: r.produto_id,
dataHoraRaw: r.created_at, // ✅ NOVO
dataHora: formatarDataHora(r.created_at),
  // 🔥 AQUI É A MUDANÇA IMPORTANTE
  item: r.produto || "SEM PRODUTO",

  unidade: r.unidade,
 qtd: parseFloat(r.quantidade) || 0,
  setor: r.setor,
  solicitante: r.solicitante,
  observacoes: r.observacoes,
  status: r.status || "PENDENTE"
}));

 preencherFiltros();
 filtrarRequisicoes();

 document.getElementById("overlay-carregando").style.display="none";
}






  
function preencherFiltros(){
 const setores=[...new Set(dadosRequisicoes.map(r=>r.setor).filter(Boolean))];
 document.getElementById("filtroSetor").innerHTML='<option value="">Todos os Setores</option>'+setores.map(s=>`<option>${s}</option>`).join('');
 const solicitantes=[...new Set(dadosRequisicoes.map(r=>r.solicitante).filter(Boolean))];
 document.getElementById("filtroSolicitante").innerHTML='<option value="">Todos os Solicitantes</option>'+solicitantes.map(s=>`<option>${s}</option>`).join('');
 document.getElementById("lista-solicitantes").innerHTML=solicitantes.map(n=>`<div onclick="filtrarPorSolicitante('${n}')">${n}</div>`).join('');
}
function parseData(d){if(!d)return null;const p=d.includes('/')?d.split('/'):[...d.split('-')];if(p.length===3){const[a,b,c]=p.map(x=>parseInt(x));return new Date(d.includes('/')?`${c}-${b}-${a}`:`${a}-${b}-${c}`);}return null;}
function filtrarRequisicoes(){
 const fs=document.getElementById('filtroStatus').value.toUpperCase(),fi=document.getElementById('filtroItem').value.toLowerCase(),
 fsol=document.getElementById('filtroSolicitante').value,fset=document.getElementById('filtroSetor').value,
 din=parseData(document.getElementById('dataInicio').value),df=parseData(document.getElementById('dataFim').value),
 modo=document.getElementById('filtroExibicao').value,validos=['COMPRADO','RECEBIDA','CONFERIDA','ENTREGUE','NEGADO'];







const filtrados = dadosRequisicoes.filter(i => {

  const st = (i.status || '').toUpperCase().trim();
  const pendente = !['COMPRADO','RECEBIDA','CONFERIDA','ENTREGUE','NEGADO'].includes(st);

  if(fs !== 'TODOS'){
    if(fs === 'PENDENTE' && !pendente) return false;
    if(fs !== 'PENDENTE' && st !== fs) return false;
  }

  if(fi && !i.item.toLowerCase().includes(fi)) return false;
  if(fsol && i.solicitante !== fsol) return false;
  if(fset && i.setor !== fset) return false;

  const dataItem = new Date(i.dataHoraRaw);

  if(din && dataItem < din) return false;
  if(df && dataItem > df) return false;

  return true;
});







  
 renderizarTabela(filtrados,modo);atualizarResumo();
}
function renderizarTabela(lista,modo='setor'){
 const t=document.getElementById('tabelaRequisicoes');t.innerHTML='';
 const g={};lista.forEach(i=>{const c=modo==='setor'?i.setor:i.solicitante||'Sem Nome';if(!g[c])g[c]=[];g[c].push(i);});
 for(const k in g){
  t.insertAdjacentHTML('beforeend',`<tr><td colspan="8">${modo==='setor'?'Setor':'Solicitante'}: ${k}</td></tr>`);
  g[k].forEach(i=>{
   const st=(i.status||'').toUpperCase().trim();
   const pendente=!['COMPRADO','RECEBIDA','CONFERIDA','ENTREGUE','NEGADO'].includes(st);
   t.insertAdjacentHTML('beforeend',`
    <tr>
     <td>${i.dataHora}</td><td>${i.item}</td><td>${i.qtd}</td><td>${i.unidade}</td>
     <td>${i.setor}</td><td>${i.solicitante}</td><td>${i.observacoes}</td>



     
     <td><select class="status" onchange="atualizarStatus('${i.index}',this.value)">
  <option value="PENDENTE" ${st==='PENDENTE'||pendente?'selected':''}>PENDENTE</option>
  <option value="CONFERIDA" ${st==='CONFERIDA'?'selected':''}>CONFERIDA</option>
  <option value="ENTREGUE" ${st==='ENTREGUE'?'selected':''}>ENTREGUE</option>
  <option value="NEGADO" ${st==='NEGADO'?'selected':''}>NEGADO</option>
</select>
     
     
     
     </td></tr>`);
  });
 }
}


  
async function atualizarStatus(i, st){

  console.log("🚀 INICIO UPDATE");
  console.log("ID:", i);
  console.log("NOVO STATUS:", st);

  try{

    // 🔥 BUSCA ITEM LOCAL
    const it = dadosRequisicoes.find(r => r.index == i);

    if(!it){
      console.warn("⚠️ ITEM NÃO ENCONTRADO");
      return;
    }

    const statusAnterior = (it.status || '').toUpperCase();
    const novoStatus = (st || '').toUpperCase();



const fluxo = {
  "PENDENTE": ["CONFERIDA"],
  "CONFERIDA": ["ENTREGUE", "NEGADO"],
  "ENTREGUE": [],
  "NEGADO": []
};

// ❌ BLOQUEIO
if(statusAnterior !== novoStatus){

  const permitido = fluxo[statusAnterior] || [];

  if(!permitido.includes(novoStatus)){
    console.warn("⛔ TRANSIÇÃO BLOQUEADA:", statusAnterior, "→", novoStatus);
    mostrarAlerta("Fluxo inválido!");
    return;
  }
}



    
    const quantidade = parseFloat(it.qtd) || 0;
    const produto_id = it.produto_id;

    // 🚨 TRAVA ANTI DUPLICAÇÃO
    if(statusAnterior === novoStatus){
      console.log("⚠️ STATUS IGUAL - IGNORADO");
      return;
    }

    console.log("🔁 DE:", statusAnterior, "➡️ PARA:", novoStatus);

    // ===============================
// 🔥 REGRAS DE ESTOQUE (CORRIGIDO)
// ===============================

// 📉 SAÍDA → só executa UMA VEZ
if(
  ["PENDENTE","RECEBIDA","CONFERIDA","COMPRADO"].includes(statusAnterior)
  && novoStatus === "ENTREGUE"
){
  console.log("📉 BAIXA CONTROLADA");

  await sb.rpc("baixar_estoque", {
    p_produto: produto_id,
    p_qtd: quantidade
  });
}

// 📈 ENTRADA → só quando compra vira recebida
if(statusAnterior === "COMPRADO" && novoStatus === "RECEBIDA"){

  console.log("📈 ENTRADA CONTROLADA");

  await sb.rpc("entrada_estoque", {
    p_produto: produto_id,
    p_qtd: quantidade
  });
}

// ♻️ ESTORNO → só quando volta de ENTREGUE
if(statusAnterior === "ENTREGUE" && novoStatus !== "ENTREGUE"){

  console.log("♻️ ESTORNO CONTROLADO");

  // 🔴 EXECUTA RPC E VERIFICA ERRO
  const { error: erroEstorno } = await sb.rpc("entrada_estoque", {
    p_produto: produto_id,
    p_qtd: quantidade
  });

  if(erroEstorno){
    console.error("❌ ERRO NO ESTORNO:", erroEstorno);
    mostrarAlerta("Erro ao estornar estoque");
    return; // 🔥 PARA TUDO
  }

  console.log("✅ ESTOQUE DEVOLVIDO");

  // 🔥 REGISTRO
  const { error: erroMov } = await sb
    .from("movimentacoes_estoque")
    .insert([{
      produto_id: produto_id,
      tipo: "ESTORNO",
      quantidade: quantidade,
      origem: "REVERSAO"
    }]);

  if(erroMov){
    console.error("❌ ERRO AO REGISTRAR MOV:", erroMov);
  }
}
    // ===============================
    // 🔥 PREPARA PAYLOAD
    // ===============================

    let payload = { status: novoStatus };

    if(novoStatus === "RECEBIDA"){
      payload.data_recebimento = new Date().toISOString();
    }

    if(novoStatus === "CONFERIDA"){
      payload.data_conferencia = new Date().toISOString();
    }

    // ===============================
    // 🔥 AGORA ATUALIZA NO BANCO
    // ===============================

    const { error } = await sb
      .from("mercatto_requisicoes")
      .update(payload)
      .eq("id", i);

    if(error){
      console.error("❌ ERRO AO SALVAR:", error);
      mostrarAlerta("Erro ao atualizar status");
      return;
    }

    // ===============================
    // 🔥 ATUALIZA LOCAL (SÓ AGORA)
    // ===============================

    it.status = novoStatus;

    // ===============================
    // 🔄 REFRESH
    // ===============================

    filtrarRequisicoes();

    mostrarAlerta("Status atualizado com sucesso!");

    console.log("✅ FINALIZADO");

  }catch(e){
    console.error("🔥 ERRO GERAL:", e);
    mostrarAlerta("Erro inesperado");
  }

  console.log("🏁 FIM UPDATE");

async function liquidarMassa(st){

 const filtrados = getFiltrados().filter(r => {
   const status = (r.status || '').toUpperCase();
   return status !== "ENTREGUE";
 });

   // 🔥 PASSA PELO MESMO FLUXO (IMPORTANTE)

 }

async function carregarUsuarios(){

  const html = data.map(u => `

async function salvarUsuario(){
 const nome = document.getElementById("nomeUser").value.toUpperCase().trim();
 const setor = document.getElementById("setorUser").value.trim();
 const senha = document.getElementById("senhaUser").value.trim();

// limpa erros anteriores
["nomeUser","setorUser","senhaUser"].forEach(id=>{
  document.getElementById(id).classList.remove("input-erro");
});

if(!nome){
  document.getElementById("nomeUser").classList.add("input-erro");
  document.getElementById("nomeUser").focus();
  mostrarAlerta("Informe o nome");
  return;
}

if(!setor){
  document.getElementById("setorUser").classList.add("input-erro");
  document.getElementById("setorUser").focus();
  mostrarAlerta("Informe o setor");
  return;
}

if(!senha){
  document.getElementById("senhaUser").classList.add("input-erro");
  document.getElementById("senhaUser").focus();
  mostrarAlerta("Informe a senha");
  return;
}

 try{

  // 🔥 UPDATE
  if(userEditando !== null){

    const { error } = await sb
      .from("usuarios")
      .update({
        nome,
        setor,
        senha
      })
      .eq("id", userEditando);

    if(error) throw error;

    mostrarAlerta("Usuário atualizado!");

  } else {

    // 🔥 INSERT
    const { error } = await sb
      .from("usuarios")
      .insert([{ nome, setor, senha }]);

    if(error) throw error;

    mostrarAlerta("Usuário criado!");
  }

  // 🔄 RESET
  document.getElementById("nomeUser").value="";
  document.getElementById("setorUser").value="";
  document.getElementById("senhaUser").value="";

  userEditando = null;

  document.querySelector(".btn-save").textContent = "Salvar Usuário";

  carregarUsuarios();

 }catch(e){
  console.error(e);
  mostrarAlerta("Erro ao salvar");
 }
}

function editarUsuario(id,nome,setor){
 document.getElementById("nomeUser").value = nome;
 document.getElementById("setorUser").value = setor;
 document.getElementById("senhaUser").value = ""; // 🔥 força digitar nova senha

 userEditando = id;

 document.querySelector(".btn-save").textContent = "Atualizar Usuário";

 mostrarAlerta("Modo edição ativado");
}

async function excluirUsuario(id){
 if(!confirm("Excluir usuário?")) return;

 await sb.from("usuarios").delete().eq("id", id);
 carregarUsuarios();
}

function renderEstoque(lista){

  const html = lista.map(p=>{

    let cor = "#22c55e"; // verde

    if(p.atual <= p.minimo) cor = "#ef4444"; // vermelho
    else if(p.atual >= p.maximo) cor = "#f59e0b"; // amarelo

    return `
      <div onclick="verMovimentacao('${p.id}','${p.nome}')" style="
        display:flex;
        justify-content:space-between;
        align-items:center;
        padding:14px;
        border-radius:14px;
        margin-bottom:10px;
        background:linear-gradient(135deg,#0f172a,#020617);
        color:#fff;
        cursor:pointer;
        border-left:6px solid ${cor};
      ">

        <!-- NOME -->
        <div style="font-size:14px;font-weight:600;">
          ${p.nome}
        </div>

        <!-- NUMEROS -->
        <div style="
          display:flex;
          gap:18px;
          font-size:11px;
          text-align:center;
        ">

          <div>
            <div style="opacity:.6">Atual</div>
            <div style="font-size:14px;font-weight:700">${p.atual}</div>
          </div>

          <div>
            <div style="opacity:.6">Min</div>
            <div>${p.minimo}</div>
          </div>

          <div>
            <div style="opacity:.6">Max</div>
            <div>${p.maximo}</div>
          </div>

        </div>

      </div>
    `;

  }).join("");

  document.getElementById("listaEstoque").innerHTML = html;
}

function filtrarEstoque(){
  const v = document.getElementById("buscaEstoque").value.toLowerCase();
  const filtrado = estoqueGlobal.filter(p=>p.nome.toLowerCase().includes(v));
  renderEstoque(filtrado);
}

async function verMovimentacao(id,nome){

  const seteDias = new Date();
  seteDias.setDate(seteDias.getDate()-7);

  const { data, error } = await sb
    .from("mercatto_requisicoes")
    .select("*")
    .eq("produto_id", id)
    .gte("created_at", seteDias.toISOString())
    .order("created_at",{ascending:false});

  if(error){
    console.error(error);
    return;
  }

  const html = `
    <h3 style="margin-bottom:10px">${nome}</h3>
    ${(data || []).map(m=>`
      <div style="
        padding:8px;
        margin-bottom:6px;
        border-radius:8px;
        background:#111;
        color:#fff;
      ">
        ${m.quantidade} ${m.unidade || ''} - ${m.status}<br>
        <small>${new Date(m.created_at).toLocaleString()}</small>
      </div>
    `).join("") || "Sem movimentação"}
  `;

  document.getElementById("movimentacaoBox").innerHTML = html;
}


function getFiltrados(){

  const fs = document.getElementById('filtroStatus').value.toUpperCase();
  const fi = document.getElementById('filtroItem').value.toLowerCase();
  const fsol = document.getElementById('filtroSolicitante').value;
  const fset = document.getElementById('filtroSetor').value;
  const din = parseData(document.getElementById('dataInicio').value);
  const df = parseData(document.getElementById('dataFim').value);

  return dadosRequisicoes.filter(i => {

    const st = (i.status || '').toUpperCase().trim();
    const pendente = !['COMPRADO','RECEBIDA','CONFERIDA','ENTREGUE','NEGADO'].includes(st);

    if(fs !== 'TODOS'){
      if(fs === 'PENDENTE' && !pendente) return false;
      if(fs !== 'PENDENTE' && st !== fs) return false;
    }

    if(fi && !i.item.toLowerCase().includes(fi)) return false;
    if(fsol && i.solicitante !== fsol) return false;
    if(fset && i.setor !== fset) return false;

    const dataItem = new Date(i.dataHoraRaw);

    if(din && dataItem < din) return false;
    if(df && dataItem > df) return false;

    return true;
  });
}

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cotação</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  font-family:Inter;
  background:#f5f7fb;
  padding:20px;
}

.container{
  max-width:900px;
  margin:auto;
}

.box{
  background:#fff;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
  box-shadow:0 5px 20px rgba(0,0,0,.08);
}

input{
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  padding:10px 15px;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:#fff;
  cursor:pointer;
}

.card{
  background:#fff;
  padding:20px;
  border-radius:12px;
  box-shadow:0 5px 20px rgba(0,0,0,.08);
  margin-top:20px;
}

.card h3{
  margin:0 0 10px;
}

.item{
  display:flex;
  gap:10px;
  margin-bottom:10px;
}
</style>
</head>

<body>

<div class="container">

<h2>💰 Nova Cotação</h2>

<div class="box">

<input id="nome" placeholder="Nome da Cotação">

<br>

<label>Data da Cotação:</label>
<input id="dataCotacao" type="date">

<br>

<label>Data de Hoje:</label>
<input id="dataHoje" disabled>

<br><br>

<button onclick="criar()">Criar Cotação</button>

</div>

<div id="areaItens" class="box" style="display:none">

<h3>Itens</h3>

<div class="item">
<input id="produto" placeholder="Produto">
<input id="qtd" type="number" placeholder="Qtd">
<button onclick="addItem()">Adicionar</button>
</div>

<div id="listaItens"></div>

</div>

<div id="resumo"></div>

</div>

<script>

const sb = supabase.createClient(
 "https://dxkszikemntfusfyrzos.supabase.co",
 "sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
);

let cotacaoId = null;
let itens = [];

// DATA HOJE FORMATADA
function formatarDataHoje(){
  const d = new Date();
  const dia = String(d.getDate()).padStart(2,'0');
  const mes = String(d.getMonth()+1).padStart(2,'0');
  const ano = d.getFullYear();

  return `${dia}/${mes}/${ano}`;
}

dataHoje.value = formatarDataHoje();

// =====================
// CRIAR COTAÇÃO
// =====================
async function criar(){

  const nome = document.getElementById("nome").value;
  const dataCotacao = document.getElementById("dataCotacao").value;

  const { data, error } = await sb
    .from("cotacoes")
    .insert([{
      nome,
      data_cotacao: dataCotacao,
      itens: []
    }])
    .select();

  if(error){
    alert("Erro ao criar");
    return;
  }

  cotacaoId = data[0].id;

  areaItens.style.display = "block";

  renderResumo(data[0]);
}

// =====================
// ADD ITEM
// =====================
async function addItem(){

  const prod = produto.value;
  const quantidade = qtd.value;

  if(!prod || !quantidade){
    alert("Preencha!");
    return;
  }

  itens.push({
    produto: prod,
    quantidade: Number(quantidade)
  });

  await salvarItens();

  produto.value = "";
  qtd.value = "";

  renderLista();
  carregarResumo();
}

// =====================
// SALVAR JSON
// =====================
async function salvarItens(){

  await sb
    .from("cotacoes")
    .update({
      itens: itens,
      atualizado_em: new Date()
    })
    .eq("id", cotacaoId);
}

// =====================
// RENDER LISTA
// =====================
function renderLista(){

  listaItens.innerHTML = itens.map(i=>`
    <div>- ${i.produto} (${i.quantidade})</div>
  `).join("");
}

// =====================
// RESUMO
// =====================
async function carregarResumo(){

  const { data } = await sb
    .from("cotacoes")
    .select("*")
    .eq("id", cotacaoId)
    .single();

  renderResumo(data);
}

function renderResumo(d){

  resumo.innerHTML = `
    <div class="card">
      <h3>${d.nome}</h3>

      <p><b>📅 Data Cotação:</b> ${d.data_cotacao || "-"}</p>
      <p><b>📆 Criado em:</b> ${formatarDataHoje()}</p>
      <p><b>📦 Itens:</b> ${d.itens?.length || 0}</p>
      <p><b>📊 Status:</b> ${d.status}</p>

      <button onclick="realizar()">Realizar</button>
    </div>
  `;
}

// =====================
// REALIZAR (futuro)
// =====================
function realizar(){
  alert("Próxima etapa: abrir tela de cotação tipo Excel");
}

</script>

</body>
</html>

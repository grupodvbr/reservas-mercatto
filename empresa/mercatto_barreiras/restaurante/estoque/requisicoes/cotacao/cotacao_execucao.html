<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Cotação Estilo Excel</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
  font-family:Inter;
  background:#eef2f7;
  padding:20px;
}

/* TOPO */
.top{
  display:flex;
  gap:10px;
  margin-bottom:15px;
}

select,button{
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

/* TABELA */
table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
  box-shadow:0 10px 30px rgba(0,0,0,.08);
}

th{
  background:#111827;
  color:#fff;
  padding:12px;
  font-size:14px;
}

td{
  border:1px solid #eee;
  padding:8px;
  text-align:center;
}

/* INPUTS */
input{
  width:65px;
  padding:4px;
  text-align:center;
}

/* CORES */
.verde{ background:#dcfce7; }
.vermelho{ background:#fee2e2; }
.laranja{ background:#fef3c7; }

/* SUB INFO */
.unit{
  font-size:11px;
  color:#555;
}

</style>
</head>

<body>

<h2 id="titulo"></h2>

<div class="top">
  <select id="fornecedorSelect"></select>
  <button onclick="addFornecedor()">+ Fornecedor</button>
</div>

<table>
<thead id="thead"></thead>
<tbody id="tbody"></tbody>
</table>

<script>

const sb = supabase.createClient(
 "https://dxkszikemntfusfyrzos.supabase.co",
 "sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
);

const id = new URLSearchParams(location.search).get("id");

let cotacao;
let fornecedores = [];
let selecionados = [];

// ================= INIT =================
async function init(){

  const { data } = await sb
    .from("cotacoes")
    .select("*")
    .eq("id", id)
    .single();

  cotacao = data;
  titulo.innerText = cotacao.nome;

  const { data: forn } = await sb
    .from("fornecedores_mercatto")
    .select("*");

  fornecedores = forn;

  fornecedorSelect.innerHTML = forn.map(f=>`
    <option value="${f.id}">${f.nome}</option>
  `).join("");

  render();
}

// ================= ADD =================
function addFornecedor(){

  const f = fornecedorSelect.value;

  if(selecionados.includes(f)) return;

  selecionados.push(f);

  render();
}

// ================= RENDER =================
function render(){

  const itens = cotacao.itens;

  thead.innerHTML = `
    <tr>
      <th>Produto</th>
      <th>Qtd</th>
      ${selecionados.map(f=>`
        <th>
          ${getNome(f)}<br>
          <span class="unit">Preço / Qtd / UN</span>
        </th>
      `).join("")}
    </tr>
  `;

  tbody.innerHTML = itens.map((i,index)=>{

    let linha = `
      <tr>
        <td>${i.produto}</td>
        <td>${i.comprar}</td>
    `;

    selecionados.forEach(f=>{
      linha += `
        <td id="cell_${index}_${f}">
          <input placeholder="Preço" oninput="calc(${index})" id="p_${index}_${f}">
          <input placeholder="Qtd" oninput="calc(${index})" id="q_${index}_${f}">
          <input placeholder="UN" oninput="calc(${index})" id="u_${index}_${f}">
          <div id="r_${index}_${f}" class="unit"></div>
        </td>
      `;
    });

    linha += `</tr>`;
    return linha;

  }).join("");
}

// ================= CALC =================
function calc(index){

  let valores = [];

  selecionados.forEach(f=>{

    const preco = Number(document.getElementById(`p_${index}_${f}`).value);
    const qtd = Number(document.getElementById(`q_${index}_${f}`).value);

    if(!preco || !qtd) return;

    const unit = preco / qtd;

    document.getElementById(`r_${index}_${f}`).innerText = "R$ " + unit.toFixed(2);

    valores.push({f, unit});
  });

  if(valores.length < 2) return;

  const menor = Math.min(...valores.map(v=>v.unit));
  const maior = Math.max(...valores.map(v=>v.unit));

  valores.forEach(v=>{

    const el = document.getElementById(`cell_${index}_${v.f}`);

    el.classList.remove("verde","vermelho","laranja");

    if(v.unit === menor){
      el.classList.add("verde");
    } else if(v.unit === maior){
      el.classList.add("vermelho");
    } else {
      el.classList.add("laranja");
    }

  });

  salvar();
}

// ================= SALVAR =================
async function salvar(){

  await sb.from("cotacoes").update({
    atualizado_em: new Date()
  }).eq("id", cotacao.id);
}

// ================= AUX =================
function getNome(id){
  return fornecedores.find(f=>f.id===id)?.nome || "";
}

init();

</script>

</body>
</html>

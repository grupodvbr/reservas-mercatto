<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Execução de Cotação PRO</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
/* ================= BASE ================= */
body{
  margin:0;
  font-family:Inter;
  background:#eef2f7;
  color:#0f172a;
}

/* ================= HEADER ================= */
.header{
  background:#020617;
  color:#fff;
  padding:16px 20px;
  font-size:16px;
  font-weight:600;
  box-shadow:0 4px 20px rgba(0,0,0,.15);
}

/* ================= TOPO ================= */
.top{
  display:flex;
  gap:10px;
  padding:15px 20px;
  background:#fff;
  border-bottom:1px solid #e5e7eb;
}

select{
  padding:10px;
  border-radius:10px;
  border:1px solid #d1d5db;
  min-width:220px;
  background:#fff;
}

button{
  padding:10px 16px;
  border-radius:10px;
  border:none;
  background:#2563eb;
  color:#fff;
  font-weight:600;
  cursor:pointer;
  transition:.2s;
}

button:hover{
  background:#1d4ed8;
}

/* ================= TABELA ================= */
.table-wrap{
  overflow:auto;
}

table{
  width:100%;
  border-collapse:separate;
  border-spacing:0;
  background:#fff;
  table-layout:fixed;
}

/* HEADER FIXO */
thead{
  position:sticky;
  top:0;
  z-index:2;
}

th{
  background:#020617;
  color:#fff;
  padding:12px;
  font-size:12px;
  font-weight:600;
  border-right:1px solid #111;
  text-align:center;
}

/* CELULAS */
td{
  padding:10px;
  border-bottom:1px solid #e5e7eb;
  border-right:1px solid #e5e7eb;
  text-align:center;
  height:70px;
  vertical-align:middle;
}

/* ================= PRODUTO ================= */
.prod{
  text-align:left;
  width:300px;
  padding-left:16px;
}

.prod strong{
  font-size:14px;
  display:block;
}

.prod span{
  font-size:11px;
  color:#64748b;
}

/* ================= BOX FORNECEDOR ================= */
.box{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:6px;
}

/* ================= INPUT ================= */
input{
  width:100px;
  padding:8px;
  border-radius:8px;
  border:1px solid #d1d5db;
  text-align:center;
  font-weight:600;
  font-size:13px;
  outline:none;
}

input:focus{
  border-color:#2563eb;
  box-shadow:0 0 0 2px rgba(37,99,235,.15);
}

/* ================= RESULTADO ================= */
.result{
  font-size:14px;
  font-weight:700;
  color:#0f172a;
}

/* ================= CORES (SUAVE) ================= */
.verde{
  background:#ecfdf5;
}

.vermelho{
  background:#fef2f2;
}

.laranja{
  background:#fffbeb;
}

/* ================= HOVER ================= */
tr:hover td{
  background:#f8fafc;
}

/* ================= SCROLL ================= */
::-webkit-scrollbar{
  height:8px;
  width:8px;
}

::-webkit-scrollbar-thumb{
  background:#cbd5e1;
  border-radius:6px;
}
</style>
</head>

<body>

<div class="header">
  <h2 id="titulo"></h2>
</div>

<div class="top">
  <select id="fornecedorSelect"></select>
  <button onclick="addFornecedor()">+ Fornecedor</button>
</div>

<div class="table-wrap">
<table>
<thead id="thead"></thead>
<tbody id="tbody"></tbody>
</table>
</div>

<script>

const sb = supabase.createClient(
 "https://dxkszikemntfusfyrzos.supabase.co",
 "sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
);

const id = new URLSearchParams(location.search).get("id");

let cotacao;
let fornecedores = [];
let selecionados = [];
let estoque = [];

/* INIT */
async function init(){

  const { data } = await sb
    .from("cotacoes")
    .select("*")
    .eq("id", id)
    .single();

  cotacao = data;
  titulo.innerText = cotacao.nome;

  const { data: forn } = await sb
    .from("fornecedores_mercatto")
    .select("*");

  fornecedores = forn;

  fornecedorSelect.innerHTML = forn.map(f=>`
    <option value="${f.id}">${f.nome}</option>
  `).join("");

  const { data: est } = await sb
    .from("mercatto_estoque")
    .select("*");

  estoque = est;

  render();
}

/* ADD FORNECEDOR */
function addFornecedor(){

  const f = fornecedorSelect.value;

  if(selecionados.includes(f)) return;

  selecionados.push(f);

  render();
}

/* RENDER */
function render(){

  const itens = cotacao.itens;

  thead.innerHTML = `
    <tr>
      <th>Produto</th>
      <th>Qtd</th>
      ${selecionados.map(f=>`<th>${getNome(f)}</th>`).join("")}
    </tr>
  `;

  tbody.innerHTML = itens.map((i,index)=>{

    const prod = estoque.find(p=>p.produto === i.produto);

    const und = prod?.und_compra || "UN";
    const qtdUni = prod?.qtd_unidades || 1;

    let linha = `
      <tr>
        <td class="prod">
          <strong>${i.produto}</strong><br>
          <span>${qtdUni} UN por ${und}</span>
        </td>
        <td>${i.comprar}</td>
    `;

    selecionados.forEach(f=>{
      linha += `
        <td id="cell_${index}_${f}">
          <div class="box">

            <div class="row">
              <input placeholder="R$" oninput="calc(${index})" id="p_${index}_${f}">
            </div>

            <div id="r_${index}_${f}" class="result"></div>

          </div>
        </td>
      `;
    });

    linha += `</tr>`;
    return linha;

  }).join("");
}

/* CALCULO */
function calc(index){

  const item = cotacao.itens[index];
  const prod = estoque.find(p=>p.produto === item.produto);

  const qtdUni = prod?.qtd_unidades || 1;

  let valores = [];

  selecionados.forEach(f=>{

    let elInput = document.getElementById(`p_${index}_${f}`);
    let valor = elInput.value.replace(",", ".");

    if(!valor) return;

    let preco = Number(valor);

    if(isNaN(preco)) return;

    const custo = preco / qtdUni;

    document.getElementById(`r_${index}_${f}`).innerText =
      "R$ " + custo.toFixed(2);

    valores.push({f, custo});
  });

  if(valores.length < 2) return;

  const menor = Math.min(...valores.map(v=>v.custo));
  const maior = Math.max(...valores.map(v=>v.custo));

  valores.forEach(v=>{

    const el = document.getElementById(`cell_${index}_${v.f}`);

    el.classList.remove("verde","vermelho","laranja");

    if(v.custo === menor){
      el.classList.add("verde");
    } else if(v.custo === maior){
      el.classList.add("vermelho");
    } else {
      el.classList.add("laranja");
    }

  });

  salvar();
}

/* SALVAR */
async function salvar(){
  await sb.from("cotacoes").update({
    atualizado_em:new Date()
  }).eq("id", cotacao.id);
}

/* AUX */
function getNome(id){
  return fornecedores.find(f=>f.id===id)?.nome || "";
}

init();

</script>

</body>
</html>

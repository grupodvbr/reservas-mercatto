<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Cotação Inteligente PRO</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
  font-family:Inter;
  background:#eef2f7;
  padding:20px;
}

/* TOPO */
.top{
  display:flex;
  gap:10px;
  margin-bottom:15px;
}

/* TABELA */
table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
}

th{
  background:#111827;
  color:#fff;
  padding:10px;
}

td{
  border:1px solid #eee;
  padding:8px;
  text-align:center;
}

/* INPUT */
input{
  width:80px;
  padding:5px;
  text-align:center;
}

/* CORES */
.verde{background:#dcfce7;}
.vermelho{background:#fee2e2;}
.laranja{background:#fef3c7;}

/* PRODUTO */
.produto{
  text-align:left;
}

.sub{
  font-size:11px;
  color:#666;
}

/* PREÇO */
.preco{
  font-weight:700;
  margin-top:4px;
}

</style>
</head>

<body>

<h2 id="titulo"></h2>

<div class="top">
  <select id="fornecedorSelect"></select>
  <button onclick="addFornecedor()">+ Fornecedor</button>
</div>

<table>
<thead id="thead"></thead>
<tbody id="tbody"></tbody>
</table>

<script>

const sb = supabase.createClient(
 "https://dxkszikemntfusfyrzos.supabase.co",
 "sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
);

const id = new URLSearchParams(location.search).get("id");

let cotacao;
let fornecedores = [];
let selecionados = [];
let estoque = [];

// ================= INIT =================
async function init(){

  // cotação
  const { data } = await sb
    .from("cotacoes")
    .select("*")
    .eq("id", id)
    .single();

  cotacao = data;
  titulo.innerText = cotacao.nome;

  // fornecedores
  const { data: forn } = await sb
    .from("fornecedores_mercatto")
    .select("*");

  fornecedores = forn;

  fornecedorSelect.innerHTML = forn.map(f=>`
    <option value="${f.id}">${f.nome}</option>
  `).join("");

  // estoque (AQUI ESTÁ O OURO)
  const { data: est } = await sb
    .from("mercatto_estoque")
    .select("*");

  estoque = est;

  render();
}

// ================= ADD =================
function addFornecedor(){

  const f = fornecedorSelect.value;

  if(selecionados.includes(f)) return;

  selecionados.push(f);

  render();
}

// ================= RENDER =================
function render(){

  const itens = cotacao.itens;

  thead.innerHTML = `
    <tr>
      <th>Produto</th>
      <th>Qtd</th>
      ${selecionados.map(f=>`<th>${getNome(f)}</th>`).join("")}
    </tr>
  `;

  tbody.innerHTML = itens.map((i,index)=>{

    const prod = estoque.find(p=>p.produto === i.produto);

    const undCompra = prod?.und_compra || "UN";
    const qtdUnidades = prod?.qtd_unidades || 1;

    let linha = `
      <tr>
        <td class="produto">
          ${i.produto}<br>
          <span class="sub">
            Compra: ${undCompra} | Contém: ${qtdUnidades} UN
          </span>
        </td>
        <td>${i.comprar}</td>
    `;

    selecionados.forEach(f=>{
      linha += `
        <td id="cell_${index}_${f}">
          <input placeholder="R$" oninput="calc(${index})" id="p_${index}_${f}">
          <div class="preco" id="r_${index}_${f}"></div>
        </td>
      `;
    });

    linha += `</tr>`;
    return linha;

  }).join("");
}

// ================= CALC =================
function calc(index){

  const item = cotacao.itens[index];
  const prod = estoque.find(p=>p.produto === item.produto);

  const qtdUnidades = prod?.qtd_unidades || 1;

  let valores = [];

  selecionados.forEach(f=>{

    let preco = document.getElementById(`p_${index}_${f}`).value;

    // 🔥 MÁSCARA
    preco = preco.replace(",", ".");
    preco = Number(preco);

    if(!preco) return;

    const custoReal = preco / qtdUnidades;

    document.getElementById(`r_${index}_${f}`).innerText =
      "R$ " + custoReal.toFixed(2) + " / UN";

    valores.push({f, custoReal});
  });

  if(valores.length < 2) return;

  const menor = Math.min(...valores.map(v=>v.custoReal));
  const maior = Math.max(...valores.map(v=>v.custoReal));

  valores.forEach(v=>{

    const el = document.getElementById(`cell_${index}_${v.f}`);

    el.classList.remove("verde","vermelho","laranja");

    if(v.custoReal === menor){
      el.classList.add("verde");
    } else if(v.custoReal === maior){
      el.classList.add("vermelho");
    } else {
      el.classList.add("laranja");
    }

  });

  salvar();
}

// ================= SALVAR =================
async function salvar(){
  await sb.from("cotacoes").update({
    atualizado_em: new Date()
  }).eq("id", cotacao.id);
}

// ================= AUX =================
function getNome(id){
  return fornecedores.find(f=>f.id===id)?.nome || "";
}

init();

</script>

</body>
</html>

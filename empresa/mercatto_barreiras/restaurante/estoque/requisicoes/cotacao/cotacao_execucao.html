<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Execução de Cotação PRO</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

/* BASE */
body{
  margin:0;
  font-family:Inter;
  background:#eef2f7;
}

/* HEADER */
.header{
  position:sticky;
  top:0;
  background:#0f172a;
  color:#fff;
  padding:15px 20px;
  z-index:10;
  box-shadow:0 5px 20px rgba(0,0,0,.2);
}

.header h2{
  margin:0;
  font-size:18px;
}

/* TOPO */
.top{
  display:flex;
  gap:10px;
  padding:15px 20px;
  background:#fff;
  border-bottom:1px solid #ddd;
}

select,button{
  padding:10px;
  border-radius:10px;
  border:1px solid #ddd;
  font-weight:600;
}

button{
  background:#2563eb;
  color:#fff;
  cursor:pointer;
}

/* TABELA */
.table-wrap{
  overflow:auto;
}

table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
  min-width:900px;
}

/* HEADER FIXO */
thead{
  position:sticky;
  top:60px;
  z-index:5;
}

th{
  background:#020617;
  color:#fff;
  padding:12px;
  font-size:13px;
  border-right:1px solid #111;
}

td{
  padding:8px;
  border-bottom:1px solid #eee;
  border-right:1px solid #eee;
  text-align:center;
}

/* PRODUTO */
.prod{
  text-align:left;
  min-width:220px;
}

.prod strong{
  display:block;
}

.sub{
  font-size:11px;
  color:#64748b;
}

/* INPUTS */
.input-group{
  display:flex;
  flex-direction:column;
  gap:4px;
}

input{
  width:100%;
  padding:6px;
  border-radius:6px;
  border:1px solid #ccc;
  text-align:center;
}

/* RESULTADO */
.result{
  font-size:12px;
  font-weight:700;
}

/* CORES */
.verde{background:#dcfce7;}
.vermelho{background:#fee2e2;}
.laranja{background:#fef3c7;}

</style>
</head>

<body>

<div class="header">
  <h2 id="titulo"></h2>
</div>

<div class="top">
  <select id="fornecedorSelect"></select>
  <button onclick="addFornecedor()">+ Fornecedor</button>
</div>

<div class="table-wrap">
<table>
<thead id="thead"></thead>
<tbody id="tbody"></tbody>
</table>
</div>

<script>

const sb = supabase.createClient(
 "https://dxkszikemntfusfyrzos.supabase.co",
 "sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
);

const id = new URLSearchParams(location.search).get("id");

let cotacao;
let fornecedores = [];
let selecionados = [];
let estoque = [];

/* INIT */
async function init(){

  const { data } = await sb
    .from("cotacoes")
    .select("*")
    .eq("id", id)
    .single();

  cotacao = data;
  titulo.innerText = cotacao.nome;

  const { data: forn } = await sb
    .from("fornecedores_mercatto")
    .select("*");

  fornecedores = forn;

  fornecedorSelect.innerHTML = forn.map(f=>`
    <option value="${f.id}">${f.nome}</option>
  `).join("");

  const { data: est } = await sb
    .from("mercatto_estoque")
    .select("*");

  estoque = est;

  render();
}

/* ADD FORNECEDOR */
function addFornecedor(){

  const f = fornecedorSelect.value;

  if(selecionados.includes(f)) return;

  selecionados.push(f);

  render();
}

/* RENDER */
function render(){

  const itens = cotacao.itens;

  thead.innerHTML = `
    <tr>
      <th>Produto</th>
      <th>Qtd</th>
      ${selecionados.map(f=>`
        <th>${getNome(f)}</th>
      `).join("")}
    </tr>
  `;

  tbody.innerHTML = itens.map((i,index)=>{

    const prod = estoque.find(p=>p.produto === i.produto);

    const und = prod?.und_compra || "UN";
    const qtdUni = prod?.qtd_unidades || 1;

    let linha = `
      <tr>
        <td class="prod">
          <strong>${i.produto}</strong>
          <span class="sub">Compra: ${und} | ${qtdUni} unidades</span>
        </td>
        <td>${i.comprar}</td>
    `;

    selecionados.forEach(f=>{
      linha += `
        <td id="cell_${index}_${f}">
          <div class="input-group">
            <input placeholder="Preço" oninput="calc(${index})" id="p_${index}_${f}">
            <div id="r_${index}_${f}" class="result"></div>
          </div>
        </td>
      `;
    });

    linha += `</tr>`;
    return linha;

  }).join("");
}

/* CALCULO */
function calc(index){

  const item = cotacao.itens[index];
  const prod = estoque.find(p=>p.produto === item.produto);
  const qtdUni = prod?.qtd_unidades || 1;

  let valores = [];

  selecionados.forEach(f=>{

    let preco = document.getElementById(`p_${index}_${f}`).value;

    preco = preco.replace(",", ".");
    preco = Number(preco);

    if(!preco) return;

    const custo = preco / qtdUni;

    document.getElementById(`r_${index}_${f}`).innerText =
      "R$ " + custo.toFixed(2) + " / UN";

    valores.push({f, custo});
  });

  if(valores.length < 2) return;

  const menor = Math.min(...valores.map(v=>v.custo));
  const maior = Math.max(...valores.map(v=>v.custo));

  valores.forEach(v=>{

    const el = document.getElementById(`cell_${index}_${v.f}`);

    el.classList.remove("verde","vermelho","laranja");

    if(v.custo === menor){
      el.classList.add("verde");
    } else if(v.custo === maior){
      el.classList.add("vermelho");
    } else {
      el.classList.add("laranja");
    }

  });

  salvar();
}

/* SALVAR */
async function salvar(){
  await sb.from("cotacoes").update({
    atualizado_em:new Date()
  }).eq("id", cotacao.id);
}

/* AUX */
function getNome(id){
  return fornecedores.find(f=>f.id===id)?.nome || "";
}

init();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESTOQUE MERCATTO</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
/* ============================= */
:root {
/* ============================= */
:root {
  --azul-principal: #2563eb;
  --azul-claro: #3b82f6;
  --azul-soft: #dbeafe;
  --azul-bg: #f0f6ff;

  --white: #ffffff;
  --cinza: #64748b;

  --glass: rgba(255,255,255,0.65);
  --borda: rgba(255,255,255,0.25);

  --shadow-soft: 0 10px 30px rgba(37, 99, 235, 0.15);
  --shadow-hover: 0 20px 50px rgba(37, 99, 235, 0.25);
}

/* RESET */
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter', sans-serif;
}

/* ============================= */
body {
  background: linear-gradient(135deg, #e0ecff, #f7fbff);
  height:100vh;
  display:flex;
  overflow:hidden;
}

/* =============================
   SPLASH
============================= */
#splash {
  position:fixed;
  width:100%;
  height:100%;
  background:linear-gradient(135deg, #2563eb, #3b82f6);
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  z-index:999999;
  animation: fadeOut 1s ease forwards;
  animation-delay:2.2s;
}

#splash h1 {
  font-size:56px;
  color:white;
  letter-spacing:5px;
  animation: fadeInUp 1s ease forwards;
}

/* animações */
@keyframes fadeInUp {
  from { opacity:0; transform:translateY(30px);}
  to { opacity:1; transform:translateY(0);}
}

@keyframes fadeOut {
  to { opacity:0; visibility:hidden;}
}

/* =============================
   SIDEBAR
============================= */
#sidebar {
  width:270px;
  background: linear-gradient(180deg, #2563eb, #1d4ed8);
  color:white;
  padding:25px 15px;
  transition:0.3s;
  box-shadow: var(--shadow-soft);
  position:relative;
}

#sidebar.minimized {
  width:80px;
}

/* botão */
#toggleSidebar {
  position:absolute;
  top:18px;
  right:-18px;
  width:38px;
  height:38px;
  background:white;
  color:var(--azul-principal);
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  font-weight:bold;
  box-shadow: var(--shadow-soft);
}

/* título */
.sidebar-title {
  font-size:22px;
  font-weight:600;
  margin-bottom:25px;
  letter-spacing:2px;
}

#sidebar.minimized .sidebar-title {
  opacity:0;
}

/* itens */
.nav-item {
  padding:14px;
  border-radius:12px;
  margin-bottom:12px;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:12px;

  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(6px);

  transition: all 0.25s ease;
}

.nav-item:hover {
  background: rgba(255,255,255,0.18);
  transform: translateX(6px);
}

.nav-text {
  font-weight:500;
}

#sidebar.minimized .nav-text {
  opacity:0;
}

/* =============================
   CONTEÚDO
============================= */
#content {
  flex:1;
  padding:30px;
  overflow-y:auto;
}

#content h1 {
  font-size:30px;
  margin-bottom:25px;
  color:#1e3a8a;
}

/* =============================
   CARDS PREMIUM
============================= */
.cards {
  display:flex;
  gap:25px;
  flex-wrap:wrap;
}

.card {
  width:220px;
  padding:22px;

  border-radius:18px;

  background: var(--glass);
  backdrop-filter: blur(14px);

  border:1px solid var(--borda);

  text-align:center;
  cursor:pointer;

  transition: all 0.3s ease;
  box-shadow: var(--shadow-soft);
}

.card:hover {
  transform: translateY(-10px) scale(1.03);
  box-shadow: var(--shadow-hover);
}

/* efeito brilho */
.card::before {
  content:"";
  position:absolute;
  inset:0;
  border-radius:18px;
  background: linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,0.4),
    transparent
  );
  opacity:0;
  transition:0.3s;
}

.card:hover::before {
  opacity:1;
}

/* imagem */
.card img {
  width:110px;
  height:110px;
  margin-bottom:12px;
  object-fit:contain;
}

/* texto */
.card p {
  font-weight:600;
  color:#1e3a8a;
}

/* =============================
   IFRAME
============================= */
#iframePage {
  width:100%;
  height:88vh;
  border:none;
  display:none;
  border-radius:16px;
  box-shadow: var(--shadow-soft);
}

/* =============================
   SCROLLBONITO
============================= */
::-webkit-scrollbar {
  width:8px;
}

::-webkit-scrollbar-thumb {
  background: var(--azul-claro);
  border-radius:10px;
}

/* =============================
   RESPONSIVO
============================= */
@media (max-width: 768px) {
  #sidebar {
    position:absolute;
    z-index:999;
    height:100%;
  }

  #content {
    padding:20px;
  }

  .card {
    width:100%;
  }
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <h1>ESTOQUE MERCATTO</h1>
</div>

<script>
// REMOVE O SPLASH PARA SEMPRE
setTimeout(() => {
  document.getElementById("splash").remove();
}, 2600);
</script>

<!-- SIDEBAR -->
<div id="sidebar">

  <div id="toggleSidebar" onclick="toggleMenu()">☰</div>

  <div class="sidebar-title">ESTOQUE</div>

  <div class="nav-item" onclick="loadPage()">
    🏠 <span class="nav-text">Página Inicial</span>
  </div>

  <div class="nav-item" onclick="loadIframe('comparacao.html')">
    📦 <span class="nav-text">Itens</span>
  </div>

  <div class="nav-item" onclick="loadIframe('documentos.html')">
    📁 <span class="nav-text">Documentação</span>
  </div>

  <div class="nav-item" onclick="loadIframe('licitacoes.html')">
    📊 <span class="nav-text">Licitações</span>
  </div>

  <div class="nav-item" onclick="loadIframe('pagina4.html')">
    ⚙️ <span class="nav-text">Configurações</span>
  </div>

</div>

<!-- CONTEÚDO -->
<div id="content">

  <div id="homeSection">
    <h1>Sistema de Licitações</h1>

    <div class="cards">

      <div class="card" onclick="window.open('https://www.gov.br/compras/pt-br', '_blank')">
        <img src="https://raw.githubusercontent.com/grupodvbr/cotacao/main/paste/Design%20sem%20nome%20(28).png">
        <p>Compras.gov</p>
      </div>

      <div class="card" onclick="window.open('https://minha.effecti.com.br/#/', '_blank')">
        <img src="https://raw.githubusercontent.com/grupodvbr/cotacao/main/paste/Design%20sem%20nome%20(29).png">
        <p>Effecti</p>
      </div>

    </div>
  </div>

  <iframe id="iframePage"></iframe>

</div>

<script>
/* recolher menu */
function toggleMenu(){
  document.getElementById("sidebar").classList.toggle("minimized");
}

/* abrir páginas */
function loadIframe(url){
  homeSection.style.display="none";
  iframePage.style.display="block";
  iframePage.src = url;
}

function loadPage(){
  homeSection.style.display="block";
  iframePage.style.display="none";
}
</script>

</body>
</html>

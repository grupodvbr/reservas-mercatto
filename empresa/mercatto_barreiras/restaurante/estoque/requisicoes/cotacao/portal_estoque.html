<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESTOQUE MERCATTO</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
/* ============================= */
:root {
  --azul: #020617;
  --azul-sec: #0f172a;
  --azul-card: #111c2e;
  --azul-hover: #1e3a8a;

  --azul-destaque: #3b82f6;
  --azul-brilho: #60a5fa;

  --shadow: 0 10px 40px rgba(0,0,0,0.6);
  --glow: 0 0 25px rgba(59,130,246,0.5);
}

/* RESET */
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

/* ============================= */
body {
  background: linear-gradient(180deg, #0f172a, #020617);
  height:100vh;
  display:flex;
  overflow:hidden;
  color:white;
}

/* =============================
   SPLASH ULTRA
============================= */
#splash {
  position:fixed;
  width:100%;
  height:100%;
  background: radial-gradient(circle at center, #020617, #000);
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  z-index:999999;
  animation: fadeOut 1s ease forwards;
  animation-delay: 2.6s;
}

/* TEXTO COM BRILHO FORTE */
#splash h1 {
  font-size:64px;
  letter-spacing:8px;
  position:relative;
  color:white;
  opacity:0;
  animation: fadeInUp 1.2s ease forwards;
}

/* LINHA BRILHO */
#splash h1::after {
  content:"";
  position:absolute;
  top:0;
  left:-150%;
  width:100%;
  height:100%;
  background: linear-gradient(
    120deg,
    transparent,
    rgba(96,165,250,0.9),
    transparent
  );
  animation: shineMove 2s ease forwards;
  animation-delay:0.5s;
}

/* ANIMAÇÕES */
@keyframes shineMove {
  0% { left:-150%; }
  100% { left:150%; }
}

@keyframes fadeInUp {
  from { opacity:0; transform:translateY(40px);}
  to { opacity:1; transform:translateY(0);}
}

@keyframes fadeOut {
  to { opacity:0; visibility:hidden;}
}

/* =============================
   SIDEBAR PREMIUM
============================= */
#sidebar {
  width:270px;
  background: linear-gradient(180deg, #020617, #0f172a);
  padding:25px 15px;
  box-shadow: var(--shadow);
  position:relative;
  transition:0.3s;
}

#sidebar.minimized {
  width:75px;
}

/* BOTÃO */
#toggleSidebar {
  position:absolute;
  top:20px;
  right:-15px;
  width:36px;
  height:36px;
  background: var(--azul-destaque);
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  box-shadow: var(--glow);
  transition:0.3s;
}

#toggleSidebar:hover {
  transform:scale(1.1);
}

/* TÍTULO */
.sidebar-title {
  font-size:24px;
  font-weight:600;
  margin-bottom:25px;
  letter-spacing:3px;
}

#sidebar.minimized .sidebar-title {
  opacity:0;
}

/* ITENS */
.nav-item {
  padding:14px;
  border-radius:12px;
  margin-bottom:12px;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:12px;

  background: linear-gradient(145deg, #0f172a, #020617);
  box-shadow: inset 0 0 10px rgba(255,255,255,0.05);

  transition:0.25s;
}

.nav-item:hover {
  background: linear-gradient(145deg, #1e3a8a, #020617);
  transform:translateX(6px);
  box-shadow: var(--glow);
}

/* TEXTO */
.nav-text {
  transition:0.2s;
}

#sidebar.minimized .nav-text {
  opacity:0;
}

/* =============================
   CONTEÚDO
============================= */
#content {
  flex:1;
  padding:35px;
  overflow-y:auto;
}

#content h1 {
  font-size:34px;
  margin-bottom:25px;
  color:#93c5fd;
}

/* =============================
   CARDS ULTRA PREMIUM
============================= */
.cards {
  display:flex;
  gap:25px;
  flex-wrap:wrap;
}

.card {
  width:220px;
  background: linear-gradient(145deg, #020617, #0f172a);
  border-radius:16px;
  padding:20px;
  text-align:center;
  cursor:pointer;

  position:relative;
  overflow:hidden;

  box-shadow: var(--shadow);
  transition:0.3s;
}

/* BORDA BRILHO */
.card::before {
  content:"";
  position:absolute;
  inset:0;
  border-radius:16px;
  padding:1px;
  background: linear-gradient(120deg, transparent, #3b82f6, transparent);
  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
          mask-composite: exclude;
  opacity:0;
  transition:0.3s;
}

/* LUZ PASSANDO */
.card::after {
  content:"";
  position:absolute;
  top:0;
  left:-120%;
  width:100%;
  height:100%;
  background: linear-gradient(
    120deg,
    transparent,
    rgba(96,165,250,0.5),
    transparent
  );
}

/* HOVER */
.card:hover {
  transform:translateY(-10px) scale(1.04);
  box-shadow: 0 25px 60px rgba(0,0,0,0.8);
}

.card:hover::before {
  opacity:1;
}

.card:hover::after {
  animation: shineMove 1.5s ease;
}

/* IMAGEM */
.card img {
  width:120px;
  height:120px;
  margin-bottom:12px;
  object-fit:contain;
}

/* TEXTO */
.card p {
  font-weight:600;
  color:#bfdbfe;
}

/* =============================
   IFRAME
============================= */
#iframePage {
  width:100%;
  height:88vh;
  border:none;
  display:none;
  border-radius:14px;
  box-shadow: var(--shadow);
}

/* =============================
   SCROLL PREMIUM
============================= */
::-webkit-scrollbar {
  width:8px;
}

::-webkit-scrollbar-thumb {
  background: linear-gradient(#1e3a8a, #3b82f6);
  border-radius:10px;
}

/* =============================
   RESPONSIVO
============================= */
@media(max-width:768px){
  #sidebar {
    position:absolute;
    z-index:999;
  }

  .card {
    width:100%;
  }
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <h1>ESTOQUE MERCATTO</h1>
</div>

<script>
// REMOVE O SPLASH PARA SEMPRE
setTimeout(() => {
  document.getElementById("splash").remove();
}, 2600);
</script>

<!-- SIDEBAR -->
<div id="sidebar">

  <div id="toggleSidebar" onclick="toggleMenu()">☰</div>

  <div class="sidebar-title">ESTOQUE</div>

  <div class="nav-item" onclick="loadPage()">
    🏠 <span class="nav-text">Página Inicial</span>
  </div>

  <div class="nav-item" onclick="loadIframe('comparacao.html')">
    📦 <span class="nav-text">Itens</span>
  </div>

  <div class="nav-item" onclick="loadIframe('documentos.html')">
    📁 <span class="nav-text">Documentação</span>
  </div>

  <div class="nav-item" onclick="loadIframe('licitacoes.html')">
    📊 <span class="nav-text">Licitações</span>
  </div>

  <div class="nav-item" onclick="loadIframe('pagina4.html')">
    ⚙️ <span class="nav-text">Configurações</span>
  </div>

</div>

<!-- CONTEÚDO -->
<div id="content">

  <div id="homeSection">
    <h1>Sistema de Licitações</h1>

    <div class="cards">

      <div class="card" onclick="window.open('https://www.gov.br/compras/pt-br', '_blank')">
        <img src="https://raw.githubusercontent.com/grupodvbr/cotacao/main/paste/Design%20sem%20nome%20(28).png">
        <p>Compras.gov</p>
      </div>

      <div class="card" onclick="window.open('https://minha.effecti.com.br/#/', '_blank')">
        <img src="https://raw.githubusercontent.com/grupodvbr/cotacao/main/paste/Design%20sem%20nome%20(29).png">
        <p>Effecti</p>
      </div>

    </div>
  </div>

  <iframe id="iframePage"></iframe>

</div>

<script>
/* recolher menu */
function toggleMenu(){
  document.getElementById("sidebar").classList.toggle("minimized");
}

/* abrir páginas */
function loadIframe(url){
  homeSection.style.display="none";
  iframePage.style.display="block";
  iframePage.src = url;
}

function loadPage(){
  homeSection.style.display="block";
  iframePage.style.display="none";
}
</script>

</body>
</html>

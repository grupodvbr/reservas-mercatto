<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<title>Painel Mercatto</title>

<meta name="viewport" content="width=device-width,initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
margin:0;
font-family:Inter,system-ui;
background:#0f172a;
color:white;
}

.container{
max-width:1100px;
margin:auto;
padding:30px 20px;
}

h1{
margin-bottom:20px;
}

.card{

background:#1e293b;

border-radius:14px;

padding:20px;

margin-bottom:20px;

box-shadow:0 10px 30px rgba(0,0,0,.4);

}

.grid{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(200px,1fr));

gap:12px;

}

input,select{

padding:10px;

border-radius:8px;

border:1px solid #334155;

background:#0f172a;

color:white;

}

button{

padding:10px;

border:none;

border-radius:8px;

background:#3b82f6;

color:white;

cursor:pointer;

font-weight:600;

}

button.danger{
background:#ef4444;
}

.calendar{

display:grid;

grid-template-columns:repeat(7,1fr);

gap:8px;

margin-top:10px;

}

.day{

background:#1e293b;

border-radius:10px;

padding:10px;

min-height:90px;

cursor:pointer;

position:relative;

}

.day:hover{
background:#334155;
}

.day span{

position:absolute;

top:6px;

right:8px;

font-size:12px;

opacity:.7;

}

.kpi{

display:flex;

justify-content:space-between;

font-size:18px;

margin-bottom:6px;

}

.modal{

position:fixed;

inset:0;

background:#00000088;

display:none;

align-items:center;

justify-content:center;

}

.modal-box{

background:#1e293b;

padding:20px;

border-radius:12px;

width:400px;

max-height:80vh;

overflow:auto;

}

</style>

</head>

<body>

<div class="container">

<h1>Reservas Mercatto</h1>

<!-- FORM -->

<div class="card">

<form id="form">

<input type="hidden" id="id">

<div class="grid">

<input id="nome" placeholder="Nome" required>

<input id="telefone" placeholder="Telefone">

<input id="pessoas" type="number" placeholder="Pessoas">

<select id="mesa">

<option>Sala Paulo Augusto</option>

<option>Villa Gourmet</option>

<option>Villa Churrascada</option>

</select>

<input id="datahora" type="datetime-local">

<input id="estimado" placeholder="Valor estimado">

<input id="sinal" placeholder="Adiantamento">

</div>

<button type="submit">Salvar Reserva</button>

</form>

</div>

<!-- CALENDARIO -->

<div class="card">

<h3 id="mes"></h3>

<div class="calendar" id="calendar"></div>

</div>

<!-- RESUMO -->

<div class="card">

<h3>Resumo do mês</h3>

<div class="kpi">Antecipado <span id="k1"></span></div>

<div class="kpi">Final Pago <span id="k2"></span></div>

<div class="kpi">A Receber <span id="k3"></span></div>

</div>

</div>

<!-- MODAL -->

<div class="modal" id="modal">

<div class="modal-box">

<h3>Reservas do dia</h3>

<div id="lista"></div>

<button onclick="fechar()">Fechar</button>

</div>

</div>

<script>

const supabase=window.supabase.createClient(
"https://SEU_PROJETO.supabase.co",
"SUA_ANON_KEY"
)

let reservas=[]

let mes=new Date().getMonth()
let ano=new Date().getFullYear()

const calendar=document.getElementById("calendar")

function moeda(v){
return Number(v||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"})
}

async function carregar(){

const inicio=`${ano}-${String(mes+1).padStart(2,'0')}-01`
const fim=`${ano}-${String(mes+2).padStart(2,'0')}-01`

const {data}=await supabase
.from("reservas_mercatto")
.select("*")
.gte("datahora",inicio)
.lt("datahora",fim)

reservas=data||[]

desenhar()

resumo()

}

function desenhar(){

calendar.innerHTML=""

document.getElementById("mes").innerText=`${mes+1}/${ano}`

const dias=new Date(ano,mes+1,0).getDate()

for(let d=1;d<=dias;d++){

const div=document.createElement("div")

div.className="day"

div.innerHTML=`${d}`

const dia=`${ano}-${String(mes+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`

const qtd=reservas.filter(r=>r.datahora.slice(0,10)==dia).length

if(qtd) div.innerHTML+=`<span>${qtd}</span>`

div.onclick=()=>abrir(dia)

calendar.appendChild(div)

}

}

function abrir(dia){

const lista=document.getElementById("lista")

const items=reservas.filter(r=>r.datahora.slice(0,10)==dia)

lista.innerHTML=""

items.forEach(r=>{

lista.innerHTML+=`

<div style="margin-bottom:10px">

<b>${r.nome}</b><br>

${r.mesa} • ${r.pessoas} pessoas<br>

${moeda(r.valor_estimado)}

<br>

<button onclick="editar('${r.id}')">Editar</button>

<button onclick="concluir('${r.id}')">Concluir</button>

<button onclick="excluir('${r.id}')" class="danger">Excluir</button>

</div>

<hr>

`

})

document.getElementById("modal").style.display="flex"

}

function fechar(){
document.getElementById("modal").style.display="none"
}

async function excluir(id){

if(!confirm("Excluir reserva?")) return

await supabase.from("reservas_mercatto").delete().eq("id",id)

carregar()

}

async function concluir(id){

const valor=prompt("Valor final pago")

if(!valor) return

await supabase
.from("reservas_mercatto")
.update({
status:"Concluída",
valor_final_pago:valor
})
.eq("id",id)

carregar()

}

function editar(id){

const r=reservas.find(x=>x.id==id)

document.getElementById("id").value=r.id
nome.value=r.nome
telefone.value=r.telefone
pessoas.value=r.pessoas
mesa.value=r.mesa

}

document.getElementById("form").onsubmit=async e=>{

e.preventDefault()

const id=document.getElementById("id").value

const obj={

nome:nome.value,
telefone:telefone.value,
pessoas:pessoas.value,
mesa:mesa.value,

datahora:datahora.value,

valor_estimado:estimado.value,
pagamento_antecipado:sinal.value

}

if(id){

await supabase
.from("reservas_mercatto")
.update(obj)
.eq("id",id)

}else{

await supabase
.from("reservas_mercatto")
.insert(obj)

}

e.target.reset()

carregar()

}

function resumo(){

let s=0
let f=0
let r=0

reservas.forEach(x=>{

const est=Number(x.valor_estimado||0)
const ant=Number(x.pagamento_antecipado||0)
const fin=Number(x.valor_final_pago||0)

s+=ant
f+=fin

if(x.status!="Concluída")
r+=Math.max(est-ant,0)

})

k1.innerText=moeda(s)
k2.innerText=moeda(f)
k3.innerText=moeda(r)

}

carregar()

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Dashboard Operacional</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Inter}

body{
  background:#f1f5f9;
  overflow:hidden;
}

/* HEADER */
.header{
  height:56px;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 16px;
  border-bottom:1px solid #e5e7eb;
}

/* CONTAINER */
.container{
  position:absolute;
  top:56px;
  bottom:0;
  left:0;
  right:0;
  overflow:auto;
  padding:14px;
  display:flex;
  flex-direction:column;
  gap:14px;
}

.card{
  background:#fff;
  border-radius:16px;
  padding:16px;
  box-shadow:0 10px 25px rgba(0,0,0,.05);
}

.title{
  font-weight:700;
  margin-bottom:12px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.kpi{
  background:#f8fafc;
  padding:14px;
  border-radius:12px;
}

.kpi-title{font-size:11px;color:#64748b}
.kpi-value{font-size:20px;font-weight:800}

/* LINHA */
.row{
  display:flex;
  justify-content:space-between;
  padding:8px 0;
  font-size:13px;
  border-bottom:1px solid #f1f5f9;
}

/* TIMELINE */
.timeline{
  display:flex;
  flex-direction:column;
  gap:8px;
}

.evento{
  background:#f8fafc;
  padding:10px;
  border-radius:10px;
  font-size:13px;
}

.hora{
  font-size:11px;
  color:#64748b;
}

/* BARRA */
.bar{
  height:6px;
  background:#e2e8f0;
  border-radius:10px;
}

.fill{
  height:6px;
  background:#2563eb;
  border-radius:10px;
}

</style>
</head>

<body>

<div class="header">
  <b>Dashboard Operacional</b>
  <span id="status">● carregando</span>
</div>

<div class="container">

  <!-- KPIS -->
  <div class="card">
    <div class="grid">
      <div class="kpi"><div class="kpi-title">Hoje</div><div class="kpi-value" id="hoje">0</div></div>
      <div class="kpi"><div class="kpi-title">Mês</div><div class="kpi-value" id="mes">0</div></div>
      <div class="kpi"><div class="kpi-title">Buffet Hoje</div><div class="kpi-value" id="buffet">0</div></div>
      <div class="kpi"><div class="kpi-title">Pico Hora</div><div class="kpi-value" id="pico">--</div></div>
    </div>
  </div>

  <!-- EMPRESAS -->
  <div class="card">
    <div class="title">Empresas</div>
    <div id="empresas"></div>
  </div>

  <!-- STATUS -->
  <div class="card">
    <div class="title">Status</div>
    <div id="statusBox"></div>
  </div>

  <!-- TIMELINE -->
  <div class="card">
    <div class="title">Fluxo do Dia</div>
    <div class="timeline" id="timeline"></div>
  </div>

  <!-- MESAS -->
  <div class="card">
    <div class="title">Mesas mais usadas</div>
    <div id="mesas"></div>
  </div>

</div>

<script>

const supabase = supabase.createClient(
"https://dxkszikemntfusfyrzos.supabase.co",
"sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
);

const tabelas = [
  {nome:"Mercatto", tabela:"reservas_mercatto"},
  {nome:"Villa", tabela:"reservas_villa"},
  {nome:"Delícia", tabela:"reservas_delicia"}
];

function hoje(){
  const d=new Date();
  return d.toISOString().slice(0,10);
}

function mesInicio(){
  const d=new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-01";
}

async function carregar(){

  let totalHoje=0,totalMes=0;
  let empresasHTML="";
  let statusMap={}, horas={}, mesas={};
  let timeline=[];

  for(const t of tabelas){

    const {data} = await supabase.from(t.tabela).select("*");

    const hojeData = data.filter(r=>r.datahora?.startsWith(hoje()));
    const mesData = data.filter(r=>r.datahora>=mesInicio());

    totalHoje += hojeData.length;
    totalMes += mesData.length;

    empresasHTML += `
      <div class="row">
        <span>${t.nome}</span>
        <span>${hojeData.length} hoje</span>
      </div>
    `;

    hojeData.forEach(r=>{
      // STATUS
      statusMap[r.status]=(statusMap[r.status]||0)+1;

      // HORA
      const h=r.datahora?.substring(11,13);
      horas[h]=(horas[h]||0)+1;

      // MESA
      if(r.mesa){
        mesas[r.mesa]=(mesas[r.mesa]||0)+1;
      }

      // TIMELINE
      timeline.push({
        nome:r.nome,
        hora:r.datahora?.substring(11,16),
        pessoas:r.pessoas
      });
    });
  }

  // BUFFET
  const {data:buffet} = await supabase
  .from("buffet_lancamentos")
  .select("data");

  const buffetHoje = buffet.filter(b=>b.data===hoje());

  // PICO
  let picoHora="--",max=0;
  Object.keys(horas).forEach(h=>{
    if(horas[h]>max){
      max=horas[h];
      picoHora=h+":00";
    }
  });

  // STATUS HTML
  let statusHTML="";
  Object.keys(statusMap).forEach(s=>{
    statusHTML+=`<div class="row"><span>${s}</span><span>${statusMap[s]}</span></div>`;
  });

  // MESAS HTML
  let mesasHTML="";
  Object.keys(mesas).sort((a,b)=>mesas[b]-mesas[a]).slice(0,5)
  .forEach(m=>{
    mesasHTML+=`
      <div class="row">
        <span>${m}</span>
        <span>${mesas[m]}</span>
      </div>
    `;
  });

  // TIMELINE HTML
  timeline.sort((a,b)=>a.hora.localeCompare(b.hora));

  let timelineHTML="";
  timeline.slice(0,10).forEach(e=>{
    timelineHTML+=`
      <div class="evento">
        <b>${e.nome}</b> - ${e.pessoas} pessoas
        <div class="hora">${e.hora}</div>
      </div>
    `;
  });

  // UI
  document.getElementById("hoje").innerText=totalHoje;
  document.getElementById("mes").innerText=totalMes;
  document.getElementById("buffet").innerText=buffetHoje.length;
  document.getElementById("pico").innerText=picoHora;

  document.getElementById("empresas").innerHTML=empresasHTML;
  document.getElementById("statusBox").innerHTML=statusHTML;
  document.getElementById("mesas").innerHTML=mesasHTML;
  document.getElementById("timeline").innerHTML=timelineHTML;

  document.getElementById("status").innerText="● atualizado";

}

carregar();
setInterval(carregar,20000);

</script>

</body>
</html>

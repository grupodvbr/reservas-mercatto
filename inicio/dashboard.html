<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Dashboard Operacional</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter}

body{
  background:#f1f5f9;
  height:100vh;
  overflow:hidden;
}

.header{
  height:56px;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 16px;
  border-bottom:1px solid #e5e7eb;
}

.container{
  position:absolute;
  top:56px;
  bottom:0;
  left:0;
  right:0;
  overflow:auto;
  padding:14px;
  display:flex;
  flex-direction:column;
  gap:14px;
}

.card{
  background:#fff;
  border-radius:14px;
  padding:14px;
  box-shadow:0 6px 18px rgba(0,0,0,.05);
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.kpi{
  background:#f8fafc;
  padding:12px;
  border-radius:12px;
}

.kpi-title{font-size:11px;color:#64748b}
.kpi-value{font-size:18px;font-weight:700}

.linha{
  display:flex;
  justify-content:space-between;
  padding:8px 0;
  font-size:13px;
  border-bottom:1px solid #f1f5f9;
}

</style>
</head>

<body>

<div class="header">
  <b>Dashboard Operacional</b>
  <span id="status">● Carregando...</span>
</div>

<div class="container">

  <div class="card">
    <div class="grid">
      <div class="kpi">
        <div class="kpi-title">Reservas Hoje</div>
        <div class="kpi-value" id="totalHoje">0</div>
      </div>

      <div class="kpi">
        <div class="kpi-title">Reservas Mês</div>
        <div class="kpi-value" id="totalMes">0</div>
      </div>

      <div class="kpi">
        <div class="kpi-title">Buffet Hoje</div>
        <div class="kpi-value" id="buffetHoje">0</div>
      </div>

      <div class="kpi">
        <div class="kpi-title">Empresas</div>
        <div class="kpi-value">3</div>
      </div>
    </div>
  </div>

  <div class="card">
    <b>🏢 Por Empresa</b>
    <div id="empresas"></div>
  </div>

  <div class="card">
    <b>📊 Status</b>
    <div id="statusReservas"></div>
  </div>

</div>

<script>

// 🔥 CONEXÃO REAL
const supabase = supabase.createClient(
"https://dxkszikemntfusfyrzos.supabase.co",
"sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
);

// 🔥 DATA LOCAL (SEM BUG DE FUSO)
function hojeString(){
  const d = new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}

function mesInicio(){
  const d = new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-01";
}

// 🔥 TABELAS
const tabelas = [
  {nome:"MERCATTO", tabela:"reservas_mercatto"},
  {nome:"VILLA", tabela:"reservas_villa"},
  {nome:"DELÍCIA", tabela:"reservas_delicia"}
];

// 🔥 FUNÇÃO PRINCIPAL
async function carregar(){

  console.log("🔄 carregando...");

  let totalHoje = 0;
  let totalMes = 0;
  let htmlEmpresas = "";
  let statusMap = {};

  const hoje = hojeString();
  const inicioMes = mesInicio();

  for(const t of tabelas){

    // 🔥 HOJE
    const { data: hojeData, error: erroHoje } = await supabase
    .from(t.tabela)
    .select("status, datahora");

    if(erroHoje){
      console.error("Erro hoje", t.tabela, erroHoje);
      continue;
    }

    const hojeFiltrado = hojeData.filter(r => r.datahora?.startsWith(hoje));

    // 🔥 MÊS
    const mesFiltrado = hojeData.filter(r => r.datahora >= inicioMes);

    totalHoje += hojeFiltrado.length;
    totalMes += mesFiltrado.length;

    // STATUS
    hojeFiltrado.forEach(r=>{
      const s = r.status || "Sem status";
      statusMap[s] = (statusMap[s] || 0) + 1;
    });

    htmlEmpresas += `
      <div class="linha">
        <span>${t.nome}</span>
        <span>${hojeFiltrado.length} hoje</span>
      </div>
    `;
  }

  // 🔥 BUFFET
  const { data: buffetData, error: erroBuffet } = await supabase
    .from("buffet_lancamentos")
    .select("data");

  if(erroBuffet){
    console.error("Erro buffet", erroBuffet);
  }

  const buffetHoje = buffetData.filter(b => b.data === hoje);

  // 🔥 ATUALIZA UI
  document.getElementById("totalHoje").innerText = totalHoje;
  document.getElementById("totalMes").innerText = totalMes;
  document.getElementById("buffetHoje").innerText = buffetHoje.length;

  document.getElementById("empresas").innerHTML = htmlEmpresas;

  // STATUS
  let htmlStatus = "";
  Object.keys(statusMap).forEach(s=>{
    htmlStatus += `
      <div class="linha">
        <span>${s}</span>
        <span>${statusMap[s]}</span>
      </div>
    `;
  });

  document.getElementById("statusReservas").innerHTML = htmlStatus;

  document.getElementById("status").innerText = "● Atualizado";
}

// 🔥 LOAD
carregar();

// 🔥 AUTO UPDATE
setInterval(carregar, 20000);

</script>

</body>
</html>

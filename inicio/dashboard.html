<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Sistemas • DV</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>

:root{
  --bg:#020617;
  --card:#0f172a;
  --border:#1e293b;
  --primary:#2563eb;
  --text:#ffffff;
  --sub:#94a3b8;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Inter;
}

body{
  background:linear-gradient(180deg,#020617,#020617 60%,#020617);
  color:var(--text);
  height:100vh;
  display:flex;
  flex-direction:column;
}

/* ===== HEADER ===== */
header{
  padding:18px 24px;
  background:rgba(15,23,42,0.7);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border);
  display:flex;
  justify-content:space-between;
  align-items:center;
}

header h1{
  font-size:20px;
  font-weight:800;
}

header span{
  font-size:13px;
  color:var(--sub);
}

/* ===== GRID ===== */
.dashboard{
  flex:1;
  padding:20px;
  display:grid;
  grid-template-columns: repeat(5, 1fr);
  grid-template-rows: repeat(2, 1fr);
  gap:16px;
}

/* ===== CARD ===== */
.card{
  background:linear-gradient(180deg,#0f172a,#020617);
  border:1px solid var(--border);
  border-radius:14px;
  overflow:hidden;
  position:relative;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-4px) scale(1.01);
  border-color:var(--primary);
  box-shadow:0 0 20px rgba(37,99,235,0.25);
}

/* glow top */
.card::before{
  content:"";
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:2px;
  background:linear-gradient(90deg,transparent,var(--primary),transparent);
  opacity:0.6;
}

/* iframe */
.card iframe{
  width:100%;
  height:100%;
  border:none;
}

/* label */
.card-title{
  position:absolute;
  top:10px;
  left:12px;
  font-size:12px;
  font-weight:600;
  background:rgba(0,0,0,0.4);
  padding:4px 10px;
  border-radius:6px;
  backdrop-filter:blur(6px);
  color:#fff;
}

/* ===== RESPONSIVO ===== */
@media(max-width:1200px){
  .dashboard{
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: auto;
  }
}

@media(max-width:768px){
  .dashboard{
    grid-template-columns: repeat(2, 1fr);
  }
}

@media(max-width:500px){
  .dashboard{
    grid-template-columns: 1fr;
  }
}

</style>
</head>
<body>

<header>
  <h1>📊 Painel de Sistemas</h1>
  <span id="hora"></span>
</header>

<div class="dashboard">

  <!-- CARD 1 -->
  <div class="card">
    <div class="card-title">Sistema 01</div>
    <iframe src="gestao/cards/card1.html"></iframe>
  </div>

  <!-- CARD 2 -->
  <div class="card">
    <div class="card-title">Sistema 02</div>
    <iframe src="gestao/cards/card2.html"></iframe>
  </div>

  <!-- CARD 3 -->
  <div class="card">
    <div class="card-title">Sistema 03</div>
    <iframe src="gestao/cards/card3.html"></iframe>
  </div>

  <!-- CARD 4 -->
  <div class="card">
    <div class="card-title">Sistema 04</div>
    <iframe src="gestao/cards/card4.html"></iframe>
  </div>

  <!-- CARD 5 -->
  <div class="card">
    <div class="card-title">Sistema 05</div>
    <iframe src="gestao/cards/card5.html"></iframe>
  </div>

  <!-- CARD 6 -->
  <div class="card">
    <div class="card-title">Sistema 06</div>
    <iframe src="gestao/cards/card6.html"></iframe>
  </div>

  <!-- CARD 7 -->
  <div class="card">
    <div class="card-title">Sistema 07</div>
    <iframe src="gestao/cards/card7.html"></iframe>
  </div>

  <!-- CARD 8 -->
  <div class="card">
    <div class="card-title">Sistema 08</div>
    <iframe src="gestao/cards/card8.html"></iframe>
  </div>

  <!-- CARD 9 -->
  <div class="card">
    <div class="card-title">Sistema 09</div>
    <iframe src="gestao/cards/card9.html"></iframe>
  </div>

  <!-- CARD 10 -->
  <div class="card">
    <div class="card-title">Sistema 10</div>
    <iframe src="gestao/cards/card10.html"></iframe>
  </div>

</div>

<script>
// ===== HORA AO VIVO =====
function atualizarHora(){
  const agora = new Date()
  const hora = agora.toLocaleTimeString("pt-BR", {
    hour: "2-digit",
    minute: "2-digit",
    second: "2-digit"
  })
  document.getElementById("hora").innerText = hora
}
setInterval(atualizarHora,1000)
atualizarHora()
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Resumo Buffet</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Inter;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100%;
}

.box{
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding:16px;
}

.empresa{
  font-size:12px;
  color:#6b7280;
  margin-bottom:4px;
}

.data{
  font-size:14px;
  font-weight:600;
  margin-bottom:6px;
}

.valor{
  font-size:26px;
  font-weight:800;
  color:#2563eb;
}

.loading{
  font-size:12px;
  color:#999;
}
</style>
</head>
<body>

<div class="box">
  <div class="empresa" id="empresa">Carregando...</div>
  <div class="data" id="data">--</div>
  <div class="valor" id="valor">--</div>
</div>

<script>

const sb = supabase.createClient(
  "https://dxkszikemntfusfyrzos.supabase.co",
  "sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
)

const EMPRESAS = [
  "MERCATTO DELÍCIA",
  "VILLA GOURMET",
  "DELÍCIA GOURMET"
]

async function carregar(){

  let html = ""

  for(const empresa of EMPRESAS){

    // 🔥 1. PEGA ÚLTIMA DATA
    const { data: ultimaDataRes } = await sb
      .from("buffet_lancamentos")
      .select("data")
      .eq("empresa", empresa)
      .order("data", { ascending: false })
      .limit(1)

    if(!ultimaDataRes || !ultimaDataRes.length){
      html += blocoSemDados(empresa)
      continue
    }

    const ultimaData = ultimaDataRes[0].data

    // 🔥 2. PEGA TODOS OS LANÇAMENTOS DO DIA
    const { data: lancamentos } = await sb
      .from("buffet_lancamentos")
      .select("quantidade, tipo")
      .eq("empresa", empresa)
      .eq("data", ultimaData)

    // 🔥 3. SOMA CORRETA (SÓ PRODUÇÃO)
let total = 0

;(lancamentos || []).forEach(l => {

  const q = Number(l.quantidade || 0)

  if(l.tipo === "MONTAGEM" || l.tipo === "REPOSICAO"){
    total += q
  }

  if(l.tipo === "RETIRADA" || l.tipo === "DEVOLUCAO"){
    total -= q
  }

})

// nunca deixa negativo
if(total < 0) total = 0
    // 🔥 DATA FORMATADA
const [ano, mes, dia] = ultimaData.split("-")
const dataFormatada = `${dia}/${mes}/${ano}`

    html += `
      <div style="margin-bottom:16px">
        <div class="empresa">${empresa}</div>
        <div class="data">Último lançamento: ${dataFormatada}</div>
        <div class="valor">${total.toFixed(2)} KG</div>
      </div>
    `
  }

  document.querySelector(".box").innerHTML = html
}

// fallback
function blocoSemDados(empresa){
  return `
    <div style="margin-bottom:16px">
      <div class="empresa">${empresa}</div>
      <div class="data">Sem dados</div>
      <div class="valor">--</div>
    </div>
  `
}

// auto update
setInterval(carregar, 10000)
carregar()

</script>

</body>
</html>

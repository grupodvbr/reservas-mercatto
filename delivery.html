<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mercatto Delícia • Pedidos Admin</title>

<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

:root{
--bg:#020617;
--panel:#0f172a;
--line:#1e293b;
--text:#e2e8f0;
--muted:#94a3b8;
--accent:#3b82f6;
--green:#22c55e;
--yellow:#f59e0b;
--red:#ef4444;
--radius:12px;
}

*{box-sizing:border-box;font-family:Inter;margin:0;padding:0}

body{
background:var(--bg);
color:var(--text);
padding:20px;
}

h1{
font-size:22px;
margin-bottom:20px;
font-weight:800;
}

table{
width:100%;
border-collapse:collapse;
background:var(--panel);
border:1px solid var(--line);
border-radius:var(--radius);
overflow:hidden;
}

th,td{
padding:12px;
border-bottom:1px solid var(--line);
font-size:13px;
}

th{
background:#020617;
font-weight:700;
text-align:left;
}

tr:hover{
background:rgba(255,255,255,.03)
}

button{
border:none;
padding:6px 10px;
border-radius:8px;
cursor:pointer;
font-weight:600;
}

.aprovar{background:var(--green);color:white}
.rejeitar{background:var(--red);color:white}
.ver{background:var(--accent);color:white}
.status{font-weight:700}

.status-novo{color:var(--yellow)}
.status-aprovado{color:var(--green)}
.status-preparo{color:#60a5fa}
.status-entregue{color:#22c55e}
.status-rejeitado{color:var(--red)}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.7);
display:none;
align-items:center;
justify-content:center;
z-index:999;
}

.modalBox{
width:600px;
max-height:80vh;
overflow:auto;
background:var(--panel);
border:1px solid var(--line);
border-radius:14px;
padding:20px;
}

.close{
float:right;
cursor:pointer;
font-weight:800;
color:var(--red);
}

.item{
display:flex;
gap:10px;
margin-top:12px;
padding:10px;
background:#020617;
border:1px solid var(--line);
border-radius:10px;
}

.item img{
width:70px;
height:70px;
object-fit:cover;
border-radius:8px;
}

.total{
margin-top:15px;
font-size:16px;
font-weight:800;
}

select{
background:#020617;
border:1px solid var(--line);
color:white;
padding:6px;
border-radius:6px;
}

</style>
</head>

<body>

<h1>📦 Pedidos • Mercatto Delícia</h1>

<table>

<thead>

<tr>
<th>#</th>
<th>Cliente</th>
<th>Telefone</th>
<th>Tipo</th>
<th>Total</th>
<th>Status</th>
<th>Ações</th>
</tr>

</thead>

<tbody id="lista">

<tr>
<td colspan="7" style="text-align:center;color:var(--muted)">
Carregando pedidos...
</td>
</tr>

</tbody>

</table>

<div id="modal" class="modal">

<div class="modalBox">

<span class="close" onclick="fechar()">X</span>

<h2 id="tituloPedido"></h2>

<div id="itensPedido"></div>

<div class="total" id="totalPedido"></div>

<br>

<label>Status:</label>
<select id="statusSelect"></select>

<button class="aprovar" onclick="salvarStatus()">Salvar</button>
<button class="ver" onclick="imprimir()">Imprimir</button>

</div>

</div>

<script>

const db = supabase.createClient(
"https://dxkszikemntfusfyrzos.supabase.co",
"sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
)

let pedidos=[]
let atual=null

async function carregar(){

const {data}=await db
.from("pedidos")
.select("*")
.order("created_at",{ascending:false})

pedidos=data||[]

render()

}

function render(){

const tbody=document.getElementById("lista")
tbody.innerHTML=""

pedidos.forEach((p,i)=>{

const total=(p.itens||[])
.reduce((s,it)=>s+(it.preco*it.quantidade),0)

const tr=document.createElement("tr")

tr.innerHTML=`
<td>${i+1}</td>
<td>${p.cliente_nome}</td>
<td>${p.cliente_telefone}</td>
<td>${p.tipo}</td>
<td>R$ ${total}</td>
<td class="status status-${p.status}">${p.status}</td>
<td>
<button class="ver" onclick="abrir(${i})">Ver</button>
</td>
`

tbody.appendChild(tr)

})

}

async function abrir(i){

atual=pedidos[i]

document.getElementById("tituloPedido").innerText=
"Pedido de "+atual.cliente_nome

const area=document.getElementById("itensPedido")

area.innerHTML=""

let total=0

for(const it of atual.itens){

let foto=""

const {data}=await db
.from("buffet")
.select("foto_url")
.ilike("nome",it.nome)
.limit(1)

if(data && data.length) foto=data[0].foto_url

total+=it.preco*it.quantidade

area.innerHTML+=`
<div class="item">
${foto?`<img src="${foto}">`:''}
<div>
<b>${it.nome}</b><br>
${it.quantidade}x R$ ${it.preco}
</div>
</div>
`

}

document.getElementById("totalPedido")
.innerText="Total: R$ "+total

const select=document.getElementById("statusSelect")

select.innerHTML=""

const status=[
"novo",
"aprovado",
"preparo",
"entregue",
"rejeitado"
]

status.forEach(s=>{

select.innerHTML+=`
<option value="${s}" ${s==atual.status?"selected":""}>
${s}
</option>
`

})

document.getElementById("modal").style.display="flex"

}

function fechar(){

document.getElementById("modal").style.display="none"

}

async function salvarStatus(){

const novo=document.getElementById("statusSelect").value

await db
.from("pedidos")
.update({status:novo})
.eq("id",atual.id)

carregar()

fechar()

}

function imprimir(){

let texto="PEDIDO MERCATTO DELÍCIA\n\n"

texto+="Cliente: "+atual.cliente_nome+"\n"
texto+="Telefone: "+atual.cliente_telefone+"\n"
texto+="Tipo: "+atual.tipo+"\n\n"

texto+="Itens:\n"

let total=0

atual.itens.forEach(it=>{

texto+=`${it.quantidade}x ${it.nome} - R$ ${it.preco}\n`
total+=it.preco*it.quantidade

})

texto+="\nTOTAL: R$ "+total

const w=window.open("","","width=400,height=600")

w.document.write("<pre>"+texto+"</pre>")

w.print()

}

carregar()

</script>

</body>
</html>

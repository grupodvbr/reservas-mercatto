<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Pedidos Mercatto Delícia • Admin</title>

<meta name="viewport"
content="width=device-width,
initial-scale=1,
maximum-scale=1,
user-scalable=no,
viewport-fit=cover">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

:root{
--bg:#020617;
--card:#0f172a;
--border:#1e293b;
--text:#f1f5f9;
--muted:#94a3b8;
--green:#22c55e;
--red:#ef4444;
--blue:#3b82f6;
--yellow:#facc15;
}

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Inter;
}

body{
background:var(--bg);
color:var(--text);
padding:20px;
}

h1{
font-size:22px;
margin-bottom:15px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid var(--border);
font-size:13px;
}

th{
background:var(--card);
text-align:left;
}

tr:hover{
background:rgba(255,255,255,.05);
}

button{
border:none;
padding:6px 10px;
border-radius:6px;
font-weight:600;
cursor:pointer;
}

.aprovar{
background:var(--green);
color:#fff;
}

.rejeitar{
background:var(--red);
color:#fff;
}

.ver{
background:var(--blue);
color:#fff;
}

.status-novo{color:var(--yellow)}
.status-aprovado{color:var(--green)}
.status-rejeitado{color:var(--red)}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.7);
display:none;
align-items:center;
justify-content:center;
}

.modalBox{
background:var(--card);
padding:20px;
border-radius:10px;
width:420px;
max-height:80vh;
overflow:auto;
}

.close{
float:right;
cursor:pointer;
color:red;
font-weight:800;
}

</style>
</head>

<body>

<h1>🧾 Pedidos • Mercatto Delícia</h1>

<table>

<thead>

<tr>
<th>#</th>
<th>Cliente</th>
<th>Telefone</th>
<th>Tipo</th>
<th>Total</th>
<th>Status</th>
<th>Ações</th>
</tr>

</thead>

<tbody id="listaPedidos">
<tr>
<td colspan="7" style="text-align:center;color:var(--muted)">
Carregando...
</td>
</tr>
</tbody>

</table>


<div id="modal" class="modal">

<div class="modalBox">

<span class="close" onclick="fechar()">X</span>

<h3>Detalhes do Pedido</h3>

<div id="detalhes"></div>

<button onclick="imprimir()">🖨️ Imprimir</button>

</div>

</div>


<script>

const db = supabase.createClient(

"https://dxkszikemntfusfyrzos.supabase.co",
"sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"

)

let pedidos=[]
let selecionado=null


async function carregar(){

const {data}=await db
.from("pedidos")
.select("*")
.order("created_at",{ascending:false})

pedidos=data||[]

render()

}

function render(){

const tbody=document.getElementById("listaPedidos")

tbody.innerHTML=""

if(!pedidos.length){

tbody.innerHTML=`<tr>
<td colspan="7">Sem pedidos</td>
</tr>`

return

}

pedidos.forEach((p,i)=>{

const total=(p.itens||[])
.reduce((s,it)=>s+(it.preco*it.quantidade),0)

const tr=document.createElement("tr")

tr.innerHTML=`

<td>${i+1}</td>

<td>${p.cliente_nome||"-"}</td>

<td>${p.cliente_telefone||"-"}</td>

<td>${p.tipo||"-"}</td>

<td>R$ ${total}</td>

<td class="status-${p.status}">
${p.status}
</td>

<td>

<button class="aprovar"
onclick="aprovar('${p.id}')">
Aprovar
</button>

<button class="rejeitar"
onclick="rejeitar('${p.id}')">
Rejeitar
</button>

<button class="ver"
onclick="abrir(${i})">
Ver
</button>

</td>

`

tbody.appendChild(tr)

})

}



async function aprovar(id){

await db
.from("pedidos")
.update({status:"aprovado"})
.eq("id",id)

carregar()

}

async function rejeitar(id){

await db
.from("pedidos")
.update({status:"rejeitado"})
.eq("id",id)

carregar()

}



function abrir(i){

selecionado=pedidos[i]

const d=document.getElementById("detalhes")

const itens=(selecionado.itens||[])
.map(it=>`<li>${it.quantidade}x ${it.nome} - R$ ${it.preco}</li>`)
.join("")

const total=(selecionado.itens||[])
.reduce((s,it)=>s+(it.preco*it.quantidade),0)

d.innerHTML=`

<p><b>Cliente:</b> ${selecionado.cliente_nome}</p>

<p><b>Telefone:</b> ${selecionado.cliente_telefone}</p>

<p><b>Tipo:</b> ${selecionado.tipo}</p>

<p><b>Endereço:</b> ${selecionado.cliente_endereco||"-"}</p>

<p><b>Bairro:</b> ${selecionado.cliente_bairro||"-"}</p>

<p><b>Itens:</b></p>

<ul>${itens}</ul>

<p><b>Total:</b> R$ ${total}</p>

`

document.getElementById("modal").style.display="flex"

}



function fechar(){

document.getElementById("modal").style.display="none"

}



function imprimir(){

let texto="PEDIDO MERCATTO DELÍCIA\n\n"

texto+="Cliente: "+selecionado.cliente_nome+"\n"
texto+="Telefone: "+selecionado.cliente_telefone+"\n"
texto+="Tipo: "+selecionado.tipo+"\n\n"

texto+="Itens:\n"

selecionado.itens.forEach(it=>{

texto+=`${it.quantidade}x ${it.nome} - R$ ${it.preco}\n`

})

const total=selecionado.itens
.reduce((s,it)=>s+(it.preco*it.quantidade),0)

texto+="\nTOTAL: R$ "+total

const win=window.open("","","width=400,height=600")

win.document.write("<pre>"+texto+"</pre>")

win.print()

}



carregar()

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>OTTO • Assistente Inteligente</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#020617;
  --card:#0f172a;
  --primary:#22c55e;
  --secondary:#2563eb;
  --text:#ffffff;
  --sub:#94a3b8;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Inter;
}

body{
  background:var(--bg);
  color:var(--text);
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* HEADER */
header{
  padding:16px;
  background:rgba(15,23,42,0.8);
  backdrop-filter:blur(10px);
  display:flex;
  justify-content:space-between;
}

/* CHAT */
#chat{
  flex:1;
  overflow:auto;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg{
  max-width:75%;
  padding:14px;
  border-radius:14px;
}

.user{
  background:var(--secondary);
  align-self:flex-end;
}

.bot{
  background:var(--card);
}

/* FOOTER */
footer{
  padding:10px;
  display:flex;
  gap:10px;
}

input{
  flex:1;
  padding:12px;
  border-radius:10px;
  border:none;
}

button{
  padding:12px;
  border-radius:10px;
  border:none;
  background:var(--secondary);
  color:white;
}

/* MIC */
#mic{
  position:fixed;
  bottom:80px;
  right:20px;
  width:70px;
  height:70px;
  border-radius:50%;
  background:var(--primary);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
}

#status{
  position:fixed;
  bottom:150px;
  right:20px;
  background:#0f172a;
  padding:10px;
  border-radius:10px;
  font-size:12px;
}
</style>
</head>

<body>

<header>
  <h2>🤖 OTTO</h2>
  <span>Assistente Inteligente</span>
</header>

<div id="chat"></div>

<div id="status">Diga "Otto" para ativar</div>

<div id="mic">🎤</div>

<footer>
  <input id="input" placeholder="Digite ou fale..." />
  <button id="send">Enviar</button>
</footer>

<script>
const chat = document.getElementById("chat")
const input = document.getElementById("input")
const status = document.getElementById("status")

let ativo = false
let textoFinal = ""
let timeoutFim = null

// ================= CHAT =================
function addMsg(texto, tipo){
  const div = document.createElement("div")
  div.className = "msg " + tipo
  div.innerText = texto
  chat.appendChild(div)
  chat.scrollTop = chat.scrollHeight
}

// ================= VOZ =================
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition
const recognition = new SpeechRecognition()

recognition.lang = "pt-BR"
recognition.continuous = true
recognition.interimResults = true

recognition.onresult = (event) => {

  let parcial = ""

  for(let i = event.resultIndex; i < event.results.length; i++){
    parcial += event.results[i][0].transcript
  }

  parcial = parcial.toLowerCase()

  console.log("🎤", parcial)

  const acordou =
    parcial.includes("otto") ||
    parcial.includes("oto") ||
    parcial.includes("foto")

  if(acordou && !ativo){
    ativo = true
    status.innerText = "🎧 Pode falar..."
    textoFinal = ""
    return
  }

  if(!ativo) return

  textoFinal = parcial

  if(timeoutFim){
    clearTimeout(timeoutFim)
  }

  timeoutFim = setTimeout(() => {

    let textoLimpo = textoFinal
      .replace(/otto|oto|foto/gi,"")
      .trim()

    if(textoLimpo.length < 3){
      ativo = false
      return
    }

    console.log("✅ FRASE FINAL:", textoLimpo)

    enviarMensagem(textoLimpo)

    ativo = false
    textoFinal = ""
    status.innerText = "Diga 'Otto' novamente"

  }, 4000)
}

recognition.onend = () => {
  setTimeout(()=>recognition.start(),500)
}

recognition.start()

// ================= API =================
async function enviarMensagem(texto){

  addMsg(texto, "user")

  try{

    const res = await fetch("/api/admin-agente", {
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer SEU_ADMIN_TOKEN"
      },
      body:JSON.stringify({
        pergunta: texto,
        numero: "557798253249"
      })
    })

    if(!res.ok){
      addMsg("❌ erro de acesso", "bot")
      return
    }

    const data = await res.json()

    addMsg(data.resposta, "bot")

    falar(data.resposta)

  }catch(e){
    addMsg("❌ erro conexão", "bot")
  }
}

// ================= VOZ RESPOSTA =================
function falar(texto){
  const msg = new SpeechSynthesisUtterance(texto)
  msg.lang = "pt-BR"
  speechSynthesis.speak(msg)
}

// ================= INPUT =================
document.getElementById("send").onclick = () => {
  if(input.value.trim()){
    enviarMensagem(input.value)
    input.value = ""
  }
}

input.addEventListener("keypress", e=>{
  if(e.key === "Enter"){
    document.getElementById("send").click()
  }
})

// ================= MIC =================
document.getElementById("mic").onclick = () => {
  ativo = true
  status.innerText = "🎧 Pode falar..."
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>OTTO • Assistente</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#020617;
  --card:#0f172a;
  --primary:#22c55e;
  --secondary:#2563eb;
  --text:#fff;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Inter;
}

body{
  background:var(--bg);
  color:white;
  overflow:hidden;
}

/* ================= AURORA ================= */

#aurora{
  position:fixed;
  inset:0;
  z-index:0;
  opacity:0;
  transition:opacity 0.5s;
  background:
    radial-gradient(circle at 20% 30%, rgba(34,197,94,0.3), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(37,99,235,0.3), transparent 40%),
    radial-gradient(circle at 50% 50%, rgba(168,85,247,0.2), transparent 50%);
  filter: blur(60px);
  animation: auroraMove 8s infinite alternate ease-in-out;
}

@keyframes auroraMove{
  0%{ transform:scale(1) translate(0,0) }
  100%{ transform:scale(1.2) translate(40px,-40px) }
}

#aurora.active{
  opacity:1;
}

/* ================= BOLA ================= */

#orb{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0);
  width:200px;
  height:200px;
  border-radius:50%;
  background:radial-gradient(circle,#22c55e,#2563eb);
  filter:blur(30px);
  transition:all 0.4s ease;
  z-index:1;
}

#orb.active{
  transform:translate(-50%,-50%) scale(1);
}

/* ================= CHAT ================= */

#chat{
  position:absolute;
  inset:0;
  z-index:2;
  padding:20px;
  overflow:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg{
  max-width:70%;
  padding:14px;
  border-radius:12px;
}

.user{
  background:#2563eb;
  align-self:flex-end;
}

.bot{
  background:#0f172a;
}

/* ================= INPUT ================= */

footer{
  position:absolute;
  bottom:0;
  width:100%;
  display:flex;
  padding:10px;
  gap:10px;
  z-index:3;
}

input{
  flex:1;
  padding:12px;
  border-radius:10px;
  border:none;
}

button{
  padding:12px;
  border:none;
  border-radius:10px;
  background:#2563eb;
  color:white;
}

#mic{
  position:fixed;
  bottom:80px;
  right:20px;
  width:70px;
  height:70px;
  border-radius:50%;
  background:#22c55e;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
  z-index:3;
}
</style>
</head>

<body>

<div id="aurora"></div>
<div id="orb"></div>

<div id="chat"></div>

<div id="mic">🎤</div>

<footer>
  <input id="input" placeholder="Digite..." />
  <button id="send">Enviar</button>
</footer>

<script>
const chat = document.getElementById("chat")
const input = document.getElementById("input")
const aurora = document.getElementById("aurora")
const orb = document.getElementById("orb")

let ativo = false
let audioLiberado = false

// 🔥 LIBERA AUDIO
document.body.onclick = () => {
  audioLiberado = true
}

// ================= VISUAL =================
function ativarVisual(){
  aurora.classList.add("active")
  orb.classList.add("active")
}

function desativarVisual(){
  aurora.classList.remove("active")
  orb.classList.remove("active")
}

// ================= CHAT =================
function addMsg(t, tipo){
  const d = document.createElement("div")
  d.className = "msg " + tipo
  d.innerText = t
  chat.appendChild(d)
  chat.scrollTop = chat.scrollHeight
}

// ================= BEEP =================
function beep(){
  if(!audioLiberado) return
  new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg").play().catch(()=>{})
}

// ================= VOZ =================
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition
const recognition = new SpeechRecognition()

recognition.lang = "pt-BR"
recognition.continuous = true
recognition.interimResults = true

recognition.onresult = (e)=>{
  let texto = ""

  for(let i=e.resultIndex;i<e.results.length;i++){
    texto += e.results[i][0].transcript.toLowerCase()
  }

  console.log("🎤", texto)

  const acordou =
    texto.includes("otto") ||
    texto.includes("oto") ||
    texto.includes("otô") ||
    texto.includes("foto")

  if(acordou && !ativo){
    ativo = true
    ativarVisual()
    beep()
    return
  }

  if(!ativo) return

  texto = texto.replace(/otto|oto|foto|otô/gi,"").trim()

  if(texto.length < 3) return

  enviar(texto)
  ativo = false
  desativarVisual()
}

recognition.onend = ()=>{
  setTimeout(()=>recognition.start(),500)
}

recognition.start()

// ================= API =================
async function enviar(texto){

  addMsg(texto,"user")

  const res = await fetch("/api/admin-agente",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer mercatto_admin_2026"
    },
    body:JSON.stringify({
      pergunta:texto,
      numero:"557798253249"
    })
  })

  const data = await res.json()

  addMsg(data.resposta,"bot")
  falar(data.resposta)
}

// ================= VOZ =================
function falar(t){
  if(!audioLiberado) return
  const msg = new SpeechSynthesisUtterance(t)
  msg.lang = "pt-BR"
  speechSynthesis.speak(msg)
}

// ================= INPUT =================
document.getElementById("send").onclick=()=>{
  enviar(input.value)
  input.value=""
}

document.getElementById("mic").onclick=()=>{
  ativo=true
  ativarVisual()
  beep()
}
</script>

</body>
</html>

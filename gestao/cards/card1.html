<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Resumo Buffet</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Inter;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100%;
}

.box{
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding:16px;
}

.empresa{
  font-size:12px;
  color:#6b7280;
  margin-bottom:4px;
}

.data{
  font-size:14px;
  font-weight:600;
  margin-bottom:6px;
}

.valor{
  font-size:26px;
  font-weight:800;
  color:#2563eb;
}

.loading{
  font-size:12px;
  color:#999;
}
</style>
</head>
<body>

<div class="box">
  <div class="empresa" id="empresa">Carregando...</div>
  <div class="data" id="data">--</div>
  <div class="valor" id="valor">--</div>
</div>

<script>

const sb = supabase.createClient(
  "https://dxkszikemntfusfyrzos.supabase.co",
  "sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
)

// 🔥 EMPRESAS (pode adicionar mais depois)
const EMPRESAS = [
  "MERCATTO DELÍCIA",
  "VILLA GOURMET",
  "DELÍCIA GOURMET"
]

async function carregar(){

  let html = ""

  for(const empresa of EMPRESAS){

    // 🔥 pega último registro
    const { data } = await sb
      .from("buffet_lancamentos")
      .select("data, quantidade")
      .eq("empresa", empresa)
      .order("data", { ascending: false })
      .limit(1)

    if(data && data.length){

      const ultimo = data[0]

      const dataFormatada = new Date(ultimo.data)
        .toLocaleDateString("pt-BR")

      html += `
        <div style="margin-bottom:14px">
          <div class="empresa">${empresa}</div>
          <div class="data">Último lançamento: ${dataFormatada}</div>
          <div class="valor">${Number(ultimo.quantidade).toFixed(2)} KG</div>
        </div>
      `

    }else{

      html += `
        <div style="margin-bottom:14px">
          <div class="empresa">${empresa}</div>
          <div class="data">Sem dados</div>
          <div class="valor">--</div>
        </div>
      `

    }
  }

  document.querySelector(".box").innerHTML = html
}

// 🔄 auto update
setInterval(carregar, 10000)
carregar()

</script>

</body>
</html>

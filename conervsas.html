<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Gestor Mercatto</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
margin:0;
font-family:Inter;
background:#0f172a;
color:white;
display:flex;
height:100vh;
}

/* SIDEBAR */
.sidebar{
width:320px;
background:#020617;
border-right:1px solid #1e293b;
overflow:auto;
}

.client{
padding:14px;
border-bottom:1px solid #1e293b;
cursor:pointer;
}

.client:hover{
background:#1e293b;
}

.client.active{
background:#334155;
}

/* CHAT */
.chat{
flex:1;
display:flex;
flex-direction:column;
}

.header{
padding:16px;
border-bottom:1px solid #1e293b;
display:flex;
justify-content:space-between;
}

.messages{
flex:1;
overflow:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:10px;
}

.msg{
max-width:60%;
padding:10px;
border-radius:10px;
}

.user{
background:#1e293b;
align-self:flex-start;
}

.bot{
background:#22c55e;
color:black;
align-self:flex-end;
}

/* INPUT */
.send{
display:flex;
gap:10px;
padding:10px;
border-top:1px solid #1e293b;
}

.send input{
flex:1;
padding:12px;
border-radius:10px;
border:none;
}

button{
padding:10px 14px;
border:none;
border-radius:8px;
cursor:pointer;
}

.pause{
background:#ef4444;
color:white;
}

.ok{
background:#22c55e;
}

.log{
font-size:12px;
padding:6px;
opacity:.7;
}
</style>
</head>

<body>

<div class="sidebar" id="lista"></div>

<div class="chat">

<div class="header">
<div id="numero">Selecione</div>

<div>
<button onclick="pausar()" class="pause">Pausar</button>
<button onclick="ativar()" class="ok">Ativar</button>
</div>
</div>

<div class="messages" id="msgs"></div>

<div class="send">
<input id="txt" placeholder="Digite...">
<button onclick="enviar()">Enviar</button>
</div>

<div class="log" id="log"></div>

</div>

<script>

/* ✅ CORREÇÃO AQUI */
const db = window.supabase.createClient(
  "https://dxkszikemntfusfyrzos.supabase.co",
  "sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
)

let atual = null

/* ================= CLIENTES ================= */

async function carregar(){

const {data} = await db
.from("conversas_whatsapp")
.select("telefone")
.order("created_at",{ascending:false})

const unicos = [...new Set(data.map(d=>d.telefone))]

const lista = document.getElementById("lista")
lista.innerHTML=""

unicos.forEach(t=>{

const div = document.createElement("div")
div.className="client"
div.innerText=t

div.onclick=()=>{
atual=t
document.getElementById("numero").innerText=t
abrir()
}

lista.appendChild(div)

})

}

/* ================= CHAT ================= */

async function abrir(){

const {data} = await db
.from("conversas_whatsapp")
.select("*")
.eq("telefone",atual)
.order("created_at",{ascending:true})

const box = document.getElementById("msgs")
box.innerHTML=""

data.forEach(m=>{

const d = document.createElement("div")
d.className="msg "+(m.role==="assistant"?"bot":"user")
d.innerText=m.mensagem

box.appendChild(d)

})

box.scrollTop = box.scrollHeight

}

/* ================= ENVIAR ================= */

async function enviar(){

const txt = document.getElementById("txt").value

if(!txt || !atual) return

log("Enviando...")

try{

await fetch("/api/send",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
telefone:atual,
mensagem:txt
})
})

await db.from("conversas_whatsapp").insert({
telefone:atual,
mensagem:txt,
role:"assistant"
})

document.getElementById("txt").value=""

abrir()

log("✅ Enviado")

}catch(e){
log("❌ Erro")
console.log(e)
}

}

/* ================= BOT ================= */

async function pausar(){

if(!atual) return

await db.from("controle_bot").upsert({
telefone:atual,
pausado:true
})

log("⛔ pausado")

}

async function ativar(){

if(!atual) return

await db.from("controle_bot").upsert({
telefone:atual,
pausado:false
})

log("✅ ativo")

}

/* ================= LOG ================= */

function log(t){
document.getElementById("log").innerText=t
}

/* ================= AUTO ================= */

carregar()

setInterval(()=>{
if(atual) abrir()
},3000)

</script>

</body>
</html>

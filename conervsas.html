<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>WhatsApp • Mercatto</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- 🚫 anti cache -->
<meta http-equiv="Cache-Control" content="no-store" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Inter;background:#0b0f14;color:#fff}

.container{display:flex;height:100vh}

.sidebar{
  width:300px;background:#111827;border-right:1px solid #1f2937;
  display:flex;flex-direction:column;
}

.sidebar h2{
  padding:20px;margin:0;border-bottom:1px solid #1f2937;
}

.lista{flex:1;overflow:auto}

.item{
  padding:12px 16px;border-bottom:1px solid #1f2937;
  cursor:pointer
}
.item:hover{background:#1f2937}
.item.active{background:#2563eb}

.chat{flex:1;display:flex;flex-direction:column}

.header{
  padding:15px;border-bottom:1px solid #1f2937
}

.messages{
  flex:1;overflow:auto;padding:20px;
  display:flex;flex-direction:column;gap:10px
}

.msg{
  max-width:70%;padding:10px 14px;border-radius:14px
}
.user{background:#1f2937;align-self:flex-start}
.bot{background:#16a34a;align-self:flex-end}

.input{
  display:flex;padding:10px;border-top:1px solid #1f2937
}

.input input{
  flex:1;padding:12px;border:none;outline:none;
  background:#1f2937;color:#fff;border-radius:10px
}

.input button{
  margin-left:10px;padding:12px 20px;
  border:none;background:#16a34a;color:#fff;
  border-radius:10px;cursor:pointer
}

.status{
  font-size:12px;
  padding:5px 10px;
  color:#9ca3af;
}
</style>
</head>

<body>

<div class="container">

  <div class="sidebar">
    <h2>Conversas</h2>
    <div class="lista" id="lista"></div>
  </div>

  <div class="chat">
    <div class="header" id="header">Selecione uma conversa</div>

    <div class="messages" id="msgs"></div>

    <div class="status" id="status"></div>

    <div class="input">
      <input id="txt" placeholder="Digite..." />
      <button onclick="enviar()">Enviar</button>
    </div>
  </div>

</div>

<script>

let numeroAtual = "";

/* ================= LOG ================= */
function log(msg){
  console.log(msg);
  document.getElementById("status").innerText = msg;
}

/* ================= LISTA ================= */
async function carregarConversas(){

  try{
    const res = await fetch("/api/conversas?ts=" + Date.now(), {
      cache:"no-store"
    });

    if(!res.ok){
      log("Erro ao carregar conversas");
      return;
    }

    const lista = await res.json();

    const div = document.getElementById("lista");
    div.innerHTML = "";

    lista.forEach(num => {

      const el = document.createElement("div");
      el.className = "item";
      el.innerText = num;

      el.onclick = () => {
        document.querySelectorAll(".item").forEach(i=>i.classList.remove("active"));
        el.classList.add("active");
        abrirChat(num);
      };

      div.appendChild(el);

    });

  } catch(e){
    log("Erro: " + e.message);
  }
}

/* ================= CHAT ================= */
async function abrirChat(numero){

  numeroAtual = numero;
  document.getElementById("header").innerText = numero;

  try{
    const res = await fetch(`/api/conversas?numero=${numero}&ts=${Date.now()}`, {
      cache:"no-store"
    });

    if(!res.ok){
      log("Erro ao abrir chat");
      return;
    }

    const msgs = await res.json();

    const div = document.getElementById("msgs");
    div.innerHTML = "";

    msgs.forEach(m => {

      const el = document.createElement("div");
      el.classList.add("msg");

      if(m.role === "user"){
        el.classList.add("user");
      } else {
        el.classList.add("bot");
      }

      el.innerText = m.mensagem;
      div.appendChild(el);

    });

    div.scrollTop = div.scrollHeight;

  } catch(e){
    log("Erro: " + e.message);
  }
}

/* ================= ENVIAR ================= */
async function enviar(){

  const texto = document.getElementById("txt").value;

  if(!texto || !numeroAtual){
    log("Selecione um chat");
    return;
  }

  log("Enviando...");

  try{

    const res = await fetch("/api/send", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        numero: numeroAtual,
        mensagem: texto
      })
    });

    if(!res.ok){
      log("Erro ao enviar");
      return;
    }

    log("Mensagem enviada ✅");

    document.getElementById("txt").value = "";

    abrirChat(numeroAtual);

  } catch(e){
    log("Erro: " + e.message);
  }
}

/* ================= AUTO ================= */
setInterval(()=>{
  carregarConversas();
  if(numeroAtual) abrirChat(numeroAtual);
},3000);

carregarConversas();

</script>

</body>
</html>

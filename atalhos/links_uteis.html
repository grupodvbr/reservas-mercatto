<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Central de Links</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter}

body{
background:#f8fafc;
padding:18px;
color:#0f172a;
}

/* HEADER */
.header{
font-size:24px;
font-weight:800;
margin-bottom:12px;
}

/* SEARCH */
.search{
width:100%;
padding:14px 16px;
border-radius:14px;
border:1px solid #e2e8f0;
font-size:14px;
background:#fff;
margin-bottom:18px;
outline:none;
transition:.2s;
}

.search:focus{
border-color:#3b82f6;
box-shadow:0 0 0 3px rgba(59,130,246,.15);
}

/* GRID */
.grid{
display:grid;
gap:14px;
grid-template-columns:repeat(3,1fr);
}

/* TABLET */
@media(min-width:768px){
.grid{
grid-template-columns:repeat(5,1fr);
}
}

/* CARD */
.card{
background:#fff;
border-radius:16px;
padding:16px;
border:1px solid #e5e7eb;
display:flex;
flex-direction:column;
justify-content:space-between;
gap:10px;
transition:.2s;
}

.card:hover{
transform:translateY(-2px);
box-shadow:0 10px 25px rgba(0,0,0,.06);
}

/* TITLE */
.title{
font-size:14px;
font-weight:800;
}

/* DESC */
.desc{
font-size:12px;
color:#64748b;
line-height:1.4;
}

/* ACTIONS */
.actions{
display:flex;
gap:8px;
margin-top:10px;
}

button{
flex:1;
padding:10px;
border-radius:10px;
border:none;
cursor:pointer;
font-weight:700;
font-size:12px;
transition:.2s;
}

.copy{
background:#10b981;
color:#fff;
}

.copy:hover{
background:#059669;
}

.open{
background:#e2e8f0;
color:#0f172a;
}

.open:hover{
background:#cbd5e1;
}

/* TOAST */
.toast{
position:fixed;
bottom:20px;
right:20px;
background:#22c55e;
color:#fff;
padding:10px 14px;
border-radius:10px;
font-weight:700;
font-size:12px;
opacity:0;
transition:.2s;
}

.toast.show{
opacity:1;
}
</style>
</head>

<body>

<div class="header">Central de Links</div>

<input class="search" placeholder="Buscar..." oninput="filtrar(this.value)">

<div class="grid" id="grid"></div>

<div class="toast" id="toast">Link copiado</div>

<script>

const links = [

  {
    nome:"Requisições",
    desc:"Solicitação de produtos e controle de consumo",
    url:"https://otavio-seven.vercel.app/restaurante/requisicoesdemercadorias.html"
  },

  {
    nome:"Cardápio",
    desc:"Gerenciamento completo dos itens do cardápio",
    url:"https://otavio-seven.vercel.app/mercatto/cardapio.html"
  },

  {
    nome:"Buffet Mercatto",
    desc:"Lançamento e controle de produção do buffet",
    url:"https://reservas-mercatto.vercel.app/empresas/mercatto_barreiras/restaurante/coleta_de_dados/registro_do_buffet.html"
  },

  {
   nome:"Enviar currículos",
    desc:"Painel de captação de currículos",
    url:"https://recepcao-gold.vercel.app/empresas/rh/curriculos.html"
  },

  {
    nome:"Licitações",
    desc:"Controle de processos licitatórios",
    url:"https://seusite.com/licitacoes"
  },

  {
    nome:"Cotações",
    desc:"Gestão de orçamentos e fornecedores",
    url:"https://seusite.com/cotacoes"
  },

  {
    nome:"Análises",
    desc:"Relatórios e indicadores do sistema",
    url:"https://seusite.com/analises"
  }

];

const grid = document.getElementById("grid");

function render(lista){
  grid.innerHTML = lista.map(l=>`
    <div class="card">
      <div>
        <div class="title">${l.nome}</div>
        <div class="desc">${l.desc}</div>
      </div>

      <div class="actions">
        <button class="copy" onclick="copiar('${l.url}')">Copiar</button>
        <button class="open" onclick="window.open('${l.url}','_blank')">Abrir</button>
      </div>
    </div>
  `).join("");
}

render(links);

function copiar(texto){
  navigator.clipboard.writeText(texto);

  const t = document.getElementById("toast");
  t.classList.add("show");

  setTimeout(()=>t.classList.remove("show"),1500);
}

function filtrar(valor){
  const v = valor.toLowerCase();

  const filtrado = links.filter(l =>
    l.nome.toLowerCase().includes(v) ||
    l.desc.toLowerCase().includes(v)
  );

  render(filtrado);
}

</script>

</body>
</html>

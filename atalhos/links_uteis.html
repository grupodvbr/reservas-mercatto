<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<!-- 🔒 BLOQUEAR ZOOM -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Central de Links</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter;
-webkit-tap-highlight-color: transparent;
}

body{
background:linear-gradient(180deg,#f8fafc,#eef2f7);
padding:16px;
color:#0f172a;
}

/* HEADER */
.header{
font-size:22px;
font-weight:800;
margin-bottom:14px;
}

/* SEARCH */
.search{
width:100%;
padding:14px 16px;
border-radius:14px;
border:1px solid #e2e8f0;
font-size:14px;
background:#fff;
margin-bottom:16px;
outline:none;
transition:.25s;
}

.search:focus{
border-color:#3b82f6;
box-shadow:0 0 0 3px rgba(59,130,246,.15);
}

/* GRID RESPONSIVO TOP */
.grid{
display:grid;
gap:12px;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
}

/* CARD PREMIUM */
.card{
background:#fff;
border-radius:18px;
padding:16px;
border:1px solid #e5e7eb;
display:flex;
flex-direction:column;
justify-content:space-between;
gap:12px;
transition:.25s;
position:relative;
overflow:hidden;
}

/* efeito brilho */
.card::after{
content:"";
position:absolute;
top:0;
left:-100%;
width:100%;
height:100%;
background:linear-gradient(120deg,transparent,rgba(255,255,255,.4),transparent);
transition:.6s;
}

.card:active::after{
left:100%;
}

/* hover desktop */
@media(hover:hover){
.card:hover{
transform:translateY(-3px);
box-shadow:0 12px 30px rgba(0,0,0,.08);
}
}

/* TITULO */
.title{
font-size:14px;
font-weight:800;
}

/* DESC */
.desc{
font-size:12px;
color:#64748b;
line-height:1.4;
}

/* ACTIONS */
.actions{
display:flex;
gap:8px;
margin-top:10px;
}

/* BOTÕES */
button{
flex:1;
padding:10px;
border-radius:10px;
border:none;
cursor:pointer;
font-weight:700;
font-size:12px;
transition:.2s;
}

/* COPIAR */
.copy{
background:#10b981;
color:#fff;
}

.copy:active{
transform:scale(.97);
}

/* ABRIR */
.open{
background:#e2e8f0;
color:#0f172a;
}

.open:active{
transform:scale(.97);
}

/* TOAST */
.toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%) translateY(20px);
background:#0f172a;
color:#fff;
padding:12px 16px;
border-radius:12px;
font-weight:600;
font-size:12px;
opacity:0;
transition:.3s;
}

.toast.show{
opacity:1;
transform:translateX(-50%) translateY(0);
}

/* MOBILE AJUSTES */
@media(max-width:480px){
.header{
font-size:20px;
}
}
</style>
</head>

<body>

<div class="header">Central de Links</div>

<input class="search" placeholder="Buscar..." oninput="filtrar(this.value)">

<div class="grid" id="grid"></div>

<div class="toast" id="toast">Link copiado</div>

<script>

const links = [

{
nome:"Requisições",
desc:"Solicitação de produtos e controle de consumo",
url:"https://otavio-seven.vercel.app/restaurante/requisicoesdemercadorias.html"
},

{
nome:"Cardápio",
desc:"Gerenciamento completo dos itens do cardápio",
url:"https://otavio-seven.vercel.app/mercatto/cardapio.html"
},

{
nome:"Buffet Mercatto",
desc:"Lançamento e controle de produção do buffet",
url:"https://reservas-mercatto.vercel.app/empresas/mercatto_barreiras/restaurante/coleta_de_dados/registro_do_buffet.html"
},

{
nome:"Enviar currículos",
desc:"Painel de captação de currículos",
url:"https://recepcao-gold.vercel.app/empresas/rh/curriculos.html"
},

{
nome:"Produção de sushi",
desc:"Controle de produção do sushi",
url:"https://reservas-mercatto.vercel.app/empresas/mercatto_barreiras/restaurante/coleta_de_dados/producao_do_sushi.html"
},

{
nome:"Cotações",
desc:"Gestão de orçamentos e fornecedores",
url:"https://seusite.com/cotacoes"
},

{
nome:"Configurações administrativas",
desc:"Ajustes setóriais",
url:"https://reservas-mercatto.vercel.app/atalhos/configuracoes.html"
}

];

const grid = document.getElementById("grid");

function render(lista){
grid.innerHTML = lista.map(l=>`
<div class="card">
  <div>
    <div class="title">${l.nome}</div>
    <div class="desc">${l.desc}</div>
  </div>

  <div class="actions">
    <button class="copy" onclick="copiar('${l.url}')">Copiar</button>
    <button class="open" onclick="abrir('${l.url}')">Abrir</button>
  </div>
</div>
`).join("");
}

render(links);

function copiar(texto){
navigator.clipboard.writeText(texto);

mostrarToast("Link copiado!");
}

function abrir(url){
window.open(url,"_blank");
}

function mostrarToast(msg){
const t = document.getElementById("toast");
t.innerText = msg;
t.classList.add("show");

setTimeout(()=>t.classList.remove("show"),1500);
}

function filtrar(valor){
const v = valor.toLowerCase();

const filtrado = links.filter(l =>
l.nome.toLowerCase().includes(v) ||
l.desc.toLowerCase().includes(v)
);

render(filtrado);
}

</script>

</body>
</html>

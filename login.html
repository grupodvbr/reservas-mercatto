<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OTTO</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#020617;
  font-family:Inter;
  overflow:hidden;
}

/* FUNDO PREMIUM */
.bg{
  position:absolute;
  width:100%;
  height:100%;
  background:
    radial-gradient(circle at 20% 30%, #3b82f633, transparent),
    radial-gradient(circle at 80% 70%, #6366f133, transparent);
  animation:move 10s infinite alternate;
}

@keyframes move{
  0%{transform:scale(1)}
  100%{transform:scale(1.3)}
}

/* CARD */
.card{
  position:relative;
  z-index:2;
  width:360px;
  padding:35px;
  border-radius:20px;

  background:rgba(15,23,42,.8);
  backdrop-filter:blur(15px);

  box-shadow:0 25px 60px rgba(0,0,0,.6);

  text-align:center;

  animation:fadeIn .6s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px)}
  to{opacity:1; transform:translateY(0)}
}

/* LOGO */
.logo{
  font-size:30px;
  font-weight:900;
  color:#3b82f6;
  margin-bottom:25px;
}

/* INPUT */
.input{
  position:relative;
  margin:10px 0;
}

input{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#1e293b;
  color:#fff;
  font-size:14px;
}

/* BOTAO */
button{
  width:100%;
  padding:14px;
  margin-top:15px;
  border:none;
  border-radius:12px;

  background:linear-gradient(135deg,#2563eb,#4f46e5);
  color:#fff;
  font-weight:700;

  cursor:pointer;
  transition:.2s;
}

button:hover{
  transform:scale(1.02);
}

/* LOADING */
.loading{
  display:none;
  margin-top:10px;
  color:#94a3b8;
  font-size:13px;
}

/* ERRO */
.erro{
  margin-top:10px;
  font-size:13px;
  color:#ef4444;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="card">
  <div class="logo">OTTO</div>

  <div class="input">
    <input id="usuario" placeholder="Usuário">
  </div>

  <div class="input">
    <input id="senha" type="password" placeholder="Senha">
  </div>

  <button onclick="login()">Entrar</button>

  <div class="loading" id="loading">Verificando...</div>
  <div class="erro" id="erro"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseClient = supabase.createClient(
  "https://dxkszikemntfusfyrzos.supabase.co",
  "sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
);

async function login(){

  const usuario = document.getElementById("usuario").value.trim();
  const senha = document.getElementById("senha").value.trim();

  const erro = document.getElementById("erro");
  const loading = document.getElementById("loading");

  erro.innerText = "";
  loading.style.display = "block";

  try{

    const { data, error } = await supabaseClient
      .from("usuarios_do_sistema")
      .select("*")
      .eq("usuario", usuario)
      .eq("senha", senha)
      .eq("ativo", true)
      .maybeSingle();

    if(error || !data){
      throw new Error("Usuário ou senha inválidos");
    }

    // 🔥 BLOQUEIO
    if(data.nivel_acesso == 0){
      throw new Error("Acesso bloqueado");
    }

    // SALVA
    localStorage.setItem("usuarioLogado", JSON.stringify(data));

    // ANIMAÇÃO
    document.body.style.opacity = "0";

    setTimeout(()=>{
      location.href = "index.html";
    },400);

  }catch(err){
    erro.innerText = err.message;
  }

  loading.style.display = "none";
}
</script>

</body>
</html>

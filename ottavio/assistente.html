<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Assistente IA • Mercatto</title>

<meta name="viewport"
content="width=device-width,
initial-scale=1,
maximum-scale=1,
user-scalable=no">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

:root{
--bg:#020617;
--card:#0f172a;
--user:#1e293b;
--assistant:#22c55e;
--text:#f1f5f9;
--border:#334155;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:Inter;
background:var(--bg);
color:var(--text);
display:flex;
flex-direction:column;
height:100vh;
}

/* HEADER */

.header{
padding:16px;
border-bottom:1px solid var(--border);
font-weight:700;
}

/* CHAT */

.messages{
flex:1;
overflow:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:14px;
}

/* BOLHAS */

.msg{
max-width:70%;
padding:14px;
border-radius:14px;
font-size:14px;
line-height:1.5;
}

.user{
background:var(--user);
align-self:flex-end;
}

.assistant{
background:var(--assistant);
align-self:flex-start;
color:white;
}

/* INPUT */

.send{
display:flex;
gap:10px;
padding:14px;
border-top:1px solid var(--border);
}

.send textarea{
flex:1;
resize:none;
border-radius:10px;
border:1px solid var(--border);
background:var(--card);
color:white;
padding:10px;
height:55px;
}

.send button{
background:#22c55e;
border:none;
color:white;
padding:10px 16px;
border-radius:10px;
font-weight:600;
cursor:pointer;
}

</style>
</head>

<body>

<div class="header">
Assistente IA (Simulação WhatsApp)
</div>

<div id="messages" class="messages"></div>

<div class="send">
<textarea id="input" placeholder="Pergunte como cliente..."></textarea>
<button onclick="enviar()">Enviar</button>
</div>

<script>

const db = supabase.createClient(
"https://dxkszikemntfusfyrzos.supabase.co",
"sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
)

const telefoneFake = "SIMULADOR"

/* RENDER */

function addMsg(text,role){

const div = document.createElement("div")
div.className = "msg " + role
div.innerText = text

document.getElementById("messages").appendChild(div)

setTimeout(()=>{
document.getElementById("messages").scrollTop = 999999
},50)

}

/* ENVIAR */

async function enviar(){

const input = document.getElementById("input")
const msg = input.value.trim()

if(!msg) return

addMsg(msg,"user")

input.value=""

/* SALVA USER */

await db.from("conversas_whatsapp").insert({
telefone: telefoneFake,
mensagem: msg,
role: "user"
})

/* CHAMA IA */

const res = await fetch("/api/ask",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
mensagem: msg,
telefone: telefoneFake
})
})

const data = await res.json()

const resposta = data.resposta || "Erro"

/* MOSTRA */

addMsg(resposta,"assistant")

/* SALVA IA */

await db.from("conversas_whatsapp").insert({
telefone: telefoneFake,
mensagem: resposta,
role: "assistant"
})

}

</script>

</body>
</html>
